<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Duwalcoe Practice Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1f3d;--navy2:#1a3260;--gold:#c8a84b;--cream:#f8f5ef;--smoke:#edeae3;--mist:#d8d4cb;--ink:#1a1a2e;--sage:#2e7d5a;--rose:#9e2a2b;--sky:#2563ab}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:14px}
.shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:16px;border-bottom:2px solid var(--gold)}
.logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold)}.logo em{color:#fff;font-style:italic}
.fsp{font-size:11px;color:#8899bb}
.tright{margin-left:auto;display:flex;align-items:center;gap:12px}
.ss{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.ss-ok{background:#e0f4ea;color:#2e7d5a}.ss-err{background:#fde8e8;color:#9e2a2b}.ss-ld{background:#fdf3d8;color:#8a6200}
.upill{background:var(--navy2);border:1px solid #334466;border-radius:20px;padding:4px 12px;font-size:12px;color:#ccd6ee;display:flex;align-items:center;gap:6px}
.upill select{background:none;border:none;color:#ccd6ee;font-size:12px;font-family:inherit;cursor:pointer;outline:none}
.upill select option{background:var(--navy2);color:#ccd6ee}
.sidebar{background:var(--navy);padding:16px 0;display:flex;flex-direction:column;gap:2px;border-right:1px solid #1e3560}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;color:#8899bb;border-left:3px solid transparent;user-select:none}
.ni:hover{color:#ccd6ee;background:rgba(255,255,255,.05)}.ni.on{color:var(--gold);background:rgba(200,168,75,.08);border-left-color:var(--gold)}
.nsec{font-size:10px;font-weight:700;color:#445577;text-transform:uppercase;letter-spacing:1.2px;padding:8px 20px 4px}
.ndiv{height:1px;background:#1e3560;margin:8px 16px}
#main{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border-radius:10px;border:1px solid var(--smoke);box-shadow:0 4px 24px rgba(15,31,61,.08)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--smoke)}
.ch h2{font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy)}
.cb{padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;user-select:none}
.btn:active{opacity:.8}
.b-nv{background:var(--navy);color:#fff}.b-gd{background:var(--gold);color:#fff}
.b-gh{background:transparent;color:var(--navy);border:1.5px solid var(--mist)}.b-gh:hover{border-color:var(--navy);background:var(--smoke)}
.b-rd{background:var(--rose);color:#fff}.b-sg{background:var(--sage);color:#fff}
.sm{padding:5px 12px;font-size:12px}.xs{padding:3px 9px;font-size:11px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-weight:700;color:#667;text-transform:uppercase;letter-spacing:.5px}
.fld input,.fld select,.fld textarea{border:1.5px solid var(--mist);border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:border-color .15s;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--navy)}
.fld textarea{resize:vertical;min-height:64px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.bx{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.bx-sg{background:#e0f4ea;color:#2e7d5a}.bx-rd{background:#fde8e8;color:#9e2a2b}
.bx-gd{background:#fdf3d8;color:#8a6200}.bx-sk{background:#e0eeff;color:#2563ab}.bx-gr{background:var(--smoke);color:#667}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--navy);color:#ccd6ee;padding:9px 12px;text-align:left;font-size:11px;font-weight:600}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--smoke);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.row:hover td{background:#fafaf8;cursor:pointer}
.stat{background:#fff;border-radius:10px;border:1px solid var(--smoke);padding:16px 18px}
.stat .v{font-family:Georgia,serif;font-size:28px;color:var(--navy)}
.stat .l{font-size:11px;color:#889;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.s-gd{border-top:3px solid var(--gold)}.s-sg{border-top:3px solid var(--sage)}
.s-sk{border-top:3px solid var(--sky)}.s-rd{border-top:3px solid var(--rose)}
.ri{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--smoke)}
.ri:last-child{border-bottom:none}
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--smoke)}
.ti:last-child{border-bottom:none}
.tcb{width:18px;height:18px;border:2px solid var(--mist);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tcb.dn{background:var(--sage);border-color:var(--sage)}.tcb.dn::after{content:'✓';color:#fff;font-size:11px;font-weight:900}
.ov{position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(15,31,61,.2)}
.mh{padding:20px 24px 16px;border-bottom:1px solid var(--smoke);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.mh h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--navy)}
.mb{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.mf{padding:14px 24px;border-top:1px solid var(--smoke);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.xb{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1;padding:2px 6px}
.xb:hover{color:var(--rose)}
.phdr{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:10px;padding:24px;color:#fff;display:flex;align-items:flex-start;gap:20px;margin-bottom:16px}
.av{width:56px;height:56px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:22px;color:#fff;flex-shrink:0}
.tabs{display:flex;border-bottom:2px solid var(--smoke);margin-bottom:20px}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:#889;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;user-select:none}
.tab:hover{color:var(--navy)}.tab.on{color:var(--navy);border-bottom-color:var(--gold)}
.sb{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--mist);border-radius:8px;padding:8px 14px;margin-bottom:16px}
.sb input{border:none;outline:none;font-size:14px;font-family:inherit;flex:1;background:transparent}
.empty{text-align:center;padding:40px;color:#aaa}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #ddd;border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:4px solid var(--sage)}.toast.err{border-left:4px solid var(--rose)}
.dr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--smoke);font-size:13px}
.dr:last-child{border-bottom:none}
.dl{color:#889;font-weight:500;flex-shrink:0}.dv{font-weight:600;text-align:right;max-width:65%;word-break:break-word}
.roa-card{border:1.5px solid var(--smoke);border-radius:8px;padding:14px 16px;margin-bottom:10px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--mist);border-radius:3px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <div class="logo">Duwalcoe <em>Practice Manager</em></div>
      <div class="fsp">FSP No: 9978</div>
    </div>
    <div class="tright">
      <span id="todayLbl" style="font-size:12px;color:#8899bb"></span>
      <span id="syncSt" class="ss ss-ld">⏳ Loading…</span>
      <button class="btn b-gh" style="color:#fff;border-color:#334466;font-size:11px;padding:4px 10px" data-act="logout">🔓 Log out</button><div class="upill">👤
        <select id="userSel">
          <option>Clinton</option>
          <option>Wife</option>
          <option>Daughter</option>
        </select>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="nsec">Main</div>
    <div class="ni on" data-nav="dash">🏠 Dashboard</div>
    <div class="ni" data-nav="clients">👥 Clients</div>
    <div class="ni" data-nav="tasks">✅ Tasks <span id="tbadge" style="margin-left:auto;background:var(--rose);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;display:none"></span></div>
    <div class="ndiv"></div>
    <div class="nsec">Tools</div>
    <div class="ni" data-act="fna">📊 Launch FNA</div>
    <div class="ni" data-act="sync">🔄 Sync Now</div>
  </div>

  <div id="main">
    <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px">
      <div class="spin" style="width:48px;height:48px;border-width:4px"></div>
      <p style="color:#889">Connecting to database…</p>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="ov" id="cMod">
  <div class="modal">
    <div class="mh"><h3 id="cModT">Client</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="cModB"></div>
    <div class="mf">
      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-gd sm" data-save="client">💾 Save Client</button>
    </div>
  </div>
</div>
<div class="ov" id="pMod">
  <div class="modal">
    <div class="mh"><h3 id="pModT">Policy</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="pModB"></div>
    <div class="mf">
      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-gd sm" data-save="policy">💾 Save Policy</button>
    </div>
  </div>
</div>
<div class="ov" id="tMod">
  <div class="modal" style="max-width:500px">
    <div class="mh"><h3>New Task</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="tModB"></div>
    <div class="mf">
      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-gd sm" data-save="task">💾 Save Task</button>
    </div>
  </div>
</div>
<div class="ov" id="rMod">
  <div class="modal">
    <div class="mh"><h3>Record of Advice</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="rModB"></div>
    <div class="mf">
      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-gd sm" data-save="roa">💾 Save ROA</button>
    </div>
  </div>
</div>


<div class="ov" id="famMod">
  <div class="modal" style="max-width:500px">
    <div class="mh"><h3 id="famModT">Add Family Member</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="famModB"></div>
    <div class="mf">
      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-gd sm" data-save="fam">💾 Save</button>
    </div>
  </div>
</div>

<div class="ov" id="linkExistMod">
  <div class="modal" style="max-width:500px">
    <div class="mh"><h3 id="linkExistT">Link Existing Client</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb">
      <div class="fld" style="margin-bottom:12px">
        <label>Relationship</label>
        <select id="linkExistRel">
          <option value="Spouse">Spouse</option>
          <option value="Child">Child</option>
          <option value="Parent">Parent</option>
          <option value="Sibling">Sibling</option>
          <option value="Partner">Partner</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="sb"><span style="color:#aaa">🔍</span><input type="text" id="linkExistSrch" placeholder="Search client name…"></div>
      <div id="linkExistResults"><div style="color:#aaa;font-size:13px;padding:8px 0">Type a name to search…</div></div>
    </div>
    <div class="mf"><button class="btn b-gh sm" data-close="1">Cancel</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ═══════════════════════════════════════════════════
var SURL = 'https://script.google.com/macros/s/AKfycbyyp16jr6unqnHpQ5J9vk1gemJn7cjZlymMEARW-hSnITYkzp4FsL_3PXAowW-262GU/exec';

// ══ STATE ════════════════════════════════════════════════════
var DB = {clients:[], policies:[], tasks:[], roas:[], links:[]};
var PAGE = 'dash';
var SEL = null;
var CTAB = 'overview';
var SRCH = '';
var EC = null; // edit client id
var EPC = null; // edit policy client id
var EPI = null; // edit policy index
var RC = null;  // roa client id
var TC = '';    // task client name

// ══ NETWORK ══════════════════════════════════════════════════
function syncNow() {
  setSS('ld');
  window.__duSync = function(d){
    DB.clients  = d.clients  || [];
    DB.policies = d.policies || [];
    DB.tasks    = d.tasks    || [];
    DB.roas     = d.roas     || [];
    DB.links    = d.links    || [];
    try { localStorage.setItem('du_db', JSON.stringify(DB)); } catch(e){}
    setSS('ok');
    render();
    toast('Synced — ' + DB.clients.length + ' clients','ok');
  };
  var old = document.getElementById('__duScript');
  if(old) old.parentNode.removeChild(old);
  var s = document.createElement('script');
  s.id = '__duScript';
  s.src = SURL + '?action=getAll&callback=__duSync&t=' + Date.now();
  s.onerror = function(){
    setSS('err');
    try {
      var c = localStorage.getItem('du_db');
      if(c){ DB = JSON.parse(c); render(); toast('Offline — showing cached data','err'); }
      else { render(); toast('Sync failed','err'); }
    } catch(e){ render(); }
  };
  document.head.appendChild(s);
}

function post(data, cb) {
  var cbName = '__duPost_' + Date.now();
  var s = document.createElement('script');
  window[cbName] = function(d){
    delete window[cbName];
    document.body.removeChild(s);
    try{localStorage.setItem('du_db',JSON.stringify(DB));}catch(e){}
    if(cb)cb(d);
  };
  var payload = encodeURIComponent(JSON.stringify(data));
  s.src = SURL + '?method=POST&payload=' + payload + '&callback=' + cbName + '&t=' + Date.now();
  s.onerror = function(){
    delete window[cbName];
    try{document.body.removeChild(s);}catch(e){}
    toast('Save failed','err');
    if(cb)cb({ok:0});
  };
  document.body.appendChild(s);
}

function setSS(s) {
  var el = document.getElementById('syncSt');
  if(!el) return;
  if(s==='ok'){el.className='ss ss-ok';el.textContent='✅ Synced';}
  else if(s==='err'){el.className='ss ss-err';el.textContent='⚠️ Offline';}
  else{el.className='ss ss-ld';el.textContent='⏳ Syncing…';}
}

// ══ HELPERS ══════════════════════════════════════════════════
function rnd(n){ if(!n||n=='0'||n=='None')return '—'; var v=parseFloat(n); return isNaN(v)?'—':'R '+Math.round(Math.abs(v)).toLocaleString('en-ZA'); }
function ini(n){ return ((n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2)).toUpperCase(); }
function fdate(d){ if(!d||d==='None'||d==='')return '—'; var dt=new Date(d); return isNaN(dt)?String(d):dt.toLocaleDateString('en-ZA'); }
function daysTo(ds){
  if(!ds||ds==='None')return null;
  var today=new Date(); today.setHours(0,0,0,0);
  var d=new Date(ds); if(isNaN(d))return null;
  var ty=new Date(today.getFullYear(),d.getMonth(),d.getDate());
  if(ty<today)ty.setFullYear(today.getFullYear()+1);
  return Math.round((ty-today)/86400000);
}
function cu(){ return document.getElementById('userSel').value||'Clinton'; }
function polsFor(id){ return DB.policies.filter(function(p){return String(p.ClientID)===String(id);}); }
function roasFor(id){ return DB.roas.filter(function(r){return String(r.ClientID)===String(id);}); }
function tasksFor(nm){ return DB.tasks.filter(function(t){return t.ClientName===nm&&!isdone(t);}); }
function isdone(t){ return t.Done===true||t.Done==='TRUE'||t.Done===1||t.Done==='true'; }
function clean(v){ return (!v||v==='None'||v==='0')?'':String(v); }
function togglePolicyOwner(val){
  var el = document.getElementById('pownother');
  if(el) el.style.display = (val==='No') ? 'block' : 'none';
}

function dobFromID(id){
  if(!id||id.length<6)return '';
  var yy=id.slice(0,2),mm=id.slice(2,4),dd=id.slice(4,6);
  if(isNaN(+yy)||isNaN(+mm)||isNaN(+dd))return '';
  return (+yy<30?'20':'19')+yy+'-'+mm+'-'+dd;
}
function g(id){ var e=document.getElementById(id); return e?e.value.trim():''; }
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✓ ':'⚠ ')+msg;
  t.className='toast show '+(type||'ok');
  setTimeout(function(){t.className='toast';},3000);
}
function updateBadge(){
  var n=DB.tasks.filter(function(t){return !isdone(t);}).length;
  var b=document.getElementById('tbadge');
  if(b){b.textContent=n;b.style.display=n>0?'':'none';}
}

// ══ HTML BUILDERS (zero inline onclicks) ═════════════════════
function H(tag,attrs,inner){
  var a=Object.keys(attrs).map(function(k){return k+'="'+attrs[k]+'"';}).join(' ');
  return '<'+tag+(a?' '+a:'')+'>'+( inner!==undefined?inner:'')+'</'+tag+'>';
}
function btn(cls,act,txt,extraAttrs){
  var a=Object.assign({'class':'btn '+cls,'data-act':act},extraAttrs||{});
  return H('button',a,txt);
}
function bx(cls,txt){ return H('span',{'class':'bx '+cls},txt); }

// ══ RENDER ═══════════════════════════════════════════════════
function goPage(p){ PAGE=p; SEL=null; render(); }
function openClient(id){ SEL=id; CTAB='overview'; PAGE='client'; render(); }
function closeAll(){ document.querySelectorAll('.ov').forEach(function(o){o.classList.remove('open');}); }

function render(){
  updateBadge();
  document.querySelectorAll('.ni[data-nav]').forEach(function(n){
    n.classList.toggle('on', n.getAttribute('data-nav')===PAGE);
  });
  var m=document.getElementById('main');
  if(!m)return;
  if(PAGE==='dash')     m.innerHTML=renderDash();
  else if(PAGE==='clients') m.innerHTML=renderClients();
  else if(PAGE==='client')  m.innerHTML=renderProfile();
  else if(PAGE==='tasks')   m.innerHTML=renderTasks();
}

// DASHBOARD
function renderDash(){
  var active=DB.clients.filter(function(c){return c.Status==='Active';});
  var open=DB.tasks.filter(function(t){return !isdone(t);});
  var up=[];
  DB.clients.forEach(function(c){
    if(clean(c.DOB)){var d=daysTo(c.DOB);if(d!==null&&d<=60)up.push({name:c.Name,type:'🎂 Birthday',days:d,col:'var(--gold)'});}
    if(clean(c.ReviewDate)){var d2=daysTo(c.ReviewDate);if(d2!==null&&d2<=60)up.push({name:c.Name,type:'📋 Review',days:d2,col:'var(--sky)'});}
  });
  up.sort(function(a,b){return a.days-b.days;});
  var myT=open.filter(function(t){return t.Assignee===cu();});
  var today=new Date(); today.setHours(0,0,0,0);
  var overdue=myT.filter(function(t){
    if(!clean(t.DueDate))return false;
    var d=new Date(t.DueDate); d.setHours(0,0,0,0);
    return d<today;
  });
  var dueToday=myT.filter(function(t){
    if(!clean(t.DueDate))return false;
    var d=new Date(t.DueDate); d.setHours(0,0,0,0);
    return d.getTime()===today.getTime();
  });
  var future=myT.filter(function(t){
    if(!clean(t.DueDate))return false;

    '</div>'+
    '<div class="cb">'+
    (function(){
      var show = dashFilter==='today'?dueToday:dashFilter==='overdue'?overdue:myT;
      var color = dashFilter==='overdue'?'rose':dashFilter==='today'?'sage':'';
      if(show.length===0) return '<div class="empty">'+(dashFilter==='today'?'No tasks due today ✅':dashFilter==='overdue'?'No overdue tasks ✅':'No open tasks ✅')+'</div>';
      return show.map(function(t){
        var c = dashFilter==='overdue'?'rose':dashFilter==='today'?'sage':'';
        if(!c){
          var d=new Date(t.DueDate); d.setHours(0,0,0,0);
          if(clean(t.DueDate)&&d<today) c='rose';
          else if(clean(t.DueDate)&&d.getTime()===today.getTime()) c='sage';

        return taskRowColored(t,c);

    '</div></div>'+
    '</div>'+
    '<div class="card"><div class="ch"><h2>👥 Recent Clients</h2>'+btn('btn b-gh sm','go-clients','View All →')+'</div>'+

}

  var dob = document.getElementById('fam_dob') ? document.getElementById('fam_dob').value : '';

  var link = {

    DOB: dob,

function upgradeToClient(linkId){
  var lnk = DB.links.find(function(l){ return String(l.ID)===String(linkId); });
  if(!lnk) return;
  var newId = 'new_' + Date.now();
  var c = {
    ID: newId, Name: lnk.Name, IDNumber: lnk.IDNumber, DOB: lnk.DOB,
    Cell: lnk.Cell, Email: lnk.Email, Status: 'Active',
    FamilyType: lnk.Type, Adviser: cu(),
    MaritalStatus:'', Occupation:'', Employer:'', Income:0,
    TaxNo:'', Smoker:'', RiskCategory:'Not Started',
    Gender:'', TelHome:'', TelWork:'', Address:'', DriveUrl:'', Notes:'',
    ReviewDate:'', Anniversary:''
  };
  DB.clients.push(c);
  lnk.IsClient = 'Yes';
  lnk.ClientID = newId;
  closeAll();
  render();
  post({action:'saveClient', client:c}, function(){
    post({action:'upgradeFamMember', id:linkId, clientId:newId}, function(){
      toast(lnk.Name + ' upgraded to client','ok');
    });
  });
  openClient(newId);
}

// ══ MODAL BUILDERS ═══════════════════════════════════════════
function fld(id,lbl,val,type,extra){
  var v=clean(val);
  var t=type||'text';
  if(t==='textarea') return '<div class="fld" style="grid-column:1/-1"><label>'+lbl+'</label><textarea id="'+id+'">'+v+'</textarea></div>';
  if(t==='select'){
    return '<div class="fld"><label>'+lbl+'</label><select id="'+id+'">'+
      (extra||[]).map(function(o){return '<option value="'+o+'"'+((o&&o.trim().toLowerCase())===(v&&v.trim().toLowerCase())?' selected':'')+'>'+( o||'Select…')+'</option>';}).join('')+
      '</select></div>';
  }
  return '<div class="fld"><label>'+lbl+'</label><input type="'+t+'" id="'+id+'" value="'+v+'"'+(extra?' '+extra:'')+' autocomplete="off"></div>';
}
function fs(id,lbl,opts,val){ return fld(id,lbl,val,'select',opts); }

function radioGroup(name, lbl, opts, val){
  return '<div class="fld"><label>'+lbl+'</label>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;padding:6px 0">'+
    opts.map(function(o){
      var checked = (String(val||'')===String(o)) ? 'checked' : '';
      return '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:500">'+
        '<input type="radio" name="'+name+'" value="'+o+'" '+checked+' style="accent-color:var(--navy);width:16px;height:16px"> '+o+'</label>';
    }).join('')+
    '</div></div>';
}

function getRadio(name){ var el=document.querySelector('input[name="'+name+'"]:checked'); return el?el.value:''; }

function saveClient(openFNA){
  var name=g('fn');
  if(!name){toast('Name is required','err');return;}
  if(!getRadio('fgen')&&!g('fgen')){toast('Please select Gender','err');return;}
  if(!getRadio('fsm')&&!g('fsm')){toast('Please select Smoker status','err');return;}
  var id=EC||('new_'+Date.now());
  var c={ID:id,Name:name,IDNumber:g('fi'),DOB:g('fd'),Cell:g('fc'),Email:g('fe'),
    Occupation:g('fo'),Employer:g('fem'),Income:g('finc')||'',TaxNo:g('ftx'),
    Anniversary:g('fann'),MaritalStatus:g('fmar'),Status:g('fst'),ReviewDate:g('fr'),
    Gender:getRadio('fgen')||g('fgen'),Smoker:getRadio('fsm')||g('fsm'),
    Education:g('fedu'),Qualification:g('fqual'),TelHome:g('ftelh'),TelWork:g('ftelw'),
    SpouseName:g('fspname'),SpouseIDNumber:g('fspid'),SpouseDOB:g('fspdob'),SpouseCell:g('fspcell'),SpouseEmail:g('fspemail'),
    Address:g('fadr'),DriveUrl:g('fdr'),Notes:g('fnt'),RiskCategory:g('frc'),Adviser:cu()};
  if(EC){var i=DB.clients.findIndex(function(x){return x.ID===EC;});if(i>=0)DB.clients[i]=c;}
  else DB.clients.push(c);

  // Save children as family members
  if(NEW_CHILDREN && NEW_CHILDREN.length){
    NEW_CHILDREN.forEach(function(ch){
      var chname = document.getElementById('chname_'+ch.id);
      var chdob = document.getElementById('chdob_'+ch.id);
      var chid = document.getElementById('chid_'+ch.id);
      if(chname && chname.value.trim()){
        var link = {ID:'fam_'+Date.now()+'_'+ch.id, PrincipalID:id,
          Name:chname.value.trim(), IDNumber:chid?chid.value:'',
          DOB:chdob?chdob.value:'', Cell:'', Email:'', Type:'Child', IsClient:'No', ClientID:''};
        DB.links.push(link);
        post({action:'saveFamMember', member:link});
      }
    });
    NEW_CHILDREN=[];
  }

  // Save spouse as family member if name entered
  if(g('fspname')){
    var existing = DB.links.find(function(l){ return String(l.PrincipalID)===String(id) && l.Type==='Spouse'; });
    if(!existing){
      var spLink = {ID:'fam_sp_'+Date.now(), PrincipalID:id,
        Name:g('fspname'), IDNumber:g('fspid')||'', DOB:g('fspdob'),
        Cell:g('fspcell'), Email:g('fspemail'), Type:'Spouse', IsClient:'No', ClientID:''};
      DB.links.push(spLink);
      post({action:'saveFamMember', member:spLink});
    } else {
      // Update existing spouse link with latest info from client form
      existing.Name = g('fspname');
      existing.IDNumber = g('fspid')||existing.IDNumber||'';
      existing.DOB  = g('fspdob')||existing.DOB||'';
      existing.Cell = g('fspcell')||existing.Cell||'';
      existing.Email= g('fspemail')||existing.Email||'';
      post({action:'saveFamMember', member:existing});
    }
  }

  EC=null; closeAll(); render();
  post({action:'saveClient',client:c},function(){
    toast('Client saved','ok');
    if(openFNA){
      var fnaUrl = 'https://hayesfinancial.github.io/Duwalcoe-Financial-Consultants/fna.html'+
        '?name='+encodeURIComponent(c.Name)+
        '&id='+encodeURIComponent(c.IDNumber||'')+
        '&dob='+encodeURIComponent(c.DOB||'')+
        '&income='+encodeURIComponent(c.Income||'');
      window.open(fnaUrl,'_blank');
    }
  });
}

function savePolicy(){
  if(!g('pi')){toast('Insurer required','err');return;}
  var now=new Date().toISOString().slice(0,10);
  var existing=polsFor(EPC);
  var oldPol=(EPI!==null&&existing[EPI])?existing[EPI]:null;
  var pol=collectPolicyForm();
  pol.ID=oldPol?oldPol.ID:('p_'+Date.now());
  pol.ClientID=EPC;
  pol.LastUpdated=now;
  pol.CapturedDate=oldPol?(oldPol.CapturedDate||now):now;
  pol.ReplacedBy=oldPol?oldPol.ReplacedBy:'';
  pol.ReplacedDate=oldPol?oldPol.ReplacedDate:'';
  if(EPI!==null&&oldPol){var gi=DB.policies.indexOf(oldPol);if(gi>=0)DB.policies[gi]=pol;}
  else DB.policies.push(pol);
  closeAll();render();
  post({action:'savePolicy',policy:pol},function(){toast('Policy saved','ok');});
}

function replacePolicy(cid,idx){
  var pols=polsFor(cid);
  var old=pols[idx];
  if(!old)return;
  if(!confirm('This will archive the current policy and open a new one. Continue?'))return;
  var gi=DB.policies.indexOf(old);
  var now=new Date().toISOString().slice(0,10);
  if(gi>=0){DB.policies[gi].Status='Replaced';DB.policies[gi].ReplacedDate=now;}
  post({action:'savePolicy',policy:DB.policies[gi]},function(){});
  EPC=cid;EPI=null;
  document.getElementById('pModT').textContent='New Policy — Replacing '+old.PolicyNo;
  buildPolicyForm({Insurer:old.Insurer,Type:old.Type,Product:old.Product});
  document.getElementById('pMod').classList.add('open');
  toast('Old policy archived — capture replacement details','ok');
}

function saveTaskLog(){
  var entry = document.getElementById('tlogentry');
  if(!entry||!entry.value.trim()){ toast('Please enter a note','err'); return; }
  var t = DB.tasks.find(function(x){ return String(x.ID)===String(TASK_LOG_ID); });
  if(!t) return;
  var log = [];
  try{ log = JSON.parse(t.Notes||'[]'); }catch(e){ if(t.Notes) log=[{date:t.Timestamp||'',text:t.Notes,user:t.Assignee||''}]; }
  var reassign = document.getElementById('treassign');
  var newAssignee = reassign ? reassign.value : '';
  var entryText = entry.value.trim();
  if(newAssignee && newAssignee !== t.Assignee){
    entryText += ' [Reassigned to '+newAssignee+']';
    t.Assignee = newAssignee;
  }
  log.push({date:new Date().toISOString(), text:entryText, user:cu()});
  t.Notes = JSON.stringify(log);
  closeAll(); render();
  post({action:'updateTaskNotes',id:TASK_LOG_ID,notes:t.Notes,assignee:t.Assignee},function(){toast('Entry added','ok');});
}

function delTask(id){

  post({action:'deleteRow',sheet:'Tasks',id:id});
}

// ══ EVENT DELEGATION (single listener, handles everything) ════
document.addEventListener('click', function(e){
  // Close overlay on backdrop click
  if(e.target.classList.contains('ov')){closeAll();return;}

  // Walk up to find data-act or data-nav
  var el=e.target;
  while(el && el!==document.body){
    var act=el.getAttribute('data-act');
    var nav=el.getAttribute('data-nav');
    var close=el.getAttribute('data-close');
    var save=el.getAttribute('data-save');

    if(close){closeAll();return;}
    if(save){
      if(save==='client'||save==='client-only')saveClient(false);
      else if(save==='client-fna')saveClient(true);
      else if(save==='policy')savePolicy();
      else if(save==='roa')saveROA();
      else if(save==='task')saveTask();
      else if(save==='fam')saveFamMember();
      else if(save==='task-log')saveTaskLog();
      return;
    }
    if(nav){goPage(nav);return;}
    if(act){
      var id=el.getAttribute('data-id')||'';
      var cid=el.getAttribute('data-cid')||'';
      var idx=el.getAttribute('data-idx');
      switch(act){
        case 'open-client':    openClient(id); break;
        case 'edit-client':    openClientModal(id); break;
        case 'open-new-client':openClientModal(); break;
        case 'go-clients':     goPage('clients'); break;
        case 'open-new-policy':openPolicyModal(cid); break;
        case 'edit-policy':    openPolicyModal(cid,parseInt(idx)); break;
        case 'open-roa':       openROAModal(cid); break;
        case 'open-task':      openTaskModal(el.getAttribute('data-client')||''); break;
        case 'toggle-task':    toggleTask(id, el.getAttribute('data-done')==='true'); break;
        case 'open-task-log':  openTaskLogModal(id); break;
        case 'task-filter':    TASK_FILTER=el.getAttribute('data-filter'); render(); break;
        case 'dash-task-filter': window.DASH_TASK_FILTER=el.getAttribute('data-filter'); render(); break;
        case 'toggle-replaced':   window.SHOW_REPLACED_POLS=!window.SHOW_REPLACED_POLS; render(); break;
        case 'replace-policy':    replacePolicy(el.getAttribute('data-cid'),parseInt(el.getAttribute('data-idx'))); break;
        case 'view-schedule':     openPolicySchedule(el.getAttribute('data-cid')); break;
        case 'select-user':    selectUser(el.getAttribute('data-user')); break;
        case 'logout':         sessionStorage.removeItem('du_auth'); location.reload(); break;
        case 'del-task':       delTask(id); break;
        case 'add-spouse':     openFamModal(id,'Spouse'); break;
        case 'add-child-row':  addChildRow(); break;
        case 'remove-child':   removeChild(id); break;
        case 'add-child':      openFamModal(id,'Child'); break;
        case 'upgrade-client':      upgradeToClient(id); break;
        case 'link-existing':       openLinkExistModal(id, 'Spouse'); break;
        case 'confirm-exist-link':  confirmExistLink(id); break;
        case 'tab':            CTAB=el.getAttribute('data-tab'); render(); break;
        case 'fna':
          var fc = SEL ? DB.clients.find(function(x){ return String(x.ID)===String(SEL); }) : null;
          var furl = 'https://hayesfinancial.github.io/Duwalcoe-Financial-Consultants/fna.html';
          if(fc){
            furl += '?name='+encodeURIComponent(fc.Name||'')+
              '&id='+encodeURIComponent(fc.IDNumber||'')+
              '&dob='+encodeURIComponent(fc.DOB||'')+
              '&income='+encodeURIComponent(fc.Income||'');
          }
          window.open(furl,'_blank');
          break;
        case 'sync':           syncNow(); break;
      }
      return;
    }
    el=el.parentElement;
  }
});

// Search input
document.addEventListener('input', function(e){
  if(e.target.id==='srchBox'){
    SRCH=e.target.value;
    var q=SRCH.toLowerCase();
    var list=SRCH?DB.clients.filter(function(c){
      return (c.Name||'').toLowerCase().indexOf(q)>=0||
             (c.IDNumber||'').toString().indexOf(q)>=0||
             (c.Email||'').toLowerCase().indexOf(q)>=0||
             (c.Cell||'').toString().indexOf(q)>=0;
    }):DB.clients;
    var wrap=document.getElementById('clientTableWrap');
    if(wrap) wrap.innerHTML=clientTable(list,false);
    var hdr=document.getElementById('clientHdr');
    if(hdr) hdr.textContent='Clients ('+list.length+')';
  }
  if(e.target.id==='linkExistSrch'){ searchLinkExist(e.target.value); }
  if(e.target.getAttribute('data-autdob')){
    var dob=dobFromID(e.target.value);
    if(dob){
      var dobFieldId=e.target.getAttribute('data-dobfield');
      var fd=dobFieldId?document.getElementById(dobFieldId):null;
      if(!fd)fd=document.getElementById('fd');
      if(!fd)fd=document.getElementById('fam_dob');
      if(fd&&!fd.value)fd.value=dob;
    }
  }
});

// User selection
document.getElementById('userSel').addEventListener('change',function(){
  localStorage.setItem('du_user',this.value);
});

function selectUser(name){
  sessionStorage.setItem('du_auth','ok');
  sessionStorage.setItem('du_auth_domain', location.hostname);
  localStorage.setItem('du_user', name);
  var lock=document.getElementById('lockScreen');
  if(lock) lock.remove();
  var shell=document.querySelector('.shell');
  if(shell) shell.style.display='';
  var sel=document.getElementById('userSel');
  if(sel) sel.value=name;
  bootApp();
}

function bootApp(){
  document.getElementById('todayLbl').textContent=
    new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
  var su=localStorage.getItem('du_user');
  if(su)document.getElementById('userSel').value=su;
  syncNow();
}

// Clear any stale auth from other domains
try{ if(sessionStorage.getItem('du_auth_domain')!==location.hostname){ sessionStorage.removeItem('du_auth'); sessionStorage.setItem('du_auth_domain',location.hostname); } }catch(e){}
document.getElementById('todayLbl').textContent=
  new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
var su=localStorage.getItem('du_user');
if(su)document.getElementById('userSel').value=su;
if(checkAuth()) bootApp();
