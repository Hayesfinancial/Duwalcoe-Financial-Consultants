<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Duwalcoe CRM</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0f1f3d;--navy2:#1a3260;--gold:#c8a84b;--cream:#f8f5ef;--smoke:#edeae3;--mist:#d8d4cb;--ink:#1a1a2e;--sage:#2e7d5a;--rose:#9e2a2b;--sky:#2563ab}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);font-size:14px}
.shell{display:grid;grid-template-columns:220px 1fr;grid-template-rows:56px 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:1/-1;background:var(--navy);display:flex;align-items:center;padding:0 20px;gap:16px;border-bottom:2px solid var(--gold)}
.logo{font-family:'DM Serif Display',serif;font-size:18px;color:var(--gold)}.logo em{color:#fff;font-style:italic}
.fsp{font-size:11px;color:#8899bb}
.tright{margin-left:auto;display:flex;align-items:center;gap:12px}
.ss{font-size:11px;padding:3px 10px;border-radius:10px;font-weight:600}
.ss-ok{background:#e0f4ea;color:#2e7d5a}.ss-err{background:#fde8e8;color:#9e2a2b}.ss-ld{background:#fdf3d8;color:#8a6200}
.upill{background:var(--navy2);border:1px solid #334466;border-radius:20px;padding:4px 12px;font-size:12px;color:#ccd6ee;display:flex;align-items:center;gap:6px}
.upill select{background:none;border:none;color:#ccd6ee;font-size:12px;font-family:inherit;cursor:pointer;outline:none}
.upill select option{background:var(--navy2);color:#ccd6ee}
.sidebar{background:var(--navy);padding:16px 0;display:flex;flex-direction:column;gap:2px;border-right:1px solid #1e3560}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;font-weight:500;color:#8899bb;border-left:3px solid transparent;user-select:none}
.ni:hover{color:#ccd6ee;background:rgba(255,255,255,.05)}.ni.on{color:var(--gold);background:rgba(200,168,75,.08);border-left-color:var(--gold)}
.nsec{font-size:10px;font-weight:700;color:#445577;text-transform:uppercase;letter-spacing:1.2px;padding:8px 20px 4px}
.ndiv{height:1px;background:#1e3560;margin:8px 16px}
#main{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.card{background:#fff;border-radius:10px;border:1px solid var(--smoke);box-shadow:0 4px 24px rgba(15,31,61,.08)}
.ch{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--smoke)}
.ch h2{font-family:'DM Serif Display',serif;font-size:17px;color:var(--navy)}
.cb{padding:20px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;user-select:none}
.btn:active{opacity:.8}
.b-nv{background:var(--navy);color:#fff}.b-gd{background:var(--gold);color:#fff}
.b-gh{background:transparent;color:var(--navy);border:1.5px solid var(--mist)}.b-gh:hover{border-color:var(--navy);background:var(--smoke)}
.b-rd{background:var(--rose);color:#fff}.b-sg{background:var(--sage);color:#fff}
.sm{padding:5px 12px;font-size:12px}.xs{padding:3px 9px;font-size:11px}
.fld{display:flex;flex-direction:column;gap:5px}
.fld label{font-size:11px;font-weight:700;color:#667;text-transform:uppercase;letter-spacing:.5px}
.fld input,.fld select,.fld textarea{border:1.5px solid var(--mist);border-radius:7px;padding:8px 11px;font-size:13px;font-family:inherit;color:var(--ink);background:#fff;outline:none;transition:border-color .15s;width:100%}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--navy)}
.fld textarea{resize:vertical;min-height:64px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.bx{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase}
.bx-sg{background:#e0f4ea;color:#2e7d5a}.bx-rd{background:#fde8e8;color:#9e2a2b}
.bx-gd{background:#fdf3d8;color:#8a6200}.bx-sk{background:#e0eeff;color:#2563ab}.bx-gr{background:var(--smoke);color:#667}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{background:var(--navy);color:#ccd6ee;padding:9px 12px;text-align:left;font-size:11px;font-weight:600}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--smoke);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr.row:hover td{background:#fafaf8;cursor:pointer}
.stat{background:#fff;border-radius:10px;border:1px solid var(--smoke);padding:16px 18px}
.stat .v{font-family:Georgia,serif;font-size:28px;color:var(--navy)}
.stat .l{font-size:11px;color:#889;font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.s-gd{border-top:3px solid var(--gold)}.s-sg{border-top:3px solid var(--sage)}
.s-sk{border-top:3px solid var(--sky)}.s-rd{border-top:3px solid var(--rose)}
.ri{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--smoke)}
.ri:last-child{border-bottom:none}
.rdot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ti{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--smoke)}
.ti:last-child{border-bottom:none}
.tcb{width:18px;height:18px;border:2px solid var(--mist);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px}
.tcb.dn{background:var(--sage);border-color:var(--sage)}.tcb.dn::after{content:'✓';color:#fff;font-size:11px;font-weight:900}
.ov{position:fixed;inset:0;background:rgba(10,20,40,.55);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.ov.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 12px 48px rgba(15,31,61,.2)}
.mh{padding:20px 24px 16px;border-bottom:1px solid var(--smoke);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:2}
.mh h3{font-family:'DM Serif Display',serif;font-size:18px;color:var(--navy)}
.mb{padding:20px 24px;display:flex;flex-direction:column;gap:14px}
.mf{padding:14px 24px;border-top:1px solid var(--smoke);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:#fff}
.xb{background:none;border:none;font-size:22px;color:#aaa;cursor:pointer;line-height:1;padding:2px 6px}
.xb:hover{color:var(--rose)}
.phdr{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:10px;padding:24px;color:#fff;display:flex;align-items:flex-start;gap:20px;margin-bottom:16px}
.av{width:56px;height:56px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:22px;color:#fff;flex-shrink:0}
.tabs{display:flex;border-bottom:2px solid var(--smoke);margin-bottom:20px}
.tab{padding:10px 18px;font-size:13px;font-weight:600;color:#889;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;user-select:none}
.tab:hover{color:var(--navy)}.tab.on{color:var(--navy);border-bottom-color:var(--gold)}
.sb{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--mist);border-radius:8px;padding:8px 14px;margin-bottom:16px}
.sb input{border:none;outline:none;font-size:14px;font-family:inherit;flex:1;background:transparent}
.empty{text-align:center;padding:40px;color:#aaa}
.spin{display:inline-block;width:20px;height:20px;border:3px solid #ddd;border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:24px;right:24px;background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{border-left:4px solid var(--sage)}.toast.err{border-left:4px solid var(--rose)}
.dr{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--smoke);font-size:13px}
.dr:last-child{border-bottom:none}
.dl{color:#889;font-weight:500;flex-shrink:0}.dv{font-weight:600;text-align:right;max-width:65%;word-break:break-word}
.roa-card{border:1.5px solid var(--smoke);border-radius:8px;padding:14px 16px;margin-bottom:10px}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:var(--mist);border-radius:3px}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div>
      <div class="logo">Duwalcoe <em>Practice Manager</em></div>
      <div class="fsp">FSP No: 9978 &nbsp;·&nbsp; <span style="color:var(--gold);font-weight:700">v3</span></div>
    </div>
    <div class="tright">
      <span id="todayLbl" style="font-size:12px;color:#8899bb"></span>
      <span id="syncSt" class="ss ss-ld">⏳ Loading…</span>
      <button class="btn b-gh" style="color:#fff;border-color:#334466;font-size:11px;padding:4px 10px" data-act="logout">🔓 Log out</button><div class="upill">👤
        <select id="userSel">
          <option>Clinton</option>
          <option>Wife</option>
          <option>Daughter</option>

  <div class="sidebar">
    <div class="nsec">Main</div>

    <div class="ni" data-nav="clients">👥 Clients</div>
    <div class="ni" data-nav="tasks">✅ Tasks <span id="tbadge" style="margin-left:auto;background:var(--rose);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;display:none"></span></div>

    <div class="ni" data-act="sync">🔄 Sync Now</div>

  <div id="main">
    <div style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px">

      <p style="color:#889">Connecting to database…</p>
    </div>
  </div>
</div>

<!-- Modals -->
<div class="ov" id="cMod">
  <div class="modal">
    <div class="mh"><h3 id="cModT">Client</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="cModB"></div>

      <button class="btn b-gh sm" data-close="1">Cancel</button>

  </div>
</div>
<div class="ov" id="pMod">
  <div class="modal">
    <div class="mh"><h3 id="pModT">Policy</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="pModB"></div>
    <div class="mf">
      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-sk sm" onclick="logAnnualReview()">📅 Log Annual Review</button>
      <button class="btn b-gd sm" data-save="policy">💾 Save Policy</button>

</div>
<div class="ov" id="bankMod">
  <div class="modal" style="max-width:480px">
    <div class="mh"><h3 id="bankModT">Bank Account</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb" id="bankModB"></div>

      <button class="btn b-gh sm" data-close="1">Cancel</button>
      <button class="btn b-gd sm" data-save="bank">💾 Save Account</button>

</div>
<div class="ov" id="polHistMod">
  <div class="modal" style="max-width:700px">

<div class="ov" id="tMod">

<div class="ov" id="famMod">

<div class="ov" id="linkExistMod">
  <div class="modal" style="max-width:500px">
    <div class="mh"><h3 id="linkExistT">Link Existing Client</h3><button class="xb" data-close="1">✕</button></div>
    <div class="mb">
      <div class="fld" style="margin-bottom:12px">
        <label>Relationship</label>
        <select id="linkExistRel">
          <option value="Spouse">Spouse</option>
          <option value="Child">Child</option>
          <option value="Parent">Parent</option>
          <option value="Sibling">Sibling</option>
          <option value="Partner">Partner</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="sb"><span style="color:#aaa">🔍</span><input type="text" id="linkExistSrch" placeholder="Search client name…"></div>
      <div id="linkExistResults"><div style="color:#aaa;font-size:13px;padding:8px 0">Type a name to search…</div></div>
    </div>
    <div class="mf"><button class="btn b-gh sm" data-close="1">Cancel</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ CONFIG ═══════════════════════════════════════════════════
var SURL = 'https://script.google.com/macros/s/AKfycbw_I8Md3snxG36VJb00gIIgbag_2-k0zUkkmzS15kDzpCO37RJSS16hTdhhpS_v5onr/exec';

// ══ STATE ════════════════════════════════════════════════════
var DB = {clients:[], policies:[], tasks:[], roas:[], links:[]};
var PAGE = 'dash';
var SEL = null;
var CTAB = 'overview';
var SRCH = '';
var EC = null; // edit client id
var EPC = null; // edit policy client id
var EPI = null; // edit policy index
var RC = null;  // roa client id
var TC = '';    // task client name

// ══ NETWORK ══════════════════════════════════════════════════
function syncNow() {
  setSS('ld');
  window.__duSync = function(d){
    // Preserve LastAccessed timestamps before overwriting with fresh sheet data
    var lastAccessed = {};
    try {
      var oldStr = localStorage.getItem('du_db');
      if(oldStr){ var oldDB=JSON.parse(oldStr); (oldDB.clients||[]).forEach(function(c){ if(c.LastAccessed) lastAccessed[String(c.ID)]=c.LastAccessed; }); }
    } catch(e){}
    if(d.clients&&d.clients[0]) console.log('DATE DEBUG - first client StartDate sample from policies:', d.policies&&d.policies[0]?d.policies[0].StartDate:'no policies');
    DB.clients  = d.clients  || [];
    DB.policies = d.policies || [];
    DB.tasks    = d.tasks    || [];
    DB.roas     = d.roas     || [];
    DB.links    = d.links    || [];
    // Restore LastAccessed from dedicated recent store (more reliable than DB cache)
    try{
      var ra=JSON.parse(localStorage.getItem(recentKey())||'{}');
      DB.clients.forEach(function(c){ if(ra[String(c.ID)]) c.LastAccessed=ra[String(c.ID)]; });
    }catch(e){}
    // Also fall back to DB cache timestamps
    DB.clients.forEach(function(c){ if(!c.LastAccessed && lastAccessed[String(c.ID)]) c.LastAccessed=lastAccessed[String(c.ID)]; });
    try { localStorage.setItem('du_db', JSON.stringify(DB)); } catch(e){}
    setSS('ok');
    render();
    toast('Synced — ' + DB.clients.length + ' clients','ok');
  };
  var old = document.getElementById('__duScript');
  if(old) old.parentNode.removeChild(old);
  var s = document.createElement('script');
  s.id = '__duScript';
  s.src = SURL + '?action=getAll&callback=__duSync&t=' + Date.now();
  s.onerror = function(){
    setSS('err');
    try {
      var c = localStorage.getItem('du_db');
      if(c){ DB = JSON.parse(c); render(); toast('Offline — showing cached data','err'); }
      else { render(); toast('Sync failed','err'); }
    } catch(e){ render(); }
  };
  document.head.appendChild(s);
}

function post(data, cb) {
  var cbName = '__duPost_' + Date.now();
  var s = document.createElement('script');
  window[cbName] = function(d){
    delete window[cbName];
    document.body.removeChild(s);
    try{localStorage.setItem('du_db',JSON.stringify(DB));}catch(e){}
    if(cb)cb(d);
  };
  var payload = encodeURIComponent(JSON.stringify(data));
  s.src = SURL + '?method=POST&payload=' + payload + '&callback=' + cbName + '&t=' + Date.now();
  s.onerror = function(){
    delete window[cbName];
    try{document.body.removeChild(s);}catch(e){}
    toast('Save failed','err');
    if(cb)cb({ok:0});
  };
  document.body.appendChild(s);
}

function setSS(s) {
  var el = document.getElementById('syncSt');
  if(!el) return;
  if(s==='ok'){el.className='ss ss-ok';el.textContent='✅ Synced';}
  else if(s==='err'){el.className='ss ss-err';el.textContent='⚠️ Offline';}
  else{el.className='ss ss-ld';el.textContent='⏳ Syncing…';}
}

// ══ HELPERS ══════════════════════════════════════════════════
function rnd(n){ if(!n||n=='0'||n=='None')return '—'; var v=parseFloat(n); return isNaN(v)?'—':'R '+Math.round(Math.abs(v)).toLocaleString('en-ZA'); }
function ini(n){ return ((n||'?').split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2)).toUpperCase(); }
function fdate(d){ if(!d||d==='None'||d==='')return '—'; var dt=new Date(d); return isNaN(dt)?String(d):dt.toLocaleDateString('en-ZA'); }
function daysTo(ds){
  if(!ds||ds==='None')return null;
  var today=new Date(); today.setHours(0,0,0,0);
  var d=new Date(ds); if(isNaN(d))return null;
  var ty=new Date(today.getFullYear(),d.getMonth(),d.getDate());
  if(ty<today)ty.setFullYear(today.getFullYear()+1);
  return Math.round((ty-today)/86400000);
}
function cu(){ return document.getElementById('userSel').value||'Clinton'; }
function recentKey(){ return 'du_recent_'+cu(); }
function polsFor(id){ return DB.policies.filter(function(p){return String(p.ClientID)===String(id);}); }
function roasFor(id){ return DB.roas.filter(function(r){return String(r.ClientID)===String(id);}); }
function tasksFor(nm){ return DB.tasks.filter(function(t){return t.ClientName===nm&&!isdone(t);}); }
function isdone(t){ return t.Done===true||t.Done==='TRUE'||t.Done===1||t.Done==='true'; }
function clean(v){ if(v===0||v==='0') return '0'; return (!v||v==='None')?'':String(v); }
function togglePolicyOwner(val){
  var el = document.getElementById('pownother');
  if(el) el.style.display = (val==='No') ? 'block' : 'none';
}

function dobFromID(id){
  if(!id||id.length<6)return '';
  var yy=id.slice(0,2),mm=id.slice(2,4),dd=id.slice(4,6);
  if(isNaN(+yy)||isNaN(+mm)||isNaN(+dd))return '';
  return (+yy<30?'20':'19')+yy+'-'+mm+'-'+dd;
}
function g(id){ var e=document.getElementById(id); return e?e.value.trim():''; }
function toast(msg,type){
  var t=document.getElementById('toast');
  t.textContent=(type==='ok'?'✓ ':'⚠ ')+msg;
  t.className='toast show '+(type||'ok');
  setTimeout(function(){t.className='toast';},3000);
}
function updateBadge(){
  var n=DB.tasks.filter(function(t){return !isdone(t);}).length;
  var b=document.getElementById('tbadge');
  if(b){b.textContent=n;b.style.display=n>0?'':'none';}
}

// ══ HTML BUILDERS (zero inline onclicks) ═════════════════════
function H(tag,attrs,inner){
  var a=Object.keys(attrs).map(function(k){return k+'="'+attrs[k]+'"';}).join(' ');
  return '<'+tag+(a?' '+a:'')+'>'+( inner!==undefined?inner:'')+'</'+tag+'>';
}
function btn(cls,act,txt,extraAttrs){
  var a=Object.assign({'class':'btn '+cls,'data-act':act},extraAttrs||{});
  return H('button',a,txt);
}
function bx(cls,txt){ return H('span',{'class':'bx '+cls},txt); }

// ══ RENDER ═══════════════════════════════════════════════════
function goPage(p){
  PAGE=p; SEL=null;
  // Before rendering dashboard, refresh LastAccessed from du_recent store
  if(p==='dash'){
    try{
      var ra=JSON.parse(localStorage.getItem(recentKey())||'{}');
      DB.clients.forEach(function(c){ if(ra[String(c.ID)]) c.LastAccessed=ra[String(c.ID)]; });
    }catch(e){}
  }
  render();
}
function openClient(id){
  SEL=id; CTAB='overview'; PAGE='client';
  // Track last accessed - write to dedicated key so it survives full DB resyncs
  var c=DB.clients.find(function(x){return String(x.ID)===String(id);});
  if(c){
    c.LastAccessed=Date.now();
    try{
      // Store in dedicated recent-access store keyed by client ID
      var ra={};
      try{ ra=JSON.parse(localStorage.getItem(recentKey())||'{}'); }catch(e){}
      ra[String(id)]=Date.now();
      localStorage.setItem(recentKey(), JSON.stringify(ra));
      localStorage.setItem('du_db',JSON.stringify(DB));
    }catch(e){}
  }
  render();
}
function closeAll(){ document.querySelectorAll('.ov').forEach(function(o){o.classList.remove('open');}); }

function render(){
  updateBadge();
  document.querySelectorAll('.ni[data-nav]').forEach(function(n){
    n.classList.toggle('on', n.getAttribute('data-nav')===PAGE);
  });
  var m=document.getElementById('main');
  if(!m)return;
  if(PAGE==='dash')     m.innerHTML=renderDash();
  else if(PAGE==='clients') m.innerHTML=renderClients();
  else if(PAGE==='client')  m.innerHTML=renderProfile();
  else if(PAGE==='tasks'){  if(!window.TASK_USER_FILTER) window.TASK_USER_FILTER=cu(); m.innerHTML=renderTasks();}
}

// DASHBOARD
function renderDash(){
  var active=DB.clients.filter(function(c){return c.Status==='Active';});
  var open=DB.tasks.filter(function(t){return !isdone(t);});
  var today=new Date(); today.setHours(0,0,0,0);
  var up=[];

  // Birthdays and manual review dates
  DB.clients.forEach(function(c){
    if(clean(c.DOB)){var d=daysTo(c.DOB);if(d!==null&&d<=60)up.push({name:c.Name,id:c.ID,cell:c.Cell||'',type:'🎂 Birthday',days:d,col:'var(--gold)'});}
    if(clean(c.ReviewDate)){var d2=daysTo(c.ReviewDate);if(d2!==null&&d2<=60)up.push({name:c.Name,id:c.ID,cell:c.Cell||'',type:'📋 Review Due',days:d2,col:'var(--sky)'});}
  });

  // Policy anniversaries — add to reminders
  DB.policies.forEach(function(p){
    if(!clean(p.StartDate)) return;
    var client = DB.clients.find(function(x){ return String(x.ID)===String(p.ClientID); });
    if(!client) return;
    // Find next anniversary of start date
    var start = new Date(p.StartDate);
    var ann = new Date(start);
    ann.setFullYear(today.getFullYear());
    if(ann < today) ann.setFullYear(today.getFullYear()+1);
    var diff = Math.round((ann - today)/(1000*60*60*24));
    if(diff <= 60){
      var label = p.Insurer ? p.Insurer+(p.PolicyType?' — '+p.PolicyType:'') : (p.PolicyType||'Policy');
      up.push({name:client.Name,id:client.ID,cell:client.Cell||'',type:'📄 '+label+' anniversary',days:diff,col:'var(--sage)'});
    }
  });

  up.sort(function(a,b){return a.days-b.days;});

  var myT=open.filter(function(t){return window.DASH_USER_FILTER==='All'||(t.Assignee||'Clinton')===window.DASH_USER_FILTER;});
  var overdue=myT.filter(function(t){
    if(!clean(t.DueDate))return false;
    var d=new Date(t.DueDate); d.setHours(0,0,0,0);
    return d<today;
  });
  var dueToday=myT.filter(function(t){
    if(!clean(t.DueDate))return false;
    var d=new Date(t.DueDate); d.setHours(0,0,0,0);
    return d.getTime()===today.getTime();
  });
  var dashFilter = window.DASH_TASK_FILTER||'today';
  if(!window.DASH_USER_FILTER) window.DASH_USER_FILTER=cu();
  var reviewsDue=DB.clients.filter(function(c){var d=daysTo(c.ReviewDate);return d!==null&&d<=30;}).length;

  // Recent clients — sorted by LastAccessed, only those actually opened
  var recentClients = DB.clients.filter(function(c){ return c.LastAccessed; })
    .slice().sort(function(a,b){ return (b.LastAccessed||0)-(a.LastAccessed||0); }).slice(0,8);

  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h1 style="font-family:\'DM Serif Display\',serif;font-size:22px;color:var(--navy)">Dashboard</h1><button class="btn b-gh sm" data-act="sync">🔄 Sync</button></div>'+
  '<div class="g4">'+
    '<div class="stat s-gd" style="cursor:pointer" data-act="go-clients"><div class="v">'+active.length+'</div><div class="l">Active Clients</div></div>'+
    '<div class="stat s-sg"><div class="v">'+up.filter(function(u){return u.days<=30;}).length+'</div><div class="l">Reminders (30d)</div></div>'+
    '<div class="stat s-sk"><div class="v">'+open.length+'</div><div class="l">Open Tasks</div></div>'+
    '<div class="stat s-rd"><div class="v">'+reviewsDue+'</div><div class="l">Reviews Due (30d)</div></div>'+
    '</div>'+
    '<div class="g2">'+

    // LEFT: Reminders
    '<div class="card"><div class="ch"><h2>📅 Reminders (60 days)</h2></div><div class="cb">'+
    (up.length===0?'<div class="empty">Nothing coming up 🎉</div>':
    up.slice(0,10).map(function(u){
      var col=u.days<=7?'var(--rose)':u.days<=14?'var(--gold)':'var(--sage)';
      return '<div class="ri" style="cursor:pointer" data-act="open-client" data-id="'+u.id+'">'+
        '<div class="rdot" style="background:'+u.col+';flex-shrink:0"></div>'+
        '<div style="flex:1"><div style="font-weight:600">'+u.name+'</div>'+
        '<div style="font-size:11px;color:#889;display:flex;gap:8px;flex-wrap:wrap">'+
        '<span>'+u.type+'</span>'+
        (u.cell?'<span>📱 '+u.cell+'</span>':'')+
        '</div></div>'+
        '<div style="font-weight:700;font-size:12px;color:'+col+'">'+
        (u.days===0?'Today!':u.days===1?'Tomorrow':'In '+u.days+'d')+'</div></div>';
    }).join(''))+'</div></div>'+

    // RIGHT: Tasks
    '<div class="card">'+
    '<div class="ch"><h2>✅ My Tasks</h2>'+btn('btn b-gd xs','open-task','+ Task')+'</div>'+
    '<div style="display:flex;gap:6px;padding:8px 16px;border-bottom:1px solid var(--smoke)">'+
    ['All','Clinton','Wife','Daughter'].map(function(u){
      var active=window.DASH_USER_FILTER===u;
      return '<button class="btn '+(active?'b-nv':'b-gh')+' xs" data-act="dash-user-filter" data-filter="'+u+'">'+u+'</button>';
    }).join('')+
    '</div>'+
    (overdue.length?'<div style="background:#fde8e8;border-left:4px solid var(--rose);padding:10px 16px;font-size:13px;font-weight:700;color:var(--rose);cursor:pointer" data-act="dash-task-filter" data-filter="overdue">🚨 '+overdue.length+' overdue — click to view</div>':'')+
    '<div style="display:flex;gap:6px;padding:10px 16px;border-bottom:1px solid var(--smoke)">'+
    ['today','overdue','all'].map(function(f){
      var isActive=dashFilter===f;
      var label=f==='today'?'Today':f==='overdue'?'Overdue':'All';
      return '<button class="btn '+(isActive?'b-nv':'b-gh')+' xs" data-act="dash-task-filter" data-filter="'+f+'">'+label+'</button>';
    }).join('')+
    '</div>'+
    '<div class="cb">'+
    (function(){
      var show=dashFilter==='today'?dueToday:dashFilter==='overdue'?overdue:myT;
      if(show.length===0) return '<div class="empty">'+(dashFilter==='today'?'No tasks due today ✅':dashFilter==='overdue'?'No overdue tasks ✅':'No open tasks ✅')+'</div>';
      return show.map(function(t){
        var c='';
        if(clean(t.DueDate)){
          var d=new Date(t.DueDate); d.setHours(0,0,0,0);
          if(d<today) c='rose'; else if(d.getTime()===today.getTime()) c='sage';
        }
        return taskRowColored(t,c);
      }).join('');
    })()+
    '</div></div>'+
    '</div>'+

    // BOTTOM: Recent Clients (only shows if any have been opened)
    '<div class="card">'+
    '<div class="ch"><h2>🕐 Recent Clients</h2>'+btn('btn b-gh sm','go-clients','View All →')+'</div>'+
    (recentClients.length===0?
      '<div class="empty" style="padding:16px">Open a client record to start tracking recent activity</div>':
      clientTable(recentClients, true))+
    '</div>';
}

function upgradeToClient(linkId){
  var lnk = DB.links.find(function(l){ return String(l.ID)===String(linkId); });
  // Handle virtual spouse entry (from client record, not yet in DB.links)
  if(!lnk && String(linkId).indexOf('virtual_sp_')===0){
    var principalId = linkId.replace('virtual_sp_','');
    var principal = DB.clients.find(function(x){ return String(x.ID)===String(principalId); });
    if(!principal || !clean(principal.SpouseName)) return;
    // Create a real link entry first
    lnk = {ID:'fam_sp_'+Date.now(), PrincipalID:principalId,
      Name:principal.SpouseName, IDNumber:principal.SpouseIDNumber||'',
      DOB:principal.SpouseDOB||'', Cell:principal.SpouseCell||'',
      Email:principal.SpouseEmail||'', Type:'Spouse', IsClient:'No', ClientID:''};
    DB.links.push(lnk);
    post({action:'saveFamMember', member:lnk});
  }
  if(!lnk) return;
  // Get principal to copy shared details like Anniversary across
  var principal2 = DB.clients.find(function(x){ return String(x.ID)===String(lnk.PrincipalID); });
  var newId = 'new_' + Date.now();
  var c = {
    ID: newId, Name: lnk.Name, IDNumber: lnk.IDNumber, DOB: lnk.DOB,
    Cell: lnk.Cell, Email: lnk.Email, Status: 'Active',
    FamilyType: lnk.Type, Adviser: cu(),
    MaritalStatus: principal2 ? (principal2.MaritalStatus||'') : '',
    Occupation:'', Employer:'', Income:0,
    TaxNo:'', Smoker:'', RiskCategory:'Not Started',
    Gender:'', TelHome:'', TelWork:'', Address:'', DriveUrl:'', Notes:'', BankDetails:'',
    ReviewDate:'',
    Anniversary: principal2 ? (principal2.Anniversary||'') : ''
  };
  DB.clients.push(c);
  lnk.IsClient = 'Yes';
  lnk.ClientID = newId;
  closeAll();
  render();
  post({action:'saveClient', client:c}, function(){
    post({action:'upgradeFamMember', id:linkId, clientId:newId}, function(){
      toast(lnk.Name + ' upgraded to client','ok');
    });
  });
  openClient(newId);
}

function renderOverview(c,pols,roas,ctasks){
  var tPrem=pols.reduce(function(s,p){return s+parseFloat(p.Premium||0);},0);
  var tDeath=pols.filter(function(p){return p.Type!=='Business Assurance';}).reduce(function(s,p){return s+parseFloat(p.BenDeath||0);},0);
  var tDis=pols.reduce(function(s,p){return s+parseFloat(p.BenDisability||0);},0);
  var tDD=pols.reduce(function(s,p){return s+parseFloat(p.BenDreadDisease||0);},0);
  var tBizCover=pols.filter(function(p){return p.Type==='Business Assurance';}).reduce(function(s,p){return s+parseFloat(p.LoanAmount||0)+parseFloat(p.BenDeath||0);},0);
  var famMembers=famFor(c.ID);
  // If SpouseName on client record but not yet in DB.links, show them as a virtual entry
  if(clean(c.SpouseName) && !famMembers.find(function(m){return m.Type==='Spouse';})){
    famMembers = [{
      ID:'virtual_sp_'+c.ID,
      PrincipalID:c.ID,
      Name:c.SpouseName,
      IDNumber:c.SpouseIDNumber||'',
      DOB:c.SpouseDOB||'',
      Cell:c.SpouseCell||'',
      Email:c.SpouseEmail||'',
      Type:'Spouse',
      IsClient:'No',
      ClientID:'',
      _virtual:true

function fld(id,lbl,val,type,extra){

  if(t==='textarea') return '<div class="fld" style="grid-column:1/-1"><label>'+lbl+'</label><textarea id="'+id+'">'+v+'</textarea></div>';

}

// 3-part date picker: Day / Month / Year -> hidden YYYY-MM-DD field
function parseDateVal(val){
  // Returns {d, m, y} strings padded to 2/4 digits, handles all Sheets formats
  var d='', m='', y='';
  if(!val || val==='None' || val==='') return {d:d,m:m,y:y};
  var v=String(val).trim();
  var parts;
  // YYYY-MM-DD
  parts=v.split('-');
  if(parts.length===3 && parts[0].length===4){
    y=parts[0]; m=parts[1].length===1?'0'+parts[1]:parts[1]; d=parts[2].length===1?'0'+parts[2]:parts[2];
    return {d:d,m:m,y:y};
  }
  // DD/MM/YYYY or M/D/YYYY or MM/DD/YYYY - use JS Date to resolve ambiguity
  parts=v.split('/');
  if(parts.length===3){
    // if last part is 4 digits it's the year
    if(parts[2].length===4){
      y=parts[2];
      // Assume DD/MM/YYYY (SA format)
      d=parts[0].length===1?'0'+parts[0]:parts[0];
      m=parts[1].length===1?'0'+parts[1]:parts[1];
    } else if(parts[0].length===4){
      y=parts[0]; m=parts[1].length===1?'0'+parts[1]:parts[1]; d=parts[2].length===1?'0'+parts[2]:parts[2];
    }
    return {d:d,m:m,y:y};
  }
  // Try JS Date parse as last resort
  var dt=new Date(v);
  if(!isNaN(dt)){
    y=String(dt.getFullYear());
    m=String(dt.getMonth()+1); if(m.length===1) m='0'+m;
    d=String(dt.getDate()); if(d.length===1) d='0'+d;
  }
  return {d:d,m:m,y:y};
}
function fdp(id, lbl, val){
  var p=parseDateVal(val);
  var d=p.d, m=p.m, y=p.y;
  var months=['','January','February','March','April','May','June','July','August','September','October','November','December'];
  var days=''; for(var i=1;i<=31;i++) days+='<option value="'+(i<10?'0'+i:i)+'"'+(d===(i<10?'0'+i:String(i))?' selected':'')+'>'+i+'</option>';
  var mons=''; for(var j=1;j<=12;j++){ var mv=j<10?'0'+j:String(j); mons+='<option value="'+mv+'"'+(m===mv?' selected':'')+'>'+months[j]+'</option>'; }
  var yrs='<option value="">Year</option>'; var cy=new Date().getFullYear();
  for(var k=cy+5;k>=1920;k--) yrs+='<option value="'+k+'"'+(y===String(k)?' selected':'')+'>'+k+'</option>';
  var normVal=(y&&m&&d)?y+'-'+m+'-'+d:(val||'');
  return '<div class="fld">'+
    '<label>'+lbl+'</label>'+
    '<input type="hidden" id="'+id+'" value="'+normVal+'">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'+
    '<select id="'+id+'_y" data-fdp="'+id+'" style="border:1.5px solid var(--mist);border-radius:7px;padding:8px 6px;font-size:13px"><option value="">Year</option>'+yrs+'</select>'+
    '<select id="'+id+'_m" data-fdp="'+id+'" style="border:1.5px solid var(--mist);border-radius:7px;padding:8px 6px;font-size:13px"><option value="">Month</option>'+mons+'</select>'+
    '<select id="'+id+'_d" data-fdp="'+id+'" style="border:1.5px solid var(--mist);border-radius:7px;padding:8px 6px;font-size:13px"><option value="">Day</option>'+days+'</select>'+
    '</div></div>';
}

function saveClient(openFNA){
  var name=g('fn');
  if(!name){toast('Name is required','err');return;}
  if(!getRadio('fgen')&&!g('fgen')){toast('Please select Gender','err');return;}
  if(!getRadio('fsm')&&!g('fsm')){toast('Please select Smoker status','err');return;}
  var id=EC||('new_'+Date.now());
  var c={ID:id,Name:name,Title:g('fttl'),IDNumber:g('fi'),DOB:g('fd'),Cell:g('fc'),Email:g('fe'),
    Occupation:g('fo'),Employer:g('fem'),Income:g('finc')||'',TaxNo:g('ftx'),
    Anniversary:g('fann'),MaritalStatus:g('fmar'),Status:g('fst'),ReviewDate:g('fr'),
    Gender:getRadio('fgen')||g('fgen'),Smoker:getRadio('fsm')||g('fsm'),
    Education:g('fedu'),Qualification:g('fqual'),TelHome:g('ftelh'),TelWork:g('ftelw'),
    SpouseName:g('fspname'),SpouseIDNumber:g('fspid'),SpouseDOB:g('fspdob'),SpouseCell:g('fspcell'),SpouseEmail:g('fspemail'),
    Address:g('fadr'),DriveUrl:g('fdr'),Notes:g('fnt'),RiskCategory:g('frc'),Adviser:cu()};
  if(EC){var i=DB.clients.findIndex(function(x){return x.ID===EC;});if(i>=0)DB.clients[i]=c;}
  else DB.clients.push(c);

  // Save children as family members
  if(NEW_CHILDREN && NEW_CHILDREN.length){
    NEW_CHILDREN.forEach(function(ch){
      var chname = document.getElementById('chname_'+ch.id);
      var chdob = document.getElementById('chdob_'+ch.id);
      var chid = document.getElementById('chid_'+ch.id);
      if(chname && chname.value.trim()){
        var link = {ID:'fam_'+Date.now()+'_'+ch.id, PrincipalID:id,
          Name:chname.value.trim(), IDNumber:chid?chid.value:'',
          DOB:chdob?chdob.value:'', Cell:'', Email:'', Type:'Child', IsClient:'No', ClientID:''};
        DB.links.push(link);
        post({action:'saveFamMember', member:link});
      }
    });
    NEW_CHILDREN=[];
  }

  // Save spouse as family member if name entered
  if(g('fspname')){
    var existing = DB.links.find(function(l){ return String(l.PrincipalID)===String(id) && l.Type==='Spouse'; });
    if(!existing){
      var spLink = {ID:'fam_sp_'+Date.now(), PrincipalID:id,
        Name:g('fspname'), IDNumber:g('fspid')||'', DOB:g('fspdob'),
        Cell:g('fspcell'), Email:g('fspemail'), Type:'Spouse', IsClient:'No', ClientID:''};
      DB.links.push(spLink);
      post({action:'saveFamMember', member:spLink});
    } else {
      // Update existing spouse link with latest info from client form
      existing.Name = g('fspname');
      existing.IDNumber = g('fspid')||existing.IDNumber||'';
      existing.DOB  = g('fspdob')||existing.DOB||'';
      existing.Cell = g('fspcell')||existing.Cell||'';
      existing.Email= g('fspemail')||existing.Email||'';
      post({action:'saveFamMember', member:existing});
    }
  }

  // Sync Anniversary, MaritalStatus, Address to linked spouse client
  if(EC){
    var spouseLink = DB.links.find(function(l){
      return (String(l.PrincipalID)===String(c.ID) || String(l.PrincipalID)===String(c.ID)) && l.Type==='Spouse' && l.IsClient==='Yes' && l.ClientID;
    });
    // Also check if THIS client is a spouse of someone else
    var asSpouseLink = DB.links.find(function(l){ return String(l.ClientID)===String(c.ID) && l.Type==='Spouse'; });
    var linkedPrincipalId = asSpouseLink ? String(asSpouseLink.PrincipalID) : null;
    var linkedSpouseClientId = spouseLink ? String(spouseLink.ClientID) : null;
    var linkedId = linkedSpouseClientId || linkedPrincipalId;
    if(linkedId){
      var linked = DB.clients.find(function(x){ return String(x.ID)===linkedId; });
      if(linked){
        var changed = false;
        if(c.Anniversary && c.Anniversary !== linked.Anniversary){ linked.Anniversary = c.Anniversary; changed=true; }
        if(c.MaritalStatus && c.MaritalStatus !== linked.MaritalStatus){ linked.MaritalStatus = c.MaritalStatus; changed=true; }
        if(c.Address && c.Address !== linked.Address){ linked.Address = c.Address; changed=true; }
        if(changed){ post({action:'saveClient', client:linked}); }
      }
    }
  }

  EC=null; closeAll(); render();
  post({action:'saveClient',client:c},function(){
    toast('Client saved','ok');
    if(openFNA){
      var fnaUrl = 'https://hayesfinancial.github.io/Duwalcoe-Financial-Consultants/fna.html'+
        '?name='+encodeURIComponent(c.Name)+
        '&id='+encodeURIComponent(c.IDNumber||'')+
        '&dob='+encodeURIComponent(c.DOB||'')+
        '&income='+encodeURIComponent(c.Income||'');
      window.open(fnaUrl,'_blank');
    }
  });
}

function snapshotPolicy(pol){
  // Returns a lightweight snapshot of current policy values for history
  return {
    date: new Date().toISOString().slice(0,10),
    by: cu(),
    premium: pol.Premium||'',
    frequency: pol.Frequency||'',
    death: pol.BenDeath||'',
    disability: pol.BenDisability||'',
    dread: pol.BenDreadDisease||'',
    fundValue: pol.BenFundValue||'',
    loanAmount: pol.LoanAmount||'',
    incomeBenefits: pol.IncomeBenefits||'',
    premEsc: pol.PremEscalation||'',
    benEsc: pol.BenEscalation||''
  };
}

function savePolicy(){
  if(!g('pi')){toast('Insurer required','err');return;}
  var now=new Date().toISOString().slice(0,10);
  var existing=polsFor(EPC);
  var oldPol=(EPI!==null&&existing[EPI])?existing[EPI]:null;
  var pol=collectPolicyForm();
  pol.ID=oldPol?oldPol.ID:('p_'+Date.now());
  pol.ClientID=EPC;
  pol.LastUpdated=now;
  pol.CapturedDate=oldPol?(oldPol.CapturedDate||now):now;
  pol.ReplacedBy=oldPol?oldPol.ReplacedBy:(window.REPLACING_POL_ID||'');
  pol.ReplacedDate=oldPol?oldPol.ReplacedDate:'';
  pol.ReplacedPolicyNo=oldPol?oldPol.ReplacedPolicyNo:(window.REPLACING_POL_NO||'');
  if(!oldPol&&window.REPLACING_POL_ID){window.REPLACING_POL_ID=null;window.REPLACING_POL_NO=null;}
  // Keep existing history, don't overwrite
  pol.ReviewHistory=oldPol?(oldPol.ReviewHistory||''):'';
  if(EPI!==null&&oldPol){var gi=DB.policies.indexOf(oldPol);if(gi>=0)DB.policies[gi]=pol;}
  else DB.policies.push(pol);
  closeAll();render();
  post({action:'savePolicy',policy:pol},function(){toast('Policy saved','ok');});
}

function logAnnualReview(){
  var existing=polsFor(EPC);
  var oldPol=(EPI!==null&&existing[EPI])?existing[EPI]:null;
  if(!oldPol){toast('Save policy first before logging a review','err');return;}
  var current=collectPolicyForm();
  var snap=snapshotPolicy(current);
  snap.type='review';
  // Add review note
  var note=prompt('Review notes (e.g. "Annual escalation May 2026 — premium increased from R10,553 to R11,843"):');
  if(note===null)return;
  snap.note=note;
  var history=[];
  try{history=JSON.parse(oldPol.ReviewHistory||'[]');}catch(e){}
  history.push(snap);
  var gi=DB.policies.indexOf(oldPol);
  if(gi>=0){
    DB.policies[gi].ReviewHistory=JSON.stringify(history);
    DB.policies[gi].LastUpdated=snap.date;
    // Also update current values from form
    var updated=collectPolicyForm();
    updated.ID=oldPol.ID;updated.ClientID=EPC;updated.LastUpdated=snap.date;
    updated.CapturedDate=oldPol.CapturedDate||snap.date;
    updated.ReplacedBy=oldPol.ReplacedBy||'';updated.ReplacedDate=oldPol.ReplacedDate||'';
    updated.ReviewHistory=JSON.stringify(history);
    DB.policies[gi]=updated;
    closeAll();render();
    post({action:'savePolicy',policy:DB.policies[gi]},function(){toast('Annual review logged & policy updated','ok');});
  }
}

function replacePolicy(cid,idx){
  var pols=polsFor(cid);
  var old=pols[idx];
  if(!old)return;
  if(!confirm('This will archive '+old.Insurer+' policy '+( old.PolicyNo||'')+ ' and open a new replacement. Continue?'))return;
  var gi=DB.policies.indexOf(old);
  var now=new Date().toISOString().slice(0,10);
  // Snapshot the old policy before archiving
  var snap=snapshotPolicy(old);
  snap.type='replaced';
  snap.note='Policy replaced on '+now+' by '+cu();
  var history=[];
  try{history=JSON.parse(old.ReviewHistory||'[]');}catch(e){}
  history.push(snap);
  if(gi>=0){
    DB.policies[gi].Status='Replaced';
    DB.policies[gi].ReplacedDate=now;
    DB.policies[gi].ReviewHistory=JSON.stringify(history);
  }
  post({action:'savePolicy',policy:DB.policies[gi]},function(){});
  // Open new policy pre-filled with old details, linked back
  EPC=cid;EPI=null;
  window.REPLACING_POL_ID=old.ID;
  window.REPLACING_POL_NO=old.PolicyNo||old.Insurer;
  document.getElementById('pModT').textContent='Replacement Policy — was '+old.Insurer+' '+( old.PolicyNo||'');
  // Pre-fill with all old values so adviser just changes what's different
  var prefill=Object.assign({},old,{

function completeTaskFromLog(){
  var t = DB.tasks.find(function(x){ return String(x.ID)===String(TASK_LOG_ID); });
  if(!t) return;
  var entry = document.getElementById('tlogentry');
  var note = entry && entry.value.trim() ? entry.value.trim() : 'Task completed.';
  var log = [];
  try{ log = JSON.parse(t.Notes||'[]'); }catch(e){ if(t.Notes) log=[{date:t.Timestamp||'',text:t.Notes,user:t.Assignee||''}]; }
  log.push({date:new Date().toISOString(), text:note+' [Marked complete]', user:cu()});
  t.Notes = JSON.stringify(log);
  t.Done = true;
  closeAll(); render();
  post({action:'updateDueDate',id:TASK_LOG_ID,assignee:t.Assignee,dueDate:t.DueDate},function(){});
  post({action:'updateTaskNotes',id:TASK_LOG_ID,notes:t.Notes},function(){});
  post({action:'toggleTask',id:TASK_LOG_ID,done:true},function(){toast('Task completed','ok');});
}

function saveTaskLog(){
  var entry = document.getElementById('tlogentry');
  if(!entry||!entry.value.trim()){ toast('Please enter a note','err'); return; }
  var t = DB.tasks.find(function(x){ return String(x.ID)===String(TASK_LOG_ID); });
  if(!t) return;
  var log = [];
  try{ log = JSON.parse(t.Notes||'[]'); }catch(e){ if(t.Notes) log=[{date:t.Timestamp||'',text:t.Notes,user:t.Assignee||''}]; }
  var reassign = document.getElementById('treassign');
  var newAssignee = reassign ? reassign.value : '';
  var entryText = entry.value.trim();
  if(newAssignee && newAssignee !== t.Assignee){
    entryText += ' [Reassigned to '+newAssignee+']';
    t.Assignee = newAssignee;
  }
  // Always sync and save due date from picker
  fdpSync('tlogdue');
  var newDue = g('tlogdue');
  if(newDue){
    if(newDue !== t.DueDate) entryText += ' [Due date updated to '+fdate(newDue)+']';
    t.DueDate = newDue;
  }
  log.push({date:new Date().toISOString(), text:entryText, user:cu()});
  t.Notes = JSON.stringify(log);
  closeAll(); render();
  // Send date/assignee update separately (small payload) then notes (large payload)
  post({action:'updateDueDate',id:TASK_LOG_ID,assignee:t.Assignee,dueDate:t.DueDate},function(){});
  post({action:'updateTaskNotes',id:TASK_LOG_ID,notes:t.Notes},function(){toast('Entry added','ok');});
}

// ══ EVENT DELEGATION (single listener, handles everything) ════
document.addEventListener('click', function(e){
  // Close overlay on backdrop click
  if(e.target.classList.contains('ov')){closeAll();return;}

  // Walk up to find data-act or data-nav
  var el=e.target;
  while(el && el!==document.body){
    var act=el.getAttribute('data-act');
    var nav=el.getAttribute('data-nav');
    var close=el.getAttribute('data-close');
    var save=el.getAttribute('data-save');

    if(close){closeAll();return;}
    if(save){
      if(save==='client'||save==='client-only')saveClient(false);
      else if(save==='client-fna')saveClient(true);
      else if(save==='policy')savePolicy();
      else if(save==='bank')saveBank();
      else if(save==='roa')saveROA();
      else if(save==='task')saveTask();
      else if(save==='fam')saveFamMember();
      else if(save==='task-log')saveTaskLog();
      return;
    }
    if(nav){goPage(nav);return;}
    if(act){
      var id=el.getAttribute('data-id')||'';
      var cid=el.getAttribute('data-cid')||'';
      var idx=el.getAttribute('data-idx');
      switch(act){
        case 'open-client':    openClient(id); break;
        case 'edit-client':    openClientModal(id); break;
        case 'open-new-client':openClientModal(); break;
        case 'go-clients':     goPage('clients'); break;
        case 'open-new-policy':openPolicyModal(cid); break;
        case 'edit-policy':    openPolicyModal(cid,parseInt(idx)); break;
        case 'pol-history':    openPolicyHistory(cid,parseInt(idx)); break;
        case 'add-bank':       openBankModal(id); break;
        case 'edit-bank':      openBankModal(id,parseInt(idx)); break;
        case 'verify-bank':    verifyBank(id,parseInt(idx)); break;
        case 'del-bank':       deleteBank(id,parseInt(idx)); break;
        case 'replace-policy': replacePolicy(cid,parseInt(idx)); break;
        case 'open-roa':       openROAModal(cid); break;
        case 'open-task':      openTaskModal(el.getAttribute('data-client')||''); break;
        case 'toggle-task':    toggleTask(id, el.getAttribute('data-done')==='true'); break;
        case 'open-task-log':  openTaskLogModal(id); break;
        case 'task-filter':    TASK_FILTER=el.getAttribute('data-filter'); render(); break;
        case 'task-user-filter': window.TASK_USER_FILTER=el.getAttribute('data-filter'); render(); break;
        case 'dash-task-filter': window.DASH_TASK_FILTER=el.getAttribute('data-filter'); render(); break;
        case 'dash-user-filter': window.DASH_USER_FILTER=el.getAttribute('data-filter'); render(); break;
        case 'toggle-replaced':   window.SHOW_REPLACED_POLS=!window.SHOW_REPLACED_POLS; render(); break;
        case 'replace-policy':    replacePolicy(el.getAttribute('data-cid'),parseInt(el.getAttribute('data-idx'))); break;
        case 'view-schedule':     openPolicySchedule(el.getAttribute('data-cid')); break;
        case 'select-user':    selectUser(el.getAttribute('data-user')); break;
        case 'logout':         sessionStorage.removeItem('du_auth'); location.reload(); break;
        case 'del-task':       delTask(id); break;
        case 'add-spouse':     openFamModal(id,'Spouse'); break;
        case 'add-child-row':  addChildRow(); break;
        case 'remove-child':   removeChild(id); break;
        case 'add-child':      openFamModal(id,'Child'); break;
        case 'upgrade-client':      upgradeToClient(id); break;
        case 'link-existing':       openLinkExistModal(id, 'Spouse'); break;
        case 'confirm-exist-link':  confirmExistLink(id); break;
        case 'tab':            CTAB=el.getAttribute('data-tab'); render(); break;
        case 'fna':
          var fc = SEL ? DB.clients.find(function(x){ return String(x.ID)===String(SEL); }) : null;
          var furl = 'https://hayesfinancial.github.io/Duwalcoe-Financial-Consultants/fna.html';
          if(fc){
            furl += '?name='+encodeURIComponent(fc.Name||'')+
              '&id='+encodeURIComponent(fc.IDNumber||'')+
              '&dob='+encodeURIComponent(fc.DOB||'')+
              '&income='+encodeURIComponent(fc.Income||'');
          }
          window.open(furl,'_blank');
          break;
        case 'sync':           syncNow(); break;
      }
      return;
    }
    el=el.parentElement;
  }
});

function openPolicySchedule(cid){
  var c=DB.clients.find(function(x){return String(x.ID)===String(cid);});
  if(!c){toast('Client not found','err');return;}
  var allPols=polsFor(cid).filter(function(p){return p.Status!=='Replaced'&&p.Status!=='Cancelled';});
  var today=new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'});

  function N(v){var n=parseFloat(String(v||'0').replace(/[^0-9.-]/g,''));return isNaN(n)?0:n;}
  function R(v){if(v===0||v==='0')return 'R 0';if(!v||v==='None')return '—';var n=N(v);return isNaN(n)||n===0?'—':'R '+Math.round(n).toLocaleString('en-ZA');}
  function Rpct(v){if(v===0||v==='0')return '0%';if(v===''||v===undefined||v===null||v==='None')return '—';return String(v)+'%';}
  function V(v){if(v===0||v==='0')return '0';return (!v||v==='None')?'—':String(v);}
  function FD(v){if(!v||v==='None')return '—';var p=parseDateVal(v);if(!p.y)return String(v);var mn=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return (p.d||'?')+' '+(mn[parseInt(p.m,10)]||'?')+' '+p.y;}

  // Classify policies into groups
  var raTypes=['Retirement Annuity','Pension Fund','Provident Fund','Pension Preservation','Provident Preservation'];
  var invTypes=['Endowment','Offshore Endowment','Flexible Investment','Offshore Flexible Investment','Unit Trust','Tax Free Savings','Living Annuity'];

  var groups={
    personal: {label:'Personal Life & Risk Cover', color:'#1a2a4a', pols:[]},
    ra:       {label:'Retirement Annuities & Preservation Funds', color:'#2e7d5a', pols:[]},
    invest:   {label:'Investments & Savings', color:'#2563ab', pols:[]},
    medical:  {label:'Medical Aid', color:'#7c3aed', pols:[]},
    business: {label:'Business Assurance', color:'#b45309', pols:[]},
    other:    {label:'Other', color:'#6b7280', pols:[]}
  };

  allPols.forEach(function(p){
    var t=p.Type||'';
    if(t==='Business Assurance') groups.business.pols.push(p);
    else if(t==='Life / Income Protector') groups.personal.pols.push(p);
    else if(raTypes.indexOf(t)>=0) groups.ra.pols.push(p);
    else if(invTypes.indexOf(t)>=0) groups.invest.pols.push(p);
    else if(t==='Medical Aid') groups.medical.pols.push(p);
    else groups.other.pols.push(p);
  });

  // Premium totals
  // Split monthly vs non-monthly premiums
  function isMonthly(p){ var f=p.Frequency||'Monthly'; return f==='Monthly'||f===''; }
  function toMonthly(p){
    var n=N(p.Premium); var f=p.Frequency||'Monthly';
    if(f==='Quarterly') return n/3;
    if(f==='Annually') return n/12;
    return 0; // Once Off and anything else = excluded from monthly
  }

  var totLife=0, totRA=0, totInv=0, totMed=0, totBiz=0, totOther=0;
  var totLifeM=0, totRAM=0, totInvM=0, totMedM=0, totBizM=0, totOtherM=0;
  var nonMonthly=[];

  function addPol(p, totRef, totMRef){
    var n=N(p.Premium);
    totRef.val+=n;
    if(isMonthly(p)) totMRef.val+=n;
    else if(p.Frequency==='Quarterly'||p.Frequency==='Annually') totMRef.val+=toMonthly(p);
    else nonMonthly.push(p); // Once Off
  }

  // Use objects to allow pass-by-ref
  var tL={val:0},tR={val:0},tI={val:0},tM={val:0},tB={val:0},tO={val:0};
  var tLM={val:0},tRM={val:0},tIM={val:0},tMM={val:0},tBM={val:0},tOM={val:0};
  groups.personal.pols.forEach(function(p){
    var n=N(p.Premium); tL.val+=n;
    if(p.Frequency==='Once Off'||p.Frequency==='Lump Sum') nonMonthly.push(p);
    else tLM.val+=(isMonthly(p)?n:toMonthly(p));
  });
  groups.ra.pols.forEach(function(p){
    var n=N(p.Premium); tR.val+=n;
    if(p.Frequency==='Once Off'||p.Frequency==='Lump Sum') nonMonthly.push(p);
    else tRM.val+=(isMonthly(p)?n:toMonthly(p));
  });
  groups.invest.pols.forEach(function(p){
    var n=N(p.Premium); tI.val+=n;
    if(p.Frequency==='Once Off'||p.Frequency==='Lump Sum') nonMonthly.push(p);
    else tIM.val+=(isMonthly(p)?n:toMonthly(p));
  });
  groups.medical.pols.forEach(function(p){
    var n=N(p.Premium); tM.val+=n;
    if(p.Frequency==='Once Off'||p.Frequency==='Lump Sum') nonMonthly.push(p);
    else tMM.val+=(isMonthly(p)?n:toMonthly(p));
  });
  groups.business.pols.forEach(function(p){
    var n=N(p.Premium); tB.val+=n;
    if(p.Frequency==='Once Off'||p.Frequency==='Lump Sum') nonMonthly.push(p);
    else tBM.val+=(isMonthly(p)?n:toMonthly(p));
  });
  groups.other.pols.forEach(function(p){
    var n=N(p.Premium); tO.val+=n;
    if(p.Frequency==='Once Off'||p.Frequency==='Lump Sum') nonMonthly.push(p);
    else tOM.val+=(isMonthly(p)?n:toMonthly(p));
  });

  var totLife=tL.val, totRA=tR.val, totInv=tI.val, totMed=tM.val, totBiz=tB.val, totOther=tO.val;
  var totLifeM=tLM.val, totRAM=tRM.val, totInvM=tIM.val, totMedM=tMM.val, totBizM=tBM.val, totOtherM=tOM.val;
  var totPersonal=totLife+totRA+totInv+totMed+totOther;
  var totPersonalM=totLifeM+totRAM+totInvM+totMedM+totOtherM;
  var totAll=totPersonal+totBiz;
  var totAllM=totPersonalM+totBizM;

  // Build policy detail card
  function buildCard(p, color){
    var bens=[];
    try{bens=p.Beneficiaries?JSON.parse(p.Beneficiaries):[];}catch(e){}
    var benStr=bens.length?bens.map(function(b){return (b.name||b.type)+(b.pct?' ('+b.pct+'%)':'');}).join(', '):'—';
    var incBens=[];
    try{incBens=p.IncomeBenefits?JSON.parse(p.IncomeBenefits):[];}catch(e){}

    var s='<div style="page-break-inside:avoid;border:1px solid #dde0e8;border-radius:8px;margin-bottom:16px;overflow:hidden">';
    s+='<div style="background:'+color+';color:#fff;padding:9px 14px;display:flex;justify-content:space-between;align-items:center">';
    s+='<div><span style="font-size:14px;font-weight:700">'+(p.Insurer||'—')+'</span>';
    if(p.Product) s+=' &nbsp;·&nbsp; <span style="font-size:12px;opacity:.85">'+p.Product+'</span>';
    s+='</div><div style="font-size:11px;opacity:.7">'+V(p.Type)+'</div></div>';
    s+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:0">';

    function cell(lbl,val){return '<div style="padding:7px 14px;border-bottom:1px solid #eef"><div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.4px">'+lbl+'</div><div style="font-weight:600;font-size:13px;margin-top:1px">'+val+'</div></div>';}

    s+=cell('Policy No', V(p.PolicyNo));
    s+=cell('Inception Date', FD(p.StartDate));
    s+=cell('Premium', R(p.Premium)+(p.Frequency&&p.Frequency!=='Monthly'?' / '+p.Frequency:' /pm'));
    s+=cell('Status', V(p.Status||'Active'));
    s+=cell('Premium Escalation', Rpct(p.PremEscalation));
    s+=cell('Benefit Escalation', Rpct(p.BenEscalation));
    s+=cell('Policy Owner', p.ClientIsOwner==='No'?V(p.Owner):'Client');
    s+=cell('Payer', V(p.Payer||c.Name));
    if(p.LoanAmount)     s+=cell('Loan / Business Cover Amount', R(p.LoanAmount));
    if(p.LifeAssured)    s+=cell('Life Assured', V(p.LifeAssured));
    if(p.KeyPosition)    s+=cell('Key Person Position', V(p.KeyPosition));
    if(p.BenDeath)       s+=cell('Death Benefit', R(p.BenDeath));
    if(p.BenDisability)  s+=cell('Capital Disability', R(p.BenDisability));
    if(p.BenDreadDisease)s+=cell('Dread Disease'+(p.DreadDiseaseType?' ('+p.DreadDiseaseType+')':''), R(p.BenDreadDisease)+(p.DreadDiseaseNotes?' — '+p.DreadDiseaseNotes:''));
    if(p.BenFundValue)   s+=cell('Fund Value', R(p.BenFundValue));
    if(p.BenSurrenderValue) s+=cell('Nett Surrender Value', R(p.BenSurrenderValue));
    if(p.MaturityDate)   s+=cell('Maturity Date', FD(p.MaturityDate));
    if(p.BizType)        s+=cell('Business Assurance Type', V(p.BizType));
    if(p.EstateDutiable) s+=cell('Estate Dutiable', V(p.EstateDutiable));
    s+='</div>';

    if(incBens.length){
      s+='<div style="padding:10px 14px;background:#f8f8f5;border-top:1px solid #eef">';
      s+='<div style="font-size:10px;font-weight:700;text-transform:uppercase;color:#c8a84b;margin-bottom:6px">Income Benefits</div>';
      s+='<table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr style="background:#eee">';
      s+='<th style="padding:4px 8px;text-align:left">Type</th><th style="padding:4px 8px;text-align:left">Label</th><th style="padding:4px 8px;text-align:right">Amount/pm</th><th style="padding:4px 8px;text-align:left">Waiting</th><th style="padding:4px 8px;text-align:left">Benefit Period</th><th style="padding:4px 8px;text-align:left">Taxable</th></tr></thead><tbody>';
      incBens.forEach(function(r){s+='<tr><td style="padding:4px 8px">'+V(r.type)+'</td><td style="padding:4px 8px">'+V(r.label)+'</td><td style="padding:4px 8px;text-align:right">'+R(r.amount)+'</td><td style="padding:4px 8px">'+V(r.waiting)+'</td><td style="padding:4px 8px">'+V(r.term)+'</td><td style="padding:4px 8px">'+V(r.taxable)+'</td></tr>';});
      s+='</tbody></table></div>';
    }

    s+='<div style="padding:8px 14px;border-top:1px solid #eef;background:#fafaf8;display:flex;gap:20px">';
    s+='<div><span style="font-size:10px;color:#888;text-transform:uppercase">Beneficiaries</span><div style="font-size:13px;font-weight:600;margin-top:1px">'+benStr+'</div></div></div>';
    if(p.Notes) s+='<div style="padding:6px 14px;border-top:1px solid #eef;font-size:12px;color:#667;font-style:italic">'+p.Notes+'</div>';
    s+='</div>';
    return s;
  }

  // Build section
  function buildSection(grp, color){
    if(!grp.pols.length) return '';
    var s='<div style="margin-bottom:28px">';
    s+='<div style="background:'+color+';color:#fff;padding:10px 16px;border-radius:8px 8px 0 0;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase">'+grp.label+'</div>';
    grp.pols.forEach(function(p){ s+=buildCard(p,color); });
    s+='</div>';
    return s;
  }

  // ── BUILD DOC ──
  var doc='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Policy Schedule — '+c.Name+'</title>';
  doc+='<style>body{font-family:Arial,sans-serif;color:#1a2a4a;font-size:13px;max-width:880px;margin:0 auto;padding:30px}@media print{.noprint{display:none}body{padding:10px}}</style>';
  doc+='</head><body>';

  // Header
  doc+='<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #c8a84b;padding-bottom:14px;margin-bottom:24px">';
  doc+='<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888">Policy Schedule</div>';
  doc+='<div style="font-size:24px;font-weight:700;margin:4px 0">'+c.Name+'</div>';
  doc+='<div style="font-size:12px;color:#666">'+(c.IDNumber?'ID: '+c.IDNumber+'&nbsp;&nbsp;':'')+(c.Cell||'')+'</div></div>';
  doc+='<div style="text-align:right;font-size:12px;color:#666"><strong style="color:#1a2a4a;display:block;font-size:14px">Clinton Hayes</strong>Duwalcoe Financial Consultants CC<br>FSP No: 9978<br>clinton@duwalcoe.co.za<br>083 608 5617<br><br>'+today+'</div></div>';

  // ── PREMIUM SUMMARY BOX ──
  doc+='<div style="border:2px solid #c8a84b;border-radius:10px;padding:18px 20px;margin-bottom:28px;background:#fffdf5">';
  doc+='<div style="font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#c8a84b;margin-bottom:14px">Premium Summary</div>';
  doc+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #eee;border-radius:6px;overflow:hidden">';

  // 3-col row: label | monthly equiv | actual/frequency
  function sumRow(lbl, monthly, actual, freq, bold){
    var st=bold?'font-weight:700;background:#f5f5f0':'';
    var mStr=monthly>0?'R '+Math.round(monthly).toLocaleString('en-ZA'):'—';
    var aStr=actual>0?'R '+Math.round(actual).toLocaleString('en-ZA')+(freq&&freq!=='Monthly'?' / '+freq:''):'—';
    return '<div style="padding:8px 14px;border-bottom:1px solid #eee;'+st+'">'+lbl+'</div>'+
           '<div style="padding:8px 14px;border-bottom:1px solid #eee;text-align:right;color:#2e7d5a;'+st+'">'+mStr+'</div>'+
           '<div style="padding:8px 14px;border-bottom:1px solid #eee;text-align:right;color:#666;font-size:12px;'+st+'">'+aStr+'</div>';
  }

  // Switch to 3-col grid
  doc=doc.replace('grid-template-columns:1fr 1fr','grid-template-columns:2fr 1fr 1fr');

  // Column headers
  doc+='<div style="grid-column:1/-1;display:grid;grid-template-columns:2fr 1fr 1fr;background:#e8e4d8">';
  doc+='<div style="padding:5px 14px;font-size:10px;font-weight:700;text-transform:uppercase;color:#888">Category</div>';
  doc+='<div style="padding:5px 14px;font-size:10px;font-weight:700;text-transform:uppercase;color:#2e7d5a;text-align:right">Monthly Cost</div>';
  doc+='<div style="padding:5px 14px;font-size:10px;font-weight:700;text-transform:uppercase;color:#888;text-align:right">Actual Premium</div>';
  doc+='</div>';

  // Personal section
  doc+='<div style="grid-column:1/-1;background:#1a2a4a;color:#fff;padding:7px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Personal Policies — Your Responsibility</div>';
  if(tL.val>0)  doc+=sumRow('Life & Risk Cover', totLifeM, totLife, '', false);
  if(tR.val>0)  doc+=sumRow('Retirement Annuities & Preservation', totRAM, totRA, '', false);
  if(tI.val>0)  doc+=sumRow('Investments & Savings', totInvM, totInv, '', false);
  if(tM.val>0)  doc+=sumRow('Medical Aid', totMedM, totMed, '', false);
  if(tO.val>0)  doc+=sumRow('Other', totOtherM, totOther, '', false);
  doc+=sumRow('Total Personal /pm', totPersonalM, totPersonalM, '', true);

  // Business section (only if exists)
  if(tB.val>0){
    doc+='<div style="grid-column:1/-1;background:#b45309;color:#fff;padding:7px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Business Assurance — Usually Employer / Company Funded</div>';
    doc+=sumRow('Business Assurance', totBizM, totBiz, '', false);
    doc+=sumRow('Total Business /pm', totBizM, totBizM, '', true);
  }

  // Grand total
  doc+='<div style="grid-column:1/-1;height:2px;background:#c8a84b"></div>';
  doc+=sumRow('TOTAL MONTHLY COST TO CLIENT', totPersonalM, totPersonalM, '', true);

  // Once-off / lump sum note
  if(nonMonthly.length){
    doc+='<div style="grid-column:1/-1;background:#fef3c7;padding:10px 14px;border-top:2px solid #f59e0b">';
    doc+='<div style="font-size:11px;font-weight:700;text-transform:uppercase;color:#92400e;margin-bottom:6px">Once-Off / Lump Sum Contributions (excluded from monthly total)</div>';
    nonMonthly.forEach(function(p){
      doc+='<div style="font-size:12px;padding:3px 0;display:flex;justify-content:space-between"><span>'+(p.Insurer||'')+(p.Product?' — '+p.Product:'')+'</span><span style="font-weight:700">R '+Math.round(N(p.Premium)).toLocaleString('en-ZA')+(p.Frequency?' ('+p.Frequency+')':'')+'</span></div>';
    });
    doc+='</div>';
  }

  doc+='</div></div>';

  // ── POLICY SECTIONS ──
  doc+=buildSection(groups.personal, '#1a2a4a');
  doc+=buildSection(groups.ra,       '#2e7d5a');
  doc+=buildSection(groups.invest,   '#2563ab');
  doc+=buildSection(groups.medical,  '#7c3aed');
  if(groups.other.pols.length) doc+=buildSection(groups.other, '#6b7280');

  // Business assurance - separate section with note
  if(groups.business.pols.length){
    doc+='<div style="margin-top:8px;padding:10px 16px;background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;font-size:12px;color:#92400e;margin-bottom:12px">ℹ️ Business assurance policies are typically funded by the employer or company, not the individual. Premium amounts shown are for record purposes.</div>';
    doc+=buildSection(groups.business, '#b45309');
  }

  doc+='<div style="margin-top:32px;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:12px">Policy schedule prepared by Clinton Hayes, Duwalcoe Financial Consultants CC (FSP No: 9978) on '+today+'. Based on information captured in the practice management system. Please verify all details with the respective product providers.</div>';
  doc+='<div class="noprint" style="position:fixed;bottom:20px;right:20px"><button onclick="window.print()" style="background:#1a2a4a;color:#fff;border:none;padding:10px 24px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;box-shadow:0 4px 12px rgba(0,0,0,.2)">🖨 Print / Save PDF</button></div>';
  doc+='</body></html>';

  var win=window.open('','_blank','width=960,height=900');
  win.document.write(doc);
  win.document.close();
}

function selectUser(name){
  sessionStorage.setItem('du_auth','ok');
  sessionStorage.setItem('du_auth_domain', location.hostname);
  localStorage.setItem('du_user', name);
  var lock=document.getElementById('lockScreen');
  if(lock) lock.remove();
  var shell=document.querySelector('.shell');
  if(shell) shell.style.display='';
  var sel=document.getElementById('userSel');
  if(sel) sel.value=name;
  bootApp();
}

function bootApp(){
  // Version stamp - wipe stale recent-client data from old builds
  try{
    if(localStorage.getItem('du_ver')!=='v15'){
      localStorage.removeItem(recentKey());
      localStorage.removeItem('du_db');
      localStorage.setItem('du_ver','v15');
    }
  }catch(e){}
  document.getElementById('todayLbl').textContent=
    new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
  var su=localStorage.getItem('du_user');
  if(su)document.getElementById('userSel').value=su;
  // Load from cache but ONLY apply LastAccessed from the dedicated du_recent store
  // This prevents stale/wrong timestamps from polluting Recent Clients
  try {
    var cached = localStorage.getItem('du_db');
    if(cached){
      DB = JSON.parse(cached);
      // Strip all LastAccessed from cached DB first
      DB.clients.forEach(function(c){ delete c.LastAccessed; });
      // Re-apply only from the trusted du_recent store
      try{
        var ra=JSON.parse(localStorage.getItem(recentKey())||'{}');
        DB.clients.forEach(function(c){ if(ra[String(c.ID)]) c.LastAccessed=ra[String(c.ID)]; });
      }catch(e){}
      render();
    }
  } catch(e){}
  // Then sync from sheet in background
  syncNow();
}

// Clear any stale auth from other domains
try{ if(sessionStorage.getItem('du_auth_domain')!==location.hostname){ sessionStorage.removeItem('du_auth'); sessionStorage.setItem('du_auth_domain',location.hostname); } }catch(e){}
document.getElementById('todayLbl').textContent=
  new Date().toLocaleDateString('en-ZA',{weekday:'long',day:'numeric',month:'long'});
var su=localStorage.getItem('du_user');
if(su)document.getElementById('userSel').value=su;
if(checkAuth()) bootApp();
</script>
