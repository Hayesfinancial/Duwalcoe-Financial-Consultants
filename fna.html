        // Use the first (primary) beneficiary to seed the simple fields
        var primaryBen = bensArr[0];
        if (!p.BeneficiaryType && primaryBen.type) p.BeneficiaryType = primaryBen.type;
        if (!p.Beneficiary && primaryBen.name)     p.Beneficiary     = primaryBen.name;
        // Auto-set EstateDutiable from type if not set
        if (!p.EstateDutiable) {
          if (p.BeneficiaryType === 'Spouse')        p.EstateDutiable = 'No';
          else if (p.BeneficiaryType === 'Estate')   p.EstateDutiable = 'Yes';
          else if (p.BeneficiaryType === 'Third Party') p.EstateDutiable = 'No';
        }
        p._bensSeeded = true;
      }
    } catch(e) {}
  }

  var benSt = el('div','stitle','Beneficiary & Estate Routing');
  benSt.style.marginTop = '10px';
  card.appendChild(benSt);

  var btr = div();
  btr.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:10px';

  // Beneficiary name
  btr.appendChild(fld('Beneficiary Name', p, 'Beneficiary', { placeholder: 'e.g. Jane Hayes' }));

  // BeneficiaryType select with colour indicator
  var btWrap = div('f');
  var btLbl = el('label','','Beneficiary Type');
  btWrap.appendChild(btLbl);
  var btSel = document.createElement('select');
  btSel.style.cssText = 'border:var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--white)';
  ['','Spouse','Estate','Third Party'].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o;
    opt.textContent = o || '— Select —';
    if ((p.BeneficiaryType || '') === o) opt.selected = true;
    btSel.appendChild(opt);
  });
  btSel.addEventListener('change', function(e) {
    S.importedPols[i].BeneficiaryType = e.target.value;
    // Auto-set EstateDutiable based on type
    if (e.target.value === 'Spouse')       { S.importedPols[i].EstateDutiable = 'No'; }
    else if (e.target.value === 'Estate')  { S.importedPols[i].EstateDutiable = 'Yes'; }
    else if (e.target.value === 'Third Party') { S.importedPols[i].EstateDutiable = 'No'; }
    render();
  });
  btWrap.appendChild(btSel);
  btr.appendChild(btWrap);

  // EstateDutiable
  var edWrap = div('f');
  var edLbl = el('label','','Estate Dutiable');
  edWrap.appendChild(edLbl);
  var edSel = document.createElement('select');
  edSel.style.cssText = 'border:var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;font-weight:700';
  var edVal = p.EstateDutiable || '';
  if (edVal === 'Yes') edSel.style.color = 'var(--orange)';
  else if (edVal === 'No') edSel.style.color = 'var(--green)';
  ['','Yes','No'].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o; opt.textContent = o || '— ?';
    if (edVal === o) opt.selected = true;
    edSel.appendChild(opt);
  });
  edSel.addEventListener('change', function(e) {
    S.importedPols[i].EstateDutiable = e.target.value;
    e.target.style.color = e.target.value === 'Yes' ? 'var(--orange)' : e.target.value === 'No' ? 'var(--green)' : 'var(--sub)';
  });
  edWrap.appendChild(edSel);
  btr.appendChild(edWrap);
  card.appendChild(btr);

  // ── Beneficiary routing explanation
  var bt = p.BeneficiaryType || '';
  if (bt) {
    var routeInf = div();
    routeInf.style.cssText = 'padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:6px';
    if (bt === 'Spouse') {
      routeInf.style.cssText += ';background:#f0fdf4;color:#166534;border:1px solid #86efac';
      routeInf.innerHTML = '✓ <strong>Section 4(q):</strong> Paid direct to spouse — not dutiable, outside estate. No estate duty on this benefit.';
    } else if (bt === 'Estate') {
      routeInf.style.cssText += ';background:#fff7ed;color:#92400e;border:1px solid #fed7aa';
      routeInf.innerHTML = '⚖ <strong>Routed to Estate:</strong> This benefit forms part of the dutiable estate. Estate duty and executor fees will apply.';
    } else if (bt === 'Third Party') {
      routeInf.style.cssText += ';background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe';
      routeInf.innerHTML = '→ <strong>Third Party:</strong> Paid direct to named beneficiary — outside estate. No estate duty on this benefit.';
    }
    card.appendChild(routeInf);
  }

  return card;
}

// ═══════════════════════════════════════════════════════════
// TAB 7 — ESTATE PLANNING
// ═══════════════════════════════════════════════════════════
function buildEstate() {
  var s = div();
  if(!S.scope.estate){
    var wi=div('info'); wi.textContent='Estate planning not selected in Scope.'; s.appendChild(wi); return s;
  }

  var pols = S.importedPols || [];

  // ── Helper: navy calculation box
  function makeCalcBox(title) {
    var box = div();
    box.style.cssText = 'background:var(--navy);color:#fff;border-radius:9px;padding:18px 20px;margin-bottom:16px';
    var ttl = div();
    ttl.style.cssText = 'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:12px';
    ttl.textContent = title;
    box.appendChild(ttl);
    var api = {
      box: box,
      row: function(lbl, val, indent, bold, borderTop) {
        var row = div();
        row.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;padding:5px 0;font-size:13px' +
          (indent ? ';padding-left:18px' : '') +
          (borderTop ? ';border-top:1px solid #334;margin-top:8px;padding-top:10px' : '') +
          (bold ? ';font-weight:700' : '');
        var l = el('span','',lbl); l.style.color = '#ccd6f6';
        var v = el('span','',val); v.style.color = bold ? 'var(--gold)' : '#ccd6f6';
        row.appendChild(l); row.appendChild(v);
        box.appendChild(row);
      },
      sub: function(lbl, val) {
        var row = div();
        row.style.cssText = 'display:flex;justify-content:space-between;padding:2px 0 2px 18px;font-size:11px;color:#8899bb';
        row.innerHTML = '<span>'+lbl+'</span><span>'+val+'</span>';
        box.appendChild(row);
      }
    };
    return api;
  }

  // ── PHYSICAL ASSETS
  s.appendChild(stitle('Assets in Estate'));
  var inf=div('info');
  inf.innerHTML='Only assets that <strong>fall into the estate</strong> are shown. Assets in a trust, CC or with named beneficiaries are excluded from estate duty.';
  s.appendChild(inf);

  var physVal = 0;
  var physLiab = 0;

  // Properties
  if((S.props||[]).length>0||(S.vehicles||[]).length>0||(S.otherAssets||[]).length>0){
    var assetTbl = document.createElement('table');
    assetTbl.style.cssText='width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px';
    assetTbl.innerHTML='<thead><tr><th style="text-align:left;padding:6px 8px;background:var(--navy);color:#fff">Asset</th><th style="text-align:right;padding:6px 8px;background:var(--navy);color:#fff">Value</th><th style="text-align:right;padding:6px 8px;background:var(--navy);color:#fff">Liability</th><th style="text-align:right;padding:6px 8px;background:var(--navy);color:#fff">Net</th><th style="text-align:left;padding:6px 8px;background:var(--navy);color:#fff">Falls to</th></tr></thead>';
    var tbody = document.createElement('tbody');

    function assetRow(desc, val, liab, benType) {
      var net = N(val) - N(liab);
      var tr = document.createElement('tr');
      tr.innerHTML = '<td style="padding:5px 8px;border-bottom:1px solid var(--mist)">'+esc2(desc)+'</td>'+
        '<td style="text-align:right;padding:5px 8px;border-bottom:1px solid var(--mist)">'+Rfmt(val)+'</td>'+
        '<td style="text-align:right;padding:5px 8px;border-bottom:1px solid var(--mist);color:var(--sub)">'+
          (N(liab)>0?'('+Rfmt(liab)+')':'—')+'</td>'+
        '<td style="text-align:right;padding:5px 8px;border-bottom:1px solid var(--mist);font-weight:600">'+Rfmt(net)+'</td>'+
        '<td style="padding:5px 8px;border-bottom:1px solid var(--mist);font-size:11px;color:var(--sub)">'+esc2(benType||'Estate')+'</td>';
      tbody.appendChild(tr);
      physVal += N(val);
      physLiab += N(liab);
    }

    (S.props||[]).forEach(function(p){
      if(N(p.val)>0) assetRow(p.desc||'Property', p.val, p.bond, p.deathBenType||'Estate');
    });
    (S.vehicles||[]).forEach(function(v){
      if(N(v.val)>0) assetRow(v.desc||'Vehicle', v.val, v.finance, v.deathBenType||'Estate');
    });
    (S.otherAssets||[]).forEach(function(a){
      if(N(a.val)>0) assetRow(a.desc||'Asset', a.val, 0, a.deathBenType||'Estate');
    });

    assetTbl.appendChild(tbody);
    s.appendChild(assetTbl);
  }

  var totalDutiableAssets = physVal;

  // ── POLICY ROUTING
  s.appendChild(stitle('Policy Routing'));
  var polInf=div('info');
  polInf.innerHTML='Policies are routed based on the beneficiary type set on each policy card. '+
    '<strong>Spouse</strong> = s.4(q) deduction (not dutiable) · '+
    '<strong>Estate</strong> = dutiable, executor administers · '+
    '<strong>Third Party/Trust</strong> = deemed property (dutiable) · '+
    '<strong>Business Assurance</strong> = outside estate (unless marked dutiable)';
  s.appendChild(polInf);

  var s4qPolicies = 0, estatePols = 0, thirdPartyPols = 0, bizDutiable = 0;
  var s4qAssets = 0;

  // Assets with spouse as beneficiary
  (S.props||[]).forEach(function(p){ if((p.deathBenType||'')==='Spouse') s4qAssets+=N(p.val)-N(p.bond); });
  (S.vehicles||[]).forEach(function(v){ if((v.deathBenType||'')==='Spouse') s4qAssets+=N(v.val)-N(v.finance); });
  (S.otherAssets||[]).forEach(function(a){ if((a.deathBenType||'')==='Spouse') s4qAssets+=N(a.val); });

  var polTbl = document.createElement('table');
  polTbl.style.cssText='width:100%;border-collapse:collapse;margin-bottom:12px;font-size:12px';
  polTbl.innerHTML='<thead><tr><th style="text-align:left;padding:6px 8px;background:var(--navy);color:#fff">Policy</th><th style="text-align:left;padding:6px 8px;background:var(--navy);color:#fff">Beneficiary</th><th style="text-align:left;padding:6px 8px;background:var(--navy);color:#fff">Type</th><th style="text-align:right;padding:6px 8px;background:var(--navy);color:#fff">Amount</th><th style="text-align:left;padding:6px 8px;background:var(--navy);color:#fff">Treatment</th></tr></thead>';
  var polTbody = document.createElement('tbody');

  // Seed BeneficiaryType from Beneficiaries array if not set
  pols.forEach(function(p) {
    if(p.Beneficiaries && !p._bensSeeded){
      try {
        var bens = JSON.parse(p.Beneficiaries);
        if(bens&&bens.length>0){
          if(!p.BeneficiaryType && bens[0].type) p.BeneficiaryType = bens[0].type;
          if(!p.Beneficiary && bens[0].name)     p.Beneficiary     = bens[0].name;
          if(!p.EstateDutiable){
            if(p.BeneficiaryType==='Spouse')       p.EstateDutiable='No';
            else if(p.BeneficiaryType==='Estate')  p.EstateDutiable='Yes';
            else if(p.BeneficiaryType==='Third Party') p.EstateDutiable='Yes';
          }
          p._bensSeeded=true;
        }
      } catch(e){}
    }
  });

  function esc2(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function polRow(insurer,product,beneficiary,benType,amount,treatment,colour){
    var tr=document.createElement('tr');
    tr.innerHTML='<td style="padding:5px 8px;border-bottom:1px solid var(--mist)"><strong>'+esc2(insurer)+'</strong>'+(product?'<br><span style="font-size:10px;color:var(--sub)">'+esc2(product)+'</span>':'')+'</td>'+
      '<td style="padding:5px 8px;border-bottom:1px solid var(--mist);font-size:11px">'+esc2(beneficiary||'—')+'</td>'+
      '<td style="padding:5px 8px;border-bottom:1px solid var(--mist);font-size:11px">'+esc2(benType||'—')+'</td>'+
      '<td style="text-align:right;padding:5px 8px;border-bottom:1px solid var(--mist);font-weight:600">'+Rfmt(amount)+'</td>'+
      '<td style="padding:5px 8px;border-bottom:1px solid var(--mist);font-size:11px;color:'+colour+'">'+esc2(treatment)+'</td>';
    polTbody.appendChild(tr);
  }

  pols.forEach(function(p){
    var bt = p.BeneficiaryType||'';
    if(p.Type==='Business Assurance'){
      var amt = N(p.LoanAmount)||N(p.BenDeath);
      var treatment, colour;
      if(p.EstateDutiable==='Yes'){
        bizDutiable+=amt;
        treatment='Deemed property — dutiable'; colour='#dc2626';
      } else {
        treatment='Outside estate — '+esc2(p.BizType||'Business assurance'); colour='#6b7280';
      }
      if(amt>0) polRow(p.Insurer,p.Product,p.Beneficiary||p.BizType,p.Type,amt,treatment,colour);
      return;
    }
    var ben = N(p.BenDeath);
    if(!ben) return;
    if(bt==='Spouse'){
      s4qPolicies+=ben;
      polRow(p.Insurer,p.Product,p.Beneficiary||'Spouse','Spouse',ben,'s.4(q) — not dutiable','#16a34a');
    } else if(bt==='Estate'){
      estatePols+=ben;
      polRow(p.Insurer,p.Product,'Estate','Estate',ben,'Dutiable — executor administers','#dc2626');
    } else if(bt==='Third Party'){
      thirdPartyPols+=ben;
      polRow(p.Insurer,p.Product,p.Beneficiary||'Third Party','Third Party',ben,'Deemed property — dutiable','#f59e0b');
    } else {
      polRow(p.Insurer,p.Product,p.Beneficiary||'—',bt||'—',ben,'Set beneficiary type on policy card','#9ca3af');
    }
  });

  polTbl.appendChild(polTbody);
  s.appendChild(polTbl);

  // Beneficiary type editors on policies
  var benEdBox=div(); benEdBox.style.cssText='background:#f8fafc;border:var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px';
  var benEdTtl=el('div','stitle','Set Beneficiary Types'); benEdTtl.style.marginBottom='8px'; benEdBox.appendChild(benEdTtl);
  var benInf2=div(); benInf2.style.cssText='font-size:11px;color:var(--sub);margin-bottom:10px';
  benInf2.textContent='Set the beneficiary type for each policy to model how proceeds route through your estate.';
  benEdBox.appendChild(benInf2);

  pols.forEach(function(p,i){
    if(p.Type==='Business Assurance') return;
    if(!N(p.BenDeath)) return;
    var row=div(); row.style.cssText='display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap';
    var lbl=el('span','',((p.Insurer||'Policy')+(p.Product?' — '+p.Product:''))+' '+Rfmt(p.BenDeath));
    lbl.style.cssText='font-size:12px;min-width:220px';
    row.appendChild(lbl);
    var sel=document.createElement('select');
    sel.style.cssText='border:var(--border);border-radius:5px;padding:4px 8px;font-size:12px;font-family:inherit';
    ['','Spouse','Estate','Third Party'].forEach(function(o){
      var opt=document.createElement('option'); opt.value=o; opt.textContent=o||'— select —';
      if(p.BeneficiaryType===o) opt.selected=true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change',function(e){
      S.importedPols[i].BeneficiaryType=e.target.value;
      if(e.target.value==='Spouse') S.importedPols[i].EstateDutiable='No';
      else if(e.target.value==='Estate') S.importedPols[i].EstateDutiable='Yes';
      else if(e.target.value==='Third Party') S.importedPols[i].EstateDutiable='Yes';
      render();
    });
    row.appendChild(sel);
    var benInp=document.createElement('input'); benInp.type='text'; benInp.placeholder='Beneficiary name';
    benInp.value=p.Beneficiary||''; benInp.style.cssText='border:var(--border);border-radius:5px;padding:4px 8px;font-size:12px;flex:1;min-width:140px';
    benInp.addEventListener('input',function(e){ S.importedPols[i].Beneficiary=e.target.value; });
    row.appendChild(benInp);
    benEdBox.appendChild(row);
  });
  s.appendChild(benEdBox);

  // ── ESTATE DUTY CALCULATION
  // CGT on death is a deemed income tax liability — deductible from estate (s.4(a))
  var _estMR = N(S.cli.grossPM)>0 ? calcMarginalRate(N(S.cli.grossPM)*12) : 0.45;
  var _cgtResult = calcTotalCGT(_estMR*100);
  var cgtLiability = _cgtResult.totalCGT;

  var grossEstate    = totalDutiableAssets + estatePols + thirdPartyPols + bizDutiable + s4qPolicies;
  var netEstate      = Math.max(0, grossEstate - physLiab - cgtLiability);

  // Accrual — on physical assets + RA fund values only (NOT risk policies)
  var accrualClaim = 0;
  var isANC = (S.cli.marital||'').toLowerCase().indexOf('accrual') > -1;
  s.appendChild(stitle('Accrual Calculation'));
  var accrBox=div(); accrBox.style.cssText='background:#fff;border:var(--border);border-radius:8px;padding:14px;margin-bottom:12px';
  if(isANC){
    var accrInf=div('info'); accrInf.textContent='ANC with accrual detected. Accrual is calculated on growth of each spouse\'s estate since marriage. Risk policies are excluded — only physical assets and RA fund values count.';
    s.appendChild(accrInf);
    if(!S.accrual) S.accrual={};
    var ag=g3();
    ag.appendChild(rfld('Client estate at marriage (R)', S.accrual, 'clientStartVal', {onblur:function(){render();}}));
    ag.appendChild(rfld('Spouse current assets (R)', S.accrual, 'spouseCurrentAssets', {onblur:function(){render();}}));
    ag.appendChild(rfld('Spouse estate at marriage (R)', S.accrual, 'spouseStartVal', {onblur:function(){render();}}));
    s.appendChild(ag);
    var raFundValue = pols.reduce(function(a,p){ return POL_RA_TYPES.indexOf(p.Type)>-1?a+N(p.BenFundValue):a; },0);
    var clientCurrentAccrual = Math.max(0, totalDutiableAssets + raFundValue - N(S.accrual.clientStartVal));
    var spouseAccrual = Math.max(0, N(S.accrual.spouseCurrentAssets) - N(S.accrual.spouseStartVal));
    if(clientCurrentAccrual > spouseAccrual) accrualClaim = (clientCurrentAccrual - spouseAccrual) / 2;
    var accrNote=div(); accrNote.style.cssText='font-size:12px;color:var(--sub);margin-top:8px;padding:8px 12px;background:#f0fdf4;border-radius:6px;border:1px solid #bbf7d0';
    accrNote.innerHTML='Client accrual: <strong>'+Rfmt(clientCurrentAccrual)+'</strong> · Spouse accrual: <strong>'+Rfmt(spouseAccrual)+'</strong> · '+
      (accrualClaim>0?'Accrual payable to spouse: <strong>'+Rfmt(accrualClaim)+'</strong>':'No accrual payable (spouse estate grew more)');
    s.appendChild(accrNote);
  } else {
    var noAccrNote=div('info'); noAccrNote.textContent='Not married ANC with accrual — no accrual claim applies.';
    s.appendChild(noAccrNote);
  }

  // s.4(q) and abatement
  var accrualDed  = Math.min(accrualClaim, netEstate);
  var afterAccrual= Math.max(0, netEstate - accrualDed);
  var section4q   = s4qPolicies + s4qAssets;
  var s4qDed      = Math.min(section4q, afterAccrual);
  var afterS4q    = Math.max(0, afterAccrual - s4qDed);
  var dutiable    = Math.max(0, afterS4q - ABATEMENT);
  var estateDuty  = dutiable <= DUTY_THRESH
    ? dutiable * DUTY_RATE1
    : DUTY_THRESH * DUTY_RATE1 + (dutiable - DUTY_THRESH) * DUTY_RATE2;
  var afterAbatement = afterS4q; // apportion against afterS4q — correct s.7 base

  // Apportionment — each category pays proportional share of duty based on afterS4q
  function apportionDuty(val){
    return (afterAbatement>0 && estateDuty>0) ? estateDuty * (val / afterAbatement) : 0;
  }
  var dutyOnPhysical     = apportionDuty(totalDutiableAssets);
  var dutyOnEstatePols   = apportionDuty(estatePols);
  var dutyOnThirdParty   = apportionDuty(thirdPartyPols);
  var dutyOnBizDutiable  = apportionDuty(bizDutiable);
  var dutyPayableByEstate       = dutyOnPhysical + dutyOnEstatePols;
  var dutyPayableByThirdParties = dutyOnThirdParty + dutyOnBizDutiable;

  // ── BOX 1: ESTATE DUTY
  s.appendChild(stitle('Estate Duty'));
  var b1 = makeCalcBox('Estate Duty Calculation');
  b1.row('Gross estate', Rfmt(grossEstate));
  b1.sub('Physical assets + all deemed property (policies)', '');
  if(physLiab>0){ b1.row('Less: Liabilities (bonds, finance, loans)', '('+Rfmt(physLiab)+')', true); }
  if(cgtLiability>0){
    b1.row('Less: CGT on death (s.4(a) — deemed income tax)', '('+Rfmt(cgtLiability)+')', true);
    b1.sub('Inclusion rate 40% · Marginal rate '+Math.round(_estMR*100)+'% · Annual exclusion R300,000 applied', '');
  }
  b1.row('Net estate', Rfmt(netEstate), false, false, true);
  if(accrualDed>0){
    b1.row('Less: Accrual claim (ANC)', '('+Rfmt(accrualDed)+')', true);
    b1.sub('Payable to spouse before estate duty is levied', '');
  }
  b1.row('Less: s.4(q) — spouse policies & assets', '('+Rfmt(s4qDed)+')', true);
  b1.sub('Paid direct to spouse — excluded from estate duty', '');
  b1.row('Less: Primary abatement', '('+Rfmt(Math.min(afterS4q, ABATEMENT))+')', true);
  b1.row('Dutiable amount', Rfmt(dutiable), false, false, true);
  b1.row('Estate duty @ 20%'+(dutiable>DUTY_THRESH?' / 25%':''), Rfmt(Math.round(estateDuty)), false, true, true);
  s.appendChild(b1.box);

  // Duty apportionment breakdown
  if(dutyPayableByThirdParties>0){
    var b1b = makeCalcBox('Duty Apportionment (s.7)');
    b1b.row('Total estate duty', Rfmt(Math.round(estateDuty)));
    b1b.sub('Apportioned in proportion to each category\'s share of the dutiable estate','');
    b1b.row('Payable by estate (physical + estate policies)', Rfmt(Math.round(dutyPayableByEstate)), false, false, true);
    if(dutyOnThirdParty>0){
      b1b.row('Payable by third party / trust beneficiaries', Rfmt(Math.round(dutyOnThirdParty)), true);
      pols.forEach(function(p){
        if((p.BeneficiaryType||'')==='Third Party'&&N(p.BenDeath)>0&&p.Type!=='Business Assurance'){
          b1b.sub((p.Insurer||'Policy')+(p.Product?' \u2014 '+p.Product:'')+' \u00b7 '+Rfmt(p.BenDeath), 'Duty: '+Rfmt(Math.round(apportionDuty(N(p.BenDeath)))));
        }
      });
    }
    if(dutyOnBizDutiable>0){
      b1b.row('Payable by business assurance beneficiary', Rfmt(Math.round(dutyOnBizDutiable)), true);
      pols.forEach(function(p){
        if(p.Type==='Business Assurance'&&p.EstateDutiable==='Yes'){
          var amt=N(p.LoanAmount)||N(p.BenDeath);
          b1b.sub((p.Insurer||'Policy')+(p.BizType?' \u2014 '+p.BizType:''), 'Duty: '+Rfmt(Math.round(apportionDuty(amt))));
        }
      });
    }
    b1b.row('Total duty by third parties', Rfmt(Math.round(dutyPayableByThirdParties)), false, false, true);
    s.appendChild(b1b.box);
  }

  // ── BOX 2: EXECUTOR FEES
  var execFeeBasis = totalDutiableAssets + estatePols;
  var execFees = execFeeBasis * EXEC_RATE;
  s.appendChild(stitle('Executor Fees'));
  var b2 = makeCalcBox('How Executor Fees Are Calculated');
  b2.row('Physical assets in estate', Rfmt(totalDutiableAssets));
  b2.sub('Market value of all assets administered by the executor','');
  if(estatePols>0){
    b2.row('+ Estate-beneficiary policy proceeds', Rfmt(estatePols), true);
    b2.sub('Policies paid into the estate \u2014 executor receives and distributes','');
  }
  b2.row('Executor fee basis', Rfmt(execFeeBasis), false, false, true);
  b2.sub('s.4(q), trust and business assurance proceeds excluded \u2014 not handled by executor','');
  b2.row('\u00d7 Executor fee rate (3.5% + 15% VAT = 4.025%)', '', true);
  b2.row('Executor fees', Rfmt(Math.round(execFees)), false, true, true);
  s.appendChild(b2.box);

  // ── BOX 3: LIQUIDITY
  var liquidCash = (S.otherAssets||[]).reduce(function(sum,a){
    var tp=(a.type||'').toLowerCase();
    var illiquid=tp.indexOf('business')>-1||tp.indexOf('farm')>-1||tp.indexOf('personal')>-1||tp.indexOf('inheritance')>-1;
    return sum + (illiquid?0:N(a.val));
  },0);
  var liqTotal = liquidCash + estatePols;
  var liqNeeds = dutyPayableByEstate + execFees + accrualDed;
  var liqGap   = liqTotal - liqNeeds;

  s.appendChild(stitle('Liquidity Analysis'));
  var b3 = makeCalcBox('Liquid Assets Available to Estate');
  if(estatePols>0){
    b3.row('Estate-beneficiary policy proceeds', Rfmt(estatePols));
    b3.sub('Only policies where executor receives the funds','');
  }
  if(liquidCash>0){
    b3.row('Liquid assets (investments / cash)', Rfmt(liquidCash), true);
    b3.sub('Investment-type assets only \u2014 illiquid assets excluded','');
  }
  b3.row('Total liquid assets available', Rfmt(liqTotal), false, false, true);
  b3.row('Less: Estate duty (estate\u2019s share)', '\u2212 '+Rfmt(Math.round(dutyPayableByEstate)), true, false, true);
  b3.row('Less: Executor fees', '\u2212 '+Rfmt(Math.round(execFees)), true);
  if(accrualDed>0){ b3.row('Less: Accrual claim payable to spouse', '\u2212 '+Rfmt(Math.round(accrualDed)), true); }
  b3.row('Liquidity '+(liqGap>=0?'Surplus':'Shortfall'), (liqGap<0?'\u2212 ':'')+Rfmt(Math.abs(liqGap)), false, true, true);
  s.appendChild(b3.box);

  if(liqGap<0){
    var liqAlert=div('alert');
    liqAlert.innerHTML='\u26a0 <strong>Liquidity shortfall of '+Rfmt(Math.abs(liqGap))+'.</strong> The estate cannot fund its own costs without selling assets. Consider additional estate liquidity cover.';
    s.appendChild(liqAlert);
  } else {
    var liqOk=div('info'); liqOk.style.cssText='background:#f0fdf4;border-color:#86efac;color:#166534';
    liqOk.innerHTML='\u2713 <strong>Estate is liquid.</strong> Available assets cover estate duty, executor fees'+(accrualDed>0?' and the accrual claim':'')+'.';
    s.appendChild(liqOk);
  }

  // ── BOX 4: BENEFICIARY OUTCOME
  s.appendChild(stitle('Beneficiary Outcome'));
  var benBox=div(); benBox.style.cssText='background:var(--navy);color:#fff;border-radius:9px;padding:18px 20px;margin-bottom:16px';

  function benRow(lbl,val,note,colour){
    var row=div();
    row.style.cssText='display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #223';
    var left=div(); left.style.cssText='display:flex;flex-direction:column;gap:2px';
    var ll=el('span','',lbl); ll.style.cssText='font-size:13px;font-weight:600;color:#ccd6f6';
    left.appendChild(ll);
    if(note){ var ln2=el('span','',note); ln2.style.cssText='font-size:11px;color:#8899bb'; left.appendChild(ln2); }
    var vv=el('span','',val); vv.style.cssText='font-size:14px;font-weight:700;color:'+(colour||'var(--gold)');
    row.appendChild(left); row.appendChild(vv);
    benBox.appendChild(row);
  }

  // Spouse s.4(q) policies
  if(s4qPolicies>0||s4qAssets>0){
    var spouseList=pols.filter(function(p){return(p.BeneficiaryType||'')==='Spouse'&&N(p.BenDeath)>0&&p.Type!=='Business Assurance';});
    var spouseNote=spouseList.map(function(p){return(p.Insurer||'')+(p.Product?' \u2014 '+p.Product:'')+': '+Rfmt(p.BenDeath);}).join(' \u00b7 ');
    benRow((S.cli.spouseName||S.cli.spouse||'Spouse')+' \u2014 Section 4(q)',Rfmt(s4qPolicies+s4qAssets),spouseNote||'Paid direct \u2014 not dutiable','#86efac');
  }

  // Spouse inherits residue option
  var afterSpouse = 0;
  var showResidueOpt = true;
  if(showResidueOpt){
    var residueRow=div(); residueRow.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid #223';
    var resCb=document.createElement('input'); resCb.type='checkbox'; resCb.checked=!!S.cli.spouseInheritsResidue;
    resCb.addEventListener('change',function(e){ S.cli.spouseInheritsResidue=e.target.checked; render(); });
    var resLbl=el('span','','Spouse inherits residue of estate (tick to include)');
    resLbl.style.cssText='font-size:12px;color:#8899bb;cursor:pointer';
    residueRow.appendChild(resCb); residueRow.appendChild(resLbl);
    benBox.appendChild(residueRow);

    if(S.cli.spouseInheritsResidue){
      // Residue = what's left after ALL deductions from the estate:
      // Net estate (after liabilities + CGT) − accrual − s.4(q) bequests − estate duty (estate's share) − executor fees
      afterSpouse = Math.max(0, netEstate - Math.round(accrualDed) - Math.round(s4qDed) - Math.round(dutyPayableByEstate) - Math.round(execFees));
      if(afterSpouse>0){
        benRow((S.cli.spouseName||'Spouse')+' \u2014 Residue of estate',Rfmt(afterSpouse),'Net estate after accrual, s.4(q), estate duty and executor fees','#86efac');
      }
    }
  }

  // Estate-beneficiary policies
  if(estatePols>0){
    var estList=pols.filter(function(p){return(p.BeneficiaryType||'')==='Estate'&&N(p.BenDeath)>0;});
    var estNote=estList.map(function(p){return(p.Insurer||'')+(p.Product?' \u2014 '+p.Product:'')+': '+Rfmt(p.BenDeath);}).join(' \u00b7 ');
    benRow('Estate (executor administered)',Rfmt(estatePols),(estNote||'')+' \u2014 funds duty, executor fees, bequests','#fcd34d');
  }

  // Third party policies
  pols.forEach(function(p){
    if((p.BeneficiaryType||'')==='Third Party'&&N(p.BenDeath)>0&&p.Type!=='Business Assurance'){
      var dutyOwed=Math.round(apportionDuty(N(p.BenDeath)));
      var note=(p.Insurer||'')+(p.Product?' \u2014 '+p.Product:'')+' \u00b7 Deemed property \u00b7 Duty share: '+Rfmt(dutyOwed);
      benRow((p.Beneficiary||'Third party')+' \u2014 '+Rfmt(p.BenDeath)+' (direct)',Rfmt(N(p.BenDeath)-dutyOwed)+' net',note,'#ccd6f6');
    }
  });

  // Business assurance
  pols.forEach(function(p){
    if(p.Type==='Business Assurance'){
      var amt=N(p.LoanAmount)||N(p.BenDeath);
      if(!amt) return;
      var dutyOwed2=p.EstateDutiable==='Yes'?Math.round(apportionDuty(amt)):0;
      var note2=(p.Insurer||'')+(p.BizType?' \u2014 '+p.BizType:'')+(dutyOwed2>0?' \u00b7 Deemed property \u00b7 Duty share: '+Rfmt(dutyOwed2):' \u00b7 Outside estate');
      benRow((p.Beneficiary||'Business')+' \u2014 Business assurance',Rfmt(amt),note2,'#ccd6f6');
    }
  });

  s.appendChild(benBox);

  // ── Notes
  s.appendChild(stitle('Estate Planning Notes'));
  s.appendChild(txfld('Notes / recommendations', S, 'estateNotes'));

  return s;
}



function buildSummary() {
  var s = div();
  var inf=div('info'); inf.textContent='This tab summarises all needs versus existing cover. Complete the other tabs first.'; s.appendChild(inf);

  var pols = S.importedPols || [];

  function pct(v){ return N(v)/100; }
  function sTitle(t){ var d=el('div','stitle',t); d.style.margin='20px 0 10px'; s.appendChild(d); }
  function sBox(){ var b=div(); b.style.cssText='background:#1a2a4a;color:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px'; s.appendChild(b); return b; }
  function sRow(b,label,val,sub,total){
    var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(total?'8':'4')+'px 0'+(total?';border-top:1px solid #334;margin-top:6px':'');
    var l=el('span','',label); l.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
    var v=el('span','',val); v.style.cssText='font-weight:'+(total?'700':'400')+';color:#c8a84b;font-size:'+(sub?'11':'12')+'px';
    r.appendChild(l); r.appendChild(v); b.appendChild(r);
  }
  function gapBox(label,need,have){
    var gap=have-need;
    var b=div(); b.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:6px;margin-bottom:8px;background:'+(need>0?(gap>=0?'#f0fdf4':'#fef2f2'):'#f9f9f6')+';border:1px solid '+(need>0?(gap>=0?'#bbf7d0':'#fecaca'):'#e5e5e5');
    var left=el('span','',label); left.style.cssText='font-weight:600;font-size:12px';
    var right=div(); right.style.cssText='text-align:right';
    var needSpan=el('div','','Need: '+(need>0?Rfmt(need):'—')); needSpan.style.cssText='font-size:11px;color:#555';
    var haveSpan=el('div','','Have: '+(have>0?Rfmt(have):'—')); haveSpan.style.cssText='font-size:11px;color:#555';
    var gapSpan=el('div','',need>0?(gap>=0?'\u25b2 '+Rfmt(gap)+' surplus':'\u25bc '+Rfmt(Math.abs(gap))+' shortfall'):'—');
    gapSpan.style.cssText='font-weight:700;font-size:13px;color:'+(need>0?(gap>=0?'#16a34a':'#dc2626'):'#999');
    right.appendChild(needSpan); right.appendChild(haveSpan); right.appendChild(gapSpan);
    b.appendChild(left); b.appendChild(right); s.appendChild(b);
  }

  // ── RISK NEEDS
  if(S.scope.death||S.scope.disability||S.scope.dread||S.scope.ip){
    sTitle('Risk Needs Summary');
    if(S.scope.death){
      // Auto liabilities — same as Needs tab calculation
      var _autoLiabSum=0;
      (S.props||[]).forEach(function(p){ if(N(p.bond)>0) _autoLiabSum+=N(p.bond); });
      (S.vehicles||[]).forEach(function(v){ if(N(v.finance)>0) _autoLiabSum+=N(v.finance); });
      var _smr=N(S.cli.grossPM)>0?calcMarginalRate(N(S.cli.grossPM)*12):0.45;
      _autoLiabSum+=calcTotalCGT(_smr*100).totalCGT;
      if(S.scope.estate){
        // Recalculate estate costs — same logic as Needs tab
        var _spv=(S.props||[]).reduce(function(a,p){return a+N(p.val);},0)+(S.vehicles||[]).reduce(function(a,v){return a+N(v.val);},0)+(S.otherAssets||[]).reduce(function(a,x){return a+N(x.val);},0);
        var _spl=(S.props||[]).reduce(function(a,p){return a+N(p.bond);},0)+(S.vehicles||[]).reduce(function(a,v){return a+N(v.finance);},0)+(S.liabilities||[]).reduce(function(a,l){return a+N(l.bal);},0);
        var _ss4q=0,_sep=0,_stp=0,_sbd=0;
        pols.forEach(function(p){
          if(p.Type==='Business Assurance'){if(p.EstateDutiable==='Yes')_sbd+=N(p.LoanAmount)||N(p.BenDeath);return;}
          var b=N(p.BenDeath);if(!b)return;
          var bt=p.BeneficiaryType||'';
          if(bt==='Spouse')_ss4q+=b;else if(bt==='Estate')_sep+=b;else if(bt==='Third Party')_stp+=b;
        });
        var _sacc=0;
        if((S.cli.marital||'').indexOf('accrual')>-1){
          var _sra=pols.reduce(function(a,p){return POL_RA_TYPES.indexOf(p.Type)>-1?a+N(p.BenFundValue):a;},0);
          var _sce=_spv+_sra,_sse=N(S.accrual&&S.accrual.spouseCurrentAssets);
          var _scs=N(S.accrual&&S.accrual.clientStartVal),_sss=N(S.accrual&&S.accrual.spouseStartVal);
          _sacc=Math.max(0,(Math.max(0,_sce-_scs)-Math.max(0,_sse-_sss))/2);
        }
        var _scgt=calcTotalCGT(_smr*100).totalCGT;
        var _sgr=_spv+_ss4q+_sep+_stp+_sbd;
        var _sne=Math.max(0,_sgr-_spl-_scgt);
        var _sad=Math.min(_sacc,_sne);
        var _saa=Math.max(0,_sne-_sad);
        var _ss4d=Math.min(_ss4q,_saa);
        var _sas4=Math.max(0,_saa-_ss4d);
        var _sdut=Math.max(0,_sas4-ABATEMENT);
        var _sduty=_sdut<=DUTY_THRESH?_sdut*DUTY_RATE1:DUTY_THRESH*DUTY_RATE1+(_sdut-DUTY_THRESH)*DUTY_RATE2;
        var _sexec=(_spv+_sep)*EXEC_RATE;
        function _sap(v){return (_saa>0&&_sduty>0)?Math.round(_sduty*(v/_saa)):0;}
        _autoLiabSum+=_sap(_spv+_sep); // estate duty — estate's share
        _autoLiabSum+=Math.round(_sexec); // executor fees
        _autoLiabSum+=Math.round(_sad); // accrual
      }
      var totLiab=_autoLiabSum+S.deathLiabs.reduce(function(a,r){return a+N(r.amt);},0);
      var totInc=S.deathIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
      var totCap=S.deathCapital.reduce(function(a,r){return a+N(r.amt);},0);
      var totalDeathNeed=totLiab+totInc+totCap;
      var totalDeathHave=pols.reduce(function(a,p){return p.Type!=='Business Assurance'?a+N(p.BenDeath):a;},0);
      gapBox('Life Cover',totalDeathNeed,totalDeathHave);
    }
    if(S.scope.disability){
      var disInc=S.disIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
      var disCap=S.disCapital.reduce(function(a,r){return a+N(r.amt);},0);
      var disHave=pols.reduce(function(a,p){return a+N(p.BenDisability);},0);
      gapBox('Disability',disInc+disCap,disHave);
    }
    if(S.scope.dread){
      var dreadHave=pols.reduce(function(a,p){return a+N(p.BenDreadDisease);},0);
      gapBox('Dread Disease',N(S.dreadAmt),dreadHave);
    }
    if(S.scope.ip){
      var ipHave=pols.reduce(function(a,p){
        var ib=[]; try{ib=JSON.parse(p.IncomeBenefits||'[]');}catch(e){}
        return a+ib.reduce(function(s,b){return s+N(b.amount);},0);
      },0);
      gapBox('Income Protection /pm',N(S.ipGrossPM||S.ipNettPM),ipHave);
    }
  }

  // ── RETIREMENT SUMMARY
  if(S.scope.retirement){
    var cliAge=ageFrom(S.cli.dob), retAge=N(S.cli.retAge)||65;
    var yrsToR2=cliAge?Math.max(0,retAge-cliAge):null;
    var yrsInRet3=Math.max(1,85-retAge);
    if(yrsToR2&&yrsInRet3>0){
      sTitle('Retirement Summary');

      // ── Same logic as buildRetirement calculator ──

      // Rental from properties not sold
      var rentalAtRet3=0;
      (S.props||[]).forEach(function(p){
        if(p.soldAtRetirement||!N(p.rental)) return;
        var escTo=N(p.rentalEsc)>0?N(p.rentalEsc):6;
        rentalAtRet3+=Math.round(N(p.rental)*Math.pow(1+escTo/100,yrsToR2));
      });

      // Other income from farm/business
      var otherIncAtRet3=0;
      (S.otherAssets||[]).forEach(function(a){
        if((a.retirementRole||'')!=='Generates income (farm/business)'||!N(a.retirementIncomePM)) return;
        var escTo=N(a.retirementIncEsc)>0?N(a.retirementIncEsc):N(S.assump.cpi)||6;
        otherIncAtRet3+=Math.round(N(a.retirementIncomePM)*Math.pow(1+escTo/100,yrsToR2));
      });

      // Monthly needs at retirement — per need at own escalation
      var monthlyAtRet3=0;
      (S.retNeeds||[]).forEach(function(r){
        if(!N(r.amtToday)) return;
        var escTo=N(r.esc)>0?N(r.esc):N(S.assump.cpi)||6;
        monthlyAtRet3+=Math.round(N(r.amtToday)*Math.pow(1+escTo/100,yrsToR2));
      });

      var netMonthlyGap3=Math.max(0,monthlyAtRet3-rentalAtRet3-otherIncAtRet3);

      // Capital needed — each need at its own escInRet
      var capNeed3=0;
      (S.retNeeds||[]).forEach(function(r){
        if(!N(r.amtToday)) return;
        var escTo=N(r.esc)>0?N(r.esc):N(S.assump.cpi)||6;
        var escIn=(r.escInRet!==''&&r.escInRet!==undefined&&r.escInRet!==null)?N(r.escInRet):escTo;
        capNeed3+=retirementCapitalNeeded(N(r.amtToday),yrsToR2,yrsInRet3,escTo,S.assump.retReturn,escIn);
      });

      var lumpAtRet3=(S.retLumps||[]).reduce(function(a,r){return a+N(r.amt);},0);
      var totalCapNeeded3=capNeed3+lumpAtRet3;

      // Projected capital: RA funds
      var totalCapAvail3=S.retAssets.reduce(function(a,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
        var gr=N(r.growthRate)>0?N(r.growthRate):N(S.assump.growth)||9;
        var esc2=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
        return a+projectFund(r.currentVal,r.monthlyContrib,esc2,gr,yrsToR2);
      },0)+N(S.retOtherCapital);

      // Sold property proceeds
      var propSold3=0;
      (S.props||[]).forEach(function(p){
        if(!p.soldAtRetirement||!N(p.val)) return;
        var gr=N(p.propGrowth)>0?N(p.propGrowth):N(S.assump.growth)||9;
        var projV=Math.round(N(p.val)*Math.pow(1+gr/100,yrsToR2));
        var pct3=N(p.retirementPct)>0?N(p.retirementPct):100;
        propSold3+=Math.round(projV*pct3/100);
      });
      totalCapAvail3+=propSold3;

      // Sold other asset proceeds
      (S.otherAssets||[]).forEach(function(a){
        if((a.retirementRole||'')!=='Sold at retirement — proceeds to retirement'||!N(a.retirementSaleProceeds)) return;
        var gr=N(a.growthRate)>0?N(a.growthRate):N(S.assump.growth)||9;
        totalCapAvail3+=Math.round(N(a.retirementSaleProceeds)*Math.pow(1+gr/100,yrsToR2));
      });

      var retGap3=totalCapAvail3-totalCapNeeded3;

      var retBox3=sBox();
      function r3Row(lbl,val,sub,bold){
        var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
        var l=el('span','',lbl); l.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
        var v=el('span','',val); v.style.cssText='font-size:'+(sub?'11':'12')+'px;color:#c8a84b'+(bold?';font-weight:700':'');
        r.appendChild(l); r.appendChild(v); retBox3.appendChild(r);
      }
      function r3Sub(l,v){ r3Row(l,v,true,false); }

      // Per-need breakdown
      (S.retNeeds||[]).forEach(function(r){
        if(!N(r.amtToday)) return;
        var escTo=N(r.esc)>0?N(r.esc):N(S.assump.cpi)||6;
        var escIn=(r.escInRet!==''&&r.escInRet!==undefined&&r.escInRet!==null)?N(r.escInRet):escTo;
        var atRet=Math.round(N(r.amtToday)*Math.pow(1+escTo/100,yrsToR2));
        var capThis=retirementCapitalNeeded(N(r.amtToday),yrsToR2,yrsInRet3,escTo,S.assump.retReturn,escIn);
        r3Row(r.desc||'Need', Rfmt(atRet)+' /pm at retirement');
        r3Sub('Capital ('+escIn+'% esc in ret, '+yrsInRet3+' yrs @ '+(N(S.assump.retReturn)||8)+'%)', Rfmt(capThis));
      });
      if(rentalAtRet3>0) r3Row('Less: rental at retirement','('+Rfmt(rentalAtRet3)+'/pm)',true);
      if(otherIncAtRet3>0) r3Row('Less: farm/business at retirement','('+Rfmt(otherIncAtRet3)+'/pm)',true);
      r3Row('Net monthly gap at retirement',Rfmt(netMonthlyGap3)+' /pm',false,true);
      r3Row('Capital needed to fund income','('+Rfmt(capNeed3)+')',false,true);
      if(lumpAtRet3>0) r3Row('Lump sum needs','('+Rfmt(lumpAtRet3)+')',true);
      r3Row('Total capital required','('+Rfmt(totalCapNeeded3)+')',false,true);
      r3Row('Projected capital at retirement',Rfmt(totalCapAvail3),false,true);
      S.retAssets.forEach(function(r){
        if(N(r.currentVal)||N(r.monthlyContrib)){
          var gr=N(r.growthRate)>0?N(r.growthRate):N(S.assump.growth)||9;
          var esc2=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
          r3Sub((r.desc||'Fund')+(N(r.monthlyContrib)?' ('+Rfmt(r.monthlyContrib)+'/pm)':''),Rfmt(projectFund(r.currentVal,r.monthlyContrib,esc2,gr,yrsToR2)));
        }
      });
      if(propSold3>0) r3Sub('Property proceeds',Rfmt(propSold3));
      if(N(S.retOtherCapital)>0) r3Sub('Other capital',Rfmt(N(S.retOtherCapital)));
      var rg3=div(); rg3.style.cssText='display:flex;justify-content:space-between;padding:8px 0;margin-top:8px;border-top:2px solid #445;font-size:14px;font-weight:700';
      var rgl3=el('span','',retGap3>=0?'Surplus':'Shortfall'); rgl3.style.color='#ccd6f6';
      var rgv3=el('span','',Rfmt(Math.abs(retGap3))); rgv3.style.color=retGap3>=0?'#86efac':'#f87171';
      rg3.appendChild(rgl3); rg3.appendChild(rgv3); retBox3.appendChild(rg3);
    }
  }

  // ── ESTATE SUMMARY
  if(S.scope.estate){
    sTitle('Estate Planning Summary');
    var physAssets=(S.props||[]).reduce(function(a,p){return a+N(p.val);},0)
      +(S.vehicles||[]).reduce(function(a,v){return a+N(v.val);},0)
      +(S.otherAssets||[]).reduce(function(a,x){return a+N(x.val);},0);
    var liabs=(S.props||[]).reduce(function(a,p){return a+N(p.bond);},0)
      +(S.vehicles||[]).reduce(function(a,v){return a+N(v.finance);},0)
      +(S.liabilities||[]).reduce(function(a,l){return a+N(l.bal);},0);
    var s4q=0,estPols=0,tpPols=0,bizDut=0;
    pols.forEach(function(p){
      if(p.Type==='Business Assurance'){if(p.EstateDutiable==='Yes')bizDut+=N(p.LoanAmount)||N(p.BenDeath);return;}
      var b=N(p.BenDeath); if(!b) return;
      var bt=p.BeneficiaryType||'';
      if(bt==='Spouse') s4q+=b;
      else if(bt==='Estate') estPols+=b;
      else if(bt==='Third Party') tpPols+=b;
    });
    var gross=physAssets+s4q+estPols+tpPols+bizDut;
    var _sumMR=N(S.cli.grossPM)>0?calcMarginalRate(N(S.cli.grossPM)*12):0.45;
    var _sumCGT=calcTotalCGT(_sumMR*100).totalCGT;
    var net=Math.max(0,gross-liabs-_sumCGT);
    // Accrual
    var _sumAccrual=0;
    if((S.cli.marital||'').indexOf('accrual')>-1){
      var _sumRaFV=pols.reduce(function(a,p){return POL_RA_TYPES.indexOf(p.Type)>-1?a+N(p.BenFundValue):a;},0);
      var _sumCE=physAssets+_sumRaFV,_sumSE=N(S.accrual&&S.accrual.spouseCurrentAssets);
      var _sumCS=N(S.accrual&&S.accrual.clientStartVal),_sumSS=N(S.accrual&&S.accrual.spouseStartVal);
      _sumAccrual=Math.max(0,(Math.max(0,_sumCE-_sumCS)-Math.max(0,_sumSE-_sumSS))/2);
    }
    var netAfterAccrual=Math.max(0,net-_sumAccrual);
    var s4qDed=Math.min(s4q,netAfterAccrual);
    var afterS4q=Math.max(0,netAfterAccrual-s4qDed);
    var dutiable=Math.max(0,afterS4q-ABATEMENT);
    var duty=dutiable<=DUTY_THRESH?dutiable*DUTY_RATE1:DUTY_THRESH*DUTY_RATE1+(dutiable-DUTY_THRESH)*DUTY_RATE2;
    var execFees=(physAssets+estPols)*EXEC_RATE;

    var estBox=div(); estBox.style.cssText='background:#1a2a4a;border-radius:8px;padding:14px 16px;margin-bottom:14px';
    function e3Row(lbl,val,sub,bold){
      var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
      var l=el('span','',lbl); l.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
      var v=el('span','',val); v.style.cssText='font-size:'+(sub?'11':'12')+'px;color:#c8a84b'+(bold?';font-weight:700':'');
      r.appendChild(l); r.appendChild(v); estBox.appendChild(r);
    }
    e3Row('Gross estate',Rfmt(gross));
    if(liabs>0) e3Row('Less: liabilities','('+Rfmt(liabs)+')',false,false);
    if(_sumCGT>0) e3Row('Less: CGT on death (s.4(a))','('+Rfmt(_sumCGT)+')',false,false);
    e3Row('Net estate',Rfmt(net),false,true);
    if(s4qDed>0) e3Row('Less: s.4(q) spouse deduction','('+Rfmt(s4qDed)+')',false,false);
    e3Row('Less: abatement','('+Rfmt(Math.min(afterS4q,ABATEMENT))+')',false,false);
    e3Row('Dutiable amount',Rfmt(dutiable),false,true);
    e3Row('Estate duty',Rfmt(Math.round(duty)),false,true);
    e3Row('Executor fees (est.)',Rfmt(Math.round(execFees)),false,false);
    e3Row('Total estate costs',Rfmt(Math.round(duty+execFees)),false,true);
    // Spouse residue — only if adviser has ticked "spouse inherits residue" on Estate tab
    var totalEstateCosts = Math.round(duty+execFees);
    if(S.cli.spouseInheritsResidue){
      var spouseResidue=Math.max(0,netAfterAccrual-Math.round(s4qDed)-Math.round(duty)-Math.round(execFees));
      if(spouseResidue>0) e3Row('Residue to spouse (inherits residue)',Rfmt(spouseResidue),false,false);
    }
    s.appendChild(estBox);
  }

  return s;
}

function buildROATab() {
  var s = div();
  if (!S.roa) S.roa = {};
  var r = S.roa;
  if (!r.needsRows) r.needsRows = [
    { area:'Life Cover',              quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Disability',              quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Dread Disease / Trauma',  quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Income Protection',       quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Pre-Retirement',          quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Post-Retirement',         quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Savings / Investment',    quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Will / Estate',           quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Other',                   quantified:'', priority:'', addressed:'', shortfall:'', review:'' }
  ];

  var inf = div('info');
  inf.innerHTML = 'Complete the advisory narrative. <strong>All fields are editable</strong> — the FNA provides the analysis but the ROA records what was actually agreed with the client. '
    + 'Section B and the products table are pre-populated as a starting point — override anything.';
  s.appendChild(inf);

  function roaSec(title, key, ph, ht) {
    s.appendChild(stitle(title));
    var ta = document.createElement('textarea');
    ta.style.cssText = 'width:100%;box-sizing:border-box;border:var(--border);border-radius:7px;padding:10px 12px;font-family:inherit;font-size:13px;min-height:'+(ht||90)+'px;resize:vertical';
    ta.placeholder = ph; ta.value = r[key] || '';
    ta.addEventListener('input', function(e){ r[key] = e.target.value; S.roa = r; });
    s.appendChild(ta);
  }

  // Section A
  roaSec('A. Client Objectives', 'objectives', 'e.g. Ensure family is financially secure. Plan for retirement at 65. Review estate structures.', 70);
  roaSec('A. Financial Situation', 'situation', 'e.g. Farmer, income from CC. Assets held in family trust. Married ANC with accrual.', 70);
  roaSec('A. Current Product Experience', 'experience', 'e.g. Existing life and disability cover with Liberty and Sanlam. Sygnia RA and TFS.', 70);

  // Section B — fully editable needs table
  s.appendChild(stitle('B. Needs & Goals Identified'));
  var bInf = div('info');
  bInf.innerHTML = 'Record what was <strong>discussed and agreed</strong> with the client. Fill in the cover amounts taken up, not just what was needed. '
    + 'Leave rows blank if not discussed. Addressed: Yes / Partially / Later / No.';
  s.appendChild(bInf);

  var tbl = document.createElement('table');
  tbl.innerHTML = '<thead><tr>'
    + '<th style="width:18%">Planning Area</th>'
    + '<th style="width:22%">Cover / Amount</th>'
    + '<th style="width:8%">Priority</th>'
    + '<th style="width:18%">Addressed</th>'
    + '<th style="width:18%">Shortfall / Notes</th>'
    + '<th style="width:12%">Review Date</th>'
    + '</tr></thead>';
  var tb = document.createElement('tbody');

  // Pre-populate from FNA where possible
  function fnaHint(rowIdx) {
    var pols = S.importedPols || [];
    switch(rowIdx) {
      case 0: // Life cover
        var need = S.deathLiabs.reduce(function(a,x){return a+N(x.amt);},0)
                 + S.deathIncome.reduce(function(a,x){return a+calcIncomeNeed(x);},0)
                 + S.deathCapital.reduce(function(a,x){return a+N(x.amt);},0);
        var have = pols.reduce(function(a,p){return p.Type!=='Business Assurance'?a+N(p.BenDeath):a;},0);
        return need > 0 ? 'FNA need: '+Rfmt(need)+' / Have: '+Rfmt(have) : '';
      case 1: // Disability
        var dn = S.disIncome.reduce(function(a,x){return a+calcIncomeNeed(x);},0)+S.disCapital.reduce(function(a,x){return a+N(x.amt);},0);
        var dh = pols.reduce(function(a,p){return a+N(p.BenDisability);},0);
        return dn > 0 ? 'FNA need: '+Rfmt(dn)+' / Have: '+Rfmt(dh) : '';
      case 2: // Dread
        var drh = pols.reduce(function(a,p){return a+N(p.BenDreadDisease);},0);
        return N(S.dreadAmt) > 0 ? 'FNA need: '+Rfmt(S.dreadAmt)+' / Have: '+Rfmt(drh) : '';
      case 3: // IP
        return N(S.ipGrossPM) > 0 ? 'FNA need: '+Rfmt(S.ipGrossPM)+'/pm gross' : '';
      case 4: // Pre-retirement
        var cliAge=ageFrom(S.cli.dob), retAge=N(S.cli.retAge)||65, yrsToR=cliAge?Math.max(0,retAge-cliAge):null;
        if(!yrsToR) return '';
        var totalProj=S.retAssets.reduce(function(a,r2){if(!N(r2.currentVal)&&!N(r2.monthlyContrib))return a;var g=N(r2.growthRate)>0?r2.growthRate:S.assump.growth;var e=N(r2.contribEsc)>0?r2.contribEsc:S.assump.incEsc;return a+projectFund(r2.currentVal,r2.monthlyContrib,e,g,yrsToR);},0);
        var mNeed=(S.retNeeds&&S.retNeeds.length>0)?S.retNeeds.reduce(function(a,r2){return a+N(r2.amtToday);},0):N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
        var capNeed=retirementCapitalNeeded(mNeed,yrsToR,85-retAge,S.assump.cpi,S.assump.retReturn);
        var gap=totalProj-capNeed;
        return capNeed>0?'FNA: need '+Rfmt(capNeed)+' / have '+Rfmt(totalProj)+(gap<0?' \u25bc '+Rfmt(Math.abs(gap))+' shortfall':' \u25b2 surplus'):'';
      default: return '';
    }
  }

  r.needsRows.forEach(function(row, ni) {
    var tr = document.createElement('tr');
    var hint = fnaHint(ni);

    // Area (fixed label)
    var td0 = document.createElement('td');
    td0.style.cssText = 'font-weight:700;font-size:11px';
    td0.textContent = row.area;
    if (hint) {
      var hd = document.createElement('div');
      hd.style.cssText = 'font-size:9px;color:#888;font-weight:400;margin-top:2px';
      hd.textContent = hint;
      td0.appendChild(hd);
    }
    tr.appendChild(td0);

    // Editable cells
    ['quantified','priority','addressed','shortfall','review'].forEach(function(key) {
      var td = document.createElement('td');
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.value = row[key] || '';
      inp.style.cssText = 'width:100%;border:none;border-bottom:1px solid var(--mist);padding:4px 2px;font-size:11px;font-family:inherit;background:transparent';
      if (key === 'addressed') {
        inp.placeholder = 'Yes / Partially / Later / No';
      }
      inp.addEventListener('input', function(e){ r.needsRows[ni][key] = e.target.value; S.roa = r; });
      td.appendChild(inp);
      tr.appendChild(td);
    });

    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  var tw = div('twrap'); tw.appendChild(tbl); s.appendChild(tw);

  // Section C — products (free text + context from FNA)
  s.appendChild(stitle('C. Products Considered'));
  var cInf = div('info');
  cInf.innerHTML = 'Record companies and quotes considered. The existing policy schedule is shown in the generated document as context.';
  s.appendChild(cInf);
  roaSec('', 'products', 'e.g. Sanlam quoted R1 800/pm for R5m life cover. Liberty quoted R2 100/pm. Client selected Sanlam.', 80);

  // Section D
  roaSec('D. Recommendation & Motivation', 'recommendation',
    'e.g. Recommended increasing life cover by R5m to address shortfall. Retained existing Sanlam policies. '
    + 'Increased RA contribution to R3 000/pm. Client acknowledged age-rated premium risk on trust policy.', 120);

  // Section E
  roaSec('E. Important Information Highlighted to Client', 'important',
    'e.g. Advised on age-rated premium escalation and long-term affordability. Explained estate duty implications of policy beneficiary routing. '
    + 'Discussed s.4(q) deduction and accrual claim.', 90);

  // Section F
  roaSec('F. Products / Advice Client Elected Not to Take', 'declined',
    'e.g. Client declined offshore investment at this stage — to be reviewed at next annual review. '
    + 'Client declined additional dread disease cover citing affordability.', 70);

  roaSec('Additional Comments', 'comments', 'Any additional notes...', 60);

  var brow = div(); brow.style.cssText = 'display:flex;gap:12px;margin-top:20px;flex-wrap:wrap';
  var b1 = document.createElement('button'); b1.className = 'btn btn-gold'; b1.textContent = 'Generate ROA Document';
  b1.addEventListener('click', generateROA); brow.appendChild(b1);
  var b2 = document.createElement('button'); b2.className = 'btn btn-navy'; b2.textContent = 'Save Client File';
  b2.addEventListener('click', saveFile); brow.appendChild(b2);
  s.appendChild(brow);
  return s;
}

function generateROA() {
  if(!S.cli.name.trim()){alert('Enter client name first.');go(0);return;}
  persist();
  var r = S.roa || {};
  var today=new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'});
  var pols = S.importedPols || [];

  // Calculate needs
  var totLiabNeed=S.deathLiabs.reduce(function(s,x){return s+N(x.amt);},0);
  var totIncCap=S.deathIncome.reduce(function(s,x){return s+calcIncomeNeed(x);},0);
  var totCapNeed=S.deathCapital.reduce(function(s,x){return s+N(x.amt);},0);
  var totalDeathNeed=totLiabNeed+totIncCap+totCapNeed;
  var totalDeathHave=pols.reduce(function(a,p){return p.Type!=='Business Assurance'?a+N(p.BenDeath):a;},0);
  var disIncCap=S.disIncome.reduce(function(a,x){return a+calcIncomeNeed(x);},0);
  var disCapNeed=S.disCapital.reduce(function(a,x){return a+N(x.amt);},0);
  var totalDisNeed=disIncCap+disCapNeed;
  var totalDisHave=pols.reduce(function(a,p){return a+N(p.BenDisability);},0);
  var totalDreadHave=pols.reduce(function(a,p){return a+N(p.BenDreadDisease);},0);

  function esc(t){ return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function rfmt(v){ return v>0?'R\u00a0'+Math.round(v).toLocaleString('en-ZA'):'—'; }
  function freeBox(text,height){
    if(text&&text.trim()) return '<div style="white-space:pre-wrap">'+esc(text)+'</div>';
    return '<div style="min-height:'+(height||50)+'px;border:1px dashed #ccc;padding:8px;color:#aaa;font-style:italic">[To be completed]</div>';
  }

  var h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ROA \u2014 '+esc(S.cli.name)+'</title><style>';
  h+='*{box-sizing:border-box}body{font-family:Arial,sans-serif;color:#1a2a4a;font-size:11.5px;margin:0 auto;padding:20px 28px;max-width:860px}';
  h+='@media print{.noprint{display:none}@page{margin:12mm 15mm}}';
  h+='.hdr{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:3px solid #c8a84b;padding-bottom:10px;margin-bottom:14px}';
  h+='.title{font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:1px}';

      var totalHave=pols.reduce(function(a,p){return p.Type!=='Business Assurance'?a+parseFloat(String(p.BenDeath||'').replace(/[^0-9.]/g,''))||0:a;},0);
      if(S.deathLiabs.length>0) {
        h += '<table><thead><tr><th>Liability</th><th>Amount</th></tr></thead><tbody>';
        S.deathLiabs.forEach(function(r){if(parseFloat(String(r.amt||'').replace(/[^0-9.]/g,''))>0) h+='<tr><td>'+esc(r.desc||'—')+'</td><td>'+rfmt(r.amt)+'</td></tr>';});
        h += '</tbody></table>';
      }
      if(S.deathIncome.length>0) {
        h += '<table><thead><tr><th>Income Need</th><th>Nett /pm</th><th>Years</th><th>Capitalised</th></tr></thead><tbody>';
        S.deathIncome.forEach(function(r){var c=calcIncomeNeed(r);if(c>0)h+='<tr><td>'+esc(r.desc||'Income')+'</td><td>'+rfmt(r.nettPM)+'</td><td>'+esc(r.years||'—')+'</td><td>'+rfmt(c)+'</td></tr>';});
        h += '</tbody></table>';
      }
      var deathGap=totalHave-totalNeed;
      h += '<div class="box"><div class="row"><span>Total cover needed</span><span>'+rfmt(totalNeed)+'</span></div>';
      h += '<div class="row"><span>Existing cover</span><span>'+rfmt(totalHave)+'</span></div>';
      h += '<div class="row" style="font-weight:700;border-top:1px solid #ccc;margin-top:4px;padding-top:4px"><span>'+(deathGap>=0?'Surplus':'Shortfall')+'</span><span class="'+(deathGap>=0?'surp':'short')+'">'+rfmt(Math.abs(deathGap))+'</span></div></div>';
    }

    if(S.scope.disability||S.scope.ip) {
      h += '<h2>Disability &amp; Income Protection</h2>';
      var disInc=S.disIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
      var disCap=S.disCapital.reduce(function(a,r){return a+parseFloat(String(r.amt||'').replace(/[^0-9.]/g,''))||0;},0);
      var disHave=pols.reduce(function(a,p){return a+parseFloat(String(p.BenDisability||'').replace(/[^0-9.]/g,''))||0;},0);
      var disGap=disHave-(disInc+disCap);
      if(N(S.ipNettPM)>0) h += '<p>Income protection needed: <strong>'+rfmt(S.ipNettPM)+' /pm nett</strong> ('+rfmt(S.ipGrossPM)+' gross) \u00b7 Waiting: '+(S.ipWait||'1 month')+' \u00b7 Benefit period: '+(S.ipBenefit||'To age 65')+'</p>';
      h += '<div class="box"><div class="row"><span>Capitalised income need</span><span>'+rfmt(disInc)+'</span></div>';
      h += '<div class="row"><span>Lump sum capital need</span><span>'+rfmt(disCap)+'</span></div>';
      h += '<div class="row"><span>Existing disability cover</span><span>'+rfmt(disHave)+'</span></div>';
      h += '<div class="row" style="font-weight:700;border-top:1px solid #ccc;margin-top:4px;padding-top:4px"><span>'+(disGap>=0?'Surplus':'Shortfall')+'</span><span class="'+(disGap>=0?'surp':'short')+'">'+rfmt(Math.abs(disGap))+'</span></div></div>';
    }

    if(S.scope.dread) {
      h += '<h2>Dread Disease</h2>';
      var dreadHave=pols.reduce(function(a,p){return a+parseFloat(String(p.BenDreadDisease||'').replace(/[^0-9.]/g,''))||0;},0);
      var dreadGap=dreadHave-N(S.dreadAmt);
      h += '<div class="box"><div class="row"><span>Cover needed</span><span>'+rfmt(S.dreadAmt)+'</span></div>';
      h += '<div class="row"><span>Existing cover</span><span>'+rfmt(dreadHave)+'</span></div>';
      h += '<div class="row" style="font-weight:700;border-top:1px solid #ccc;margin-top:4px;padding-top:4px"><span>'+(dreadGap>=0?'Surplus':'Shortfall')+'</span><span class="'+(dreadGap>=0?'surp':'short')+'">'+rfmt(Math.abs(dreadGap))+'</span></div></div>';
    }
  }

  // ══ PAGE 4: RETIREMENT ══════════════════════════════════════
  if(S.scope.retirement && S.retAssets && S.retAssets.length > 0) {
    h += '<div class="pb">'+pageHeader('Retirement Planning')+'</div>';
    var cliAge=ageFrom(S.cli.dob), retAge=N(S.cli.retAge)||65;
    var yrsToR=cliAge?Math.max(0,retAge-cliAge):null;
    var yrsInRet=85-retAge;
    if(yrsToR) {
      var totalProj=S.retAssets.reduce(function(a,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
        var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
        var escRate=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
        return a+projectFund(r.currentVal,r.monthlyContrib,escRate,gr,yrsToR);
      },0);
      var mNeed=(S.retNeeds&&S.retNeeds.length>0)?S.retNeeds.reduce(function(a,r){return a+N(r.amtToday);},0):N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
      var capNeed=retirementCapitalNeeded(mNeed,yrsToR,yrsInRet,S.assump.cpi,S.assump.retReturn);
      var retGap=totalProj-capNeed;

      h += '<div class="grid">';
      h += '<div><div class="lbl">Current Age</div><div class="val">'+(cliAge||'—')+'</div></div>';
      h += '<div><div class="lbl">Retirement Age</div><div class="val">'+retAge+'</div></div>';
      h += '<div><div class="lbl">Years to Retirement</div><div class="val">'+yrsToR+'</div></div>';
      h += '<div><div class="lbl">Monthly Need Today</div><div class="val">'+rfmt(mNeed)+' /pm</div></div>';
      h += '<div><div class="lbl">Capital Needed</div><div class="val">'+rfmt(capNeed)+'</div></div>';
      h += '<div><div class="lbl">Projected at Retirement</div><div class="val">'+rfmt(totalProj)+'</div></div>';
      h += '</div>';

      h += '<h2>Retirement Assets</h2>';
      h += '<table><thead><tr><th>Fund</th><th>Current Value</th><th>Monthly Contribution</th><th>Growth %</th><th>Projected at '+retAge+'</th></tr></thead><tbody>';
      S.retAssets.forEach(function(r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return;
        var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
        var escRate=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
        h += '<tr><td>'+esc(r.desc||'Fund')+'</td><td>'+rfmt(r.currentVal)+'</td>';
        h += '<td>'+(N(r.monthlyContrib)>0?rfmt(r.monthlyContrib)+' /pm':'—')+'</td>';
        h += '<td>'+gr+'%</td>';
        h += '<td><strong>'+rfmt(projectFund(r.currentVal,r.monthlyContrib,escRate,gr,yrsToR))+'</strong></td></tr>';
      });
      h += '</tbody></table>';

      if(S.retNeeds&&S.retNeeds.length>0) {
        h += '<h2>Retirement Income Needs</h2>';
        h += '<table><thead><tr><th>Description</th><th>Today (R/pm)</th><th>Escalation</th><th>Capital Needed</th></tr></thead><tbody>';
        S.retNeeds.forEach(function(r){
          if(!N(r.amtToday)) return;
          var itemEscRate=N(r.esc)>0?pct(r.esc):pct(S.assump.cpi);
          var itemAtRet=N(r.amtToday)*Math.pow(1+itemEscRate,yrsToR);
          var itemCap=retirementCapitalNeeded(itemAtRet/Math.pow(1+pct(S.assump.cpi),yrsToR),yrsToR,yrsInRet,S.assump.cpi,S.assump.retReturn);
          h += '<tr><td>'+esc(r.desc||'—')+'</td><td>'+rfmt(r.amtToday)+'</td>';
          h += '<td>'+(r.esc||S.assump.cpi)+'%</td>';
          h += '<td><strong>'+rfmt(itemCap)+'</strong></td></tr>';
        });
        h += '</tbody></table>';
      }

      h += '<div class="navy-box">';
      h += '<div class="row"><span class="lbl">Capital needed</span><span class="val">('+rfmt(capNeed)+')</span></div>';
      h += '<div class="row"><span class="lbl">Projected capital at retirement</span><span class="val">'+rfmt(totalProj)+'</span></div>';
      h += '<div class="row" style="border-top:1px solid #334;margin-top:6px;padding-top:6px;font-size:13px;font-weight:700">';
      h += '<span style="color:#ccd6f6">'+(retGap>=0?'Surplus':'Shortfall')+'</span>';
      h += '<span style="color:'+(retGap>=0?'#86efac':'#f87171')+'">'+rfmt(Math.abs(retGap))+'</span></div>';
      h += '</div>';
    }
  }

  // ══ PAGE 5: ESTATE ══════════════════════════════════════════
  if(S.scope.estate) {
    h += '<div class="pb">'+pageHeader('Estate Planning')+'</div>';
    // Replicate key estate calculations
    var physAssets = S.props.reduce(function(a,p){return a+N(p.val);},0)+S.vehicles.reduce(function(a,v){return a+N(v.val);},0)+S.otherAssets.reduce(function(a,x){return a+N(x.val);},0);
    var liabs = S.props.reduce(function(a,p){return a+N(p.bond);},0)+S.vehicles.reduce(function(a,v){return a+N(v.finance);},0)+S.liabilities.reduce(function(a,l){return a+N(l.bal);},0);
    var s4q=0,estPols=0,thirdPty=0,bizDut=0;
    pols.forEach(function(p){
      if(p.Type==='Business Assurance'){if(p.EstateDutiable==='Yes')bizDut+=N(p.LoanAmount)||N(p.BenDeath);return;}
      var b=N(p.BenDeath);if(!b)return;
      var bt=p.BeneficiaryType||'';
      if(bt==='Spouse')s4q+=b;else if(bt==='Estate')estPols+=b;else if(bt==='Third Party')thirdPty+=b;
    });
    var gross=physAssets+s4q+estPols+thirdPty+bizDut;
    var net=Math.max(0,gross-liabs);
    var s4qDed=Math.min(s4q,net);
    var afterS4q=Math.max(0,net-s4qDed);
    var dutiable=Math.max(0,afterS4q-ABATEMENT);
    var duty=dutiable<=DUTY_THRESH?dutiable*DUTY_RATE1:DUTY_THRESH*DUTY_RATE1+(dutiable-DUTY_THRESH)*DUTY_RATE2;
    var execFees=(physAssets+estPols)*EXEC_RATE;

    h += '<h2>Estate Duty Calculation</h2>';
    h += '<table><thead><tr><th>Item</th><th>Amount</th></tr></thead><tbody>';
    h += '<tr><td>Gross estate (physical assets + deemed policy proceeds)</td><td>'+rfmt(gross)+'</td></tr>';
    if(liabs>0) h += '<tr><td>Less: Liabilities</td><td>('+rfmt(liabs)+')</td></tr>';
    h += '<tr><td>Net estate</td><td><strong>'+rfmt(net)+'</strong></td></tr>';
    if(s4qDed>0) h += '<tr><td>Less: Section 4(q) \u2014 spouse policies</td><td>('+rfmt(s4qDed)+')</td></tr>';
    h += '<tr><td>Less: Primary abatement</td><td>('+rfmt(Math.min(afterS4q,ABATEMENT))+')</td></tr>';
    h += '<tr><td>Dutiable amount</td><td><strong>'+rfmt(dutiable)+'</strong></td></tr>';
    h += '<tr><td>Estate duty (20%)</td><td><strong>'+rfmt(duty)+'</strong></td></tr>';
    h += '<tr><td>Executor fees (4.025%)</td><td>'+rfmt(execFees)+'</td></tr>';
    h += '</tbody></table>';

    h += '<h2>Policy Routing</h2>';
    h += '<table><thead><tr><th>Policy</th><th>Sum Assured</th><th>Beneficiary Type</th><th>Estate Dutiable</th></tr></thead><tbody>';
    pols.forEach(function(p){
      var amt = p.Type==='Business Assurance'?(N(p.LoanAmount)||N(p.BenDeath)):N(p.BenDeath);
      if(!amt&&!N(p.BenFundValue)) return;
      h += '<tr><td>'+esc(p.Insurer||'')+(p.Product?' \u2014 '+esc(p.Product):'')+'</td>';
      h += '<td>'+rfmt(amt||p.BenFundValue)+'</td>';
      h += '<td>'+esc(p.BeneficiaryType||p.BizType||'—')+'</td>';
      h += '<td>'+esc(p.EstateDutiable||'—')+'</td></tr>';
    });
    h += '</tbody></table>';
  }

  // ══ PRINT BUTTON ════════════════════════════════════════════
  h += '<div class="noprint" style="position:fixed;bottom:16px;right:16px;display:flex;gap:8px">';
  h += '<button onclick="window.print()" style="background:#1a2a4a;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700">Print / Save PDF</button>';
  h += '<button onclick="window.close()" style="background:#888;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:13px">Close</button></div>';

  h += '</body></html>';

  var win = window.open('','_blank');
  if (win) {
    win.document.write(h); win.document.close();
  } else {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#fff;overflow:auto';
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '\u2715 Close';
    closeBtn.style.cssText = 'position:fixed;top:12px;right:12px;z-index:10000;background:#1a2a4a;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700';
    closeBtn.addEventListener('click', function(){ document.body.removeChild(overlay); });
    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:100%;height:100%;border:none';
    overlay.appendChild(closeBtn);
    overlay.appendChild(iframe);
    document.body.appendChild(overlay);
    iframe.contentDocument.write(h);
    iframe.contentDocument.close();
  }
}

// INIT
render();
setInterval(autoSave, 60000);
document.addEventListener('visibilitychange', function(){ if(document.hidden) autoSave(); });
</script>
</body>
</html>
