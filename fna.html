<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Duwalcoe FNA — v10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Segoe UI',Arial,sans-serif;background:#f0f3f9;color:#1a2744;font-size:15px}
.app{max-width:1200px;margin:0 auto;padding:20px 16px 80px}
.hdr{background:#1a2744;color:#fff;border-radius:12px;padding:20px 28px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.hdr h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.hdr p{font-size:12px;color:#99aac8;margin-top:2px}
.hdr-r{text-align:right;font-size:12px;color:#99aac8}
.hdr-r b{color:#c8a84b}
.sbar{background:#1a2744;border-radius:10px;padding:10px 18px;margin-bottom:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.sbar .cname{color:#fff;font-size:13px;font-weight:600;flex:1;min-width:120px}
.sbar .cname span{color:#99aac8;font-weight:300;font-size:12px}
.sstatus{font-size:12px;font-weight:700;color:#4caf8a}
.btn-save{background:#c8a84b;color:#fff;padding:8px 18px;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;border:none;white-space:nowrap}
.btn-save:hover{background:#a8882e}
.btn-new{background:transparent;color:#99aac8;border:1px solid #3a4f6e;padding:8px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer}
.btn-new:hover{background:#2a3f5e;color:#fff}
.prog{background:#d0d9e8;border-radius:4px;height:4px;margin:8px 0}
.prog-f{background:linear-gradient(90deg,#2e5f9e,#c8a84b);height:4px;border-radius:4px;transition:width .3s}
.nav{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:18px}
.nav-btn{padding:7px 13px;border-radius:18px;border:1.5px solid #d0d9e8;background:#fff;color:#6b7a99;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.nav-btn:hover{border-color:#2e5f9e;color:#2e5f9e}
.nav-btn.active{background:#2e5f9e;border-color:#2e5f9e;color:#fff}
.sec{background:#fff;border-radius:12px;padding:26px 28px;border:1px solid #d0d9e8;margin-bottom:12px}
.sec-title{font-size:18px;font-weight:700;color:#1a2744;margin-bottom:4px;display:flex;align-items:center;gap:10px}
.sec-title .num{background:#2e5f9e;color:#fff;width:26px;height:26px;border-radius:50%;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sec-sub{font-size:13px;color:#6b7a99;margin-bottom:16px;line-height:1.5}
.divider{border:none;border-top:1px solid #d0d9e8;margin:16px 0}
.subsec{margin-bottom:20px}
.subsec-title{font-size:11px;font-weight:700;color:#2e5f9e;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:4px;border-bottom:2px solid #e8f0fb}
.subsec-title.red{color:#c0392b;border-bottom-color:#f0c0c0}
.subsec-title.grn{color:#2e7d5a;border-bottom-color:#b0dcc0}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:1fr 1fr 1fr}
.g4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:700px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:700;color:#6b7a99;text-transform:uppercase;letter-spacing:.4px}
.field input,.field select,.field textarea{border:1.5px solid #d0d9e8;border-radius:7px;padding:8px 11px;font-size:14px;font-family:inherit;color:#1a2744;background:#fff;outline:none;transition:border-color .15s;width:100%}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#2e5f9e;background:#fafcff}
.field textarea{resize:vertical;min-height:62px;line-height:1.55}
.rf{position:relative}
.rf input{padding-left:22px}
.rp{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;font-weight:700;color:#6b7a99;pointer-events:none}
.calc{background:#e8f0fb!important;color:#2e5f9e!important;font-weight:700!important;border-color:#c0d4f0!important}
.warn-f{background:#fff8e8!important;color:#c8a84b!important;font-weight:700!important;border-color:#f0d080!important}
.info{background:#fffbf0;border:1.5px solid #f0d080;border-radius:7px;padding:10px 13px;font-size:13px;color:#7a5c00;margin-bottom:12px;line-height:1.5}
.info.red{background:#fff8f8;border-color:#f0c0c0;color:#7a2020}
.sc{background:#e8f0fb;border-radius:9px;padding:13px 16px;margin-bottom:12px;border-left:4px solid #2e5f9e}
.sc h3{font-size:13px;font-weight:700;color:#1a2744;margin-bottom:6px}
.sr{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;border-bottom:1px solid #d0d9e8}
.sr:last-child{border-bottom:none;font-weight:700;font-size:14px}
.sr.ind{padding-left:14px;color:#6b7a99;font-size:12px}
.sr.grn{color:#2e7d5a}
.sr.red{color:#c0392b}
.surp{color:#2e7d5a;font-weight:800}
.def{color:#c0392b;font-weight:800}
.chk-row{display:flex;flex-wrap:wrap;gap:8px}
.chk{display:flex;align-items:center;gap:7px;padding:9px 12px;border:1.5px solid #d0d9e8;border-radius:8px;cursor:pointer;user-select:none;transition:all .15s}
.chk:hover{border-color:#2e5f9e;background:#fafcff}
.chk.on{border-color:#2e5f9e;background:#e8f0fb}
.cb{width:15px;height:15px;border:2px solid #d0d9e8;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chk.on .cb{background:#2e5f9e;border-color:#2e5f9e}
.cbtick{color:#fff;font-size:10px;font-weight:900}
.rg{display:flex;flex-wrap:wrap;gap:7px}
.ri{display:flex;align-items:center;gap:7px;padding:8px 12px;border:1.5px solid #d0d9e8;border-radius:8px;cursor:pointer;user-select:none;transition:all .15s;font-size:13px}
.ri:hover{border-color:#2e5f9e;background:#fafcff}
.ri.sel{border-color:#2e5f9e;background:#e8f0fb}
.rdot{width:14px;height:14px;border:2px solid #d0d9e8;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ri.sel .rdot{border-color:#2e5f9e}
.rdoti{width:6px;height:6px;border-radius:50%;background:#2e5f9e}
.tw{overflow-x:auto;border-radius:8px;border:1px solid #d0d9e8}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a2744;color:#fff;padding:8px 10px;text-align:left;font-weight:600;font-size:11px;letter-spacing:.3px;white-space:nowrap}
td{padding:4px 5px;border-bottom:1px solid #e8f0fb;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafcff}
td input,td select{border:1px solid #d0d9e8;border-radius:5px;padding:6px 8px;font-size:13px;font-family:inherit;width:100%;outline:none;background:#fff}
td input:focus,td select:focus{border-color:#2e5f9e;background:#fafcff}
td input.calc{background:#e8f0fb;color:#2e5f9e;font-weight:700;border-color:#c0d4f0}
td input.warn{background:#fff8e8;color:#c8a84b;font-weight:700;border-color:#f0d080}
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;cursor:pointer;user-select:none;border:1.5px solid #d0d9e8;color:#6b7a99;background:#fff;margin:1px;transition:all .1s}
.tag.on{color:#fff;border-color:transparent}
.tag.ret.on{background:#2e5f9e}
.tag.dth.on{background:#7a2020;border-color:#7a2020}
.tag.dis.on{background:#6b4e00;border-color:#6b4e00}
.tag.edu.on{background:#1a6b4e;border-color:#1a6b4e}
.tag.est.on{background:#4a2e7a;border-color:#4a2e7a}
.tag.gol.on{background:#7a6b00;border-color:#7a6b00}
.btn-add{background:#f0f8f0;color:#2e7d5a;border:1.5px dashed #90c8a0;padding:7px 14px;font-size:12px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700;margin-top:6px;transition:background .15s}
.btn-add:hover{background:#e0f4e8}
.btn-del{background:#fff0f0;color:#c0392b;border:1px solid #f0c0c0;width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.btn-del:hover{background:#fde8e8}
.card{background:#f8f9fc;border:1.5px solid #d0d9e8;border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-hdr strong{font-size:13px;color:#1a2744}
.card-sub{border-radius:7px;padding:10px 13px;margin-top:10px}
.card-sub.bond{background:#fff8e8;border:1px solid #f0d080}
.card-sub.surety{background:#fff8f8;border:1px solid #f0c0c0}
.card-sub-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.card-sub.bond .card-sub-title{color:#7a5c00}
.card-sub.surety .card-sub-title{color:#7a2020}
.nb{background:#f5f6f8;border:1.5px solid #d0d9e8;border-radius:8px;padding:11px;margin-top:12px}
.nb label{font-size:11px;font-weight:700;color:#6b7a99;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px}
.nb textarea{background:#fff;border:1px solid #d0d9e8;border-radius:6px;padding:8px;font-size:13px;font-family:inherit;width:100%;min-height:56px;resize:vertical;outline:none;color:#1a2744;line-height:1.55}
.nb textarea:focus{border-color:#2e5f9e}
.out-box{background:#1a2744;color:#e8f0fb;border-radius:10px;padding:20px;font-family:'Courier New',monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:560px;overflow-y:auto;margin-top:12px}
.copy-ok{color:#2e7d5a;font-size:13px;font-weight:700;margin-top:7px}
.db{display:inline-flex;align-items:center;justify-content:center;border:1.5px solid #d0d9e8;border-radius:5px;cursor:pointer;font-size:11px;font-weight:800;color:#6b7a99;background:#fff;user-select:none;transition:all .15s;padding:0 8px;height:26px}
.db.on{background:#2e5f9e;border-color:#2e5f9e;color:#fff}
.db.red-on.on{background:#c0392b;border-color:#c0392b}
</style>
</head>
<body>
<div id="root"></div>
<script id="saved-data" type="application/json">null</script>
<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
const N   = v => { const n=parseFloat((v||"").toString().replace(/[^0-9.-]/g,"")); return isNaN(n)?0:Math.abs(n); };
const Rnd = n => { if(!n||n===0) return "R 0"; return "R "+Math.round(Math.abs(n)).toLocaleString("en-ZA"); };
const pct = v => N(v)/100;
const el  = (tag,props={},children=[]) => {
  const e = document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==="className") e.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="innerHTML") e.innerHTML=v;
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{ if(c==null||c===false) return; e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
};
const div  = (cls,children=[],props={}) => el("div",{className:cls,...props},Array.isArray(children)?children:[children]);
const span = (cls,text) => el("span",{className:cls},[text]);
const inp  = (props) => el("input",props);
const sel  = (props,opts) => { const s=el("select",props); opts.forEach(o=>{ const op=el("option",{value:o.v},[o.l]); if(o.v===props.value) op.selected=true; s.appendChild(op); }); return s; };

// ── Data defaults ─────────────────────────────────────────────────────────────
const mkPol = ()=>({insurer:"",polNo:"",inceptionDate:"",polType:"",benefit:"",premium:"",owner:"",benef:"",notes:"",fundRetirement:false,retEsc:"",retEndAge:""});
const POL_TYPES = [
  {v:"personal",l:"Personal life / risk cover",ed:true},
  {v:"contingent_liability",l:"Business — Contingent liability (estate dutiable)",ed:true},
  {v:"keyman_family",l:"Business — Keyman: family company (estate dutiable)",ed:true},
  {v:"keyman_non_family",l:"Business — Keyman: non-family (NOT estate dutiable)",ed:false},
  {v:"buy_sell",l:"Business — Buy & sell (NOT estate dutiable)",ed:false},
];
const isED = t => POL_TYPES.find(p=>p.v===t)?.ed ?? true;
const mkProp = ()=>({desc:"",val:"",growthRate:"",rental:"",baseCost:"",isPrimRes:false,purposes:["estate"],bond:{outstanding:"",rate:"",payment:"",paidBeforeRet:"Yes"},notes:""});
const mkVeh  = ()=>({desc:"",val:"",purposes:["estate"],finance:{outstanding:"",rate:"",payment:""},notes:""});
const mkMov  = ()=>({desc:"",val:"",purposes:["estate"],notes:""});
const mkInv  = ()=>({desc:"",type:"unitTrust",inst:"",polNo:"",inceptionDate:"",maturityDate:"",val:"",growthRate:"",monthlyContrib:"",escalation:"",paidUp:false,purposes:["retirement"],benef:"",drawdownRate:"",monthlyPayout:"",portfolio:"",notes:""});
const mkBiz  = ()=>({desc:"",type:"cc",val:"",growthRate:"",purposes:["estate","retirement"],surety:{hasSurety:false,amount:"",suretyFor:"",coveringPol:""},notes:""});
const mkContLiab = ()=>({desc:"",amount:"",suretyFor:"",coveringPol:"",notes:""});
const mkRetAsset = ()=>({assetKey:"",desc:"",currentVal:"",growthRate:"",use:"sell",baseCost:"",monthlyIncome:"",notes:"",isPrimRes:false,sellPct:"100"});
const mkDeathInc = ()=>({desc:"Family living expenses",amount:"",years:"20",esc:"5"});
const mkDeathCap = ()=>({desc:"",amount:""});

const DEFAULTS = {
  scope:{death:true,disability:false,illness:false,retirement:false,estate:true,investment:false},
  assump:{cpi:"5",growth:"9",incEsc:"6",capRate:"7.5",premGrowth:"10",execFee:"3.5",lifeExp:"85"},
  scopeNotes:"",
  cli:{name:"",id:"",dob:"",income:"",nett:"",occ:"",retAge:"65"},
  marital:"",domDate:"",accStart:{cli:""},
  kids:[{name:"",age:"",dep:"Y",notes:""},{name:"",age:"",dep:"Y",notes:""},{name:"",age:"",dep:"",notes:""},{name:"",age:"",dep:"",notes:""}],
  perNotes:"",
  incRows:[{src:"Salary / drawings",cli:""},{src:"Rental income",cli:""},{src:"Investment income",cli:""},{src:"Business income",cli:""},{src:"Other",cli:""}],
  exp:{cli:""},incNotes:"",
  props:[{desc:"Primary residence",val:"",growthRate:"",rental:"",baseCost:"",isPrimRes:true,purposes:["estate"],bond:{outstanding:"",rate:"",payment:"",paidBeforeRet:"Yes"},notes:""}],
  vehicles:[mkVeh()],
  movables:[{desc:"Household contents & effects",val:"",purposes:["estate"],notes:""}],
  investments:[
    {desc:"Bank / cash",type:"cash",inst:"",polNo:"",inceptionDate:"",maturityDate:"",val:"",growthRate:"4",monthlyContrib:"",escalation:"",paidUp:false,purposes:["estate"],benef:"",drawdownRate:"",monthlyPayout:"",portfolio:"",notes:""},
    {desc:"Unit trusts",type:"unitTrust",inst:"",polNo:"",inceptionDate:"",maturityDate:"",val:"",growthRate:"",monthlyContrib:"",escalation:"",paidUp:false,purposes:["retirement"],benef:"",drawdownRate:"",monthlyPayout:"",portfolio:"",notes:""},
    {desc:"Tax free savings",type:"tfs",inst:"",polNo:"",inceptionDate:"",maturityDate:"",val:"",growthRate:"",monthlyContrib:"",escalation:"",paidUp:false,purposes:["retirement"],benef:"",drawdownRate:"",monthlyPayout:"",portfolio:"",notes:""},
    {desc:"Retirement annuity (RA)",type:"ra",inst:"",polNo:"",inceptionDate:"",maturityDate:"",val:"",growthRate:"",monthlyContrib:"",escalation:"",paidUp:false,purposes:["retirement"],benef:"",drawdownRate:"",monthlyPayout:"",portfolio:"",notes:""},
    {desc:"Pension / Provident fund",type:"pension",inst:"",polNo:"",inceptionDate:"",maturityDate:"",val:"",growthRate:"",monthlyContrib:"",escalation:"",paidUp:false,purposes:["retirement"],benef:"",drawdownRate:"",monthlyPayout:"",portfolio:"",notes:""},
  ],
  bizInts:[mkBiz()],
  contLiab:[mkContLiab()],
  assetNotes:"",
  pols:Array(8).fill(null).map(mkPol),
  incBens:[],disBens:[],disCapBens:[],insNotes:"",
  deathInc:[mkDeathInc()],
  deathCap:[{desc:"Education — lump sum",amount:""},{desc:"Trust / bequest",amount:""},{desc:"Bond repayment",amount:""},{desc:"Other capital",amount:""}],
  disMonthlyNeed:"",disCapNeed:"",
  retNeeds:{
    monthlyExpenses:"",medicalAid:"",lifePremiums:"",otherMonthly:"",
    lumpsums:[{desc:"Holiday / travel fund",amount:""},{desc:"Other lump sum",amount:""}],
    retNotes:""
  },
  eduNeeds:[{child:"",targetAmt:"",targetYear:"",notes:""}],
  goals:[{desc:"",targetAmt:"",targetYear:"",notes:""}],
  needsNotes:"",
  ret:{retAssets:[],annuityType:"",drawdownRate:"4",statePension:"",otherFixed:"",retNotes:""},
  est:{hasWill:"",exec:"",feeAgreed:"",hasTrust:"",trustName:"",trustType:"",spAssets:"",funeral:"15000",master:"7000",cashBequests:"0",s4q:"Y"},
  estNotes:"",
};

// ── State ─────────────────────────────────────────────────────────────────────
let S = JSON.parse(JSON.stringify(DEFAULTS));
const SECS = ["Scope","Personal","Income","Assets","Insurance","Needs","Estate","Output"];
let activeTab = 0;
let saveStatus = "";
let copiedFlag = false;
let outputText = "";
let roaOpen = false;
let roaRec = "";
let roaMot = "";
let roaInfo = "";
let roaDeclined = "";
let docsModalOpen = false;

function loadSaved(){
  try{ const d=JSON.parse(document.getElementById("saved-data").textContent); if(d) S=deepMerge(JSON.parse(JSON.stringify(DEFAULTS)),d); }catch(e){}
  // Pre-fill from CRM URL params
  try{
    var params = new URLSearchParams(window.location.search);
    if(params.get('name')) S.cli.name = params.get('name');
    if(params.get('id')) S.cli.id = params.get('id');
    if(params.get('dob')){
      // Convert YYYY-MM-DD to DD/MM/YYYY for FNA
      var d = params.get('dob').split('-');
      if(d.length===3) S.cli.dob = d[2]+'/'+d[1]+'/'+d[0];
    }
    if(params.get('income')) S.cli.income = params.get('income');
  }catch(e){}
}
function deepMerge(base,override){
  if(typeof override!=="object"||override===null) return override!==undefined?override:base;
  if(Array.isArray(override)) return override;
  const r={...base};
  Object.keys(override).forEach(k=>{ r[k]=deepMerge(base[k],override[k]); });
  return r;
}
function saveAsClientFile(){
  if(!S.cli.name.trim()){alert("Enter client name on Personal tab first.");go(1);return;}
  const fname=S.cli.name.replace(/[^a-zA-Z0-9\s]/g,"").trim().replace(/\s+/g,"_")+"_FNA.html";
  const html=document.documentElement.outerHTML;
  const updated=html.replace(/<script id="saved-data" type="application\/json">[\s\S]*?<\/script>/,
    `<script id="saved-data" type="application/json">${JSON.stringify(S)}<\/script>`);
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([updated],{type:"text/html"}));
  a.download=fname; a.click();
  URL.revokeObjectURL(a.href);
  saveStatus="✓ Saved as "+fname;
  render(); setTimeout(()=>{saveStatus="";render();},5000);
}
function go(i){ activeTab=i; render(); }
function newClient(){ if(!confirm("Open blank form for new client?")) return; S=JSON.parse(JSON.stringify(DEFAULTS)); activeTab=0; render(); }

// ── Calculations ──────────────────────────────────────────────────────────────
function calc(){
  const a=S.assump, growthR=pct(a.growth), cpiR=pct(a.cpi), capR=pct(a.capRate);
  const totCliInc=S.incRows.reduce((s,r)=>s+N(r.cli),0);
  const totProps    =S.props.reduce((s,p)=>s+N(p.val),0);
  const totVehicles =S.vehicles.reduce((s,v)=>s+N(v.val),0);
  const totMovables =S.movables.reduce((s,m)=>s+N(m.val),0);
  const totInvs     =S.investments.reduce((s,i)=>s+N(i.val),0);
  const totBizInts  =S.bizInts.reduce((s,b)=>s+N(b.val),0);
  const totPropBonds=S.props.reduce((s,p)=>s+N(p.bond?.outstanding),0);
  const totVehFin   =S.vehicles.reduce((s,v)=>s+N(v.finance?.outstanding),0);
  const totContLiab =S.contLiab.reduce((s,c)=>s+N(c.amount),0);
  const totLiab=totPropBonds+totVehFin;
  const netAssets=totProps+totVehicles+totMovables+totInvs+totBizInts-totLiab;

  const filledPols=S.pols.filter(p=>p.insurer&&N(p.benefit)>0);
  const totEDLife=filledPols.filter(p=>isED(p.polType)).reduce((s,p)=>s+N(p.benefit),0);
  const totBuySell=filledPols.filter(p=>p.polType==="buy_sell").reduce((s,p)=>s+N(p.benefit),0);
  const totKeyNonFam=filledPols.filter(p=>p.polType==="keyman_non_family").reduce((s,p)=>s+N(p.benefit),0);
  const totPrem=S.pols.filter(p=>p.insurer).reduce((s,p)=>s+N(p.premium),0);
  const lifeToEstate=filledPols.filter(p=>isED(p.polType)&&(p.benef==="Estate"||p.benef==="")).reduce((s,p)=>s+N(p.benefit),0);
  const lifeToSpouse=filledPols.filter(p=>isED(p.polType)&&p.benef==="Spouse").reduce((s,p)=>s+N(p.benefit),0);
  const lifeToThird =filledPols.filter(p=>isED(p.polType)&&p.benef!=="Estate"&&p.benef!=="Spouse"&&p.benef!=="").reduce((s,p)=>s+N(p.benefit),0);
  const incBenCap=S.incBens.reduce((s,r)=>s+capInc(N(r.amount),N(r.years)||1,capR),0);
  const totDisMonthly=S.disBens.reduce((s,r)=>s+N(r.monthlyBen),0);
  const totDisCap=S.disCapBens.reduce((s,r)=>s+N(r.benefit),0);

  // Estate
  const execFees=(totProps+totBizInts+totInvs+lifeToEstate)*pct(a.execFee)*1.15;
  const funeral=N(S.est.funeral), master=N(S.est.master);
  const cliAcc=(totProps+totBizInts+totInvs+lifeToSpouse+lifeToEstate)-N(S.accStart?.cli);
  const spAcc=N(S.est.spAssets)-N(S.accStart?.sp);
  const accrualClaim=S.marital?.includes("accrual")&&(cliAcc-spAcc)>0?(cliAcc-spAcc)/2:0;
  const s4q=S.est.s4q==="Y"?lifeToSpouse+accrualClaim:0;
  const grossEstate=totProps+totBizInts+totInvs+totEDLife;
  const nettEst=grossEstate-(execFees+master+funeral+s4q+totLiab);
  const abat=3500000;
  const dutiable=Math.max(0,nettEst-abat);
  const totalDuty=dutiable<=30000000?dutiable*0.20:30000000*0.20+(dutiable-30000000)*0.25;
  const pctThird=grossEstate>0?lifeToThird/grossEstate:0;
  const dutyEstate=totalDuty*(1-pctThird);
  const liqProv=lifeToEstate+totInvs;
  const liqNeed=execFees+master+funeral+dutyEstate+N(S.est.cashBequests)+accrualClaim;
  const liqShort=liqProv-liqNeed;

  // Death needs
  const incStreams=S.deathInc.map(r=>capInc(N(r.amount),N(r.years)||1,capR));
  const totIncNeed=incStreams.reduce((s,v)=>s+v,0);
  const totCapNeed=S.deathCap.reduce((s,r)=>s+N(r.amount),0);
  const totalDeathNeeds=totIncNeed+totCapNeed+execFees+master+funeral+dutyEstate+accrualClaim;
  const totalDeathProv=totEDLife+totInvs+incBenCap;
  const deathExcess=totalDeathProv-totalDeathNeeds;

  // Retirement
  const cliAge=S.cli.dob?Math.floor((Date.now()-new Date(S.cli.dob.split("/").reverse().join("-")))/31557600000):null;
  const cliRetAge=N(S.cli.retAge)||null;
  const cliRetReady=cliAge!==null&&cliRetAge!==null&&cliRetAge>cliAge;
  const cliYrsToRet=cliRetReady?cliRetAge-cliAge:null;
  const lifeExp=N(a.lifeExp)||85;
  const cliYrsInRet=cliRetReady?Math.max(1,lifeExp-cliRetAge):null;

  const retInvs=S.investments.filter(i=>i.purposes?.includes("retirement"));
  const cliInvProj=retInvs.map(i=>{ const g=i.growthRate?pct(i.growthRate):growthR; const esc=i.escalation?pct(i.escalation):0; return projFundEsc(i.val,i.paidUp?0:i.monthlyContrib,esc,cliYrsToRet,g); });
  const totCliRetFunds=cliRetReady&&cliInvProj.every(v=>v!==null)?cliInvProj.reduce((s,v)=>s+(v||0),0):null;

  const CGT_ANN=40000, CGT_INC=0.40, CGT_MARG=0.45, SMALL_BIZ=1800000;
  const retAssetCalcs=(S.ret.retAssets||[]).map(a=>{
    const g=a.growthRate?pct(a.growthRate):growthR;
    const projVal=cliYrsToRet!==null?N(a.currentVal)*Math.pow(1+g,cliYrsToRet):null;
    let netProceeds=null,cgt=null,capContrib=null,incContrib=null;
    if(a.use==="sell"||a.use==="biz"){
      if(projVal!==null){
        const gain=Math.max(0,projVal-N(a.baseCost));
        const excl=a.use==="biz"?SMALL_BIZ:(a.isPrimRes?2000000:CGT_ANN);
        cgt=Math.max(0,gain-excl)*CGT_INC*CGT_MARG;
        netProceeds=projVal-cgt;
        capContrib=Math.max(0,netProceeds);
      }
    } else if(a.use==="partial"){
      if(projVal!==null){
        const pct2=(N(a.sellPct)||50)/100;
        const sp2=projVal*pct2;
        const gain=Math.max(0,sp2-N(a.baseCost)*pct2);
        cgt=Math.max(0,gain-CGT_ANN)*CGT_INC*CGT_MARG;
        netProceeds=sp2-cgt; capContrib=Math.max(0,netProceeds);
      }
    } else { incContrib=N(a.monthlyIncome); capContrib=0; }
    return {a,projVal,cgt,netProceeds,capContrib,incContrib};
  });
  const totRetAssetCap=retAssetCalcs.reduce((s,c)=>s+(c.capContrib||0),0);
  const totRetAssetIncome=retAssetCalcs.reduce((s,c)=>s+(c.incContrib||0),0);
  const totCliRetProv=totCliRetFunds!==null?totCliRetFunds+totRetAssetCap:null;

  const cliExpNow=N(S.exp.cli);
  const cliExpAtRet=cliYrsToRet!==null?cliExpNow*Math.pow(1+cpiR,cliYrsToRet):null;
  const cliExpNet=cliExpAtRet!==null?Math.max(0,cliExpAtRet-totRetAssetIncome):null;
  const cliCapNeeded=cliExpNet!==null&&cliYrsInRet!==null?capInc(cliExpNet,cliYrsInRet,capR):null;

  // Premium funding
  const premPols=S.pols.filter(p=>p.insurer&&p.fundRetirement&&N(p.premium)>0);
  const premCalcs=premPols.map(p=>{
    const esc=pct(p.retEsc)||growthR;
    const endAge=N(p.retEndAge)||lifeExp;
    const yrsInRet=cliRetAge?Math.max(1,endAge-cliRetAge):null;
    const premAtRet=cliYrsToRet!==null?N(p.premium)*Math.pow(1+esc,cliYrsToRet):null;
    const capNeeded=premAtRet!==null&&yrsInRet!==null?capInc(premAtRet,yrsInRet,capR):null;
    const savPMT=capNeeded!==null&&cliYrsToRet!==null?addPMT(capNeeded,cliYrsToRet,growthR):null;
    return {p,premAtRet,capNeeded,savPMT,yrsInRet};
  });
  const totPremCap=premCalcs.every(c=>c.capNeeded!==null)?premCalcs.reduce((s,c)=>s+(c.capNeeded||0),0):null;

  const totCapReq=(cliCapNeeded||0)+(totPremCap||0);
  const cliRetGap=totCliRetProv!==null&&cliCapNeeded!==null?totCliRetProv-totCapReq:null;
  const cliAddPMT=cliRetGap!==null&&cliRetGap<0&&cliYrsToRet?addPMT(Math.abs(cliRetGap),cliYrsToRet,growthR):0;

  return {
    totCliInc,totProps,totVehicles,totMovables,totInvs,totBizInts,
    totPropBonds,totVehFin,totContLiab,totLiab,netAssets,
    filledPols,totEDLife,totBuySell,totKeyNonFam,totPrem,
    lifeToEstate,lifeToSpouse,lifeToThird,incBenCap,totDisMonthly,totDisCap,
    execFees,funeral,master,accrualClaim,s4q,grossEstate,nettEst,dutiable,totalDuty,
    dutyEstate,liqProv,liqNeed,liqShort,
    incStreams,totIncNeed,totCapNeed,totalDeathNeeds,totalDeathProv,deathExcess,
    cliAge,cliRetAge,cliRetReady,cliYrsToRet,cliYrsInRet,
    retInvs,cliInvProj,totCliRetFunds,retAssetCalcs,totRetAssetCap,totRetAssetIncome,totCliRetProv,
    cliExpNow,cliExpAtRet,cliExpNet,cliCapNeeded,totCapReq,
    premPols,premCalcs,totPremCap,cliRetGap,cliAddPMT,
  };
}
function projFundEsc(pv,pmt,esc,yrs,g){
  // Projects fund with escalating contributions: PMT grows at esc% per year
  if(yrs===null||yrs===undefined) return null;
  if(yrs<=0) return N(pv);
  const fvPV=N(pv)*Math.pow(1+g,yrs);
  if(N(pmt)===0) return fvPV;
  // Sum of FV of each year's escalating contribution
  let fvPMT=0;
  for(let yr=1;yr<=yrs;yr++){
    const pmtThisYr=N(pmt)*12*Math.pow(1+esc,yr-1);
    fvPMT+=pmtThisYr*Math.pow(1+g,yrs-yr);
  }
  return fvPV+fvPMT;
}
function projFund(pv,pmt,yrs,g){
  if(yrs===null||yrs===undefined) return null;
  if(yrs<=0) return N(pv);
  const fvPV=N(pv)*Math.pow(1+g,yrs);
  const fvPMT=g>0?N(pmt)*12*(Math.pow(1+g,yrs)-1)/g:N(pmt)*12*yrs;
  return fvPV+fvPMT;
}
function capInc(amt,yrs,r){ return amt>0?(r>0?(amt*12*(1-Math.pow(1+r,-yrs)))/r:amt*12*yrs):0; }
function addPMT(gap,yrs,g){ if(gap<=0||yrs<=0) return 0; const d=g>0?(Math.pow(1+g,yrs)-1)/g:yrs; return gap/d/12; }

  Estate duty: ${Rnd(C.totalDuty)}
  Liquidity ${C.liqShort>=0?"surplus":"shortfall"}: ${C.liqShort>=0?Rnd(C.liqShort):"("+Rnd(Math.abs(C.liqShort))+")"}

═══════════════════════════════════════════════════════
END OF REPORT
═══════════════════════════════════════════════════════`.trim();
}

// ── Helpers for UI ────────────────────────────────────────────────────────────
function secTitle(num,text){
  const d=div("sec-title"); const n=div("num",[num]); d.appendChild(n); d.appendChild(document.createTextNode(text)); return d;
}
function subsecTitle(text){ const d=div("subsec-title"); d.textContent=text; return d; }
function mkDelBtn(onClick){ const b=div("btn-del",["×"]); b.addEventListener("click",onClick); return b; }

// ── Boot ──────────────────────────────────────────────────────────────────────
loadSaved();
render();
</script>
