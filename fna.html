  var edVal = p.EstateDutiable || '';
  if (edVal === 'Yes') edSel.style.color = 'var(--orange)';
  else if (edVal === 'No') edSel.style.color = 'var(--green)';
  ['','Yes','No'].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o; opt.textContent = o || '— ?';
    if (edVal === o) opt.selected = true;
    edSel.appendChild(opt);
  });
  edSel.addEventListener('change', function(e) {
    S.importedPols[i].EstateDutiable = e.target.value;
    e.target.style.color = e.target.value === 'Yes' ? 'var(--orange)' : e.target.value === 'No' ? 'var(--green)' : 'var(--sub)';
  });
  edWrap.appendChild(edSel);
  btr.appendChild(edWrap);
  card.appendChild(btr);

  // ── Beneficiary routing explanation
  var bt = p.BeneficiaryType || '';
  if (bt) {
    var routeInf = div();
    routeInf.style.cssText = 'padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:6px';
    if (bt === 'Spouse') {
      routeInf.style.cssText += ';background:#f0fdf4;color:#166534;border:1px solid #86efac';
      routeInf.innerHTML = '✓ <strong>Section 4(q):</strong> Paid direct to spouse — not dutiable, outside estate. No estate duty on this benefit.';
    } else if (bt === 'Estate') {
      routeInf.style.cssText += ';background:#fff7ed;color:#92400e;border:1px solid #fed7aa';
      routeInf.innerHTML = '⚖ <strong>Routed to Estate:</strong> This benefit forms part of the dutiable estate. Estate duty and executor fees will apply.';
    } else if (bt === 'Third Party') {
      routeInf.style.cssText += ';background:#fff7ed;color:#92400e;border:1px solid #fed7aa';
      routeInf.innerHTML = '⚖ <strong>Third Party (Deemed Property):</strong> Although paid direct to the beneficiary, this is a <strong>deemed asset</strong> under the Estate Duty Act — it forms part of the dutiable estate. Estate duty applies.';
    }
    card.appendChild(routeInf);
  }

  return card;
}

// ═══════════════════════════════════════════════════════════
// TAB 7 — ESTATE PLANNING
// ═══════════════════════════════════════════════════════════
function buildEstate() {
  var s = div();

  var inf = div('info');
  inf.innerHTML = 'Estate duty is calculated on the <strong>dutiable estate</strong>. ' +
    'Adjust beneficiary routing on the Policies tab to model different outcomes. ' +
    'Asset dutiable amounts can be overridden below.';
  s.appendChild(inf);

  // ── SA Estate Duty constants
  var ABATEMENT   = 3500000;   // Primary abatement R3.5m
  var DUTY_RATE1  = 0.20;      // 20% on first R30m dutiable
  var DUTY_RATE2  = 0.25;      // 25% above R30m
  var DUTY_THRESH = 30000000;
  var EXEC_RATE   = 0.04025;   // 3.5% + VAT (15%) = 4.025%

  // ── SECTION 1: Assets
  s.appendChild(stitle('Dutiable Assets'));

  var assetNote = div('info');
  assetNote.innerHTML = 'Assets are drawn from the Assets tab. Override the dutiable amount if an asset is held in a trust, CC, or is otherwise excluded. ' +
    'Set to <strong>0</strong> to exclude entirely.';
  s.appendChild(assetNote);

  // Build a working list from Assets tab data
  // Each row: { desc, fullVal, dutiableAmt (editable) }
  // We reconcile with S.estateAssets (persisted overrides) by desc key

  function getOverride(desc) {
    if (!S.estateAssets) S.estateAssets = [];
    var found = S.estateAssets.filter(function(a) { return a.desc === desc; })[0];
    return found || null;
  }
  function setOverride(desc, dutiable) {
    if (!S.estateAssets) S.estateAssets = [];
    var idx = -1;
    S.estateAssets.forEach(function(a, i) { if (a.desc === desc) idx = i; });
    if (idx > -1) S.estateAssets[idx].dutiable = dutiable;
    else S.estateAssets.push({ desc: desc, dutiable: dutiable });
  }

  // Collect all assets from tab 3
  var allAssets = [];
  S.props.forEach(function(p) {
    if (!p.desc && !N(p.val)) return;
    var desc = p.desc || 'Property';
    var ov = getOverride(desc);
    // All assets included in gross estate at full value — s.4(q) handles the deduction
    allAssets.push({ desc: desc, fullVal: N(p.val), dutiable: ov ? ov.dutiable : String(N(p.val)), bond: N(p.bond), benType: p.deathBenType||'' });
  });
  S.vehicles.forEach(function(v) {
    if (!v.desc && !N(v.val)) return;
    var desc = v.desc || 'Vehicle';
    var ov = getOverride(desc);
    // All assets included in gross estate at full value
    allAssets.push({ desc: desc, fullVal: N(v.val), dutiable: ov ? ov.dutiable : String(N(v.val)), bond: N(v.finance), benType: v.deathBenType||'' });
  });
  S.otherAssets.forEach(function(a) {
    if (!a.desc && !N(a.val)) return;
    var desc = a.desc || 'Asset';
    var ov = getOverride(desc);
    // All assets included in gross estate — s.4(q) handles deduction for spouse assets
    allAssets.push({ desc: desc, fullVal: N(a.val), dutiable: ov ? ov.dutiable : String(N(a.val)), bond: 0, benType: a.deathBenType||'' });
  });

  if (allAssets.length === 0) {
    var noA = div('info');
    noA.textContent = 'No assets captured. Add properties, vehicles, and other assets on the Assets tab.';
    s.appendChild(noA);
  } else {
    var aTbl = document.createElement('table');
    var aThead = document.createElement('thead');
    aThead.innerHTML = '<tr><th>Asset</th><th>Full Value</th><th>Dutiable Amount</th><th>Notes</th></tr>';
    aTbl.appendChild(aThead);
    var aTbody = document.createElement('tbody');

    allAssets.forEach(function(a) {
      var tr = document.createElement('tr');

      var td1 = document.createElement('td'); td1.style.fontWeight = '600'; td1.textContent = a.desc; tr.appendChild(td1);

      var td2 = document.createElement('td'); td2.textContent = Rfmt(a.fullVal); td2.style.color = 'var(--sub)'; tr.appendChild(td2);

      var td3 = document.createElement('td');
      var rw = div('td-r'); rw.appendChild(el('span','rp','R'));
      var inp = document.createElement('input'); inp.type = 'text'; inp.inputMode = 'numeric';
      inp.value = a.dutiable; inp.placeholder = '0';
      inp.addEventListener('input', function(e) { setOverride(a.desc, e.target.value); });
      inp.addEventListener('blur', function(e) { setOverride(a.desc, e.target.value); render(); });
      rw.appendChild(inp); td3.appendChild(rw); tr.appendChild(td3);

      var td4 = document.createElement('td');
      td4.style.fontSize = '11px'; td4.style.color = 'var(--sub)';
      if (N(a.dutiable) < a.fullVal && N(a.dutiable) >= 0) {
        td4.textContent = a.bond > 0 ? 'Bond: ' + Rfmt(a.bond) : 'Partially excluded';
        if (N(a.dutiable) === 0) td4.textContent = 'Excluded (trust/CC?)';
      } else if (a.bond > 0) {
        td4.textContent = 'Bond outstanding: ' + Rfmt(a.bond) + ' (reduce dutiable if applicable)';
      }
      tr.appendChild(td4);

      aTbody.appendChild(tr);
    });
    aTbl.appendChild(aTbody);
    var aTw = div('twrap'); aTw.appendChild(aTbl); s.appendChild(aTw);
  }

  // ── SECTION 2: Retirement assets (outside estate — display only)
  var retTotal = S.retAssets.reduce(function(sum, r) { return sum + N(r.currentVal); }, 0);
  if (retTotal > 0) {
    s.appendChild(stitle('Retirement Assets (Outside Estate)'));
    var retNote = div('info');
    retNote.innerHTML = 'RA / pension fund values are <strong>excluded from estate duty</strong> (Pension Funds Act s.37C — paid at trustee discretion). ' +
      'Shown for liquidity context only.';
    s.appendChild(retNote);
    var retCards = div('cards c3');
    S.retAssets.forEach(function(r) {
      if (!N(r.currentVal)) return;
      var c = div('card');
      c.innerHTML = '<div class="lbl">' + (r.desc || 'Retirement fund') + '</div><div class="val">' + Rfmt(r.currentVal) + '</div>' +
        '<div class="sub">Outside estate</div>';
      retCards.appendChild(c);
    });
    s.appendChild(retCards);
  }

  // ── SECTION 3: Policy death benefits — routing summary
  s.appendChild(stitle('Policy Death Benefits — Routing'));

  var pols = S.importedPols || [];

  // Policy routing buckets — kept separate for display and calculation
  var s4qPolicies    = 0;  // Spouse beneficiary — s.4(q) deductible, enters gross estate as deemed property
  var estatePols     = 0;  // Estate beneficiary — paid INTO the estate, executor administers
  var thirdPartyPols = 0;  // Third Party beneficiary — deemed property, paid DIRECT to beneficiary
  var bizDutiable    = 0;  // Business assurance with EstateDutiable=Yes — deemed property
  var bizOutside     = 0;  // Business assurance outside personal estate

  pols.forEach(function(p) {
    var ben = N(p.BenDeath);
    if (!ben && (POL_RA_TYPES.indexOf(p.Type) > -1 || POL_INV_TYPES.indexOf(p.Type) > -1)) {
      ben = N(p.BenFundValue);
    }
    if (p.Type === 'Business Assurance') {
      var bizAmt = N(p.LoanAmount) || N(p.BenDeath);
      if (p.EstateDutiable === 'Yes') { bizDutiable += bizAmt; }
      else                            { bizOutside  += bizAmt; }
      return;
    }
    if (!ben) return;
    var bt = p.BeneficiaryType || '';
    if      (bt === 'Spouse')       s4qPolicies    += ben;
    else if (bt === 'Estate')       estatePols     += ben;  // paid into estate
    else if (bt === 'Third Party')  thirdPartyPols += ben;  // deemed property, paid direct
    else                            bizOutside     += ben;
  });

  // Physical assets with spouse beneficiary also qualify for s.4(q)
  var s4qAssets = 0;
  S.props.forEach(function(p){ if(p.deathBenType==='Spouse' && N(p.val)) s4qAssets += N(p.val); });
  S.vehicles.forEach(function(v){ if(v.deathBenType==='Spouse' && N(v.val)) s4qAssets += N(v.val); });
  S.otherAssets.forEach(function(a){ if(a.deathBenType==='Spouse' && N(a.val)) s4qAssets += N(a.val); });

  // dutiablePols = all non-spouse policy proceeds in gross estate (for calculations)
  var dutiablePols = estatePols + thirdPartyPols;

  // toEstate = ALL policy proceeds entering gross estate as deemed property
  var toEstate = s4qPolicies + dutiablePols + bizDutiable;

  // section4q = total s.4(q) deduction
  var section4q = s4qPolicies + s4qAssets;

  // toBiz = display only
  var toBiz = bizOutside;

  // polsActuallyInEstate = estate-beneficiary policies only (executor administers)
  var polsActuallyInEstate = estatePols;

  if (pols.length === 0) {
    var noPol = div('info'); noPol.textContent = 'No policies captured. Add policies on the Policies tab.';
    s.appendChild(noPol);
  } else {
    var polRouteCards = div('cards');
    polRouteCards.style.gridTemplateColumns = 'repeat(4,1fr)';
    [
      { l: 'Section 4(q) — Spouse',         v: s4qPolicies,    c: 'ok',   sub: 'Paid direct to spouse — not dutiable' },
      { l: 'To Estate (estate beneficiary)', v: estatePols,     c: 'warn', sub: 'Paid into estate — executor administers' },
      { l: 'Third Party / Trust',            v: thirdPartyPols, c: 'warn', sub: 'Deemed property — paid direct, duty apportioned' },
      { l: 'Biz Assurance — Dutiable',       v: bizDutiable,    c: 'warn', sub: 'Deemed property — paid to CC/bank, duty apportioned' },
      { l: 'Biz Assurance — Outside Estate', v: bizOutside,     c: '',     sub: 'Keyman / buy-sell — outside estate, no duty' }
    ].forEach(function(x) {
      var c = div('card');
      c.innerHTML = '<div class="lbl">' + x.l + '</div>' +
        '<div class="val ' + x.c + '">' + (x.v > 0 ? Rfmt(x.v) : '—') + '</div>' +
        '<div class="sub">' + x.sub + '</div>';
      polRouteCards.appendChild(c);
    });
    s.appendChild(polRouteCards);
  }

  // ── SECTION 4: Accrual Claim (OCP with Accrual marriages)
  var isOCP = (S.cli.marital || '').toLowerCase().indexOf('accrual') > -1 ||
              (S.cli.marital || '').toLowerCase().indexOf('community') > -1;
  var accrualClaim = 0;

  if (isOCP || N(S.accrual.spouseCurrentAssets) > 0) {
    s.appendChild(stitle('Accrual Claim (OCP with Accrual)'));
    var accrNote = div('info');
    accrNote.innerHTML = 'For OCP with accrual marriages: if the client\'s estate accrual exceeds the spouse\'s accrual, ' +
      'half the difference is payable to the surviving spouse from the estate before estate duty. ' +
      '<strong>Accrual claim reduces the dutiable estate.</strong>';
    s.appendChild(accrNote);

    var accrGrid = g3();
    accrGrid.appendChild(rfld('Client estate at marriage (R)', S.accrual, 'clientStartVal'));
    accrGrid.appendChild(rfld('Spouse estate at marriage (R)', S.accrual, 'spouseStartVal'));
    accrGrid.appendChild(rfld('Spouse\'s current gross assets (R)', S.accrual, 'spouseCurrentAssets'));
    s.appendChild(accrGrid);

    // ── ACCRUAL LAW (Matrimonial Property Act)
    // Accrual is calculated on assets owned IMMEDIATELY BEFORE death.
    // Risk life policies have R0 surrender value before death — excluded.
    // Policy proceeds only arise AFTER death and do not form part of the accrual calculation.
    // Only actual owned assets count: physical assets + investment/RA fund values.

    // Physical assets owned before death
    var accrPhysical = S.props.reduce(function(sum,p){ return sum+N(p.val); },0) +
                       S.vehicles.reduce(function(sum,v){ return sum+N(v.val); },0) +
                       S.otherAssets.reduce(function(sum,a){ return sum+N(a.val); },0);

    // RA/investment fund values owned before death (surrender value exists)
    var accrInvFunds = (S.importedPols||[]).reduce(function(sum,p){
      if (POL_RA_TYPES.indexOf(p.Type) > -1 || POL_INV_TYPES.indexOf(p.Type) > -1) {
        return sum + N(p.BenFundValue);
      }
      return sum;
    },0);

    var clientGrossAccrual = accrPhysical + accrInvFunds;
    // NOTE: clientGrossAccrual is used here (not totalDutiableAssets which is declared later)
    var clientAccrual = Math.max(0, clientGrossAccrual - N(S.accrual.clientStartVal));
    var spouseAccrual = Math.max(0, N(S.accrual.spouseCurrentAssets) - N(S.accrual.spouseStartVal));

    if (clientAccrual > spouseAccrual) {
      accrualClaim = (clientAccrual - spouseAccrual) / 2;
    } else if (spouseAccrual > clientAccrual) {
      // Spouse accrual exceeds client — no claim against estate
      accrualClaim = 0;
    }

    var accrCards = div('cards c3'); accrCards.style.marginTop = '10px';
    var ac1 = div('card');
    ac1.innerHTML = '<div class="lbl">Client Accrual Estate</div><div class="val">' + Rfmt(clientGrossAccrual) + '</div>' +
      '<div class="sub">Physical assets + RA/investment funds<br><span style="font-size:10px;color:#8899bb">Risk policies excluded (R0 before death)</span></div>';
    accrCards.appendChild(ac1);
    var ac2 = div('card');
    ac2.innerHTML = '<div class="lbl">Spouse Accrual Estate</div><div class="val">' + Rfmt(N(S.accrual.spouseCurrentAssets)) + '</div>' +
      '<div class="sub">Spouse assets at moment of death<br><span style="font-size:10px;color:#8899bb">Before receiving any policy proceeds</span></div>';
    accrCards.appendChild(ac2);
    var ac3 = div('card');
    ac3.innerHTML = '<div class="lbl">Accrual Claim Payable</div><div class="val ' + (accrualClaim > 0 ? 'warn' : 'ok') + '">' +
      (accrualClaim > 0 ? Rfmt(accrualClaim) : 'R 0') + '</div>' +
      '<div class="sub">½ × (Client − Spouse) accrual</div>';
    accrCards.appendChild(ac3);
    s.appendChild(accrCards);

    // Info box explaining the calculation
    var accrExp = div('info'); accrExp.style.cssText='font-size:11px;margin-top:6px';
    accrExp.innerHTML = '<strong>How accrual is calculated:</strong> Only assets owned <em>immediately before death</em> count. ' +
      'Risk life policies have R0 surrender value before death and are excluded. ' +
      'Policy proceeds (paid after death) do not form part of either party\'s accrual estate. ' +
      'The accrual claim (' + Rfmt(accrualClaim) + ') is deducted from the estate before estate duty is calculated.';
    s.appendChild(accrExp);
  }

  // ── SECTION 5: Estate duty calculation
  s.appendChild(stitle('Estate Duty Calculation'));

  // Gross dutiable estate = dutiable assets + estate-routed policy benefits - liabilities
  var totalDutiableAssets = allAssets.reduce(function(sum, a) { return sum + N(a.dutiable); }, 0);
  var totalLiabs = S.props.reduce(function(sum, p) { return sum + N(p.bond); }, 0) +
                   S.vehicles.reduce(function(sum, v) { return sum + N(v.finance); }, 0) +
                   S.liabilities.reduce(function(sum, l) { return sum + N(l.bal); }, 0);

  // ── GROSS ESTATE: physical assets + ALL deemed property (s3(3)(a) Estate Duty Act)
  var grossEstate = totalDutiableAssets + toEstate;
  var netEstate   = Math.max(0, grossEstate - totalLiabs);

  // ── DEDUCTIONS in correct legal order
  // 1. Accrual claim (Matrimonial Property Act — paid before estate duty)
  var accrualDed    = Math.min(accrualClaim, netEstate);
  var afterAccrual2 = Math.max(0, netEstate - accrualDed);

  // 2. Section 4(q) — spouse policies + spouse physical assets
  var sec4qTotal = section4q;
  if (S.cli.spouseInheritsResidue) {
    var residue = Math.max(0, afterAccrual2 - section4q);
    sec4qTotal  = section4q + residue;
  }
  var sec4qDed    = Math.min(sec4qTotal, afterAccrual2);
  var afterSpouse = Math.max(0, afterAccrual2 - sec4qDed);

  // 3. Primary abatement
  var afterAbatement = Math.max(0, afterSpouse - ABATEMENT);

  // ── TOTAL ESTATE DUTY
  var estateDuty = 0;
  if (afterAbatement > 0) {
    if (afterAbatement <= DUTY_THRESH) {
      estateDuty = afterAbatement * DUTY_RATE1;
    } else {
      estateDuty = DUTY_THRESH * DUTY_RATE1 + (afterAbatement - DUTY_THRESH) * DUTY_RATE2;
    }
  }

  // Executor fees: only on assets that pass through the executor's hands
  // = physical assets + policies paid INTO the estate
  // NOT: s4q policies (paid direct to spouse)
  // NOT: trust/third party policies (paid direct — executor never handles them)
  // NOT: business assurance to CC/bank (paid direct to that entity)
  // Executor fees basis: physical assets + policies paid INTO estate only
  // Third party / trust policies paid direct — executor never handles them
  var execFeeBasis     = totalDutiableAssets + estatePols;
  var execFees         = execFeeBasis * EXEC_RATE;
  var totalEstateCosts = estateDuty + execFees;

  // ── DUTY APPORTIONMENT (s7 Estate Duty Act)
  // Each asset/policy in the dutiable estate carries a proportional share of estate duty.
  // s4q policies are deducted from dutiable estate — they carry no duty.
  // Formula: duty on item = total duty × (item value ÷ dutiable estate)
  function apportionDuty(val) {
    return (afterAbatement > 0 && estateDuty > 0) ? estateDuty * (val / afterAbatement) : 0;
  }
  var dutyOnPhysical      = apportionDuty(totalDutiableAssets);
  var dutyOnEstatePols    = apportionDuty(estatePols);      // estate pays this via estate policy
  var dutyOnThirdParty    = apportionDuty(thirdPartyPols);  // trust/3rd party pays this
  var dutyOnBizDutiable   = apportionDuty(bizDutiable);     // CC/bank pays this
  var dutyPayableByEstate        = dutyOnPhysical + dutyOnEstatePols;
  var dutyPayableByThirdParties  = dutyOnThirdParty + dutyOnBizDutiable;

  // ── LIQUIDITY — what the estate itself needs to fund
  // Estate pays: its own duty share + executor fees
  // Third party policy beneficiaries pay their own duty share (recovered from them)
  // Available to estate: estate-beneficiary policy proceeds + liquid assets
  // s4q and business assurance proceeds do NOT flow through the estate
  // Liquid cash = only Investment-type assets (not business interests, farms, personal property)
  // Business interests / farms are illiquid — cannot be quickly sold to pay estate costs
  var LIQUID_TYPES = ['Investment','Unit Trust','Money Market','Tax Free'];
  var liquidCash = S.otherAssets.reduce(function(sum,a){
    var t = (a.type||'').toLowerCase();
    var isLiquid = t === '' || t === 'investment' || t.indexOf('unit') > -1 ||
                   t.indexOf('money') > -1 || t.indexOf('tax free') > -1;
    var isIlliquid = t.indexOf('business') > -1 || t.indexOf('farm') > -1 ||
                     t.indexOf('personal') > -1 || t.indexOf('inheritance') > -1;
    return sum + (isIlliquid ? 0 : N(a.val));
  }, 0);
  var liquidPolicies = polsActuallyInEstate;  // only estate-beneficiary policies flow through executor
  var liquidAssets   = liquidCash + liquidPolicies;
  // Accrual claim is a CASH LIABILITY payable from the estate — must be in liquidity
  var estateOwnCosts = dutyPayableByEstate + execFees + accrualDed;
  var liquidityGap   = liquidAssets - estateOwnCosts;

  // ── Shared helper for all three calculation boxes
  function makeCalcBox(title) {
    var box = div();
    box.style.cssText = 'background:var(--navy);color:#fff;border-radius:9px;padding:18px 20px;margin-bottom:16px';
    var ttl = div();
    ttl.style.cssText = 'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:10px';
    ttl.textContent = title;
    box.appendChild(ttl);
    function cRow(lbl, val, indent, highlight, borderTop) {
      var row = div();
      row.style.cssText = 'display:flex;justify-content:space-between;padding:4px 0;font-size:13px' +
        (indent?';padding-left:20px':'') +
        (borderTop?';border-top:1px solid #334;margin-top:8px;padding-top:10px':'') +
        (highlight?';font-size:15px;font-weight:700':'');
      var ls = el('span','',lbl);
      var vs = el('span','',val);
      vs.style.color = highlight ? 'var(--gold)' : '#ccd6f6';
      row.appendChild(ls); row.appendChild(vs);
      box.appendChild(row);
    }
    function cSub(lbl, val) {
      var row = div();
      row.style.cssText = 'display:flex;justify-content:space-between;padding:3px 0 3px 16px;font-size:11px;color:#8899bb';
      row.innerHTML = '<span>' + lbl + '</span><span>' + val + '</span>';
      box.appendChild(row);
    }
    return { box:box, row:cRow, sub:cSub };
  }

  // ── BOX 1: ESTATE DUTY CALCULATION
  s.appendChild(stitle('Estate Duty Calculation'));
  var b1 = makeCalcBox('Estate Duty Calculation');
  b1.row('Gross estate', Rfmt(grossEstate));
  b1.sub('Physical assets', Rfmt(totalDutiableAssets));
  b1.sub('+ All deemed policy proceeds', Rfmt(toEstate));
  if (totalLiabs > 0) {
    b1.row('Less: Liabilities', '\u2212 ' + Rfmt(totalLiabs), true);
    b1.row('Net estate', Rfmt(netEstate), false, false, true);
  }
  if (accrualClaim > 0) {
    b1.row('Less: Accrual claim (ANC with accrual)', '\u2212 ' + Rfmt(accrualDed), true);
    b1.row('After accrual deduction', Rfmt(afterAccrual2), false, false, true);
  }
  if (sec4qTotal > 0) {
    b1.row(S.cli.spouseInheritsResidue ? 'Less: Section 4(q) \u2014 spouse policies + residue' : 'Less: Section 4(q) \u2014 spouse bequest', '\u2212 ' + Rfmt(sec4qDed), true);
    b1.row('After Section 4(q) deduction', Rfmt(afterSpouse), false, false, true);
  }
  b1.row('Less: Primary abatement', '\u2212 ' + Rfmt(Math.min(afterSpouse, ABATEMENT)), true);
  b1.row('Dutiable amount', Rfmt(afterAbatement), false, false, true);
  if (afterAbatement > 0) {
    b1.sub(afterAbatement <= DUTY_THRESH ? 'Rate: 20% on first R30m' : '20% on first R30m + 25% on balance', '');
  }
  b1.row('Estate Duty', Rfmt(estateDuty), false, false, true);
  b1.row('Executor fees', Rfmt(execFees), true);
  b1.sub('4.025% on physical assets + estate-beneficiary policies only', '');
  b1.row('Total estate costs', Rfmt(totalEstateCosts), false, false, true);
  if (dutyPayableByThirdParties > 0) {
    var apTtl1 = div();
    apTtl1.style.cssText = 'font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#8899bb;margin-top:14px;padding-top:12px;border-top:1px solid #334;margin-bottom:6px';
    apTtl1.textContent = 'Duty Apportionment — s7 Estate Duty Act';
    b1.box.appendChild(apTtl1);
    b1.sub('Formula: party duty = total duty × (party value ÷ dutiable estate)', '');
    b1.row('Duty payable by estate', Rfmt(dutyPayableByEstate), true);
    b1.sub('Physical assets: ' + Rfmt(dutyOnPhysical) + ' · Estate policy: ' + Rfmt(dutyOnEstatePols), '');
    if (dutyOnThirdParty > 0) {
      b1.row('Duty payable by third party / trust', Rfmt(dutyOnThirdParty), true);
      (S.importedPols||[]).forEach(function(p){
        if ((p.BeneficiaryType||'')==='Third Party' && N(p.BenDeath)>0 && p.Type!=='Business Assurance') {
          b1.sub((p.Insurer||'Policy') + ' — ' + (p.Beneficiary||'Third party'), Rfmt(apportionDuty(N(p.BenDeath))));
        }
      });
    }
    if (dutyOnBizDutiable > 0) {
      b1.row('Duty payable by business assurance beneficiary', Rfmt(dutyOnBizDutiable), true);
      (S.importedPols||[]).forEach(function(p){
        if (p.Type==='Business Assurance' && p.EstateDutiable==='Yes') {
          var amt = N(p.LoanAmount)||N(p.BenDeath);
          b1.sub((p.Insurer||'Policy') + ' — ' + (p.Beneficiary||'Business'), Rfmt(apportionDuty(amt)));
        }
      });
    }
    b1.row('Total duty by third parties', Rfmt(dutyPayableByThirdParties), false, false, true);
    var apNote1 = div();
    apNote1.style.cssText = 'font-size:10px;color:#8899bb;margin-top:6px;line-height:1.5';
    apNote1.textContent = 'Third party beneficiaries carry a proportional duty share. Estate pays full duty then recovers these amounts.';
    b1.box.appendChild(apNote1);
  }
  s.appendChild(b1.box);

  // ── BOX 2: EXECUTOR FEES DETAIL
  s.appendChild(stitle('Executor Fees'));
  var b2 = makeCalcBox('How Executor Fees Are Calculated');
  b2.row('Physical assets in estate', Rfmt(totalDutiableAssets));
  b2.sub('Market value of all assets administered by the executor', '');
  b2.row('+ Estate-beneficiary policy proceeds', Rfmt(estatePols), true);
  b2.sub('Policies paid into the estate — executor receives and distributes', '');
  b2.row('Executor fee basis', Rfmt(execFeeBasis), false, false, true);
  b2.sub('s.4(q), trust and business assurance proceeds excluded — not handled by executor', '');
  b2.row('× Executor fee rate (3.5% + 15% VAT = 4.025%)', '', true);
  b2.row('Executor fees', Rfmt(execFees), false, true, true);
  s.appendChild(b2.box);

  // ── BOX 3: LIQUIDITY ANALYSIS
  // Recalculate liquidCash and liquidPolicies cleanly here
  var liqCashAmt = S.otherAssets.reduce(function(sum,a){
    var t = (a.type||'').toLowerCase();
    var illiquid = t.indexOf('business')>-1 || t.indexOf('farm')>-1 || t.indexOf('personal')>-1 || t.indexOf('inheritance')>-1;
    return sum + (illiquid ? 0 : N(a.val));
  }, 0);
  var liqPolsAmt  = estatePols;  // only estate-beneficiary policies flow through executor
  var liqTotal    = liqCashAmt + liqPolsAmt;
  var liqNeeds    = dutyPayableByEstate + execFees + accrualDed;
  var liqGap      = liqTotal - liqNeeds;

  s.appendChild(stitle('Liquidity Analysis'));
  var b3 = makeCalcBox('Liquid Assets Available to Estate');
  b3.row('Estate-beneficiary policy proceeds', Rfmt(liqPolsAmt));
  b3.sub('Only policies where executor receives the funds', '');
  if (liqCashAmt > 0) {
    b3.row('Liquid assets (investments / cash)', Rfmt(liqCashAmt), true);
    b3.sub('Investment-type assets only \u2014 illiquid assets excluded', '');
  }
  b3.row('Total liquid assets available', Rfmt(liqTotal), false, false, true);
  b3.row('Less: Estate duty (estate share)', '\u2212 ' + Rfmt(dutyPayableByEstate), true, false, true);
  b3.row('Less: Executor fees', '\u2212 ' + Rfmt(execFees), true);
  if (accrualDed > 0) {
    b3.row('Less: Accrual claim payable to spouse', '\u2212 ' + Rfmt(accrualDed), true);
  }
  b3.row('Liquidity ' + (liqGap >= 0 ? 'Surplus' : 'Shortfall'), (liqGap >= 0 ? '' : '\u2212 ') + Rfmt(Math.abs(liqGap)), false, true, true);
  s.appendChild(b3.box);
  if (liqGap < 0) {
    var liqAlert = div('alert');
    liqAlert.innerHTML = '\u26a0 <strong>Liquidity shortfall of ' + Rfmt(Math.abs(liqGap)) + '.</strong> The estate cannot fund its own costs without selling assets. Consider additional estate liquidity cover.';
    s.appendChild(liqAlert);
  } else {
    var liqOk = div('info');
    liqOk.style.cssText = 'background:#f0fdf4;border-color:#86efac;color:#166534';
    liqOk.innerHTML = '\u2713 <strong>Estate is liquid.</strong> Available assets cover estate duty, executor fees and the accrual claim.';
    s.appendChild(liqOk);
  }

  // ── BOX 4: BENEFICIARY OUTCOME
  s.appendChild(stitle('Beneficiary Outcome'));
  var benBox = div();
  benBox.style.cssText = 'background:var(--navy);color:#fff;border-radius:9px;padding:18px 20px;margin-bottom:16px';

  function benRow(lbl, val, note, colour) {
    var row = div();
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #223';
    var left = div();
    left.style.cssText = 'display:flex;flex-direction:column;gap:2px';
    var ll = el('span','',lbl); ll.style.cssText='font-size:13px;font-weight:600;color:#ccd6f6';
    left.appendChild(ll);
    if (note) { var ln = el('span','',note); ln.style.cssText='font-size:11px;color:#8899bb'; left.appendChild(ln); }
    var vv = el('span','',val); vv.style.cssText='font-size:14px;font-weight:700;color:'+(colour||'var(--gold)');
    row.appendChild(left); row.appendChild(vv);
    benBox.appendChild(row);
  }

  // Spouse — s4q policies paid direct
  if (s4qPolicies > 0 || s4qAssets > 0) {
    var spousePolList = (S.importedPols||[]).filter(function(p){ return (p.BeneficiaryType||'')==='Spouse' && N(p.BenDeath)>0 && p.Type!=='Business Assurance'; });
    var spouseNote = spousePolList.map(function(p){ return (p.Insurer||'')+(p.Product?' \u2014 '+p.Product:'') + ': ' + Rfmt(p.BenDeath); }).join(' \u00b7 ');
    benRow((S.cli.spouseName||'Spouse') + ' \u2014 Section 4(q)', Rfmt(s4qPolicies + s4qAssets), spouseNote || 'Paid direct \u2014 not dutiable', '#86efac');
  }
  if (S.cli.spouseInheritsResidue && afterSpouse > 0) {
    benRow((S.cli.spouseName||'Spouse') + ' \u2014 Residue of estate', Rfmt(afterSpouse), 'After duty, executor fees and accrual are settled', '#86efac');
  }

  // Estate-beneficiary policies
  if (estatePols > 0) {
    var estPolList = (S.importedPols||[]).filter(function(p){ return (p.BeneficiaryType||'')==='Estate' && N(p.BenDeath)>0; });
    var estNote = estPolList.map(function(p){ return (p.Insurer||'')+(p.Product?' \u2014 '+p.Product:'') + ': ' + Rfmt(p.BenDeath); }).join(' \u00b7 ');
    benRow('Estate (executor administered)', Rfmt(estatePols), (estNote||'') + ' \u2014 funds duty, executor fees, bequests', '#fcd34d');
  }

  // Third party policies — named beneficiary + amount + duty they owe
  (S.importedPols||[]).forEach(function(p){
    if ((p.BeneficiaryType||'')==='Third Party' && N(p.BenDeath)>0 && p.Type!=='Business Assurance') {
      var dutyOwed = apportionDuty(N(p.BenDeath));
      var note = (p.Insurer||'') + (p.Product?' \u2014 '+p.Product:'') + ' \u00b7 Deemed property \u00b7 Duty share: ' + Rfmt(dutyOwed);
      benRow((p.Beneficiary||'Third party') + ' \u2014 ' + Rfmt(p.BenDeath) + ' (direct)', Rfmt(N(p.BenDeath) - dutyOwed) + ' net', note, '#ccd6f6');
    }
  });

  // Business assurance policies
  (S.importedPols||[]).forEach(function(p){
    if (p.Type==='Business Assurance') {
      var amt = N(p.LoanAmount)||N(p.BenDeath);
      var dutyOwed2 = p.EstateDutiable==='Yes' ? apportionDuty(amt) : 0;
      var note2 = (p.Insurer||'') + (p.BizType?' \u2014 '+p.BizType:'') + (dutyOwed2>0?' \u00b7 Deemed property \u00b7 Duty share: '+Rfmt(dutyOwed2):' \u00b7 Outside estate');
      benRow((p.Beneficiary||'Business') + ' \u2014 Business assurance', Rfmt(amt), note2, '#ccd6f6');
    }
  });

  s.appendChild(benBox);

  // ── Estate planning notes
  s.appendChild(stitle('Estate Planning Notes'));
  s.appendChild(txfld('Notes / recommendations', S, 'estateNotes'));

  return s;
}

// ═══════════════════════════════════════════════════════════
// TAB 8 — SUMMARY & GAPS
// ═══════════════════════════════════════════════════════════
function buildSummary() {
  var s = div();
  var inf=div('info'); inf.textContent='This tab reads policies from the CRM (passed via URL) or captured below. It shows needs vs existing cover and calculates gaps.'; s.appendChild(inf);

  // For now, policies are entered here as a quick summary table
  // When linked from CRM they will be passed via URL params
  s.appendChild(stitle('Existing Cover Summary'));
  var inf2=div('info'); inf2.innerHTML='Enter cover amounts from existing policies. When opened from the client profile in the CRM, this will populate automatically.'; s.appendChild(inf2);

  // Summary fields for existing cover
  if(!S.existingCover) S.existingCover={death:'',disability:'',dread:'',ipPM:'',totalPrem:''};
  var eg=g3();
  eg.appendChild(rfld('Death Cover', S.existingCover, 'death'));
  eg.appendChild(rfld('Disability Cover', S.existingCover, 'disability'));
  eg.appendChild(rfld('Dread Disease', S.existingCover, 'dread'));
  s.appendChild(eg);
  var eg2=g3();
  eg2.appendChild(rfld('Income Protection /pm', S.existingCover, 'ipPM'));
  eg2.appendChild(rfld('Total Premiums /pm', S.existingCover, 'totalPrem'));
  s.appendChild(eg2);

  // ── Gap analysis
  s.appendChild(stitle('Gap Analysis'));

  // Death
  var totLiabNeed=S.deathLiabs.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totIncCap=S.deathIncome.reduce(function(sum,r){return sum+calcIncomeNeed(r);},0);
  var totCapNeed=S.deathCapital.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totalDeathNeed=totLiabNeed+totIncCap+totCapNeed;
  var haveDeathCover=N(S.existingCover.death);

  if(S.scope.death) s.appendChild(buildGapRow('Death Cover', totalDeathNeed, haveDeathCover));

  // Disability
  var disIncCap=S.disIncome.reduce(function(sum,r){return sum+calcIncomeNeed(r);},0);
  var disCapNeed=S.disCapital.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totalDisNeed=disIncCap+disCapNeed;
  if(S.scope.disability) s.appendChild(buildGapRow('Disability Cover', totalDisNeed, N(S.existingCover.disability)));

  // Dread
  if(S.scope.dread) s.appendChild(buildGapRow('Dread Disease', N(S.dreadAmt), N(S.existingCover.dread)));

  // IP
  if(S.scope.ip) s.appendChild(buildGapRow('Income Protection /pm', N(S.ipGrossPM||S.ipNettPM), N(S.existingCover.ipPM)));

  // Retirement
  if(S.scope.retirement){
    var cliAge=ageFrom(S.cli.dob);
    var retAge=N(S.cli.retAge)||65;
    var yrsToR=cliAge?Math.max(0,retAge-cliAge):null;
    var yrsInRet=85-retAge;
    if(yrsToR!==null){
      var totalProj=S.retAssets.reduce(function(sum,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return sum;
        var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
        var esc=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
        return sum+projectFund(r.currentVal,r.monthlyContrib,esc,gr,yrsToR);
      },0);
      var monthlyNeedToday=N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
      var lumpAtRet=S.retLumps.reduce(function(sum,r){return sum+N(r.amt);},0)*Math.pow(1+pct(S.assump.cpi),yrsToR);
      var capForIncome=retirementCapitalNeeded(monthlyNeedToday,yrsToR,yrsInRet,S.assump.cpi,S.assump.retReturn);
      s.appendChild(buildGapRow('Retirement Capital', capForIncome+lumpAtRet, totalProj));
    }
  }

  return s;
}

function buildGapRow(label, need, have) {
  var gap=have-need;
  var hasNeed=need>0;
  var row=div('gap-row'+(hasNeed?(gap>=0?' ok':' bad'):''));
  var gl=el('div','gl',label); row.appendChild(gl);
  var gv=div('gv');
  [{l:'Need',v:need},{l:'Have',v:have},{l:gap>=0?'Surplus':'Shortfall',v:Math.abs(gap)}].forEach(function(x,xi){
    var d=div(); d.innerHTML='<div class="vl">'+x.l+'</div><div class="vn" style="color:'+(xi===2?(gap>=0?'var(--green)':'var(--red)'):'var(--navy)')+'">'+
      (x.v>0?Rfmt(x.v):(xi===0?'Not captured':'—'))+'</div>';
    gv.appendChild(d);
  });
  row.appendChild(gv);
  return row;
}
