<style>
:root {
  --navy:    #1a2a4a;
  --gold:    #c8a84b;

  --white:   #ffffff;
  --text:    #1a2a4a;
  --sub:     #6b7280;
  --green:   #16a34a;
  --red:     #dc2626;
  --orange:  #d97706;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--smoke); color: var(--text); font-size: 13px; line-height: 1.5; }

/* ── HEADER ── */
.hdr { background: var(--navy); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; position: sticky; top: 0; z-index: 200; }
.hdr-brand { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
.hdr-client { font-size: 13px; color: #ccd6f6; }
.hdr-actions { display: flex; gap: 8px; }

/* ── TABS ── */
.tabbar { background: var(--navy); display: flex; padding: 0 20px; gap: 2px; border-bottom: 2px solid var(--gold); overflow-x: auto; }
.tabbar::-webkit-scrollbar { height: 0; }
.tab { padding: 9px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #8899bb; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s; }
.tab:hover { color: #ccd; }
.tab.on { color: var(--gold); border-bottom-color: var(--gold); }

/* ── CONTENT ── */
.content { max-width: 980px; margin: 0 auto; padding: 24px 20px 100px; }

/* ── SECTION TITLES ── */
.stitle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); padding-bottom: 8px; border-bottom: 1px solid var(--mist); margin: 28px 0 14px; }
.stitle:first-child { margin-top: 0; }

/* ── GRIDS ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }

/* ── FIELD ── */
.f { display: flex; flex-direction: column; gap: 4px; }
.f label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); }
.f input, .f select, .f textarea {
  border: var(--border); border-radius: 6px; padding: 8px 10px;
  font-family: inherit; font-size: 13px; color: var(--text);
  background: var(--white); transition: border-color .15s;
}
.f input:focus, .f select:focus, .f textarea:focus { outline: none; border-color: var(--gold); }
.f textarea { resize: vertical; min-height: 72px; }
/* Rand prefix */
.rw { position: relative; }
.rw .rp { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 12px; pointer-events: none; }
.rw input { padding-left: 22px; }
/* Percent suffix */
.pw { position: relative; }
.pw .pp { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 12px; pointer-events: none; }
.pw input { padding-right: 24px; }

/* ── RADIO GROUP ── */
.rg { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 2px; }
.rg label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text); }
.rg input[type=radio] { accent-color: var(--gold); width: 14px; height: 14px; }

/* ── CHECKBOXES ── */
.chkgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.chk { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: var(--border); border-radius: 7px; background: var(--white); cursor: pointer; transition: all .15s; user-select: none; }
.chk:hover { border-color: var(--gold); }
.chk.on { border-color: var(--gold); background: #fdf8ee; font-weight: 600; color: var(--navy); }
.chk input { accent-color: var(--gold); width: 14px; height: 14px; flex-shrink: 0; }

/* ── TABLES ── */
.twrap { overflow-x: auto; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--navy); color: #fff; padding: 7px 8px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
tbody tr td { padding: 5px 6px; border-bottom: 1px solid #eef0f4; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafaf8; }
table input, table select {
  border: var(--border); border-radius: 5px; padding: 5px 7px;
  font-family: inherit; font-size: 12px; width: 100%; background: var(--white);
}
table input:focus, table select:focus { outline: none; border-color: var(--gold); }
.td-r { display: flex; align-items: center; }
.td-r .rp { color: var(--sub); font-size: 11px; margin-right: 3px; flex-shrink: 0; }
.td-r input { flex: 1; min-width: 0; }

/* ── BUTTONS ── */
.btn { border: none; border-radius: 6px; padding: 8px 16px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; }

.btn-gold:hover  { background: #b8942a; }
.btn-navy  { background: var(--navy); color: #fff; }
.btn-navy:hover  { background: #0f1e38; }
.btn-ghost { background: transparent; border: var(--border); color: var(--sub); }
.btn-ghost:hover { border-color: var(--navy); color: var(--navy); }

.btn-add:hover { border-color: var(--gold); color: var(--gold); }
.btn-del { background: none; border: none; color: #bbb; font-size: 15px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
.btn-del:hover { color: var(--red); background: #fef2f2; }

/* ── INFO / ALERT ── */
.info  { background: #fdf8ee; border: 1.5px solid var(--gold2); border-radius: 7px; padding: 10px 13px; font-size: 12px; color: #7a5f1a; margin-bottom: 14px; }
.alert { background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 7px; padding: 10px 13px; font-size: 12px; color: var(--red); margin-bottom: 14px; }

/* ── SUMMARY CARDS ── */
.cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.cards.c3 { grid-template-columns: repeat(3,1fr); }
.cards.c2 { grid-template-columns: repeat(2,1fr); }
.card { background: var(--white); border: var(--border); border-radius: 9px; padding: 14px 16px; }
.card .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); margin-bottom: 4px; }
.card .val { font-size: 20px; font-weight: 700; color: var(--navy); }
.card .val.ok  { color: var(--green); }
.card .val.bad { color: var(--red); }
.card .val.warn { color: var(--orange); }
.card .sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* ── GAP ROWS ── */
.gap-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-radius: 8px; border: var(--border); background: var(--white); margin-bottom: 8px; }
.gap-row.ok  { border-color: #86efac; background: #f0fdf4; }
.gap-row.bad { border-color: #fca5a5; background: #fef2f2; }
.gap-row .gl { font-size: 13px; font-weight: 700; }
.gap-row .gv { display: flex; gap: 28px; }
.gap-row .gv > div { text-align: right; }
.gap-row .gv .vl { font-size: 10px; text-transform: uppercase; color: var(--sub); }
.gap-row .gv .vn { font-size: 13px; font-weight: 700; }

/* ── TAX BOX ── */
.taxbox { background: var(--white); border: var(--border); border-radius: 7px; padding: 11px 14px; margin-bottom: 14px; }
.taxbox .tr { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.taxbox .tr.tot { font-weight: 700; border-top: 1px solid var(--mist); margin-top: 6px; padding-top: 6px; }

/* ── CALC RESULT ── */
.calc-result { background: var(--navy); color: #fff; border-radius: 8px; padding: 12px 16px; margin-top: 8px; }
.calc-result .cr-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }

.calc-result .cr-row .gold { color: var(--gold); }

/* ── FOOTER ── */
.footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 9px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 200; border-top: 2px solid var(--gold); }
.footer-l { font-size: 11px; color: #8899bb; }
.footer-r { display: flex; gap: 8px; }
</style>

// UTILITIES

function N(v) { return parseFloat(String(v || '').replace(/[^0-9.\-]/g, '')) || 0; }
function pct(v) { return N(v) / 100; }
function Rfmt(v) { return 'R\u202f' + Math.round(N(v)).toLocaleString('en-ZA'); }
function Rval(v) { return N(v) > 0 ? Rfmt(v) : '—'; }

function ageFrom(dob) {
  if (!dob) return null;
  var p = dob.split('/');
  if (p.length !== 3) return null;
  var d = new Date(p[2] + '-' + p[1] + '-' + p[0]);
  if (isNaN(d)) return null;
  return Math.floor((Date.now() - d) / 31557600000);
}
function yrsToRet(dob, retAge) {
  var a = ageFrom(dob);
  if (!a) return null;
  return Math.max(0, N(retAge) - a);
}

// ── TAX TABLES 2025/2026 ──────────────────────────────────
// Returns gross monthly amount needed to yield nettPM nett
// Uses iterative approach: start with gross = nett / (1 - est rate), refine
var TAX_BRACKETS = [
  { limit: 237100,  base: 0,       rate: 0.18 },
  { limit: 370500,  base: 42678,   rate: 0.26 },
  { limit: 512800,  base: 77362,   rate: 0.31 },
  { limit: 673000,  base: 121475,  rate: 0.36 },
  { limit: 857900,  base: 179147,  rate: 0.39 },
  { limit: 1817000, base: 251258,  rate: 0.41 },
  { limit: Infinity,base: 643601,  rate: 0.45 }
];
var PRIMARY_REBATE = 17235;
var SECONDARY_REBATE = 9444; // 65+
var UIF_RATE = 0.01;
var UIF_MAX_ANNUAL = 1776;

function calcTaxPA(grossPA) {
  var g = N(grossPA);
  var prevLimit = 0;
  var tax = 0;
  for (var i = 0; i < TAX_BRACKETS.length; i++) {
    var b = TAX_BRACKETS[i];
    if (g <= b.limit) {
      tax = b.base + (g - prevLimit) * b.rate;
      break;
    }
    prevLimit = b.limit;
  }
  return Math.max(0, tax - PRIMARY_REBATE);
}

function grossFromNett(nettPM) {
  // Find gross monthly that yields nettPM after PAYE and UIF
  // Iterate: guess gross, compute nett, adjust
  var nett = N(nettPM);
  if (nett <= 0) return 0;
  var gross = nett / 0.72; // initial guess
  for (var i = 0; i < 20; i++) {
    var taxPA = calcTaxPA(gross * 12);
    var uifPA = Math.min(gross * 12 * UIF_RATE, UIF_MAX_ANNUAL);
    var nettCalc = gross - taxPA / 12 - uifPA / 12;
    var diff = nett - nettCalc;
    if (Math.abs(diff) < 1) break;
    gross += diff * 0.7;
  }
  return Math.round(gross);
}

function taxBreakdown(grossPM) {
  var g = N(grossPM);
  if (g <= 0) return null;
  var grossPA = g * 12;
  var taxPA = calcTaxPA(grossPA);
  var uifPA = Math.min(grossPA * UIF_RATE, UIF_MAX_ANNUAL);
  return {
    grossPM: g,
    taxPM: Math.round(taxPA / 12),
    uifPM: Math.round(uifPA / 12),
    nettPM: Math.round(g - taxPA / 12 - uifPA / 12)
  };
}

// ── CAPITALISATION ────────────────────────────────────────
// Present value of a growing annuity (annual payments, beginning of year)
// grossMonthly: gross monthly amount (already tax-grossed-up)
// years: term in years
// escalation: annual escalation rate (decimal)
// drawdown: drawdown / return rate (decimal)
// Returns: capital lump sum needed today
function capitalise(grossMonthly, years, escalation, drawdown) {
  var pmt = N(grossMonthly) * 12; // annual
  var n = N(years);
  var g = pct(escalation);
  var r = pct(drawdown);
  if (pmt <= 0 || n <= 0) return 0;
  if (Math.abs(r - g) < 0.0001) {
    // Edge case: r ≈ g
    return pmt * n / (1 + r);
  }
  // PV of growing annuity (beginning of period)
  var pv = pmt * (1 - Math.pow((1 + g) / (1 + r), n)) / (r - g);
  return Math.round(pv);
}

// Confirm: monthly income the capital produces
// cap: capital amount, years: term, escalation, drawdown
function monthlyFromCapital(cap, years, escalation, drawdown) {
  var n = N(years);
  var g = pct(escalation);
  var r = pct(drawdown);
  var C = N(cap);
  if (C <= 0 || n <= 0) return 0;
  if (Math.abs(r - g) < 0.0001) return Math.round(C * (1 + r) / n / 12);
  var annual = C * (r - g) / (1 - Math.pow((1 + g) / (1 + r), n));
  return Math.round(annual / 12);
}

// ── RETIREMENT PROJECTION ─────────────────────────────────
// Grow a fund with contributions from now to retirement
// currentVal, monthlyContrib, annualEscalation, growthRate, years
function projectFund(currentVal, monthlyContrib, escalation, growth, years) {
  var pv = N(currentVal);
  var pmt = N(monthlyContrib);
  var g = pct(escalation);
  var r = pct(growth);
  var n = N(years);
  if (n <= 0) return pv;
  // Grow existing fund
  var fvExisting = pv * Math.pow(1 + r, n);
  if (pmt <= 0) return Math.round(fvExisting);
  // Future value of growing annuity of contributions (annual, beginning of year)
  var annualPmt = pmt * 12;
  var fvContribs;
  if (Math.abs(r - g) < 0.0001) {
    fvContribs = annualPmt * n * Math.pow(1 + r, n / 2);
  } else {
    fvContribs = annualPmt * (Math.pow(1 + r, n) - Math.pow(1 + g, n)) / (r - g);
  }
  return Math.round(fvExisting + fvContribs);
}

// Capital needed to fund income in retirement
// monthlyIncome: income needed in first year of retirement (today's rands, will inflate to retirement)
// yearsToRet: inflation-adjust the income to retirement date
// yearsInRet: how many years capital must last
// cpi: inflation rate
// returnRate: return on capital in retirement
function retirementCapitalNeeded(monthlyIncomeToday, yearsToRet, yearsInRet, cpi, returnRate) {
  if (N(monthlyIncomeToday) <= 0 || N(yearsInRet) <= 0) return 0;
  // Inflate to retirement date
  var incomeAtRet = N(monthlyIncomeToday) * Math.pow(1 + pct(cpi), N(yearsToRet));
  // Capitalise: PV of growing annuity at retirement date
  return capitalise(incomeAtRet, N(yearsInRet), N(cpi), N(returnRate));
}

  if (params.get('occ'))       S.cli.occ        = decodeURIComponent(params.get('occ'));
  if (params.get('edu'))       S.cli.education  = decodeURIComponent(params.get('edu'));
  if (params.get('spouse'))    S.cli.spouseName = decodeURIComponent(params.get('spouse'));
  if (params.get('spousedob')) {
    var rawSpDob = decodeURIComponent(params.get('spousedob'));
    if (rawSpDob.indexOf('T') > -1) rawSpDob = rawSpDob.split('T')[0];
    var sd = rawSpDob.split('-');
    if (sd.length === 3) S.cli.spouseDob = sd[2] + '/' + sd[1] + '/' + sd[0];
    else S.cli.spouseDob = rawSpDob;
  }
  if (params.get('domdate')) {
    var rawDom = decodeURIComponent(params.get('domdate'));
    // Handle ISO timestamp e.g. 2005-03-15T22:00:00.000Z -> extract date part only
    if (rawDom.indexOf('T') > -1) rawDom = rawDom.split('T')[0];
    // Convert YYYY-MM-DD to the HTML date input format (which IS YYYY-MM-DD — keep as-is)
    S.cli.domDate = rawDom;
  }
  if (params.get('pols')) {
    try {
      var pols = JSON.parse(decodeURIComponent(params.get('pols')));
      // Store the raw policy array for the Policy Schedule tab
      S.importedPols = pols;
      if (!S.existingCover) S.existingCover = {death:'',disability:'',dread:'',ipPM:'',totalPrem:''};
      var totDeath=0,totDis=0,totDD=0,totIP=0,totPrem=0;
      pols.forEach(function(p){
        var n=function(v){return parseFloat(String(v||'').replace(/[^0-9.\-]/g,''))||0;};
        if(p.Type!=='Business Assurance'){totDeath+=n(p.BenDeath);totDis+=n(p.BenDisability);totDD+=n(p.BenDreadDisease);}
        try{var ib=p.IncomeBenefits?JSON.parse(p.IncomeBenefits):[];ib.forEach(function(r){totIP+=n(r.amount);});}catch(e){}
        var f=p.Frequency||'Monthly';
        if(f==='Monthly'||f==='') totPrem+=n(p.Premium);
      });
      if(totDeath>0) S.existingCover.death     =String(Math.round(totDeath));
      if(totDis>0)   S.existingCover.disability=String(Math.round(totDis));
      if(totDD>0)    S.existingCover.dread      =String(Math.round(totDD));
      if(totIP>0)    S.existingCover.ipPM       =String(Math.round(totIP));
      if(totPrem>0)  S.existingCover.totalPrem  =String(Math.round(totPrem));
    } catch(e) {}
  }
})();

function deepMerge(base, over) {
  if (typeof over !== 'object' || over === null) return over !== undefined ? over : base;
  var result = JSON.parse(JSON.stringify(base));
  Object.keys(over).forEach(function (k) {
    if (Array.isArray(over[k])) { result[k] = over[k]; }
    else if (typeof over[k] === 'object' && over[k] !== null && typeof base[k] === 'object') {
      result[k] = deepMerge(base[k], over[k]);
    } else { result[k] = over[k]; }
  });
  return result;
}

// ═══════════════════════════════════════════════════════════
// FIELD BUILDER HELPERS (no re-render on input)
// ═══════════════════════════════════════════════════════════
function el(tag, className, textContent) {
  var e = document.createElement(tag);
  if (className) e.className = className;
  if (textContent !== undefined) e.textContent = textContent;
  return e;
}
function div(className) { return el('div', className); }

// Text field: binds to obj[key], no render on input, optional blur callback
function fld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var inp = document.createElement('input');
  inp.type = opts.type || 'text';
  inp.value = obj[key] || '';
  if (opts.placeholder) inp.placeholder = opts.placeholder;
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  wrap.appendChild(inp);
  return wrap;
}

// Rand field
function rfld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var rw = div('rw');
  var rp = el('span', 'rp', 'R');
  var inp = document.createElement('input');
  inp.type = 'text'; inp.inputMode = 'numeric';
  inp.value = obj[key] || '';
  inp.placeholder = '0';
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  rw.appendChild(rp); rw.appendChild(inp);
  wrap.appendChild(rw);
  return wrap;
}

// Percent field
function pfld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var pw = div('pw');
  var pp = el('span', 'pp', '%');
  var inp = document.createElement('input');
  inp.type = 'text'; inp.inputMode = 'numeric';
  inp.value = obj[key] || '';
  inp.placeholder = '0';
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  pw.appendChild(inp); pw.appendChild(pp);
  wrap.appendChild(pw);
  return wrap;
}

// Select field
function sfld(labelTxt, obj, key, options) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var sel = document.createElement('select');
  options.forEach(function (o) {
    var opt = document.createElement('option');
    var v = typeof o === 'object' ? o.v : o;
    var l = typeof o === 'object' ? o.l : o;
    opt.value = v; opt.textContent = l;
    if (String(obj[key]) === String(v)) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function (e) { obj[key] = e.target.value; render(); });
  wrap.appendChild(sel);
  return wrap;
}

// Textarea
function txfld(labelTxt, obj, key) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var ta = document.createElement('textarea');
  ta.value = obj[key] || ''; ta.placeholder = 'Notes...';
  ta.addEventListener('input', function (e) { obj[key] = e.target.value; });
  wrap.appendChild(ta);
  return wrap;
}

// Radio group
function radioGrp(labelTxt, obj, key, options) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var rg = div('rg');
  var gname = key + '_' + Math.random().toString(36).slice(2);
  options.forEach(function (o) {
    var v = typeof o === 'object' ? o.v : o;
    var l = typeof o === 'object' ? o.l : o;
    var lbl = document.createElement('label');
    var inp = document.createElement('input'); inp.type = 'radio'; inp.name = gname; inp.value = v;
    if (String(obj[key]) === String(v)) inp.checked = true;
    inp.addEventListener('change', function (e) { obj[key] = e.target.value; });
    lbl.appendChild(inp); lbl.appendChild(document.createTextNode(l));
    rg.appendChild(lbl);
  });
  wrap.appendChild(rg);
  return wrap;
}

// Add / Delete buttons
function addBtn(txt, onClick) {
  var b = document.createElement('button'); b.className = 'btn-add'; b.textContent = txt;
  b.addEventListener('click', onClick); return b;
}
function delBtn(onClick) {
  var b = el('button', 'btn-del', '✕'); b.type = 'button';
  b.addEventListener('click', onClick); return b;
}

// ── Income Need Row builder (shared for death and disability) ──
function calcIncomeNeed(r){
  if(!N(r.nettPM)&&!N(r.grossPM)) return 0;
  var gross = N(r.grossPM) || grossFromNett(r.nettPM);
  var esc = N(r.esc)>0 ? r.esc : S.assump.cpi;
  var dr  = N(r.drawdown)>0 ? r.drawdown : S.assump.drawdown;
  return capitalise(gross, r.years, esc, dr);
}

function buildIncomeNeedRow(parent, r, i, arrayKey){
  var card=div(); card.style.cssText='background:#fff;border:var(--border);border-radius:8px;padding:14px;margin-bottom:10px';
  var ch=div(); ch.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';

  // Description
  var df=div('f'); df.appendChild(el('label','','Description'));
  var di=document.createElement('input'); di.type='text'; di.value=r.desc||''; di.placeholder='e.g. Spouse living expenses';
  di.addEventListener('input',function(e){S[arrayKey][i].desc=e.target.value;}); df.appendChild(di);
  ch.appendChild(df);
  ch.appendChild(delBtn(function(){S[arrayKey].splice(i,1);render();}));
  card.appendChild(ch);

  var rg1=g4();

  // Nett PM with gross-up on blur
  var nf=div('f'); nf.appendChild(el('label','','Nett /pm (client states)'));
  var nrw=div('rw'); nrw.appendChild(el('span','rp','R'));
  var ninp=document.createElement('input'); ninp.type='text'; ninp.inputMode='numeric';
  ninp.value=r.nettPM||''; ninp.placeholder='0';
  ninp.addEventListener('input',function(e){S[arrayKey][i].nettPM=e.target.value;});
  ninp.addEventListener('blur',function(e){
    S[arrayKey][i].nettPM=e.target.value;
    if(N(e.target.value)>0){S[arrayKey][i].grossPM=String(grossFromNett(e.target.value));render();}
  });
  nrw.appendChild(ninp); nf.appendChild(nrw); rg1.appendChild(nf);

  // Gross PM (calc, overrideable)
  var gf2=div('f'); gf2.appendChild(el('label','','Gross /pm (tax grossed-up)'));
  var grw2=div('rw'); grw2.appendChild(el('span','rp','R'));
  var ginp2=document.createElement('input'); ginp2.type='text'; ginp2.inputMode='numeric';
  ginp2.value=r.grossPM||''; ginp2.placeholder='0'; ginp2.style.background='#f9f9f6';
  ginp2.addEventListener('input',function(e){S[arrayKey][i].grossPM=e.target.value;});
  ginp2.addEventListener('blur',function(e){S[arrayKey][i].grossPM=e.target.value;render();});
  grw2.appendChild(ginp2); gf2.appendChild(grw2); rg1.appendChild(gf2);

  // Years
  var yf=div('f'); yf.appendChild(el('label','','Term (years)'));
  var yi=document.createElement('input'); yi.type='text'; yi.inputMode='numeric';
  yi.value=r.years||''; yi.placeholder='e.g. 20';
  yi.addEventListener('input',function(e){S[arrayKey][i].years=e.target.value;});
  yi.addEventListener('blur',function(e){S[arrayKey][i].years=e.target.value;render();});
  yf.appendChild(yi); rg1.appendChild(yf);

  // Escalation
  var ef=div('f'); ef.appendChild(el('label','','Escalation % (blank=CPI)'));
  var epw=div('pw'); var epp=el('span','pp','%');
  var ei=document.createElement('input'); ei.type='text'; ei.inputMode='numeric';
  ei.value=r.esc||''; ei.placeholder=S.assump.cpi;
  ei.addEventListener('input',function(e){S[arrayKey][i].esc=e.target.value;});
  ei.addEventListener('blur',function(e){S[arrayKey][i].esc=e.target.value;render();});
  epw.appendChild(ei); epw.appendChild(epp); ef.appendChild(epw); rg1.appendChild(ef);
  card.appendChild(rg1);

  var rg2=g3();
  // Drawdown rate
  var drf=div('f'); drf.appendChild(el('label','','Drawdown % (blank='+S.assump.drawdown+'%)'));
  var drpw=div('pw'); var drpp=el('span','pp','%');
  var dri=document.createElement('input'); dri.type='text'; dri.inputMode='numeric';
  dri.value=r.drawdown||''; dri.placeholder=S.assump.drawdown;
  dri.addEventListener('input',function(e){S[arrayKey][i].drawdown=e.target.value;});
  dri.addEventListener('blur',function(e){S[arrayKey][i].drawdown=e.target.value;render();});
  drpw.appendChild(dri); drpw.appendChild(drpp); drf.appendChild(drpw); rg2.appendChild(drf);
  card.appendChild(rg2);

  // Calculated result
  var gross=N(r.grossPM)||grossFromNett(r.nettPM);
  if(gross>0&&N(r.years)>0){
    var cap=calcIncomeNeed(r);
    var monthly=monthlyFromCapital(cap,r.years,N(r.esc)>0?r.esc:S.assump.cpi,N(r.drawdown)>0?r.drawdown:S.assump.drawdown);
    var cr=div('calc-result');
    cr.innerHTML=
      '<div class="cr-row"><span>Nett monthly amount</span><span class="gold">'+Rfmt(r.nettPM||gross)+'</span></div>'+
      '<div class="cr-row"><span>Gross (pre-tax)</span><span class="gold">'+Rfmt(gross)+'</span></div>'+
      '<div class="cr-row big"><span>Capital lump sum required</span><span class="gold">'+Rfmt(cap)+'</span></div>'+
      '<div class="cr-row"><span style="font-size:11px;color:#8899bb">This capital at '+(N(r.drawdown)>0?r.drawdown:S.assump.drawdown)+'% drawdown produces '+Rfmt(monthly)+'/pm for '+r.years+' years at '+(N(r.esc)>0?r.esc:S.assump.cpi)+'% escalation</span></div>';
    card.appendChild(cr);
  }

  parent.appendChild(card);
}

function buildRetirement() {

  }
  var cliAge=ageFrom(S.cli.dob);
  var retAge=N(S.cli.retAge)||65;
  var yrsToR=cliAge?Math.max(0,retAge-cliAge):null;
  var yrsInRet=85-retAge;

  var inf=div('info');
  inf.textContent=cliAge?
    'Age: '+cliAge+' · Retirement: '+retAge+' · Years to retirement: '+(yrsToR||'?')+
    ' · Life expectancy: 85 · Years in retirement: '+yrsInRet :
    'Enter date of birth on the Client tab to enable retirement projections.';
  s.appendChild(inf);

  // ── Retirement assets
  s.appendChild(stitle('Retirement Assets (RAs, Pension Funds, Investments)'));

  // Auto-seed retAssets from imported RA/pension/investment policies if retAssets is empty
  var raPolTypes = ['Retirement Annuity','Pension Fund','Provident Fund','Pension Preservation','Provident Preservation',
                    'Endowment','Offshore Endowment','Flexible Investment','Offshore Flexible Investment',
                    'Unit Trust','Tax Free Savings','Living Annuity'];
  if (S.retAssets.length === 0 && S.importedPols && S.importedPols.length > 0) {
    S.importedPols.forEach(function(p) {
      if (raPolTypes.indexOf(p.Type) > -1) {
        S.retAssets.push({
          desc: (p.Insurer ? p.Insurer + ' — ' : '') + (p.Type || 'Policy'),
          currentVal: p.BenFundValue || '',
          monthlyContrib: p.Premium && (p.Frequency === 'Monthly' || !p.Frequency) ? p.Premium : '',
          contribEsc: '',
          growthRate: ''
        });
      }
    });
  }

  var inf2=div('info'); inf2.innerHTML='These assets project forward to retirement. ' +
    (S.retAssets.length > 0 ? 'Pre-populated from imported policies — ' : '') +
    'Enter or update current fund values and monthly contributions.'; s.appendChild(inf2);

  S.retAssets.forEach(function(r,i){
    var card=div(); card.style.cssText='background:#fff;border:var(--border);border-radius:8px;padding:14px;margin-bottom:10px';
    var ch=div(); ch.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:10px';
    var df2=div('f'); df2.appendChild(el('label','','Description'));
    var di=document.createElement('input'); di.type='text'; di.value=r.desc||''; di.placeholder='e.g. Sanlam RA, Discovery pension';
    di.addEventListener('input',function(e){S.retAssets[i].desc=e.target.value;}); df2.appendChild(di);
    ch.appendChild(df2); ch.appendChild(delBtn(function(){S.retAssets.splice(i,1);render();})); card.appendChild(ch);

    var rg1=g4();
    rg1.appendChild(rfld('Current Fund Value', r, 'currentVal', {onblur:function(){render();}}));
    rg1.appendChild(rfld('Monthly Contribution', r, 'monthlyContrib', {onblur:function(){render();}}));
    rg1.appendChild(pfld('Contribution Escalation %', r, 'contribEsc', {onblur:function(){render();}}));
    rg1.appendChild(pfld('Fund Growth Rate %', r, 'growthRate', {onblur:function(){render();}}));
    card.appendChild(rg1);

    // Projection
    if(yrsToR!==null&&(N(r.currentVal)>0||N(r.monthlyContrib)>0)){
      var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
      var esc=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
      var fv=projectFund(r.currentVal,r.monthlyContrib,esc,gr,yrsToR);
      var cr=div('calc-result');
      cr.innerHTML=
        '<div class="cr-row"><span>Current fund value</span><span class="gold">'+Rfmt(r.currentVal)+'</span></div>'+
        (N(r.monthlyContrib)>0?'<div class="cr-row"><span>Monthly contribution</span><span class="gold">'+Rfmt(r.monthlyContrib)+' ('+esc+'% p.a. escalation)</span></div>':'')+
        '<div class="cr-row big"><span>Projected value at retirement (age '+retAge+')</span><span class="gold">'+Rfmt(fv)+'</span></div>'+
        '<div class="cr-row"><span style="font-size:11px;color:#8899bb">Growth rate: '+gr+'% · '+yrsToR+' years to grow</span></div>';
      card.appendChild(cr);
    }
    s.appendChild(card);
  });
  s.appendChild(addBtn('+ Add Retirement Asset', function(){
    S.retAssets.push({desc:'',currentVal:'',monthlyContrib:'',contribEsc:'',growthRate:''});render();
  }));

  // ── Retirement income need
  s.appendChild(stitle('Retirement Income Needs (Today\'s Rands)'));
  var ri=div('info'); ri.textContent='Enter what the client needs in today\'s money. The system inflates to retirement date using CPI.'; s.appendChild(ri);

  var rg3=g3();
  rg3.appendChild(rfld('Monthly living expenses (today R)', S, 'retIncomeToday', {onblur:function(){render();}}));
  rg3.appendChild(rfld('Medical aid (today R)', S, 'retMedAidToday', {onblur:function(){render();}}));
  rg3.appendChild(rfld('Other monthly (today R)', S, 'retOtherMonthly', {onblur:function(){render();}}));
  s.appendChild(rg3);

  // Lump sums at retirement
  s.appendChild(stitle('Lump Sum Needs at Retirement'));
  var lst=document.createElement('table');
  lst.innerHTML='<thead><tr><th>Description</th><th>Amount (today R)</th><th></th></tr></thead>';
  var lsb=document.createElement('tbody');
  S.retLumps.forEach(function(r,i){
    var tr=document.createElement('tr');
    var t1=document.createElement('td'); var di=document.createElement('input'); di.type='text'; di.value=r.desc||'';
    di.addEventListener('input',function(e){S.retLumps[i].desc=e.target.value;}); t1.appendChild(di); tr.appendChild(t1);
    var t2=document.createElement('td'); var rw=div('td-r'); rw.appendChild(el('span','rp','R'));
    var ai=document.createElement('input'); ai.type='text'; ai.inputMode='numeric'; ai.value=r.amt||''; ai.placeholder='0';
    ai.addEventListener('input',function(e){S.retLumps[i].amt=e.target.value;}); rw.appendChild(ai); t2.appendChild(rw); tr.appendChild(t2);
    var t3=document.createElement('td'); t3.appendChild(delBtn(function(){S.retLumps.splice(i,1);render();})); tr.appendChild(t3);
    lsb.appendChild(tr);
  });
  lst.appendChild(lsb); var lstw=div('twrap'); lstw.appendChild(lst); s.appendChild(lstw);
  s.appendChild(addBtn('+ Add Lump Sum', function(){S.retLumps.push({desc:'',amt:''});render();}));

  // ── Retirement projection summary
  if(yrsToR!==null){
    var totalProj=S.retAssets.reduce(function(sum,r){
      if(!N(r.currentVal)&&!N(r.monthlyContrib)) return sum;
      var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
      var esc=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
      return sum+projectFund(r.currentVal,r.monthlyContrib,esc,gr,yrsToR);
    },0);

    var monthlyNeedToday=N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
    var lumpSumNeedToday=S.retLumps.reduce(function(sum,r){return sum+N(r.amt);},0);

    // Inflate monthly need to retirement date
    var monthlyAtRet=monthlyNeedToday>0?monthlyNeedToday*Math.pow(1+pct(S.assump.cpi),yrsToR):0;
    var lumpAtRet=lumpSumNeedToday>0?lumpSumNeedToday*Math.pow(1+pct(S.assump.cpi),yrsToR):0;

    // Capital needed for income in retirement
    var capForIncome=retirementCapitalNeeded(monthlyNeedToday,yrsToR,yrsInRet,S.assump.cpi,S.assump.retReturn);
    var totalCapNeeded=capForIncome+lumpAtRet;
    var gap=totalProj-totalCapNeeded;

    if(monthlyNeedToday>0||totalProj>0){
      s.appendChild(stitle('Retirement Projection Summary'));
      var cards2=div('cards'); cards2.style.marginTop='0';
      var cd=[
        {l:'Projected fund at ret.',v:totalProj,c:''},
        {l:'Monthly need (at retirement)',v:monthlyAtRet,c:''},
        {l:'Capital required',v:totalCapNeeded,c:''},
        {l:'Surplus / shortfall',v:gap,c:gap>=0?'ok':'bad'}
      ];
      cd.forEach(function(x){
        var c=div('card'); c.innerHTML='<div class="lbl">'+x.l+'</div><div class="val '+x.c+'">'+Rfmt(x.v)+'</div>'; cards2.appendChild(c);
      });
      s.appendChild(cards2);
      var rdet=div('info');
      rdet.innerHTML='Assumptions: CPI '+S.assump.cpi+'% · Growth '+S.assump.growth+'% · Return on capital in retirement '+S.assump.retReturn+'% · Life expectancy 85 · Years in retirement: '+yrsInRet;
      s.appendChild(rdet);
    }
  }

  s.appendChild(txfld('Retirement notes', S, 'retNotes'));
  return s;
}

var POL_TYPES = [

    'Changes are <strong>FNA only</strong> — the CRM is not affected. ' +
    (pols.length ? '<strong>' + pols.length + ' polic' + (pols.length === 1 ? 'y' : 'ies') + '</strong> loaded from CRM.' :

  // ── Render each policy as an editable card
  pols.forEach(function(p, i) {
    s.appendChild(buildPolCard(p, i));
  });

  // ── Add policy button
  s.appendChild(addBtn('+ Add Policy / What-if Scenario', function() {
    S.importedPols.push({
      Insurer:'', PolicyNo:'', Type:'Life / Income Protector', Product:'',
      Premium:'', Frequency:'Monthly',
      BenDeath:'', BenDisability:'', BenDreadDisease:'', IncomeBenefits:'[]',
      Beneficiary:'', BeneficiaryType:'', EstateDutiable:''
    });
    render();

  // ── Premium totals
  var totalPrem = pols.reduce(function(sum, p) {

  }, 0);

  if (totalPrem > 0 || pols.length > 0) {
    var totCards = div('cards c3');
    totCards.style.marginTop = '20px';

    var c2 = div('card'); c2.innerHTML = '<div class="lbl">Annual Premium Cost</div><div class="val">' + Rfmt(totalPrem * 12) + '</div>'; totCards.appendChild(c2);
    var c3 = div('card'); c3.innerHTML = '<div class="lbl">Policies on Record</div><div class="val">' + pols.length + '</div>'; totCards.appendChild(c3);
    s.appendChild(totCards);
  }

  return s;
}

function buildPolCard(p, i) {

  insurerInp.addEventListener('input', function(e) { S.importedPols[i].Insurer = e.target.value; });
  insurerInp.addEventListener('focus', function(e) { e.target.style.borderBottomColor = 'var(--gold)'; });
  insurerInp.addEventListener('blur',  function(e) { e.target.style.borderBottomColor = 'var(--mist)'; });
  chLeft.appendChild(insurerInp);

  // Type select (below insurer)
  var typeSel = document.createElement('select');
  typeSel.style.cssText = 'border:var(--border);border-radius:5px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--sub);font-family:inherit;background:var(--smoke);cursor:pointer';
  POL_TYPES.forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === t) opt.selected = true;
    typeSel.appendChild(opt);
  });
  typeSel.addEventListener('change', function(e) { S.importedPols[i].Type = e.target.value; render(); });
  chLeft.appendChild(typeSel);
  ch.appendChild(chLeft);

  // Delete button
  var db = delBtn(function() { S.importedPols.splice(i, 1); render(); });
  ch.appendChild(db);
  card.appendChild(ch);

  // ── Row 1: Policy No, Product, Status
  var r1 = g3();
  r1.appendChild(fld('Policy / Contract No', p, 'PolicyNo'));
  r1.appendChild(fld('Product / Plan Name',  p, 'Product'));
  r1.appendChild(sfld('Status', p, 'Status', ['Active','Lapsed','Paid Up','Cancelled']));
  card.appendChild(r1);

  // ── Row 2: Premium + Frequency
  var r2 = g3();
  r2.appendChild(rfld('Premium / Contribution', p, 'Premium'));
  r2.appendChild(sfld('Frequency', p, 'Frequency', ['Monthly','Quarterly','Annually','Once Off']));
  card.appendChild(r2);

  // ── Benefits section — varies by type
  if (isRisk || t === 'Life / Income Protector') {
    var bst = el('div','stitle','Benefits');
    bst.style.marginTop = '10px';
    card.appendChild(bst);

    var rb1 = g3();
    rb1.appendChild(rfld('Death / Life Cover',    p, 'BenDeath'));
    rb1.appendChild(rfld('Capital Disability',    p, 'BenDisability'));
    rb1.appendChild(rfld('Dread Disease Cover',   p, 'BenDreadDisease'));
    card.appendChild(rb1);

    // Income benefits (simplified — monthly amount)
    var ipWrap = div();
    ipWrap.style.cssText = 'margin-top:4px';
    var ipLbl = el('label','','Income Protection / Monthly Benefit');
    ipLbl.style.cssText = 'font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--sub);display:block;margin-bottom:4px';
    ipWrap.appendChild(ipLbl);

    // Parse existing IP rows
    var ipRows = [];
    try { ipRows = p.IncomeBenefits ? JSON.parse(p.IncomeBenefits) : []; } catch(e) { ipRows = []; }

    var ipTbl = document.createElement('table');
    var ipTbody = document.createElement('tbody');
    ipRows.forEach(function(r, ri) {
      var tr = document.createElement('tr');
      // Type
      var t1 = document.createElement('td');
      var tSel = document.createElement('select');
      tSel.style.cssText = 'border:var(--border);border-radius:5px;padding:5px 7px;font-family:inherit;font-size:12px;width:100%';
      ['Income Protection','Temporary IP','Death Income','Sickness Benefit','Hospital Income','Other'].forEach(function(o) {
        var opt = document.createElement('option'); opt.value = o; opt.textContent = o;
        if (r.type === o) opt.selected = true;
        tSel.appendChild(opt);
      });
      tSel.addEventListener('change', function(e) {
        try { var rows = JSON.parse(S.importedPols[i].IncomeBenefits||'[]'); rows[ri].type = e.target.value; S.importedPols[i].IncomeBenefits = JSON.stringify(rows); } catch(ex) {}
      });
      t1.appendChild(tSel); tr.appendChild(t1);
      // Amount
      var t2 = document.createElement('td');
      var rw = div('td-r'); rw.appendChild(el('span','rp','R'));
      var aInp = document.createElement('input'); aInp.type = 'text'; aInp.inputMode = 'numeric';
      aInp.value = r.amount || ''; aInp.placeholder = '0';
      aInp.addEventListener('input', function(e) {
        try { var rows = JSON.parse(S.importedPols[i].IncomeBenefits||'[]'); rows[ri].amount = e.target.value; S.importedPols[i].IncomeBenefits = JSON.stringify(rows); } catch(ex) {}
      });
      rw.appendChild(aInp); t2.appendChild(rw); tr.appendChild(t2);
      // Delete
      var t3 = document.createElement('td');
      t3.appendChild(delBtn(function() {
        try { var rows = JSON.parse(S.importedPols[i].IncomeBenefits||'[]'); rows.splice(ri,1); S.importedPols[i].IncomeBenefits = JSON.stringify(rows); render(); } catch(ex) { render(); }
      }));

      ipTbody.appendChild(tr);

    ipWrap.appendChild(ipTbl);
    ipWrap.appendChild(addBtn('+ Add IP Benefit Row', function() {
      try {
        var rows = JSON.parse(S.importedPols[i].IncomeBenefits||'[]');
        rows.push({type:'Income Protection', amount:''});

        render();
      } catch(ex) { render(); }
    }));
    card.appendChild(ipWrap);
  }

  if (isRA || isInv) {

    bst2.style.marginTop = '10px';
    card.appendChild(bst2);
    var rb2 = g2();
    rb2.appendChild(rfld('Current Fund Value', p, 'BenFundValue'));
    rb2.appendChild(rfld('Death Benefit',      p, 'BenDeath'));
    card.appendChild(rb2);
    // Also show premium as contribution label
    var premNote = div('info');
    premNote.style.cssText = 'font-size:11px;padding:6px 10px;margin-top:-4px';
    premNote.textContent = 'Premium field above = monthly contribution for this fund.';
    card.appendChild(premNote);
  }

  if (isBiz) {
    var bstBiz = el('div','stitle','Business Assurance Details');
    bstBiz.style.marginTop = '10px';
    card.appendChild(bstBiz);
    var rbBiz = g3();
    rbBiz.appendChild(sfld('Business Type', p, 'BizType', ['','Buy & Sell','Keyman','Contingent Liability']));
    rbBiz.appendChild(rfld('Cover / Loan Amount', p, 'LoanAmount'));
    rbBiz.appendChild(rfld('Death Benefit', p, 'BenDeath'));
    card.appendChild(rbBiz);
    var bizNote = div('info');
    bizNote.style.cssText = 'font-size:11px;padding:6px 10px;margin-top:-4px;background:#eff6ff;border-color:#bfdbfe;color:#1e40af';
    bizNote.innerHTML = '<strong>Buy &amp; Sell</strong> pays to co-shareholder · <strong>Keyman</strong> pays to business · <strong>Contingent Liability</strong> settles business debt. None form part of personal estate.';
    card.appendChild(bizNote);
  }
  // Parse Beneficiaries array (CRM format) on first render to seed BeneficiaryType/Beneficiary
  if (p.Beneficiaries && !p._bensSeeded) {
    try {
      var bensArr = JSON.parse(p.Beneficiaries);
      if (bensArr && bensArr.length > 0) {
        // Use the first (primary) beneficiary to seed the simple fields
        var primaryBen = bensArr[0];
        if (!p.BeneficiaryType && primaryBen.type) p.BeneficiaryType = primaryBen.type;
        if (!p.Beneficiary && primaryBen.name)     p.Beneficiary     = primaryBen.name;
        // Auto-set EstateDutiable from type if not set
        if (!p.EstateDutiable) {
          if (p.BeneficiaryType === 'Spouse')        p.EstateDutiable = 'No';
          else if (p.BeneficiaryType === 'Estate')   p.EstateDutiable = 'Yes';
          else if (p.BeneficiaryType === 'Third Party') p.EstateDutiable = 'No';
        }
        p._bensSeeded = true;
      }
    } catch(e) {}
  }

  var benSt = el('div','stitle','Beneficiary & Estate Routing');
  benSt.style.marginTop = '10px';
  card.appendChild(benSt);

  var btr = div();
  btr.style.cssText = 'display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;margin-bottom:10px';

  btr.appendChild(fld('Beneficiary Name', p, 'Beneficiary', { placeholder: 'e.g. Jane Hayes' }));

  var btLbl = el('label','','Beneficiary Type');
  btWrap.appendChild(btLbl);
  var btSel = document.createElement('select');
  btSel.style.cssText = 'border:var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;color:var(--text);background:var(--white)';
  ['','Spouse','Estate','Third Party'].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o;
    opt.textContent = o || '— Select —';
    if ((p.BeneficiaryType || '') === o) opt.selected = true;
    btSel.appendChild(opt);
  });
  btSel.addEventListener('change', function(e) {
    S.importedPols[i].BeneficiaryType = e.target.value;
    // Auto-set EstateDutiable based on type
    if (e.target.value === 'Spouse')       { S.importedPols[i].EstateDutiable = 'No'; }
    else if (e.target.value === 'Estate')  { S.importedPols[i].EstateDutiable = 'Yes'; }
    else if (e.target.value === 'Third Party') { S.importedPols[i].EstateDutiable = 'No'; }
    render();
  });
  btWrap.appendChild(btSel);
  btr.appendChild(btWrap);

  // EstateDutiable
  var edWrap = div('f');
  var edLbl = el('label','','Estate Dutiable');
  edWrap.appendChild(edLbl);
  var edSel = document.createElement('select');
  edSel.style.cssText = 'border:var(--border);border-radius:6px;padding:8px 10px;font-family:inherit;font-size:13px;font-weight:700';
  var edVal = p.EstateDutiable || '';
  if (edVal === 'Yes') edSel.style.color = 'var(--orange)';
  else if (edVal === 'No') edSel.style.color = 'var(--green)';
  ['','Yes','No'].forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o; opt.textContent = o || '— ?';
    if (edVal === o) opt.selected = true;
    edSel.appendChild(opt);
  });
  edSel.addEventListener('change', function(e) {
    S.importedPols[i].EstateDutiable = e.target.value;
    e.target.style.color = e.target.value === 'Yes' ? 'var(--orange)' : e.target.value === 'No' ? 'var(--green)' : 'var(--sub)';
  });
  edWrap.appendChild(edSel);
  btr.appendChild(edWrap);
  card.appendChild(btr);

  // ── Beneficiary routing explanation
  var bt = p.BeneficiaryType || '';
  if (bt) {
    var routeInf = div();
    routeInf.style.cssText = 'padding:8px 12px;border-radius:6px;font-size:12px;margin-bottom:6px';
    if (bt === 'Spouse') {
      routeInf.style.cssText += ';background:#f0fdf4;color:#166534;border:1px solid #86efac';
      routeInf.innerHTML = '✓ <strong>Section 4(q):</strong> Paid direct to spouse — not dutiable, outside estate. No estate duty on this benefit.';
    } else if (bt === 'Estate') {
      routeInf.style.cssText += ';background:#fff7ed;color:#92400e;border:1px solid #fed7aa';
      routeInf.innerHTML = '⚖ <strong>Routed to Estate:</strong> This benefit forms part of the dutiable estate. Estate duty and executor fees will apply.';
    } else if (bt === 'Third Party') {
      routeInf.style.cssText += ';background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe';
      routeInf.innerHTML = '→ <strong>Third Party:</strong> Paid direct to named beneficiary — outside estate. No estate duty on this benefit.';
    }
    card.appendChild(routeInf);
  }

  return card;
}

function buildEstate() {
  var s = div();

  var inf = div('info');
  inf.innerHTML = 'Estate duty is calculated on the <strong>dutiable estate</strong>. ' +
    'Adjust beneficiary routing on the Policies tab to model different outcomes. ' +
    'Asset dutiable amounts can be overridden below.';
  s.appendChild(inf);

  // ── SA Estate Duty constants
  var ABATEMENT   = 3500000;   // Primary abatement R3.5m
  var DUTY_RATE1  = 0.20;      // 20% on first R30m dutiable
  var DUTY_RATE2  = 0.25;      // 25% above R30m
  var DUTY_THRESH = 30000000;
  var EXEC_RATE   = 0.04025;   // 3.5% + VAT (15%) = 4.025%

  // ── SECTION 1: Assets
  s.appendChild(stitle('Dutiable Assets'));

  var assetNote = div('info');
  assetNote.innerHTML = 'Assets are drawn from the Assets tab. Override the dutiable amount if an asset is held in a trust, CC, or is otherwise excluded. ' +
    'Set to <strong>0</strong> to exclude entirely.';
  s.appendChild(assetNote);

  // Build a working list from Assets tab data
  // Each row: { desc, fullVal, dutiableAmt (editable) }
  // We reconcile with S.estateAssets (persisted overrides) by desc key

  function getOverride(desc) {
    if (!S.estateAssets) S.estateAssets = [];
    var found = S.estateAssets.filter(function(a) { return a.desc === desc; })[0];
    return found || null;
  }
  function setOverride(desc, dutiable) {
    if (!S.estateAssets) S.estateAssets = [];
    var idx = -1;
    S.estateAssets.forEach(function(a, i) { if (a.desc === desc) idx = i; });
    if (idx > -1) S.estateAssets[idx].dutiable = dutiable;
    else S.estateAssets.push({ desc: desc, dutiable: dutiable });
  }

  // Collect all assets from tab 3
  var allAssets = [];
  S.props.forEach(function(p) {
    if (!p.desc && !N(p.val)) return;
    var desc = p.desc || 'Property';
    var ov = getOverride(desc);
    allAssets.push({ desc: desc, fullVal: N(p.val), dutiable: ov ? ov.dutiable : String(N(p.val)), bond: N(p.bond) });
  });
  S.vehicles.forEach(function(v) {
    if (!v.desc && !N(v.val)) return;
    var desc = v.desc || 'Vehicle';
    var ov = getOverride(desc);
    allAssets.push({ desc: desc, fullVal: N(v.val), dutiable: ov ? ov.dutiable : String(N(v.val)), bond: N(v.finance) });
  });
  S.otherAssets.forEach(function(a) {
    if (!a.desc && !N(a.val)) return;
    var desc = a.desc || 'Asset';
    var ov = getOverride(desc);
    allAssets.push({ desc: desc, fullVal: N(a.val), dutiable: ov ? ov.dutiable : String(N(a.val)), bond: 0 });
  });

  if (allAssets.length === 0) {
    var noA = div('info');
    noA.textContent = 'No assets captured. Add properties, vehicles, and other assets on the Assets tab.';
    s.appendChild(noA);
  } else {
    var aTbl = document.createElement('table');
    var aThead = document.createElement('thead');
    aThead.innerHTML = '<tr><th>Asset</th><th>Full Value</th><th>Dutiable Amount</th><th>Notes</th></tr>';
    aTbl.appendChild(aThead);
    var aTbody = document.createElement('tbody');

    allAssets.forEach(function(a) {
      var tr = document.createElement('tr');

      var td1 = document.createElement('td'); td1.style.fontWeight = '600'; td1.textContent = a.desc; tr.appendChild(td1);

      var td2 = document.createElement('td'); td2.textContent = Rfmt(a.fullVal); td2.style.color = 'var(--sub)'; tr.appendChild(td2);

      var td3 = document.createElement('td');
      var rw = div('td-r'); rw.appendChild(el('span','rp','R'));
      var inp = document.createElement('input'); inp.type = 'text'; inp.inputMode = 'numeric';
      inp.value = a.dutiable; inp.placeholder = '0';
      inp.addEventListener('input', function(e) { setOverride(a.desc, e.target.value); });
      inp.addEventListener('blur', function(e) { setOverride(a.desc, e.target.value); render(); });
      rw.appendChild(inp); td3.appendChild(rw); tr.appendChild(td3);

      var td4 = document.createElement('td');
      td4.style.fontSize = '11px'; td4.style.color = 'var(--sub)';
      if (N(a.dutiable) < a.fullVal && N(a.dutiable) >= 0) {
        td4.textContent = a.bond > 0 ? 'Bond: ' + Rfmt(a.bond) : 'Partially excluded';
        if (N(a.dutiable) === 0) td4.textContent = 'Excluded (trust/CC?)';
      } else if (a.bond > 0) {
        td4.textContent = 'Bond outstanding: ' + Rfmt(a.bond) + ' (reduce dutiable if applicable)';
      }
      tr.appendChild(td4);

      aTbody.appendChild(tr);
    });
    aTbl.appendChild(aTbody);
    var aTw = div('twrap'); aTw.appendChild(aTbl); s.appendChild(aTw);
  }

  // ── SECTION 2: Retirement assets (outside estate — display only)
  var retTotal = S.retAssets.reduce(function(sum, r) { return sum + N(r.currentVal); }, 0);
  if (retTotal > 0) {
    s.appendChild(stitle('Retirement Assets (Outside Estate)'));
    var retNote = div('info');
    retNote.innerHTML = 'RA / pension fund values are <strong>excluded from estate duty</strong> (Pension Funds Act s.37C — paid at trustee discretion). ' +
      'Shown for liquidity context only.';
    s.appendChild(retNote);
    var retCards = div('cards c3');
    S.retAssets.forEach(function(r) {
      if (!N(r.currentVal)) return;
      var c = div('card');
      c.innerHTML = '<div class="lbl">' + (r.desc || 'Retirement fund') + '</div><div class="val">' + Rfmt(r.currentVal) + '</div>' +
        '<div class="sub">Outside estate</div>';
      retCards.appendChild(c);
    });
    s.appendChild(retCards);
  }

  // ── SECTION 3: Policy death benefits — routing summary
  s.appendChild(stitle('Policy Death Benefits — Routing'));

  var pols = S.importedPols || [];
  var section4q  = 0;  // To spouse — s.4(q) deduction
  var toEstate   = 0;  // Into estate (dutiable)
  var toThird    = 0;  // Direct to 3rd party
  var toBiz      = 0;  // Business assurance

  pols.forEach(function(p) {
    var ben = N(p.BenDeath);
    if (!ben && (POL_RA_TYPES.indexOf(p.Type) > -1 || POL_INV_TYPES.indexOf(p.Type) > -1)) {
      ben = N(p.BenFundValue);  // Use fund value for RA/investments
    }
    if (p.Type === 'Business Assurance') {
      // Business assurance goes to toBiz regardless of beneficiary — outside personal estate
      toBiz += N(p.LoanAmount) || N(p.BenDeath);
      return; // skip personal routing
    }
    if (!ben) return;
    var bt = p.BeneficiaryType || '';
    if (bt === 'Spouse')       section4q += ben;
    else if (bt === 'Estate')  toEstate  += ben;
    else if (bt === 'Third Party') toThird += ben;
    else                       toBiz     += ben;
  });

  if (pols.length === 0) {
    var noPol = div('info'); noPol.textContent = 'No policies captured. Add policies on the Policies tab.';
    s.appendChild(noPol);
  } else {
    var polRouteCards = div('cards');
    polRouteCards.style.gridTemplateColumns = 'repeat(4,1fr)';
    [
      { l: 'Section 4(q) — Spouse', v: section4q, c: 'ok',  sub: 'Not dutiable' },
      { l: 'To Estate',              v: toEstate,  c: 'warn', sub: 'Dutiable' },
      { l: 'Third Party Direct',     v: toThird,   c: '',     sub: 'Not dutiable' },
      { l: 'Business Assurance',     v: toBiz,     c: '',     sub: 'Outside estate' }
    ].forEach(function(x) {
      var c = div('card');
      c.innerHTML = '<div class="lbl">' + x.l + '</div>' +
        '<div class="val ' + x.c + '">' + (x.v > 0 ? Rfmt(x.v) : '—') + '</div>' +
        '<div class="sub">' + x.sub + '</div>';
      polRouteCards.appendChild(c);
    });
    s.appendChild(polRouteCards);
  }

  // ── SECTION 4: Estate duty calculation
  s.appendChild(stitle('Estate Duty Calculation'));

  // Gross dutiable estate = dutiable assets + estate-routed policy benefits - liabilities
  var totalDutiableAssets = allAssets.reduce(function(sum, a) { return sum + N(a.dutiable); }, 0);
  var totalLiabs = S.props.reduce(function(sum, p) { return sum + N(p.bond); }, 0) +
                   S.vehicles.reduce(function(sum, v) { return sum + N(v.finance); }, 0) +
                   S.liabilities.reduce(function(sum, l) { return sum + N(l.bal); }, 0);

  var grossEstate    = totalDutiableAssets + toEstate;
  var netEstate      = Math.max(0, grossEstate - totalLiabs);
  var sec4qDed       = Math.min(section4q, netEstate);  // can't exceed net estate
  var afterSpouse    = Math.max(0, netEstate - sec4qDed);
  var afterAbatement = Math.max(0, afterSpouse - ABATEMENT);

  // Estate duty
  var estateDuty = 0;
  if (afterAbatement > 0) {
    if (afterAbatement <= DUTY_THRESH) {
      estateDuty = afterAbatement * DUTY_RATE1;
    } else {
      estateDuty = DUTY_THRESH * DUTY_RATE1 + (afterAbatement - DUTY_THRESH) * DUTY_RATE2;
    }
  }

  // Executor fees on gross estate (gross assets, not net)
  var execFees = grossEstate * EXEC_RATE;

  // Total estate costs
  var totalEstateCosts = estateDuty + execFees;

  // Liquidity: cash-type assets + estate-routed policies vs costs
  // Cash/liquid = investments and other assets not properties/vehicles (rough proxy)
  var liquidAssets = S.otherAssets.reduce(function(sum, a) { return sum + N(a.val); }, 0) + toEstate;
  var liquidityGap = liquidAssets - totalEstateCosts;

  // ── Calculation breakdown display
  var calcBox = div();
  calcBox.style.cssText = 'background:var(--navy);color:#fff;border-radius:9px;padding:18px 20px;margin-bottom:16px';

  function calcRow(label, val, indent, highlight, borderTop) {
    var row = div();
    row.style.cssText = 'display:flex;justify-content:space-between;padding:4px 0;font-size:13px' +
      (indent ? ';padding-left:20px' : '') +
      (borderTop ? ';border-top:1px solid #334;margin-top:8px;padding-top:10px' : '') +
      (highlight ? ';font-size:15px;font-weight:700' : '');
    var lSpan = el('span','',label);
    var vSpan = el('span','', val);
    vSpan.style.color = highlight ? 'var(--gold)' : '#ccd6f6';
    row.appendChild(lSpan); row.appendChild(vSpan);
    calcBox.appendChild(row);
  }

  function calcRowSub(label, val) {
    var row = div();
    row.style.cssText = 'display:flex;justify-content:space-between;padding:3px 0 3px 16px;font-size:11px;color:#8899bb';
    row.innerHTML = '<span>' + label + '</span><span>' + val + '</span>';
    calcBox.appendChild(row);
  }

  calcRow('Gross Estate', Rfmt(grossEstate));
  calcRowSub('Dutiable assets', Rfmt(totalDutiableAssets));
  calcRowSub('+ Estate-routed policy benefits', Rfmt(toEstate));

  calcRow('Less: Liabilities', '− ' + Rfmt(totalLiabs), true);
  calcRow('Net Estate', Rfmt(netEstate), false, false, true);

  if (section4q > 0) {
    calcRow('Less: Section 4(q) — spouse bequest', '− ' + Rfmt(sec4qDed), true);
  }
  if (afterSpouse !== netEstate) {
    calcRow('After 4(q) deduction', Rfmt(afterSpouse), false, false, true);
  }

  calcRow('Less: Primary abatement', '− ' + Rfmt(Math.min(afterSpouse, ABATEMENT)), true);
  calcRow('Dutiable amount', Rfmt(afterAbatement), false, false, true);

  if (afterAbatement > 0) {
    if (afterAbatement <= DUTY_THRESH) {
      calcRowSub('Rate: 20% on R' + (DUTY_THRESH/1000000) + 'm', '');
    } else {
      calcRowSub('20% on first R30m + 25% on balance', '');
    }
  }

  calcRow('Estate Duty', Rfmt(estateDuty), false, false, true);
  calcRow('Executor fees (~4.025% of gross estate)', Rfmt(execFees), true);
  calcRow('Total Estate Costs', Rfmt(totalEstateCosts), false, true, true);
  s.appendChild(calcBox);

  // ── Liquidity analysis
  s.appendChild(stitle('Liquidity Analysis'));
  var liqNote = div('info');
  liqNote.innerHTML = 'The estate needs <strong>liquid funds</strong> to pay duty and executor fees without forcing asset sales. ' +
    'Estate-routed policy benefits contribute to estate liquidity.';
  s.appendChild(liqNote);

  var liqCards = div('cards c3');
  var lc1 = div('card');
  lc1.innerHTML = '<div class="lbl">Estate Costs (Duty + Fees)</div><div class="val bad">' + Rfmt(totalEstateCosts) + '</div>';
  liqCards.appendChild(lc1);
  var lc2 = div('card');
  lc2.innerHTML = '<div class="lbl">Liquid / Policy Assets in Estate</div><div class="val">' + Rfmt(Math.max(0, liquidAssets)) + '</div>';
  liqCards.appendChild(lc2);
  var lc3 = div('card');
  lc3.innerHTML = '<div class="lbl">Liquidity ' + (liquidityGap >= 0 ? 'Surplus' : 'Shortfall') + '</div>' +
    '<div class="val ' + (liquidityGap >= 0 ? 'ok' : 'bad') + '">' + Rfmt(Math.abs(liquidityGap)) + '</div>';
  liqCards.appendChild(lc3);
  s.appendChild(liqCards);

  if (liquidityGap < 0) {
    var liqAlert = div('alert');
    liqAlert.innerHTML = '⚠ <strong>Liquidity shortfall of ' + Rfmt(Math.abs(liquidityGap)) + '.</strong> ' +
      'The estate may need to sell assets to fund duty and executor fees. ' +
      'Consider routing additional life cover to the estate, or an estate liquidity policy.';
    s.appendChild(liqAlert);
  } else {
    var liqOk = div('info');
    liqOk.style.cssText = 'background:#f0fdf4;border-color:#86efac;color:#166534';
    liqOk.innerHTML = '✓ <strong>Estate is liquid.</strong> Sufficient funds available to cover duty and executor fees without forced asset sales.';
    s.appendChild(liqOk);
  }

  // ── What each beneficiary receives
  s.appendChild(stitle('Beneficiary Outcome Summary'));

  var outCards = div('cards c2');
  outCards.style.marginTop = '0';

  // Spouse receives: 4(q) policies + residual estate after all costs and bequests
  var estateResidual = Math.max(0, netEstate - sec4qDed - totalEstateCosts);
  var c_spouse = div('card');
  c_spouse.innerHTML = '<div class="lbl">Spouse receives</div>' +
    '<div class="val ok">' + Rfmt(section4q + estateResidual) + '</div>' +
    '<div class="sub">Section 4(q) policies: ' + Rfmt(section4q) + '<br>Estate residual: ' + Rfmt(estateResidual) + '</div>';
  outCards.appendChild(c_spouse);

  var c_third = div('card');
  c_third.innerHTML = '<div class="lbl">Third party beneficiaries</div>' +
    '<div class="val">' + Rfmt(toThird) + '</div>' +
    '<div class="sub">Paid direct — no estate duty</div>';
  outCards.appendChild(c_third);

  s.appendChild(outCards);

  // ── Estate planning notes
  s.appendChild(stitle('Estate Planning Notes'));
  s.appendChild(txfld('Notes / recommendations', S, 'estateNotes'));

  return s;
}

// ═══════════════════════════════════════════════════════════
// TAB 8 — SUMMARY & GAPS
// ═══════════════════════════════════════════════════════════
function buildSummary() {
  var s = div();
  var inf=div('info'); inf.textContent='This tab reads policies from the CRM (passed via URL) or captured below. It shows needs vs existing cover and calculates gaps.'; s.appendChild(inf);

  // For now, policies are entered here as a quick summary table
  // When linked from CRM they will be passed via URL params
  s.appendChild(stitle('Existing Cover Summary'));
  var inf2=div('info'); inf2.innerHTML='Enter cover amounts from existing policies. When opened from the client profile in the CRM, this will populate automatically.'; s.appendChild(inf2);

  // Summary fields for existing cover
  if(!S.existingCover) S.existingCover={death:'',disability:'',dread:'',ipPM:'',totalPrem:''};
  var eg=g3();
  eg.appendChild(rfld('Death Cover', S.existingCover, 'death'));
  eg.appendChild(rfld('Disability Cover', S.existingCover, 'disability'));
  eg.appendChild(rfld('Dread Disease', S.existingCover, 'dread'));
  s.appendChild(eg);
  var eg2=g3();
  eg2.appendChild(rfld('Income Protection /pm', S.existingCover, 'ipPM'));
  eg2.appendChild(rfld('Total Premiums /pm', S.existingCover, 'totalPrem'));
  s.appendChild(eg2);

  // ── Gap analysis
  s.appendChild(stitle('Gap Analysis'));

  // Death
  var totLiabNeed=S.deathLiabs.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totIncCap=S.deathIncome.reduce(function(sum,r){return sum+calcIncomeNeed(r);},0);
  var totCapNeed=S.deathCapital.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totalDeathNeed=totLiabNeed+totIncCap+totCapNeed;
  var haveDeathCover=N(S.existingCover.death);

  if(S.scope.death) s.appendChild(buildGapRow('Death Cover', totalDeathNeed, haveDeathCover));

  // Disability
  var disIncCap=S.disIncome.reduce(function(sum,r){return sum+calcIncomeNeed(r);},0);
  var disCapNeed=S.disCapital.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totalDisNeed=disIncCap+disCapNeed;
  if(S.scope.disability) s.appendChild(buildGapRow('Disability Cover', totalDisNeed, N(S.existingCover.disability)));

  // Dread
  if(S.scope.dread) s.appendChild(buildGapRow('Dread Disease', N(S.dreadAmt), N(S.existingCover.dread)));

  // IP
  if(S.scope.ip) s.appendChild(buildGapRow('Income Protection /pm', N(S.ipGrossPM||S.ipNettPM), N(S.existingCover.ipPM)));

  // Retirement
  if(S.scope.retirement){
    var cliAge=ageFrom(S.cli.dob);
    var retAge=N(S.cli.retAge)||65;
    var yrsToR=cliAge?Math.max(0,retAge-cliAge):null;
    var yrsInRet=85-retAge;
    if(yrsToR!==null){
      var totalProj=S.retAssets.reduce(function(sum,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return sum;
        var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
        var esc=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
        return sum+projectFund(r.currentVal,r.monthlyContrib,esc,gr,yrsToR);
      },0);
      var monthlyNeedToday=N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
      var lumpAtRet=S.retLumps.reduce(function(sum,r){return sum+N(r.amt);},0)*Math.pow(1+pct(S.assump.cpi),yrsToR);
      var capForIncome=retirementCapitalNeeded(monthlyNeedToday,yrsToR,yrsInRet,S.assump.cpi,S.assump.retReturn);
      s.appendChild(buildGapRow('Retirement Capital', capForIncome+lumpAtRet, totalProj));
    }
  }

  return s;
}

function buildGapRow(label, need, have) {
  var gap=have-need;
  var hasNeed=need>0;
  var row=div('gap-row'+(hasNeed?(gap>=0?' ok':' bad'):''));
  var gl=el('div','gl',label); row.appendChild(gl);
  var gv=div('gv');
  [{l:'Need',v:need},{l:'Have',v:have},{l:gap>=0?'Surplus':'Shortfall',v:Math.abs(gap)}].forEach(function(x,xi){
    var d=div(); d.innerHTML='<div class="vl">'+x.l+'</div><div class="vn" style="color:'+(xi===2?(gap>=0?'var(--green)':'var(--red)'):'var(--navy)')+'">'+
      (x.v>0?Rfmt(x.v):(xi===0?'Not captured':'—'))+'</div>';
    gv.appendChild(d);
  });
  row.appendChild(gv);
  return row;
}

// ═══════════════════════════════════════════════════════════
// ROA GENERATOR
// ═══════════════════════════════════════════════════════════
function generateROA() {
  if(!S.cli.name.trim()){alert('Enter client name first.');go(0);return;}
  persist();
  var today=new Date().toLocaleDateString('en-ZA',{day:'2-digit',month:'long',year:'numeric'});

  var scopeList=['death Life Cover','disability Disability','dread Dread Disease','ip Income Protection',
    'retirement Retirement','investment Investment','offshore Offshore','will Will','estate Estate','review Review']
    .filter(function(x){return S.scope[x.split(' ')[0]];})
    .map(function(x){return x.split(' ').slice(1).join(' ');}).join(' · ');

  // Calculate all needs
  var totLiabNeed=S.deathLiabs.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totIncCap=S.deathIncome.reduce(function(sum,r){return sum+calcIncomeNeed(r);},0);
  var totCapNeed=S.deathCapital.reduce(function(sum,r){return sum+N(r.amt);},0);
  var totalDeathNeed=totLiabNeed+totIncCap+totCapNeed;
  var haveDeathCover=N(S.existingCover&&S.existingCover.death);
  var deathGap=haveDeathCover-totalDeathNeed;

  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>ROA — '+S.cli.name+'</title><style>'+
    'body{font-family:Arial,sans-serif;color:#1a2a4a;font-size:13px;max-width:820px;margin:0 auto;padding:30px}'+
    '.hdr{display:flex;justify-content:space-between;border-bottom:3px solid #c8a84b;padding-bottom:16px;margin-bottom:24px}'+
    '.hdr-left h1{font-size:22px;margin:4px 0 2px}.hdr-left .sub{color:#666;font-size:12px}'+
    '.hdr-right{text-align:right;font-size:12px;color:#666}'+
    '.hdr-right strong{color:#1a2a4a;display:block;font-size:14px;margin-bottom:2px}'+
    'h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#c8a84b;border-bottom:1px solid #eee;padding-bottom:4px;margin:24px 0 10px}'+
    'table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px}'+
    'th{background:#1a2a4a;color:#fff;padding:6px 8px;text-align:left;font-size:11px}'+
    'td{padding:6px 8px;border-bottom:1px solid #eef}'+
    '.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:8px}'+
    '.lbl{font-size:10px;color:#888;text-transform:uppercase}'+
    '.val{font-weight:700}'+
    '.gap-ok{color:#16a34a;font-weight:700}.gap-bad{color:#dc2626;font-weight:700}'+
    '.sig{margin-top:48px;display:grid;grid-template-columns:1fr 1fr;gap:48px}'+
    '.sig-line{border-top:1px solid #333;padding-top:6px;font-size:11px;color:#888}'+
    '.disc{margin-top:32px;font-size:10px;color:#999;border-top:1px solid #eee;padding-top:12px;line-height:1.6}'+
    '@media print{.noprint{display:none}}'+
    '</style></head><body>';

  html+='<div class="hdr"><div class="hdr-left"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#888">Record of Advice</div>'+
    '<h1>'+S.cli.name+'</h1><div class="sub">'+S.cli.id+(S.cli.dob?' · DOB '+S.cli.dob:'')+'</div></div>'+
    '<div class="hdr-right"><strong>Clinton Hayes</strong>Duwalcoe Financial Consultants CC<br>FSP No: 9978<br>clinton@duwalcoe.co.za<br>083 608 5617<br><br>Date: '+today+'</div></div>';

  html+='<h2>Client Information</h2><div class="g2">'+
    '<div><div class="lbl">Occupation</div><div class="val">'+(S.cli.occ||'—')+'</div></div>'+
    '<div><div class="lbl">Marital Status</div><div class="val">'+(S.cli.marital||'—')+'</div></div>'+
    '<div><div class="lbl">Gross Monthly Income</div><div class="val">'+(S.cli.grossPM?Rfmt(S.cli.grossPM)+' /pm':'—')+'</div></div>'+
    '<div><div class="lbl">Smoker Status</div><div class="val">'+(S.cli.smoker||'—')+'</div></div>'+
    '</div>';

  html+='<h2>Scope of Advice</h2><p>'+(scopeList||'Not specified')+'</p>';
  if(S.whyHere) html+='<p style="margin-top:8px;color:#555;font-style:italic">"'+S.whyHere.replace(/\n/g,'<br>').replace(/"/g,'&quot;')+'"</p>';

  // Needs & gaps table
  html+='<h2>Needs Analysis</h2><table><thead><tr><th>Area</th><th>Cover Required</th><th>Existing Cover</th><th>Surplus / Shortfall</th></tr></thead><tbody>';
  function roaGapRow(label,need,have){
    var gap=have-need; var hasN=need>0;
    return '<tr><td><strong>'+label+'</strong></td><td>'+(need>0?Rfmt(need):'Not quantified')+'</td><td>'+(have>0?Rfmt(have):'—')+'</td>'+
      '<td class="'+(hasN?(gap>=0?'gap-ok':'gap-bad'):'')+'">'+
      (hasN?(gap>=0?'▲ '+Rfmt(gap)+' surplus':'▼ '+Rfmt(Math.abs(gap))+' shortfall'):'—')+'</td></tr>';
  }
  if(S.scope.death) html+=roaGapRow('Death Cover',totalDeathNeed,haveDeathCover);
  if(S.scope.disability){
    var disIncCap=S.disIncome.reduce(function(sum,r){return sum+calcIncomeNeed(r);},0);
    var disCapNeed=S.disCapital.reduce(function(sum,r){return sum+N(r.amt);},0);
    html+=roaGapRow('Disability Cover',disIncCap+disCapNeed,N(S.existingCover&&S.existingCover.disability));
  }
  if(S.scope.dread) html+=roaGapRow('Dread Disease',N(S.dreadAmt),N(S.existingCover&&S.existingCover.dread));
  if(S.scope.ip) html+=roaGapRow('Income Protection /pm',N(S.ipGrossPM||S.ipNettPM),N(S.existingCover&&S.existingCover.ipPM));
  html+='</tbody></table>';

  // Death breakdown if applicable
  if(S.scope.death&&totalDeathNeed>0){
    html+='<h2>Death Cover Breakdown</h2><table><thead><tr><th>Component</th><th>Amount</th></tr></thead><tbody>';
    S.deathLiabs.forEach(function(r){if(N(r.amt)>0) html+='<tr><td>'+r.desc+'</td><td>'+Rfmt(r.amt)+'</td></tr>';});
    S.deathIncome.forEach(function(r){
      var cap=calcIncomeNeed(r);
      if(cap>0) html+='<tr><td>'+r.desc+' (capitalised: '+Rfmt(N(r.grossPM)||grossFromNett(r.nettPM))+'/pm × '+r.years+' yrs @ '+(N(r.esc)>0?r.esc:S.assump.cpi)+'% esc)</td><td>'+Rfmt(cap)+'</td></tr>';
    });
    S.deathCapital.forEach(function(r){if(N(r.amt)>0) html+='<tr><td>'+r.desc+'</td><td>'+Rfmt(r.amt)+'</td></tr>';});
    html+='<tr style="font-weight:700;background:#f5f5f0"><td>Total Death Cover Required</td><td>'+Rfmt(totalDeathNeed)+'</td></tr></tbody></table>';
  }

  html+='<h2>Recommendation</h2>';
  if(S.roaNotes){
    html+='<p style="white-space:pre-wrap">'+S.roaNotes.replace(/</g,'&lt;')+'</p>';
  } else {
    html+='<p style="min-height:80px;border:1px solid #eee;padding:12px;color:#aaa;font-style:italic">[Adviser to complete recommendation]</p>';
  }

  html+='<div class="sig">'+
    '<div><div class="sig-line">Client signature &amp; date</div><div style="margin-top:6px;font-weight:700">'+S.cli.name+'</div></div>'+
    '<div><div class="sig-line">Financial adviser signature &amp; date</div><div style="margin-top:6px;font-weight:700">Clinton Hayes · FSP No: 9978</div></div>'+
    '</div>';

  html+='<div class="disc">This Record of Advice has been prepared by Clinton Hayes on behalf of Duwalcoe Financial Consultants CC (FSP No: 9978). '+
    'The information and recommendations contained herein are based on information provided by the client and are believed to be correct as at '+today+'. '+
    'All projections and calculations are based on assumptions which are not guaranteed. Past performance is not indicative of future results. '+
    'This document constitutes a record of the financial advice provided and should be retained by the client.</div>';

  html+='<div class="noprint" style="position:fixed;bottom:20px;right:20px;display:flex;gap:8px">'+
    '<button onclick="window.print()" style="background:#1a2a4a;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700">🖨 Print / Save PDF</button>'+
    '<button onclick="window.close()" style="background:#888;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:13px">Close</button>'+
    '</div>';

  html+='</body></html>';
  var win=window.open('','_blank','width=920,height=850');
  win.document.write(html); win.document.close();
}

// INIT
render();
setInterval(autoSave, 60000);
document.addEventListener('visibilitychange', function(){ if(document.hidden) autoSave(); });
</script>
