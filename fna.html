        +'<td class="r b">'+R(equity)+'</td></tr>';
    });
    h += '<tr class="subtotal"><td>Property Total</td><td class="r">'+R(totPropVal)+'</td><td class="r">'+(totPropBond>0?'('+R(totPropBond)+')':'&#8212;')+'</td><td class="r"></td><td class="r">'+R(totPropVal-totPropBond)+'</td></tr>';
    h += '</tbody></table>';
  }

  // Vehicles
  if((S.vehicles||[]).some(function(v){return N(v.val)>0;})){
    h += '<table><thead><tr><th>Vehicle</th><th class="r">Market Value</th><th class="r">Finance Outstanding</th><th class="r">Net Value</th></tr></thead><tbody>';
    (S.vehicles||[]).forEach(function(v){
      if(!N(v.val)) return;
      var net=N(v.val)-N(v.finance);
      h += '<tr><td>'+e(v.desc||'Vehicle')+'</td>'
        +'<td class="r">'+R(v.val)+'</td>'
        +'<td class="r">'+(N(v.finance)>0?'('+R(v.finance)+')':'&#8212;')+'</td>'
        +'<td class="r b">'+R(net)+'</td></tr>';
    });
    h += '<tr class="subtotal"><td>Vehicle Total</td><td class="r">'+R(totVehVal)+'</td><td class="r">'+(totVehFin>0?'('+R(totVehFin)+')':'&#8212;')+'</td><td class="r">'+R(totVehVal-totVehFin)+'</td></tr>';
    h += '</tbody></table>';
  }

  // Other assets
  if((S.otherAssets||[]).some(function(a){return N(a.val)>0;})){
    h += '<table><thead><tr><th>Other Asset</th><th>Type</th><th class="r">Value</th></tr></thead><tbody>';
    (S.otherAssets||[]).forEach(function(a){
      if(!N(a.val)) return;
      h += '<tr><td>'+e(a.desc||'Asset')+'</td><td style="font-size:9.5px;color:#555">'+e(a.type||'')+'</td><td class="r">'+R(a.val)+'</td></tr>';
    });
    h += '<tr class="subtotal"><td colspan="2">Other Assets Total</td><td class="r">'+R(totOthVal)+'</td></tr>';
    h += '</tbody></table>';
  }

  // Retirement & Investment fund values
  var raList=pols.filter(function(p){return POL_RA_TYPES.indexOf(p.Type)>-1&&N(p.BenFundValue)>0;});
  var invList=pols.filter(function(p){return POL_INV_TYPES.indexOf(p.Type)>-1&&N(p.BenFundValue)>0;});
  if(raList.length>0||invList.length>0){
    h += '<table><thead><tr><th>Investment / Retirement Fund</th><th>Type</th><th class="r">Fund Value</th></tr></thead><tbody>';
    raList.concat(invList).forEach(function(p){
      h += '<tr><td>'+e((p.Insurer||'')+(p.Product?' — '+p.Product:''))+'</td>'
        +'<td style="font-size:9.5px;color:#555">'+e(p.Type)+'</td>'
        +'<td class="r">'+R(p.BenFundValue)+'</td></tr>';
    });
    if(totRetFV+totInvFV>0){
      h += '<tr class="subtotal"><td colspan="2">Funds Total</td><td class="r">'+R(totRetFV+totInvFV)+'</td></tr>';
    }
    h += '</tbody></table>';
  }

  // ── LIABILITIES
  h += '<h2>Liabilities</h2>';
  var hasLiabs = totPropBond>0||totVehFin>0||(S.liabilities||[]).some(function(l){return N(l.bal)>0;});
  if(hasLiabs){
    h += '<table><thead><tr><th>Liability</th><th class="r">Outstanding Balance</th><th class="r">Monthly Payment</th></tr></thead><tbody>';
    (S.props||[]).forEach(function(p){
      if(!N(p.bond)) return;
      h += '<tr><td>'+e(p.desc||'Property')+' — Bond</td><td class="r">'+R(p.bond)+'</td><td class="r">'+(N(p.bondPM)>0?Rm(p.bondPM):'&#8212;')+'</td></tr>';
    });
    (S.vehicles||[]).forEach(function(v){
      if(!N(v.finance)) return;
      h += '<tr><td>'+e(v.desc||'Vehicle')+' — Finance</td><td class="r">'+R(v.finance)+'</td><td class="r">&#8212;</td></tr>';
    });
    (S.liabilities||[]).forEach(function(l){
      if(!N(l.bal)) return;
      h += '<tr><td>'+e(l.desc||'Liability')+'</td><td class="r">'+R(l.bal)+'</td><td class="r">'+(N(l.pmt)>0?Rm(l.pmt):'&#8212;')+'</td></tr>';
    });
    h += '<tr class="subtotal"><td>Total Liabilities</td><td class="r">'+R(totalLiabs)+'</td><td class="r">'+(totalDebtPmt>0?Rm(totalDebtPmt):'&#8212;')+'</td></tr>';
    h += '</tbody></table>';
  } else {
    h += '<p style="font-size:10px;color:#888;margin-bottom:10px">No liabilities recorded.</p>';
  }

  // ── NET WORTH SUMMARY
  h += '<div class="summary">';
  h += '<div class="sum-grid">';
  h += '<div class="sum-card"><div class="sum-lbl">Total Assets</div><div class="sum-val">'+R(totalAssets)+'</div></div>';
  h += '<div class="sum-card"><div class="sum-lbl">Total Liabilities</div><div class="sum-val">'+R(totalLiabs)+'</div></div>';
  h += '<div class="sum-card"><div class="sum-lbl">Net Worth</div><div class="sum-val '+(netWorth>=0?'ok':'bad')+'">'+R(netWorth)+'</div></div>';
  h += '</div>';

  // Monthly income vs commitments
  if(grossPM>0){
    h += '<div style="border-top:1px solid #334;padding-top:10px;margin-top:4px">';
    h += '<div style="font-size:8.5px;text-transform:uppercase;letter-spacing:.6px;color:#8899bb;margin-bottom:6px">Monthly Income &amp; Commitments</div>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
    h += '<div>';
    h += '<div class="inc-row"><span class="inc-lbl">Gross income</span><span class="inc-val">'+Rm(grossPM)+'</span></div>';
    if(nettPM>0) h += '<div class="inc-row"><span class="inc-lbl">Nett income</span><span class="inc-val">'+Rm(nettPM)+'</span></div>';
    h += '</div>';
    h += '<div>';
    if(totalDebtPmt>0) h += '<div class="inc-row"><span class="inc-lbl">Debt repayments</span><span class="inc-val">'+Rm(totalDebtPmt)+'</span></div>';
    if(totalPremPM>0)  h += '<div class="inc-row"><span class="inc-lbl">Insurance premiums</span><span class="inc-val">'+Rm(totalPremPM)+'</span></div>';
    var totalCommit=totalDebtPmt+totalPremPM;
    if(totalCommit>0&&grossPM>0){
      var commitPct=Math.round(totalCommit/grossPM*100);
      h += '<div class="inc-row" style="border-bottom:none;margin-top:4px"><span class="inc-lbl" style="font-weight:700;color:#ccd6f6">Total commitments</span><span class="inc-val" style="color:'+(commitPct>40?'#f87171':'#86efac')+'">'+Rm(totalCommit)+' ('+commitPct+'%)</span></div>';
    }
    h += '</div></div></div>';
  }
  h += '</div>';

  // ── Declaration
  h += '<div class="declaration">';
  h += '<strong>Declaration</strong><br>';
  h += 'I, <strong>'+e(cli.name||'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;')+'</strong>, hereby declare that the information contained in this Asset and Liability Statement is true, accurate and complete to the best of my knowledge and belief. I acknowledge that this statement has been prepared for financial planning and/or credit assessment purposes.';
  h += '<div class="sig-grid">';
  h += '<div><div class="sig-line">Client Signature</div></div>';
  h += '<div><div class="sig-line">Date</div></div>';
  h += '</div>';
  h += '</div>';

  // ── Disclaimer
  h += '<div class="disclaimer">Values reflected are estimates based on information provided by the client and/or loaded in the FNA system. Market values of properties and vehicles may differ from professional valuations. Retirement and investment fund values reflect balances at the time of capture and will fluctuate with market conditions. This statement does not constitute a formal valuation and should be read in conjunction with supporting documentation.</div>';

  h += '<div class="fnote">Duwalcoe Financial Consultants CC &nbsp;·&nbsp; FSP No: 9978 &nbsp;·&nbsp; Prepared: '+today+' &nbsp;·&nbsp; This document is confidential and prepared for '+e(cli.name||'the named client')+' only.</div>';

  h += '<div class="noprint" style="position:fixed;bottom:16px;right:16px;display:flex;gap:8px">';
  h += '<button onclick="window.print()" style="background:#0e413a;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700">Print / Save PDF</button>';
  h += '<button onclick="window.close()" style="background:#888;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:13px">Close</button></div>';

  h += '</div></body></html>';

  var win = window.open('','_blank');
  if(win){ win.document.write(h); win.document.close(); }
  else { alert('Pop-up blocked. Please allow pop-ups for this page.'); }
}


// INIT
render();
setInterval(autoSave, 60000);
document.addEventListener('visibilitychange', function(){ if(document.hidden) autoSave(); });
</script>
</body>
</html>
