<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duwalcoe FNA</title>
<style>
:root {
  --navy:    #1a2a4a;
  --gold:    #c8a84b;
  --gold2:   #e8d48b;
  --smoke:   #f4f4f0;
  --mist:    #dde0e8;
  --white:   #ffffff;
  --text:    #1a2a4a;
  --sub:     #6b7280;
  --green:   #16a34a;
  --red:     #dc2626;
  --orange:  #d97706;
  --border:  1.5px solid var(--mist);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--smoke); color: var(--text); font-size: 13px; line-height: 1.5; }

/* ── HEADER ── */
.hdr { background: var(--navy); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 52px; position: sticky; top: 0; z-index: 200; }
.hdr-brand { font-size: 12px; font-weight: 700; color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase; }
.hdr-client { font-size: 13px; color: #ccd6f6; }
.hdr-actions { display: flex; gap: 8px; }

/* ── TABS ── */
.tabbar { background: var(--navy); display: flex; padding: 0 20px; gap: 2px; border-bottom: 2px solid var(--gold); overflow-x: auto; }
.tabbar::-webkit-scrollbar { height: 0; }
.tab { padding: 9px 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #8899bb; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s; }
.tab:hover { color: #ccd; }
.tab.on { color: var(--gold); border-bottom-color: var(--gold); }

/* ── CONTENT ── */
.content { max-width: 980px; margin: 0 auto; padding: 24px 20px 100px; }

/* ── SECTION TITLES ── */
.stitle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); padding-bottom: 8px; border-bottom: 1px solid var(--mist); margin: 28px 0 14px; }
.stitle:first-child { margin-top: 0; }

/* ── GRIDS ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 14px; margin-bottom: 14px; }

/* ── FIELD ── */
.f { display: flex; flex-direction: column; gap: 4px; }
.f label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); }
.f input, .f select, .f textarea {
  border: var(--border); border-radius: 6px; padding: 8px 10px;
  font-family: inherit; font-size: 13px; color: var(--text);
  background: var(--white); transition: border-color .15s;
}
.f input:focus, .f select:focus, .f textarea:focus { outline: none; border-color: var(--gold); }
.f textarea { resize: vertical; min-height: 72px; }
/* Rand prefix */
.rw { position: relative; }
.rw .rp { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 12px; pointer-events: none; }
.rw input { padding-left: 22px; }
/* Percent suffix */
.pw { position: relative; }
.pw .pp { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 12px; pointer-events: none; }
.pw input { padding-right: 24px; }

/* ── RADIO GROUP ── */
.rg { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 2px; }
.rg label { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 13px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text); }
.rg input[type=radio] { accent-color: var(--gold); width: 14px; height: 14px; }

/* ── CHECKBOXES ── */
.chkgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
.chk { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: var(--border); border-radius: 7px; background: var(--white); cursor: pointer; transition: all .15s; user-select: none; }
.chk:hover { border-color: var(--gold); }
.chk.on { border-color: var(--gold); background: #fdf8ee; font-weight: 600; color: var(--navy); }
.chk input { accent-color: var(--gold); width: 14px; height: 14px; flex-shrink: 0; }

/* ── TABLES ── */
.twrap { overflow-x: auto; margin-bottom: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 12px; }
thead th { background: var(--navy); color: #fff; padding: 7px 8px; text-align: left; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
tbody tr td { padding: 5px 6px; border-bottom: 1px solid #eef0f4; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafaf8; }
table input, table select {
  border: var(--border); border-radius: 5px; padding: 5px 7px;
  font-family: inherit; font-size: 12px; width: 100%; background: var(--white);
}
table input:focus, table select:focus { outline: none; border-color: var(--gold); }
.td-r { display: flex; align-items: center; }
.td-r .rp { color: var(--sub); font-size: 11px; margin-right: 3px; flex-shrink: 0; }
.td-r input { flex: 1; min-width: 0; }

/* ── BUTTONS ── */
.btn { border: none; border-radius: 6px; padding: 8px 16px; font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; transition: all .15s; }
.btn-gold  { background: var(--gold); color: #fff; }
.btn-gold:hover  { background: #b8942a; }
.btn-navy  { background: var(--navy); color: #fff; }
.btn-navy:hover  { background: #0f1e38; }
.btn-ghost { background: transparent; border: var(--border); color: var(--sub); }
.btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
.btn-sm { padding: 6px 12px; font-size: 11px; }
.btn-add { width: 100%; background: transparent; border: 1.5px dashed var(--mist); color: var(--sub); border-radius: 6px; padding: 7px; font-family: inherit; font-size: 12px; cursor: pointer; margin-top: 6px; transition: all .15s; }
.btn-add:hover { border-color: var(--gold); color: var(--gold); }
.btn-del { background: none; border: none; color: #bbb; font-size: 15px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
.btn-del:hover { color: var(--red); background: #fef2f2; }

/* ── INFO / ALERT ── */
.info  { background: #fdf8ee; border: 1.5px solid var(--gold2); border-radius: 7px; padding: 10px 13px; font-size: 12px; color: #7a5f1a; margin-bottom: 14px; }
.alert { background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 7px; padding: 10px 13px; font-size: 12px; color: var(--red); margin-bottom: 14px; }

/* ── SUMMARY CARDS ── */
.cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.cards.c3 { grid-template-columns: repeat(3,1fr); }
.cards.c2 { grid-template-columns: repeat(2,1fr); }
.card { background: var(--white); border: var(--border); border-radius: 9px; padding: 14px 16px; }
.card .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); margin-bottom: 4px; }
.card .val { font-size: 20px; font-weight: 700; color: var(--navy); }
.card .val.ok  { color: var(--green); }
.card .val.bad { color: var(--red); }
.card .val.warn { color: var(--orange); }
.card .sub { font-size: 11px; color: var(--sub); margin-top: 2px; }

/* ── GAP ROWS ── */
.gap-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; border-radius: 8px; border: var(--border); background: var(--white); margin-bottom: 8px; }
.gap-row.ok  { border-color: #86efac; background: #f0fdf4; }
.gap-row.bad { border-color: #fca5a5; background: #fef2f2; }
.gap-row .gl { font-size: 13px; font-weight: 700; }
.gap-row .gv { display: flex; gap: 28px; }
.gap-row .gv > div { text-align: right; }
.gap-row .gv .vl { font-size: 10px; text-transform: uppercase; color: var(--sub); }
.gap-row .gv .vn { font-size: 13px; font-weight: 700; }

/* ── TAX BOX ── */
.taxbox { background: var(--white); border: var(--border); border-radius: 7px; padding: 11px 14px; margin-bottom: 14px; }
.taxbox .tr { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.taxbox .tr.tot { font-weight: 700; border-top: 1px solid var(--mist); margin-top: 6px; padding-top: 6px; }

/* ── CALC RESULT ── */
.calc-result { background: var(--navy); color: #fff; border-radius: 8px; padding: 12px 16px; margin-top: 8px; }
.calc-result .cr-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
.calc-result .cr-row.big { font-size: 15px; font-weight: 700; padding-top: 6px; border-top: 1px solid #334; margin-top: 4px; }
.calc-result .cr-row .gold { color: var(--gold); }

/* ── FOOTER ── */
.footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 9px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 200; border-top: 2px solid var(--gold); }
.footer-l { font-size: 11px; color: #8899bb; }
.footer-r { display: flex; gap: 8px; }
</style>

var POL_INV_TYPES = ['Tax Free Savings','Investment','Endowment','Unit Trust'];

var DUTY_RATE2 = 0.25;

function N(v) { return parseFloat(String(v || '').replace(/[^0-9.\-]/g, '')) || 0; }
function pct(v) { return N(v) / 100; }
function Rfmt(v) { return 'R\u202f' + Math.round(N(v)).toLocaleString('en-ZA'); }
function Rval(v) { return N(v) > 0 ? Rfmt(v) : '—'; }

function ageFrom(dob) {
  if (!dob) return null;
  var p = dob.split('/');
  if (p.length !== 3) return null;
  var d = new Date(p[2] + '-' + p[1] + '-' + p[0]);
  if (isNaN(d)) return null;
  return Math.floor((Date.now() - d) / 31557600000);
}
function yrsToRet(dob, retAge) {
  var a = ageFrom(dob);
  if (!a) return null;
  return Math.max(0, N(retAge) - a);
}

// ── TAX TABLES 2025/2026 ──────────────────────────────────
// Returns gross monthly amount needed to yield nettPM nett
// Uses iterative approach: start with gross = nett / (1 - est rate), refine
var TAX_BRACKETS = [
  { limit: 237100,  base: 0,       rate: 0.18 },
  { limit: 370500,  base: 42678,   rate: 0.26 },
  { limit: 512800,  base: 77362,   rate: 0.31 },
  { limit: 673000,  base: 121475,  rate: 0.36 },
  { limit: 857900,  base: 179147,  rate: 0.39 },
  { limit: 1817000, base: 251258,  rate: 0.41 },
  { limit: Infinity,base: 643601,  rate: 0.45 }
];
var PRIMARY_REBATE = 17235;
var SECONDARY_REBATE = 9444; // 65+
var UIF_RATE = 0.01;
var UIF_MAX_ANNUAL = 1776;

function calcTaxPA(grossPA) {
  var g = N(grossPA);
  var prevLimit = 0;
  var tax = 0;
  for (var i = 0; i < TAX_BRACKETS.length; i++) {
    var b = TAX_BRACKETS[i];
    if (g <= b.limit) {
      tax = b.base + (g - prevLimit) * b.rate;
      break;
    }
    prevLimit = b.limit;
  }
  return Math.max(0, tax - PRIMARY_REBATE);
}

function calcMarginalRate(grossPA) {
  var g = N(grossPA);
  for (var i = 0; i < TAX_BRACKETS.length; i++) {
    if (g <= TAX_BRACKETS[i].limit) return TAX_BRACKETS[i].rate;
  }
  return TAX_BRACKETS[TAX_BRACKETS.length - 1].rate;

// Full breakdown: salary (subject to UIF) + other taxable income (rental etc — PAYE but no UIF)
function taxBreakdownFull(salaryGrossPM, otherTaxablePM) {
  var sal   = N(salaryGrossPM);
  var other = N(otherTaxablePM);
  var totalGrossPM = sal + other;
  if (totalGrossPM <= 0) return null;
  var totalGrossPA = totalGrossPM * 12;
  var taxPA = calcTaxPA(totalGrossPA);
  var uifPA = Math.min(sal * 12 * UIF_RATE, UIF_MAX_ANNUAL); // UIF on salary portion only
  var taxPM = Math.round(taxPA / 12);
  var uifPM = Math.round(uifPA / 12);
  return {
    salaryGrossPM:  sal,
    otherTaxablePM: other,
    totalGrossPM:   totalGrossPM,
    taxPM:          taxPM,
    uifPM:          uifPM,
    nettPM:         Math.round(totalGrossPM - taxPM - uifPM),
    marginalRate:   calcMarginalRate(totalGrossPA)
  };
}

// Legacy single-arg wrapper for callers that only have salary gross
function taxBreakdown(grossPM) {
  return taxBreakdownFull(N(grossPM), 0);
}

function grossFromNett(nettPM) {
  // Find gross monthly that yields nettPM after PAYE and UIF
  // Iterate: guess gross, compute nett, adjust
  var nett = N(nettPM);
  if (nett <= 0) return 0;
  var gross = nett / 0.72; // initial guess
  for (var i = 0; i < 20; i++) {
    var taxPA = calcTaxPA(gross * 12);
    var uifPA = Math.min(gross * 12 * UIF_RATE, UIF_MAX_ANNUAL);
    var nettCalc = gross - taxPA / 12 - uifPA / 12;
    var diff = nett - nettCalc;
    if (Math.abs(diff) < 1) break;
    gross += diff * 0.7;
  }
  return Math.round(gross);
}

// ── CAPITALISATION ────────────────────────────────────────
// Present value of a growing annuity (annual payments, beginning of year)
// grossMonthly: gross monthly amount (already tax-grossed-up)
// years: term in years
// escalation: annual escalation rate (decimal)
// drawdown: drawdown / return rate (decimal)
// Returns: capital lump sum needed today
function capitalise(grossMonthly, years, escalation, drawdown) {
  var pmt = N(grossMonthly) * 12; // annual
  var n = N(years);
  var g = pct(escalation);
  var r = pct(drawdown);
  if (pmt <= 0 || n <= 0) return 0;
  if (Math.abs(r - g) < 0.0001) {
    // Edge case: r ≈ g
    return pmt * n / (1 + r);
  }
  // PV of growing annuity (beginning of period)
  var pv = pmt * (1 - Math.pow((1 + g) / (1 + r), n)) / (r - g);
  return Math.round(pv);
}

// Confirm: monthly income the capital produces
// cap: capital amount, years: term, escalation, drawdown
function monthlyFromCapital(cap, years, escalation, drawdown) {
  var n = N(years);
  var g = pct(escalation);
  var r = pct(drawdown);
  var C = N(cap);
  if (C <= 0 || n <= 0) return 0;
  if (Math.abs(r - g) < 0.0001) return Math.round(C * (1 + r) / n / 12);
  var annual = C * (r - g) / (1 - Math.pow((1 + g) / (1 + r), n));
  return Math.round(annual / 12);
}

// ── RETIREMENT PROJECTION ─────────────────────────────────
// Grow a fund with contributions from now to retirement
// currentVal, monthlyContrib, annualEscalation, growthRate, years
function projectFund(currentVal, monthlyContrib, escalation, growth, years) {
  var pv = N(currentVal);
  var pmt = N(monthlyContrib);
  var g = pct(escalation);
  var r = pct(growth);
  var n = N(years);
  if (n <= 0) return pv;
  // Grow existing fund
  var fvExisting = pv * Math.pow(1 + r, n);
  if (pmt <= 0) return Math.round(fvExisting);
  // Future value of growing annuity of contributions (annual, beginning of year)
  var annualPmt = pmt * 12;
  var fvContribs;
  if (Math.abs(r - g) < 0.0001) {
    fvContribs = annualPmt * n * Math.pow(1 + r, n - 1);
  } else {
    fvContribs = annualPmt * (Math.pow(1 + r, n) - Math.pow(1 + g, n)) / (r - g);
  }
  return Math.round(fvExisting + fvContribs);
}

// Capital needed to fund income in retirement
// monthlyIncome: income needed in first year of retirement (today's rands, will inflate to retirement)
// yearsToRet: inflation-adjust the income to retirement date
// yearsInRet: how many years capital must last
// cpi: inflation rate
// returnRate: return on capital in retirement
function retirementCapitalNeeded(monthlyIncomeToday, yearsToRet, yearsInRet, cpi, returnRate) {
  if (N(monthlyIncomeToday) <= 0 || N(yearsInRet) <= 0) return 0;
  // Inflate to retirement date
  var incomeAtRet = N(monthlyIncomeToday) * Math.pow(1 + pct(cpi), N(yearsToRet));
  // Capitalise: PV of growing annuity at retirement date
  return capitalise(incomeAtRet, N(yearsInRet), N(cpi), N(returnRate));
}

(function () {
  var params = new URLSearchParams(window.location.search);
  var saved = document.getElementById('saved-data').textContent;
  var hasSavedState = false;

  if (saved && saved !== 'null') {
    try { S = deepMerge(JSON.parse(JSON.stringify(DEFAULTS)), JSON.parse(saved)); hasSavedState = true; } catch(e) {}
  } else {
    try {
      var lsKey = null;
      if (params.get('id')) lsKey = 'du_fna_' + params.get('id');
      else if (params.get('name')) lsKey = 'du_fna_' + decodeURIComponent(params.get('name')).replace(/\s+/g,'_');
      var lsSaved = lsKey ? localStorage.getItem(lsKey) : null;
      if (lsSaved) { S = deepMerge(JSON.parse(JSON.stringify(DEFAULTS)), JSON.parse(lsSaved)); hasSavedState = true; }
    } catch(e) {}
  }

  // Store the raw URL params so the "Refresh from CRM" button can re-apply them
  window._crmParams = params;

  // Name and ID always update from URL (display only — not FNA data)
  if (params.get('name')) S.cli.name = decodeURIComponent(params.get('name'));
  if (params.get('id'))   S.cli.id   = params.get('id');

  // If we have a saved state, DON'T overwrite FNA data from URL.
  // The user may have edited income, policies etc — those are preserved.
  // A "Refresh from CRM" button lets them deliberately pull fresh data.
  if (hasSavedState) return;

  // Fresh FNA — seed everything from URL params
  if (params.get('dob')) {
    var rawDob = params.get('dob');
    if (rawDob.indexOf('T') > -1) rawDob = rawDob.split('T')[0];
    var d = rawDob.split('-');
    if (d.length === 3) S.cli.dob = d[2] + '/' + d[1] + '/' + d[0];
    else S.cli.dob = rawDob;
  }
  if (params.get('income')) {
    var incVal = params.get('income');
    if (!S.incRows) S.incRows = [];
    if (S.incRows.length === 0) S.incRows.push({ src: 'Salary / drawings', pm: '' });
    if (!S.incRows[0].pm) S.incRows[0].pm = incVal;
    S.cli.grossPM = incVal;
  }
  if (params.get('gender'))  S.cli.gender    = decodeURIComponent(params.get('gender'));
  if (params.get('smoker')) {
    var sm = decodeURIComponent(params.get('smoker'));
    S.cli.smoker = (sm === 'Yes') ? 'Smoker' : (sm === 'No') ? 'Non-smoker' : sm;
  }
  if (params.get('marital')) S.cli.marital   = decodeURIComponent(params.get('marital'));
  if (params.get('occ'))     S.cli.occ       = decodeURIComponent(params.get('occ'));
  if (params.get('edu'))     S.cli.education = decodeURIComponent(params.get('edu'));
  if (params.get('spouse'))  S.cli.spouseName= decodeURIComponent(params.get('spouse'));
  if (params.get('spousedob')) {
    var rawSpDob = decodeURIComponent(params.get('spousedob'));
    if (rawSpDob.indexOf('T') > -1) rawSpDob = rawSpDob.split('T')[0];
    var sd = rawSpDob.split('-');
    S.cli.spouseDob = (sd.length === 3) ? sd[2] + '/' + sd[1] + '/' + sd[0] : rawSpDob;
  }
  if (params.get('domdate')) {
    var rawDom = decodeURIComponent(params.get('domdate'));
    if (rawDom.indexOf('T') > -1) rawDom = rawDom.split('T')[0];
    S.cli.domDate = rawDom;
  }
  if (params.get('pols')) {
    try {
      var pols = JSON.parse(decodeURIComponent(params.get('pols')));
      applyPolsFromCRM(pols);
    } catch(e) {}
  }
})();

// Applies CRM policy data to state — used on fresh load and on "Refresh from CRM"
function applyPolsFromCRM(pols) {
  S.importedPols = pols;
  if (!S.existingCover) S.existingCover = {death:'',disability:'',dread:'',ipPM:'',totalPrem:''};
  var totDeath=0,totDis=0,totDD=0,totIP=0,totPrem=0;
  pols.forEach(function(p){
    var n=function(v){return parseFloat(String(v||'').replace(/[^0-9.\-]/g,''))||0;};
    if(p.Type!=='Business Assurance'){totDeath+=n(p.BenDeath);totDis+=n(p.BenDisability);totDD+=n(p.BenDreadDisease);}
    try{var ib=p.IncomeBenefits?JSON.parse(p.IncomeBenefits):[];ib.forEach(function(r){totIP+=n(r.amount);});}catch(e){}
    var f=p.Frequency||'Monthly';
    if(f==='Monthly'||f==='') totPrem+=n(p.Premium);
  });
  if(totDeath>0) S.existingCover.death     =String(Math.round(totDeath));
  if(totDis>0)   S.existingCover.disability=String(Math.round(totDis));
  if(totDD>0)    S.existingCover.dread      =String(Math.round(totDD));
  if(totIP>0)    S.existingCover.ipPM       =String(Math.round(totIP));
  if(totPrem>0)  S.existingCover.totalPrem  =String(Math.round(totPrem));
}

    var d2 = rawDob.split('-');
    if (d2.length === 3) S.cli.dob = d2[2] + '/' + d2[1] + '/' + d2[0];
  }
  if (params.get('income')) {
    var incVal2 = params.get('income');
    if (S.incRows && S.incRows.length > 0) S.incRows[0].pm = incVal2;
    S.cli.grossPM = incVal2;
  }
  if (params.get('gender'))  S.cli.gender    = decodeURIComponent(params.get('gender'));
  if (params.get('marital')) S.cli.marital   = decodeURIComponent(params.get('marital'));
  if (params.get('spouse'))  S.cli.spouseName= decodeURIComponent(params.get('spouse'));
  if (params.get('spousedob')) {
    var rawSpDob2 = decodeURIComponent(params.get('spousedob'));
    if (rawSpDob2.indexOf('T') > -1) rawSpDob2 = rawSpDob2.split('T')[0];
    var sd2 = rawSpDob2.split('-');
    if (sd2.length === 3) S.cli.spouseDob = sd2[2] + '/' + sd2[1] + '/' + sd2[0];
  }
  if (params.get('domdate')) {
    var rawDom2 = decodeURIComponent(params.get('domdate'));
    if (rawDom2.indexOf('T') > -1) rawDom2 = rawDom2.split('T')[0];
    S.cli.domDate = rawDom2;
  }
  if (params.get('pols')) {
    try { applyPolsFromCRM(JSON.parse(decodeURIComponent(params.get('pols')))); } catch(e) {}
  }
  // Reset seeded flags so policies re-seed beneficiaries
  if (S.importedPols) S.importedPols.forEach(function(p){ p._bensSeeded = false; });
  // Reset retirement assets so they re-seed from new policies
  S.retAssets = [];
  persist();
  render();
  status('✓ Refreshed from CRM');
}

function deepMerge(base, over) {
  if (typeof over !== 'object' || over === null) return over !== undefined ? over : base;
  var result = JSON.parse(JSON.stringify(base));
  Object.keys(over).forEach(function (k) {
    if (Array.isArray(over[k])) { result[k] = over[k]; }
    else if (typeof over[k] === 'object' && over[k] !== null && typeof base[k] === 'object') {
      result[k] = deepMerge(base[k], over[k]);
    } else { result[k] = over[k]; }
  });
  return result;
}

// ═══════════════════════════════════════════════════════════
// FIELD BUILDER HELPERS (no re-render on input)
// ═══════════════════════════════════════════════════════════
function el(tag, className, textContent) {
  var e = document.createElement(tag);
  if (className) e.className = className;
  if (textContent !== undefined) e.textContent = textContent;
  return e;
}
function div(className) { return el('div', className); }

// Text field: binds to obj[key], no render on input, optional blur callback
function fld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var inp = document.createElement('input');
  inp.type = opts.type || 'text';
  inp.value = obj[key] || '';
  if (opts.placeholder) inp.placeholder = opts.placeholder;
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  wrap.appendChild(inp);
  return wrap;
}

// Rand field
function rfld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var rw = div('rw');
  var rp = el('span', 'rp', 'R');
  var inp = document.createElement('input');
  inp.type = 'text'; inp.inputMode = 'numeric';
  inp.value = obj[key] || '';
  inp.placeholder = '0';
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  rw.appendChild(rp); rw.appendChild(inp);
  wrap.appendChild(rw);
  return wrap;
}

// Percent field
function pfld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var pw = div('pw');
  var pp = el('span', 'pp', '%');
  var inp = document.createElement('input');
  inp.type = 'text'; inp.inputMode = 'numeric';
  inp.value = obj[key] || '';
  inp.placeholder = '0';
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  pw.appendChild(inp); pw.appendChild(pp);
  wrap.appendChild(pw);
  return wrap;
}

// Select field
function sfld(labelTxt, obj, key, options) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var sel = document.createElement('select');
  options.forEach(function (o) {
    var opt = document.createElement('option');
    var v = typeof o === 'object' ? o.v : o;
    var l = typeof o === 'object' ? o.l : o;
    opt.value = v; opt.textContent = l;
    if (String(obj[key]) === String(v)) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function (e) { obj[key] = e.target.value; render(); });
  wrap.appendChild(sel);
  return wrap;
}

// Textarea
function txfld(labelTxt, obj, key) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var ta = document.createElement('textarea');
  ta.value = obj[key] || ''; ta.placeholder = 'Notes...';
  ta.addEventListener('input', function (e) { obj[key] = e.target.value; });
  wrap.appendChild(ta);
  return wrap;
}

// Radio group
function radioGrp(labelTxt, obj, key, options) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var rg = div('rg');
  var gname = key + '_' + Math.random().toString(36).slice(2);
  options.forEach(function (o) {
    var v = typeof o === 'object' ? o.v : o;
    var l = typeof o === 'object' ? o.l : o;
    var lbl = document.createElement('label');
    var inp = document.createElement('input'); inp.type = 'radio'; inp.name = gname; inp.value = v;
    if (String(obj[key]) === String(v)) inp.checked = true;
    inp.addEventListener('change', function (e) { obj[key] = e.target.value; });
    lbl.appendChild(inp); lbl.appendChild(document.createTextNode(l));
    rg.appendChild(lbl);
  });
  wrap.appendChild(rg);
  return wrap;
}

// ═══════════════════════════════════════════════════════════
// TAB 2 — INCOME
// ═══════════════════════════════════════════════════════════
function buildIncome() {
  var s = div();

  // Auto-sync rental income rows from Properties tab
  // Rows with src starting with "Rental:" are managed automatically
  var rentalSrcs = S.props.filter(function(p){ return N(p.rental) > 0; })
                           .map(function(p){ return 'Rental: ' + (p.desc||'Property'); });
  // Remove stale auto rental rows (property deleted or rental cleared)
  S.incRows = S.incRows.filter(function(r){
    if (r._auto) return rentalSrcs.indexOf(r.src) > -1;
    return true;
  });
  // Add missing rental rows
  rentalSrcs.forEach(function(src) {
    var exists = S.incRows.filter(function(r){ return r.src === src; })[0];
    if (!exists) {
      var prop = S.props.filter(function(p){ return 'Rental: '+(p.desc||'Property') === src; })[0];
      S.incRows.push({ src: src, pm: prop ? String(Math.round(N(prop.rental))) : '', _auto: true, _taxable: true });
    } else {
      var prop2 = S.props.filter(function(p){ return 'Rental: '+(p.desc||'Property') === src; })[0];
      if (prop2) exists.pm = String(Math.round(N(prop2.rental)));
      exists._taxable = true; // mark as taxable
    }
  });

  s.appendChild(stitle('Income Sources'));
  var incInf = div('info');
  incInf.innerHTML = 'The <strong>first row (Salary / drawings)</strong> drives the PAYE calculation. ' +
    'Rental income rows (from the Assets tab) are automatically included in taxable income — ' +
    'this affects your marginal rate and RA deduction benefit. ' +
    'Add other income below; tick the <strong>Taxable</strong> box if it\'s subject to income tax.';
  s.appendChild(incInf);

  var itbl = document.createElement('table');
  itbl.innerHTML = '<thead><tr><th>Source</th><th>Gross R/pm</th><th>Taxable</th><th></th></tr></thead>';
  var ib = document.createElement('tbody');
  S.incRows.forEach(function(r, i) {
    var tr = document.createElement('tr');

    // Source description (read-only for auto rental rows)
    var t1 = document.createElement('td');
    if (r._auto) {
      var autoLbl = document.createElement('span');
      autoLbl.textContent = r.src;
      autoLbl.style.cssText = 'font-size:12px;color:var(--sub);font-style:italic';
      t1.appendChild(autoLbl);
    } else {
      var si = document.createElement('input'); si.type = 'text'; si.value = r.src || '';
      si.placeholder = i === 0 ? 'Salary / drawings' : 'e.g. Investment income, spouse salary';
      si.addEventListener('input', function(e) { S.incRows[i].src = e.target.value; });
      t1.appendChild(si);
    }
    tr.appendChild(t1);

    // Amount
    var t2 = document.createElement('td');
    var rw = div('td-r'); rw.appendChild(el('span', 'rp', 'R'));
    var vi = document.createElement('input'); vi.type = 'text'; vi.inputMode = 'numeric';
    vi.value = r.pm || ''; vi.placeholder = '0';
    vi.readOnly = !!r._auto; // auto rows are read-only (driven by Assets tab)
    if (r._auto) vi.style.color = 'var(--sub)';
    vi.addEventListener('input', function(e) { if (!S.incRows[i]._auto) S.incRows[i].pm = e.target.value; });
    vi.addEventListener('blur', function(e) {
      if (!S.incRows[i]._auto) S.incRows[i].pm = e.target.value;
      render();
    });
    rw.appendChild(vi); t2.appendChild(rw); tr.appendChild(t2);

    // Taxable checkbox (row 0 always taxable; auto rental always taxable — both locked)
    var t3 = document.createElement('td'); t3.style.textAlign = 'center';
    var tcb = document.createElement('input'); tcb.type = 'checkbox';
    var isTaxable = (i === 0) || !!r._taxable;
    tcb.checked = isTaxable;
    tcb.disabled = (i === 0 || !!r._auto); // can't untick salary or auto rental
    tcb.addEventListener('change', function(e) { S.incRows[i]._taxable = e.target.checked; render(); });
    t3.appendChild(tcb); tr.appendChild(t3);

    // Delete
    var t4 = document.createElement('td');
    if (i > 0 && !r._auto) t4.appendChild(delBtn(function() { S.incRows.splice(i, 1); render(); }));
    tr.appendChild(t4);

    ib.appendChild(tr);
  });
  itbl.appendChild(ib);
  var itw = div('twrap'); itw.appendChild(itbl); s.appendChild(itw);
  s.appendChild(addBtn('+ Add Income Source', function() {
    S.incRows.push({ src: '', pm: '', _taxable: false }); render();
  }));

  // ── Tax calculation: salary + all taxable other income together
  var salaryGross    = N(S.incRows[0] && S.incRows[0].pm);
  var otherTaxable   = S.incRows.slice(1).reduce(function(sum, r) {
    return sum + (r._taxable ? N(r.pm) : 0);
  }, 0);
  var nonTaxable     = S.incRows.slice(1).reduce(function(sum, r) {
    return sum + (!r._taxable ? N(r.pm) : 0);
  }, 0);

  if (salaryGross > 0 || otherTaxable > 0) {
    var t = taxBreakdownFull(salaryGross, otherTaxable);
    if (t) {
      S.cli.grossPM = String(salaryGross);
      S.cli.nettPM  = String(t.nettPM);
      var tb = div('taxbox');
      tb.style.marginTop = '12px';
      tb.innerHTML =
        '<div class="tr"><span>Gross salary / drawings</span><span>' + Rfmt(t.salaryGrossPM) + '</span></div>' +
        (t.otherTaxablePM > 0 ?
          '<div class="tr"><span>Other taxable income (rental etc)</span><span>+ ' + Rfmt(t.otherTaxablePM) + '</span></div>' +
          '<div class="tr"><span>Total taxable income p/m</span><span>' + Rfmt(t.totalGrossPM) + '</span></div>'
          : '') +
        '<div class="tr"><span>PAYE (income tax)</span><span>− ' + Rfmt(t.taxPM) + '</span></div>' +
        '<div class="tr"><span>UIF (on salary only)</span><span>− ' + Rfmt(t.uifPM) + '</span></div>' +
        '<div class="tr tot"><span>Estimated nett income p/m</span><span>' + Rfmt(t.nettPM) + '</span></div>' +
        (t.otherTaxablePM > 0 ?
          '<div class="tr" style="font-size:11px;color:#aab;margin-top:4px"><span>Marginal rate (combined income)</span><span>' +
          Math.round(t.marginalRate * 100) + '%</span></div>'
          : '');
      s.appendChild(tb);

      if (t.otherTaxablePM > 0) {
        var raNote = div('info');
        raNote.style.cssText = 'font-size:11px;background:#eff6ff;border-color:#bfdbfe;color:#1e40af;margin-top:6px';
        raNote.innerHTML = '💡 <strong>RA tax benefit:</strong> At a marginal rate of ' + Math.round(t.marginalRate * 100) +
          '%, an RA contribution of R10 000/pm saves approximately <strong>' +
          Rfmt(Math.round(10000 * t.marginalRate)) + ' in tax per month</strong>. ' +
          'Rental income pushes the marginal rate up — contributing to an RA is more tax-efficient.';
        s.appendChild(raNote);
      }
    }
  }

  // Retirement age
  var retRow = g2(); retRow.style.marginTop = '14px';
  retRow.appendChild(sfld('Retirement Age', S.cli, 'retAge', ['55','60','63','65','67','70']));
  s.appendChild(retRow);

  // Total income summary
  var nettIncome = N(S.cli.nettPM);
  var totInc     = nettIncome + nonTaxable; // nett already includes rental nett via taxBreakdownFull

  if (totInc > 0) {
    var ti = div('info'); ti.style.marginTop = '4px';
    ti.innerHTML = 'Total nett income: <strong>' + Rfmt(nettIncome) + '</strong>' +
      (nonTaxable > 0 ? ' + Non-taxable: <strong>' + Rfmt(nonTaxable) + '</strong>' : '') +
      ' = <strong>' + Rfmt(totInc) + ' /pm</strong>';
    s.appendChild(ti);
  }

  s.appendChild(stitle('Monthly Expenses'));
  var eg = g2();
  eg.appendChild(rfld('Total monthly expenses', S, 'expenses'));
  var surplus = totInc - N(S.expenses);
  var sf = div('f');
  sf.appendChild(el('label', '', 'Monthly surplus / shortfall'));
  var si2 = document.createElement('input'); si2.type = 'text'; si2.readOnly = true;
  si2.value = totInc > 0 && N(S.expenses) > 0 ? (surplus >= 0 ? '+ ' : '') + Rfmt(surplus) : '';
  si2.style.fontWeight = '700';
  si2.style.color = surplus >= 0 ? 'var(--green)' : 'var(--red)';
  sf.appendChild(si2);
  eg.appendChild(sf);
  s.appendChild(eg);

  s.appendChild(txfld('Income notes', S, 'incNotes'));
  return s;
}

// TAB 3 — ASSETS & LIABILITIES
// ═══════════════════════════════════════════════════════════

    ['Estate','Spouse','Third Party'].forEach(function(o){
      var opt=document.createElement('option'); opt.value=o; opt.textContent=o;
      if((p.deathBenType||'Estate')===o) opt.selected=true;
      dbtSel.appendChild(opt);
    });
    dbtSel.addEventListener('change',function(e){ S.props[i].deathBenType=e.target.value; render(); });
    dbtFld.appendChild(dbtSel); r3.appendChild(dbtFld);
    if (N(p.rental) > 0) {
      var renEscWrap = div(); renEscWrap.style.cssText='display:flex;align-items:center;gap:6px';

      var renInp = document.createElement('input'); renInp.type='text'; renInp.inputMode='numeric';
      renInp.value = p.rentalEsc||'6'; renInp.style.cssText='width:52px;padding:4px 6px;border:1.5px solid var(--mist);border-radius:5px;font-size:12px';
      renInp.addEventListener('input',function(e){S.props[i].rentalEsc=e.target.value;});
      renEscWrap.appendChild(renLb); renEscWrap.appendChild(renInp);
      renEscWrap.appendChild(el('label','','% p.a.')).style='font-size:11px;color:var(--sub)';
      r3.appendChild(renEscWrap);
    }
    card.appendChild(r3);
    s.appendChild(card);
  });
  s.appendChild(addBtn('+ Add Property', function(){S.props.push({desc:'',val:'',bond:'',bondPM:'',rental:'',rentalEsc:'6',baseCost:'',soldAtDeath:false,soldAtRetirement:false});render();}));

  // ── Vehicles
  s.appendChild(stitle('Vehicles'));
  S.vehicles.forEach(function(v,i){
    var card=div(); card.style.cssText='background:#fff;border:var(--border);border-radius:8px;padding:12px;margin-bottom:8px';
    var row=div(); row.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr 36px;gap:12px;align-items:end';
    var df=div('f'); df.appendChild(el('label','','Description'));

    row.appendChild(rfld('Finance Outstanding',v,'finance'));
    var dd=div(); dd.appendChild(delBtn(function(){S.vehicles.splice(i,1);render();})); row.appendChild(dd);
    card.appendChild(row);
    var vr2=div(); vr2.style.cssText='display:flex;gap:16px;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--mist)';

    var vlb=el('label','','Sold / realised at death'); vlb.style.cssText='font-size:12px;cursor:pointer;color:var(--navy)';
    vr2.appendChild(vcb); vr2.appendChild(vlb);

    var vdbtFld=div('f'); vdbtFld.style.cssText='display:flex;flex-direction:column;gap:4px;min-width:160px;margin-left:16px';
    vdbtFld.appendChild(el('label','','On death, falls to'));
    var vdbtSel=document.createElement('select');
    vdbtSel.style.cssText='border:1.5px solid var(--mist);border-radius:6px;padding:6px 8px;font-size:12px;font-family:inherit';
    ['Estate','Spouse','Third Party'].forEach(function(o){
      var opt=document.createElement('option'); opt.value=o; opt.textContent=o;
      if((v.deathBenType||'Estate')===o) opt.selected=true;
      vdbtSel.appendChild(opt);

  s.appendChild(stitle('Other Assets'));
  S.otherAssets.forEach(function(a,i){
    var card=div(); card.style.cssText='background:#fff;border:var(--border);border-radius:8px;padding:12px;margin-bottom:8px';
    var row=div(); row.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr 36px;gap:12px;align-items:end';
    var df=div('f'); df.appendChild(el('label','','Description'));
    var di=document.createElement('input'); di.type='text'; di.value=a.desc||''; di.placeholder='e.g. Listed shares, farm, business';
    di.addEventListener('input',function(e){S.otherAssets[i].desc=e.target.value;}); df.appendChild(di); row.appendChild(df);
    row.appendChild(rfld('Current Value', a, 'val'));
    row.appendChild(sfld('Type', a, 'type', ['Investment','Business Interest','Farm / Agricultural','Inheritance','Personal','Other']));
    var dd=div(); dd.appendChild(delBtn(function(){S.otherAssets.splice(i,1);render();})); row.appendChild(dd);
    card.appendChild(row);

    // Row 2: retirement role + dependent fields + death flag
    var ar2=div(); ar2.style.cssText='display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;margin-top:10px;padding-top:10px;border-top:1px solid var(--mist)';

    ['Not included','Sold at retirement — proceeds to retirement','Generates income (farm/business)'].forEach(function(opt){
      var o = document.createElement('option'); o.value = opt; o.textContent = opt;
      if ((a.retirementRole||'Not included') === opt) o.selected = true;
      roleSel.appendChild(o);
    });
    roleSel.addEventListener('change',function(e){S.otherAssets[i].retirementRole=e.target.value;render();});
    roleFld.appendChild(roleSel); ar2.appendChild(roleFld);

    var role = a.retirementRole||'Not included';

    // SOLD — show expected sale proceeds
    if(role === 'Sold at retirement — proceeds to retirement'){
      var spFld=div('f'); spFld.style.minWidth='160px';
      spFld.appendChild(el('label','','Expected sale proceeds'));
      var spRw=div('rw'); spRw.appendChild(el('span','rp','R'));

        var spInfo=div('info'); spInfo.style.cssText='font-size:11px;padding:5px 9px;margin-top:0;align-self:flex-end';
        spInfo.textContent='Projected at retirement (@ '+gr+'% growth): '+Rfmt(projProceeds);
        ar2.appendChild(spInfo);

      incInp.style.cssText='border:1.5px solid var(--mist);border-radius:7px;padding:7px 10px 7px 22px;font-size:13px;font-family:inherit;width:100%';
      incInp.addEventListener('input',function(e){S.otherAssets[i].retirementIncomePM=e.target.value;});

      var escToFld=div('f'); escToFld.style.minWidth='130px';

      var escToPw=div('pw'); escToPw.appendChild(el('span','pp','%'));

      escToPw.insertBefore(escToInp,escToPw.firstChild); escToFld.appendChild(escToPw); ar2.appendChild(escToFld);

      var escInFld=div('f'); escInFld.style.minWidth='130px';

      var escInPw=div('pw'); escInPw.appendChild(el('span','pp','%'));

      escInInp.value=a.retirementInRetEsc||''; escInInp.placeholder=S.assump.cpi||'6';
      escInInp.style.cssText='border:1.5px solid var(--mist);border-radius:7px;padding:7px 24px 7px 10px;font-size:13px;font-family:inherit;width:100%';
      escInInp.addEventListener('input',function(e){S.otherAssets[i].retirementInRetEsc=e.target.value;});
      escInPw.insertBefore(escInInp,escInPw.firstChild); escInFld.appendChild(escInPw); ar2.appendChild(escInFld);

      // Show inflated income at retirement
      if(yrsToRet && N(a.retirementIncomePM)>0){
        var escTo=N(a.retirementIncEsc)>0?N(a.retirementIncEsc):N(S.assump.cpi)||6;
        var incAtRet=Math.round(N(a.retirementIncomePM)*Math.pow(1+escTo/100,yrsToRet));
        var incInfo=div('info'); incInfo.style.cssText='font-size:11px;padding:5px 9px;margin-top:0;align-self:flex-end';
        incInfo.textContent='At retirement: '+Rfmt(incAtRet)+'/pm (@ '+escTo+'% p.a.)';
        ar2.appendChild(incInfo);
      }
    }

    // Growth rate (always shown — used for projection / sold proceeds)
    var grFld = div('f'); grFld.style.minWidth='130px';
    grFld.appendChild(el('label','','Growth rate % p.a.'));

// ── Income Need helpers — global, used by buildNeeds, buildSummary, printFNA
function calcIncomeNeed(r) {
  var gross = N(r.grossPM) || grossFromNett(r.nettPM);
  if (!gross) return 0;
  var escRate = N(r.esc) > 0 ? r.esc : S.assump.cpi;
  var dr = N(r.drawdown) > 0 ? r.drawdown : S.assump.drawdown;
  return capitalise(gross, r.years, escRate, dr);
}

    di.addEventListener('input',function(e){S.retAssets[i].desc=e.target.value;}); df.appendChild(di); ch.appendChild(df);
    ch.appendChild(delBtn(function(){S.retAssets.splice(i,1);render();})); card.appendChild(ch);
    var rg=g4();
    rg.appendChild(rfld('Current fund value',r,'currentVal',{onblur:function(){render();}}));
    rg.appendChild(rfld('Monthly contribution',r,'monthlyContrib',{onblur:function(){render();}}));
    rg.appendChild(pfld('Growth rate %',r,'growthRate',{onblur:function(){render();}}));
    rg.appendChild(pfld('Contrib esc %',r,'contribEsc',{onblur:function(){render();}}));
    card.appendChild(rg);
    // Show projected value
    if(yrsToRet&&(N(r.currentVal)||N(r.monthlyContrib))){
      var gr=N(r.growthRate)>0?N(r.growthRate):N(S.assump.growth)||9;
      var esc2=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
      var proj=projectFund(r.currentVal,r.monthlyContrib,esc2,gr,yrsToRet);
      var cr=div('calc-result');
      cr.innerHTML='<div class="cr-row"><span>Projected at age '+retAge+'</span><span class="gold">'+Rfmt(proj)+'</span></div>';
      card.appendChild(cr);
    }
    s.appendChild(card);
  });
  s.appendChild(addBtn('+ Add fund / RA',function(){S.retAssets.push({desc:'',currentVal:'',monthlyContrib:'',growthRate:'',contribEsc:''});render();}));

  // ── Other capital at retirement
  s.appendChild(stitle('Other Capital / Income at Retirement'));
  var og=g3();
  og.appendChild(rfld('Property / asset sale proceeds', S, 'retOtherCapital', {onblur:function(){render();}}));
  og.appendChild(rfld('Rental income today (R/pm)', S, 'retRentalPM', {onblur:function(){render();}}));
  og.appendChild(div());
  s.appendChild(og);

  // ── Calculator
  if(yrsToRet && yrsToRet > 0){
    var totalMonthlyNeed = (S.retNeeds||[]).reduce(function(a,r){return a+N(r.amtToday);},0);
    var rentalAtRet = N(S.retRentalPM)>0?Math.round(N(S.retRentalPM)*Math.pow(1+N(S.assump.cpi)/100,yrsToRet)):0;

    // Income-generating assets — inflate using per-asset escalation to retirement
    var otherIncAtRet = 0;
    (S.otherAssets||[]).forEach(function(a){
      if((a.retirementRole||'')!=='Generates income (farm/business)') return;
      if(!N(a.retirementIncomePM)) return;
      var escTo = N(a.retirementIncEsc)>0 ? N(a.retirementIncEsc) : N(S.assump.cpi)||6;
      otherIncAtRet += Math.round(N(a.retirementIncomePM)*Math.pow(1+escTo/100,yrsToRet));
    });

    var monthlyAtRet = totalMonthlyNeed>0?Math.round(totalMonthlyNeed*Math.pow(1+N(S.assump.cpi)/100,yrsToRet)):0;
    var netMonthlyGap = Math.max(0, monthlyAtRet - rentalAtRet - otherIncAtRet);
    var netToday = netMonthlyGap>0?netMonthlyGap/Math.pow(1+N(S.assump.cpi)/100,yrsToRet):0;
    var capNeed = netToday>0?retirementCapitalNeeded(netToday,yrsToRet,yrsInRet,S.assump.cpi,S.assump.retReturn):0;
    var lumpNeed = (S.retLumps||[]).reduce(function(a,r){return a+N(r.amt);},0);
    var totalCapNeed = capNeed + lumpNeed;

    // Project existing RA/fund assets
    var totalProj = S.retAssets.reduce(function(a,r){
      if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
      var gr=N(r.growthRate)>0?N(r.growthRate):N(S.assump.growth)||9;
      var esc3=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
      return a+projectFund(r.currentVal,r.monthlyContrib,esc3,gr,yrsToRet);
    },0)+N(S.retOtherCapital);

    // Add sold-asset projected proceeds
    var soldProceedsAtRet = 0;
    (S.otherAssets||[]).forEach(function(a){
      if((a.retirementRole||'')!=='Sold at retirement — proceeds to retirement') return;
      if(!N(a.retirementSaleProceeds)) return;
      var gr=N(a.growthRate)>0?N(a.growthRate):N(S.assump.growth)||9;
      soldProceedsAtRet+=Math.round(N(a.retirementSaleProceeds)*Math.pow(1+gr/100,yrsToRet));
    });
    totalProj += soldProceedsAtRet;

    var retGap = totalProj - totalCapNeed;

    s.appendChild(stitle('Retirement Capital Summary'));
    var calcBox=div(); calcBox.style.cssText='background:#1a2a4a;border-radius:8px;padding:14px 16px;margin-bottom:14px';
    function rRow(lbl,val,sub,bold){
      var r2=div(); r2.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
      var l2=el('span','',lbl); l2.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
      var v2=el('span','',val); v2.style.cssText='font-size:'+(sub?'11':'12')+'px;color:#c8a84b'+(bold?';font-weight:700':'');
      r2.appendChild(l2); r2.appendChild(v2); calcBox.appendChild(r2);
    }
    rRow('Monthly need today', Rfmt(totalMonthlyNeed)+' /pm');
    rRow('Monthly need at retirement (age '+retAge+')', Rfmt(monthlyAtRet)+' /pm');
    if(rentalAtRet>0) rRow('Less: rental at retirement', '('+Rfmt(rentalAtRet)+'/pm)', true);
    if(otherIncAtRet>0) rRow('Less: farm/business income at retirement', '('+Rfmt(otherIncAtRet)+'/pm)', true);
    rRow('Net monthly gap at retirement', Rfmt(netMonthlyGap)+' /pm', false, true);
    rRow('Capital needed to fund income', '('+Rfmt(capNeed)+')', false, true);
    if(lumpNeed>0) rRow('Lump sum needs', '('+Rfmt(lumpNeed)+')', true);
    rRow('Total capital required', '('+Rfmt(totalCapNeed)+')', false, true);
    rRow('Projected capital at retirement', Rfmt(totalProj), false, true);
    if(soldProceedsAtRet>0) rRow('Incl. asset sale proceeds (projected)', Rfmt(soldProceedsAtRet), true);
    var gapRow=div(); gapRow.style.cssText='display:flex;justify-content:space-between;padding:8px 0;margin-top:8px;border-top:2px solid #445;font-size:14px;font-weight:700';
    var gl2=el('span','',retGap>=0?'Surplus':'Shortfall'); gl2.style.color='#ccd6f6';
    var gv2=el('span','',Rfmt(Math.abs(retGap))); gv2.style.color=retGap>=0?'#86efac':'#f87171';
    gapRow.appendChild(gl2); gapRow.appendChild(gv2); calcBox.appendChild(gapRow);

    // PMT: additional monthly contribution needed to close the shortfall
    if (retGap < 0 && yrsToRet > 0) {
      var shortfall = Math.abs(retGap);
      var monthlyRate = N(S.assump.growth) / 100 / 12;
      var nMonths = yrsToRet * 12;
      var pmtNeeded = 0;
      if (monthlyRate > 0) {
        // PMT to accumulate shortfall: PMT = FV * r / ((1+r)^n - 1)
        pmtNeeded = Math.round(shortfall * monthlyRate / (Math.pow(1 + monthlyRate, nMonths) - 1));
      } else {
        pmtNeeded = Math.round(shortfall / nMonths);
      }
      var pmtRow = div();
      pmtRow.style.cssText = 'display:flex;justify-content:space-between;padding:6px 0;margin-top:4px;font-size:12px';
      var pmtL = el('span','','To close this gap, save an additional'); pmtL.style.color='#8899bb';
      var pmtV = el('span','',Rfmt(pmtNeeded)+' /pm'); pmtV.style.cssText='font-weight:700;color:#fbbf24';
      pmtRow.appendChild(pmtL); pmtRow.appendChild(pmtV);
      calcBox.appendChild(pmtRow);
      var pmtNote = div();
      pmtNote.style.cssText = 'font-size:10px;color:#667;padding-bottom:4px';
      pmtNote.textContent = 'Assumes '+S.assump.growth+'% p.a. growth, no escalation on new contribution, over '+yrsToRet+' years.';
      calcBox.appendChild(pmtNote);
    }

    s.appendChild(calcBox);

    // ── What-if Scenario Calculator (client discussion tool)
    s.appendChild(stitle('Scenario Calculator — Client Discussion'));
    var scInf=div('info');
    scInf.innerHTML='The <strong>capital target</strong> is fixed — it comes from the income needs above. '
      +'Adjust growth rate, annual increase on the new premium and monthly saving amount, then press <strong>Calculate</strong> to see the required monthly saving.';
    s.appendChild(scInf);

    if(!window._sc){
      window._sc={
        retAge:    String(retAge),
        growth:    String(S.assump.growth||9),
        contribEsc:String(S.assump.incEsc||6),
        extraPM:   ''
      };
    }
    var sc=window._sc;
    sc.retAge = sc.retAge || String(retAge);

    // ── Target box — always visible, shows what we are saving towards
    var scTargetBox=div();
    scTargetBox.style.cssText='background:#1a2a4a;border-radius:9px;padding:14px 18px;margin-bottom:14px';

    // Pre-calculate target using saved assumptions so it shows immediately
    (function(){
      var _yrsToR = cliAge ? Math.max(0, retAge - cliAge) : 0;
      var _yrsInR = Math.max(1, 85 - retAge);
      var _mNeed  = (S.retNeeds||[]).reduce(function(a,r){return a+N(r.amtToday);},0);
      var _rental = N(S.retRentalPM)>0?Math.round(N(S.retRentalPM)*Math.pow(1+N(S.assump.cpi)/100,_yrsToR)):0;
      var _mAtRet = _mNeed>0?Math.round(_mNeed*Math.pow(1+N(S.assump.cpi)/100,_yrsToR)):0;
      var _netToday=Math.max(0,_mAtRet-_rental)>0?Math.max(0,_mAtRet-_rental)/Math.pow(1+N(S.assump.cpi)/100,_yrsToR):0;
      var _capNeed=_netToday>0?retirementCapitalNeeded(_netToday,_yrsToR,_yrsInR,S.assump.cpi,S.assump.retReturn):0;
      var _lumps=(S.retLumps||[]).reduce(function(a,r){return a+N(r.amt);},0);
      var _target=_capNeed+_lumps;
      var _proj=S.retAssets.reduce(function(a,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
        var gr=N(r.growthRate)>0?N(r.growthRate):N(S.assump.growth)||9;
        var esc=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
        return a+projectFund(r.currentVal,r.monthlyContrib,esc,gr,_yrsToR);
      },0)+N(S.retOtherCapital);
      var _shortfall=Math.max(0,_target-_proj);

      function tRow(lbl,val,big,col){
        var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(big?'6':'3')+'px 0';
        var l=el('span','',lbl); l.style.cssText='color:#8899bb;font-size:'+(big?'13':'11')+'px';
        var v=el('span','',val); v.style.cssText='font-weight:'+(big?'700':'400')+';font-size:'+(big?'15':'11')+'px;color:'+(col||'#c8a84b');
        r.appendChild(l); r.appendChild(v); scTargetBox.appendChild(r);
      }
      var hdr=div(); hdr.style.cssText='font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gold);margin-bottom:8px';
      hdr.textContent='Retirement Capital Target'; scTargetBox.appendChild(hdr);
      tRow('Capital needed at retirement',Rfmt(_target),true);
      tRow('Projected from existing funds',Rfmt(_proj),false);
      tRow('Shortfall to close',Rfmt(_shortfall),true,_shortfall>0?'#f87171':'#86efac');
      if(_mNeed>0) tRow('Based on monthly need of '+Rfmt(_mNeed)+'/pm today, inflated '+_yrsToR+' yrs at '+S.assump.cpi+'% CPI','',false,'#667');
    })();
    s.appendChild(scTargetBox);

    // ── Input card
    var scCard=div();
    scCard.style.cssText='background:#fff;border:1.5px solid var(--gold);border-radius:9px;padding:16px;margin-bottom:14px';

    var hdr2=div(); hdr2.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:12px';
    hdr2.textContent='Adjust Assumptions'; scCard.appendChild(hdr2);

    var scG=div(); scG.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px';

    function scFld(lbl,key,suffix,hint){
      var w=div('f');
      var lb=el('label','',lbl); w.appendChild(lb);
      if(hint){ var hn=el('div','',hint); hn.style.cssText='font-size:9px;color:var(--sub);margin-bottom:2px'; w.appendChild(hn); }
      var wrap=div(); wrap.style.cssText='position:relative';
      var inp=document.createElement('input');
      inp.type='text'; inp.inputMode='numeric'; inp.value=sc[key]||'';
      inp.style.cssText='width:100%;box-sizing:border-box;border:1.5px solid var(--mist);border-radius:6px;font-size:13px;font-family:inherit;padding:7px 26px 7px 10px';
      var suf=el('span','',suffix);
      suf.style.cssText='position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:11px;color:var(--sub);pointer-events:none';
      wrap.appendChild(inp); wrap.appendChild(suf); w.appendChild(wrap);
      inp.addEventListener('input',function(e){ sc[key]=e.target.value; });
      return w;
    }

    scG.appendChild(scFld('Retirement Age','retAge','yrs',''));
    scG.appendChild(scFld('Fund Growth Rate','growth','%','% p.a. on all funds'));
    scG.appendChild(scFld('Annual Premium Inc.','contribEsc','%','% increase on new saving'));
    scG.appendChild(scFld('Starting Monthly Saving','extraPM','R/pm','what they can afford today'));
    scCard.appendChild(scG);

    // Calculate button
    var scBtn=document.createElement('button');
    scBtn.className='btn btn-gold';
    scBtn.style.cssText='width:100%;padding:11px;font-size:14px;font-weight:700;letter-spacing:.5px';
    scBtn.textContent='Calculate';
    scCard.appendChild(scBtn);
    s.appendChild(scCard);

    // Result box
    var scResult=div();
    scResult.style.cssText='background:#1a2a4a;border-radius:9px;padding:16px 18px;margin-bottom:14px;display:none';
    s.appendChild(scResult);

    function scRow(lbl,val,bold,colour){
      var r=div();
      r.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:'+(bold?'8':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:6px':'');
      var l=el('span','',lbl); l.style.cssText='color:#ccd6f6;font-size:'+(bold?'13':'12')+'px';
      var v=el('span','',val); v.style.cssText='font-size:'+(bold?'15':'12')+'px;font-weight:'+(bold?'700':'400')+';color:'+(colour||'#c8a84b');
      r.appendChild(l); r.appendChild(v); scResult.appendChild(r);
    }

    scBtn.addEventListener('click', function(){
      scResult.innerHTML='';
      scResult.style.display='block';

      var scRetAge  = N(sc.retAge)||65;
      var scGrowth  = N(sc.growth)||9;
      var scEsc     = N(sc.contribEsc)||0;
      var scExtra   = N(sc.extraPM)||0;
      var scYrsToR  = cliAge ? Math.max(0, scRetAge - cliAge) : 0;
      var scYrsInR  = Math.max(1, 85 - scRetAge);

      if(!cliAge){
        scRow('Enter client date of birth on the Client tab first','',false,'#f87171');
        return;
      }
      if(scYrsToR<=0){
        scRow('Client has already reached retirement age '+scRetAge,'',false,'#86efac');
        return;
      }

      // Capital target
      var scMNeed = (S.retNeeds||[]).reduce(function(a,r){return a+N(r.amtToday);},0);
      var scRental= N(S.retRentalPM)>0?Math.round(N(S.retRentalPM)*Math.pow(1+N(S.assump.cpi)/100,scYrsToR)):0;
      var scMAtRet= scMNeed>0?Math.round(scMNeed*Math.pow(1+N(S.assump.cpi)/100,scYrsToR)):0;
      var scNetToday=Math.max(0,scMAtRet-scRental)>0?Math.max(0,scMAtRet-scRental)/Math.pow(1+N(S.assump.cpi)/100,scYrsToR):0;
      var scCapNeed=scNetToday>0?retirementCapitalNeeded(scNetToday,scYrsToR,scYrsInR,S.assump.cpi,S.assump.retReturn):0;
      var scLumps=(S.retLumps||[]).reduce(function(a,r){return a+N(r.amt);},0);
      var scTarget=scCapNeed+scLumps;

      // Projected capital from existing funds at scenario growth rate
      var scProj=S.retAssets.reduce(function(a,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
        var gr=N(r.growthRate)>0?N(r.growthRate):scGrowth;
        var esc=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
        return a+projectFund(r.currentVal,r.monthlyContrib,esc,gr,scYrsToR);
      },0)+N(S.retOtherCapital);

      // Shortfall = FV we need the new saving to accumulate
      var scShortfall=Math.max(0,scTarget-scProj);

      // FV of extra saving if entered
      var scExtraFV=scExtra>0?projectFund(0,scExtra,scEsc,scGrowth,scYrsToR):0;
      var scRemaining=Math.max(0,scShortfall-scExtraFV);

      // PMT to close remaining shortfall — FV target = scRemaining
      // Use projectFund(0, 1, scEsc, scGrowth, scYrsToR) to find the FV of R1/pm
      // with the given escalation and growth. Divide shortfall by that unit FV.
      // This is consistent with how projectFund works everywhere else.
      var scPMT=0;
      if(scRemaining>0&&scYrsToR>0){
        var unitFV=projectFund(0,1,scEsc,scGrowth,scYrsToR);
        scPMT=unitFV>0?Math.round(scRemaining/unitFV):0;
      }

      // Show results
      scRow('Capital target (FV to achieve)',Rfmt(scTarget),true);
      scRow('Existing funds projected @ '+scGrowth+'% growth',Rfmt(scProj));
      scRow('Shortfall — FV new saving must accumulate',Rfmt(scShortfall),true,scShortfall>0?'#f87171':'#86efac');

      if(scExtra>0){
        scRow('Starting saving of '+Rfmt(scExtra)+'/pm @ '+scEsc+'% p.a. increase grows to',Rfmt(scExtraFV));
        scRow('Remaining shortfall',Rfmt(scRemaining),false,scRemaining>0?'#f87171':'#86efac');
      }

      if(scRemaining>0){
        scRow(
          'Monthly saving needed'+(scEsc>0?' (starting amount, escalates '+scEsc+'% p.a.)':' (flat)'),
          Rfmt(scPMT)+' /pm',
          true,
          '#fbbf24'
        );
        scRow(scYrsToR+' years to retirement · Growth '+scGrowth+'% · FV = '+Rfmt(scRemaining),'',false,'#556');
      } else {
        scRow('✓ Shortfall fully covered'+(scExtra>0?' — saving of '+Rfmt(scExtra)+'/pm is sufficient':''),'',true,'#86efac');
      }
    });
  }

  return s;
}

function buildPolicies() {
  var s = div();

  if (!S.importedPols) S.importedPols = [];
  var pols = S.importedPols;

  var inf = div('info');
  inf.innerHTML = 'All fields are editable here for scenario planning. ' +
    'Changes are <strong>FNA only</strong> — the CRM is not affected. ' +
    (pols.length ? '<strong>' + pols.length + ' polic' + (pols.length === 1 ? 'y' : 'ies') + '</strong> loaded from CRM.' :
      'No policies loaded. Add below or open from a CRM client profile.');
  s.appendChild(inf);

  // ── Render each policy as an editable card
  pols.forEach(function(p, i) {
    s.appendChild(buildPolCard(p, i));
  });

  // ── Add policy button
  s.appendChild(addBtn('+ Add Policy / What-if Scenario', function() {
    S.importedPols.push({
      Insurer:'', PolicyNo:'', Type:'Life / Income Protector', Product:'',
      Premium:'', Frequency:'Monthly',
      BenDeath:'', BenDisability:'', BenDreadDisease:'', IncomeBenefits:'[]',
      Beneficiary:'', BeneficiaryType:'', EstateDutiable:''
    });
    render();
  }));

  // ── Premium totals + affordability projection
  var _allInvBiz = POL_RA_TYPES.concat(POL_INV_TYPES).concat(['Business Assurance']);
  var totalPrem = pols.reduce(function(sum, p) {
    if (_allInvBiz.indexOf(p.Type||'') > -1) return sum;
    return sum + ((p.Frequency || 'Monthly') === 'Monthly' ? N(p.Premium) : 0);
  }, 0);

  if (totalPrem > 0 || pols.length > 0) {
    var totCards = div('cards c3');
    totCards.style.marginTop = '20px';
    var c1 = div('card'); c1.innerHTML = '<div class="lbl">Total Monthly Premiums</div><div class="val">' + Rfmt(totalPrem) + '</div>'; totCards.appendChild(c1);
    var c2 = div('card'); c2.innerHTML = '<div class="lbl">Annual Premium Cost</div><div class="val">' + Rfmt(totalPrem * 12) + '</div>'; totCards.appendChild(c2);
    var c3 = div('card'); c3.innerHTML = '<div class="lbl">Policies on Record</div><div class="val">' + pols.length + '</div>'; totCards.appendChild(c3);
    s.appendChild(totCards);

    // Premium affordability at retirement
    var cliAge  = ageFrom(S.cli.dob);
    var retAge  = N(S.cli.retAge) || 65;
    var yrsToRet = cliAge ? Math.max(0, retAge - cliAge) : null;
    if (yrsToRet !== null && yrsToRet > 0 && totalPrem > 0) {
      s.appendChild(stitle('Premium Affordability at Retirement'));
      var afford = div('info');
      afford.innerHTML = 'Each policy escalates at its own rate. Projection shows estimated premium at retirement age <strong>' + retAge + '</strong> ' +
        '(' + yrsToRet + ' years from now). This is critical for budgeting retirement income.';
      s.appendChild(afford);

      var affTbl = document.createElement('table');
      affTbl.innerHTML = '<thead><tr><th>Policy</th><th>Current premium</th><th>Esc %</th><th>At retirement (est.)</th></tr></thead>';
      var affTb = document.createElement('tbody');
      var totalAtRet = 0;
      pols.forEach(function(pol, j) {
        if ((pol.Frequency||'Monthly') !== 'Monthly') return;
        var prem = N(pol.Premium);
        if (!prem) return;
        var escRaw = String(pol.PremEscalation || pol.premEsc || '').replace(/,/g, '.').replace(/[^0-9.]/g, '');
        var esc = parseFloat(escRaw) || 0;
        var future = esc > 0 ? Math.round(prem * Math.pow(1 + esc/100, yrsToRet)) : prem;
        totalAtRet += future;
        var tr2 = document.createElement('tr');
        tr2.innerHTML =
          '<td>' + (pol.Insurer||'—') + (pol.Type ? ' <span style="font-size:11px;color:var(--sub)">'+pol.Type+'</span>' : '') + '</td>' +
          '<td>' + Rfmt(prem) + '</td>' +
          '<td><input type="text" inputmode="numeric" value="' + (pol.premEsc||'') + '" placeholder="0" style="width:52px;padding:4px 6px;border:1.5px solid var(--mist);border-radius:5px;font-size:12px" ' +
            'data-idx="'+j+'" onblur="S.importedPols[this.dataset.idx].premEsc=this.value;render()" oninput="S.importedPols[this.dataset.idx].premEsc=this.value"> %</td>' +
          '<td style="font-weight:700;color:' + ((esc > 0 && esc > (N(S.assump.incEsc)||5)) ? 'var(--red)' : 'var(--navy)') + '">' + Rfmt(future) + '</td>';
        affTb.appendChild(tr2);
      });
      var trTot = document.createElement('tr');
      trTot.style.cssText = 'border-top:2px solid var(--navy);font-weight:700';
      trTot.innerHTML = '<td colspan="3">Total premiums at retirement</td><td style="color:var(--gold)">' + Rfmt(totalAtRet) + ' /pm</td>';
      affTb.appendChild(trTot);
      affTbl.appendChild(affTb);
      var affTw = div('twrap'); affTw.appendChild(affTbl); s.appendChild(affTw);

      var nettAtRet = N(S.cli.nettPM);
      if (nettAtRet > 0 && totalAtRet > 0) {
        var premPct = Math.round(totalAtRet / nettAtRet * 100);
        var afford2 = div('info'); afford2.style.marginTop = '8px';
        afford2.style.background = premPct > 20 ? '#fef2f2' : '#f0fdf4';
        afford2.style.borderColor = premPct > 20 ? '#fca5a5' : '#86efac';
        afford2.style.color = premPct > 20 ? '#991b1b' : '#166534';
        afford2.innerHTML = 'Estimated premiums at retirement = <strong>' + Rfmt(totalAtRet) + ' /pm</strong> (' +
          premPct + '% of current nett income of ' + Rfmt(nettAtRet) + '). ' +
          (premPct > 20 ? '⚠ Premium burden is high relative to current income.' : '✓ Premium burden appears manageable.');
        s.appendChild(afford2);
      }
    }
  }

  // Send ticked premiums to retirement needs
  if (S.scope.retirement) {
    var brow2 = div(); brow2.style.cssText='display:flex;gap:12px;margin-top:14px;flex-wrap:wrap';
    var bSend = document.createElement('button');
    bSend.className = 'btn btn-navy';
    bSend.textContent = '→ Send ticked premiums to Retirement tab';
    bSend.addEventListener('click', function() {
      var toSend = (S.importedPols||[]).filter(function(p){
        return p._retInclude && (p.Frequency||'Monthly')==='Monthly' && N(p.Premium)>0
          && ['Business Assurance'].indexOf(p.Type||'') < 0;
      });
      if (!toSend.length) { alert('Tick the Ret checkbox on policies to include first.'); return; }
      if (!S.retNeeds) S.retNeeds = [];
      S.retNeeds = S.retNeeds.filter(function(r){ return !r._isPremRow; });
      toSend.forEach(function(p){
        S.retNeeds.push({ desc:(p.Insurer||'')+(p.Product?' — '+p.Product:'')+' premium', amtToday:String(Math.round(N(p.Premium))), esc:String(N(p.PremEscalation)||''), _isPremRow:true });
      });
      persist(); go(5);
    });
    brow2.appendChild(bSend);
    s.appendChild(brow2);
  }

  return s;
}

function buildPolCard(p, i) {
  var t = p.Type || 'Life / Income Protector';
  var isRA  = POL_RA_TYPES.indexOf(t) > -1;
  var isInv = POL_INV_TYPES.indexOf(t) > -1;
  var isMed = (t === 'Medical Aid');
  var isBiz = (t === 'Business Assurance');
