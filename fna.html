<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duwalcoe FNA</title>
<style>
:root {
  --navy: #1a2a4a;
  --gold: #c8a84b;
  --gold-light: #e8d48b;
  --smoke: #f5f5f0;
  --mist: #ddd;
  --rose: #c0392b;
  --sage: #27ae60;
  --sky: #2980b9;
  --text: #1a2a4a;
  --sub: #666;
  --white: #fff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: var(--smoke); color: var(--text); font-size: 14px; }

/* HEADER */
.hdr { background: var(--navy); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; }
.hdr-logo { font-size: 13px; font-weight: 700; color: var(--gold); letter-spacing: 1px; }
.hdr-client { font-size: 13px; color: #ccc; }
.hdr-btns { display: flex; gap: 8px; }

/* TABS */
.tabs { background: var(--navy); border-bottom: 2px solid var(--gold); display: flex; padding: 0 24px; gap: 2px; }
.tab { padding: 10px 16px; font-size: 12px; font-weight: 600; color: #aaa; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all .2s; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
.tab:hover { color: #fff; }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }

/* CONTENT */
.content { max-width: 960px; margin: 0 auto; padding: 28px 24px 80px; }

/* SECTIONS */
.sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); padding-bottom: 8px; border-bottom: 1px solid var(--mist); margin: 24px 0 16px; }
.sec-title:first-child { margin-top: 0; }

/* GRIDS */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.g1 { margin-bottom: 16px; }

/* FIELDS */
.fld { display: flex; flex-direction: column; gap: 5px; }
.fld label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); }
.fld input, .fld select, .fld textarea {
  border: 1.5px solid var(--mist); border-radius: 7px; padding: 9px 12px;
  font-family: inherit; font-size: 13px; color: var(--text); background: #fff;
  transition: border-color .15s;
}
.fld input:focus, .fld select:focus, .fld textarea:focus { outline: none; border-color: var(--gold); }
.fld textarea { resize: vertical; min-height: 80px; }
.fld .r-wrap { display: flex; align-items: center; position: relative; }
.fld .r-wrap .rp { position: absolute; left: 12px; color: var(--sub); font-size: 13px; pointer-events: none; }
.fld .r-wrap input { padding-left: 24px; width: 100%; }

/* RADIO GROUP */
.radio-group { display: flex; gap: 16px; margin-top: 4px; flex-wrap: wrap; }
.radio-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text); }

/* CHECKBOXES */
.check-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.chk-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 8px 12px; border-radius: 6px; border: 1.5px solid var(--mist); background: #fff; transition: all .15s; }
.chk-item:hover { border-color: var(--gold); }
.chk-item.on { border-color: var(--gold); background: #fdf8ee; font-weight: 600; }
.chk-item input { accent-color: var(--gold); width: 15px; height: 15px; }

/* TABLES */
.tbl-wrap { overflow-x: auto; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--navy); color: #fff; padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
tbody td { padding: 6px 6px; border-bottom: 1px solid var(--smoke); vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafaf8; }
table input, table select { border: 1.5px solid var(--mist); border-radius: 5px; padding: 5px 8px; font-family: inherit; font-size: 12px; width: 100%; background: #fff; }
table input:focus, table select:focus { outline: none; border-color: var(--gold); }
.r-cell { display: flex; align-items: center; }
.r-cell .rp { color: var(--sub); font-size: 12px; margin-right: 3px; white-space: nowrap; }
.r-cell input { flex: 1; }

/* BUTTONS */
.btn { border: none; border-radius: 7px; padding: 9px 18px; font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; }
.btn-gold { background: var(--gold); color: #fff; }
.btn-gold:hover { background: #b8942a; }
.btn-navy { background: var(--navy); color: #fff; }
.btn-navy:hover { background: #0f1e38; }
.btn-ghost { background: transparent; border: 1.5px solid var(--mist); color: var(--sub); }
.btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
.btn-add { background: transparent; border: 1.5px dashed var(--mist); color: var(--sub); border-radius: 7px; padding: 7px 14px; font-family: inherit; font-size: 12px; cursor: pointer; width: 100%; margin-top: 6px; transition: all .15s; }
.btn-add:hover { border-color: var(--gold); color: var(--gold); }
.btn-del { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 4px; }
.btn-del:hover { color: var(--rose); background: #fee; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* SUMMARY CARDS */
.sum-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.sum-card { background: #fff; border-radius: 10px; padding: 14px 16px; border: 1.5px solid var(--mist); }
.sum-card .lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); margin-bottom: 4px; }
.sum-card .val { font-size: 18px; font-weight: 700; color: var(--navy); }
.sum-card .val.ok { color: var(--sage); }
.sum-card .val.gap { color: var(--rose); }
.sum-card .val.warn { color: #e67e22; }

/* GAP ROWS */
.gap-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; background: #fff; border: 1.5px solid var(--mist); }
.gap-row .gap-label { font-size: 13px; font-weight: 600; }
.gap-row .gap-vals { display: flex; gap: 24px; font-size: 12px; }
.gap-row .gap-vals span { display: flex; flex-direction: column; align-items: flex-end; }
.gap-row .gap-vals .v-label { font-size: 10px; color: var(--sub); text-transform: uppercase; }
.gap-row.ok { border-color: #a8d5b5; background: #f0faf3; }
.gap-row.gap { border-color: #f5bcb8; background: #fdf2f1; }

/* SCOPE FLAGS */
.scope-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
.scope-tag { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1.5px solid var(--mist); color: var(--sub); cursor: pointer; transition: all .15s; }
.scope-tag.on { background: var(--navy); border-color: var(--navy); color: var(--gold); }

/* TAX CALC */
.tax-calc { background: #fff; border: 1.5px solid var(--mist); border-radius: 8px; padding: 12px 14px; margin-top: 8px; }
.tax-calc .tax-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
.tax-calc .tax-row.total { font-weight: 700; border-top: 1px solid var(--mist); margin-top: 6px; padding-top: 6px; }

/* INFO BOX */
.info { background: #fdf8ee; border: 1.5px solid var(--gold-light); border-radius: 8px; padding: 12px 14px; font-size: 12px; color: #7a6020; margin-bottom: 16px; }

/* NOTES */
.notes-wrap { margin-top: 16px; }
.notes-wrap textarea { width: 100%; border: 1.5px solid var(--mist); border-radius: 7px; padding: 10px 12px; font-family: inherit; font-size: 13px; resize: vertical; min-height: 70px; }
.notes-wrap textarea:focus { outline: none; border-color: var(--gold); }
.notes-wrap label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); display: block; margin-bottom: 5px; }

/* FOOTER */
.footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 10px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
.footer-left { font-size: 12px; color: #aaa; }
.footer-right { display: flex; gap: 8px; }

/* PRINT */
@media print { .hdr, .tabs, .footer { display: none !important; } .content { padding: 0; max-width: 100%; } }
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-logo">DUWALCOE · FNA</div>
  <div class="hdr-client" id="hdrClient">New Client</div>
  <div class="hdr-btns">
    <button class="btn btn-ghost btn-sm" onclick="newClient()">New Client</button>
    <button class="btn btn-ghost btn-sm" onclick="saveLocal()">💾 Save</button>
  </div>
</div>

<div class="tabs" id="tabBar"></div>
<div class="content" id="content"></div>

<div class="footer">
  <div class="footer-left" id="saveStatus">FSP No: 9978 · Clinton Hayes</div>
  <div class="footer-right">
    <button class="btn btn-ghost btn-sm" onclick="prevTab()">← Back</button>
    <button class="btn btn-gold btn-sm" onclick="nextTab()">Next →</button>
    <button class="btn btn-navy btn-sm" onclick="buildROA()">📄 Generate ROA</button>
  </div>
</div>

<div id="saved-data" style="display:none">null</div>

<script>
// ─── HELPERS ────────────────────────────────────────────────────────────────
function N(v){ return parseFloat(String(v||'').replace(/[^0-9.\-]/g,''))||0; }
function R(v){ return v?'R '+Math.round(N(v)).toLocaleString('en-ZA'):'-'; }
function Rfmt(v){ return 'R '+Math.round(N(v)).toLocaleString('en-ZA'); }
function pct(v){ return (N(v)/100); }
function age(dob){
  if(!dob) return null;
  var parts = dob.split('/');
  if(parts.length!==3) return null;
  var d = new Date(parts[2]+'-'+parts[1]+'-'+parts[0]);
  return Math.floor((Date.now()-d)/31557600000);
}
function yrsTo(dob, retAge){
  var a = age(dob); if(!a||!retAge) return null;
  return Math.max(0, N(retAge)-a);
}

// ─── TAX CALCULATOR (2025/2026) ─────────────────────────────────────────────
function calcTax(annualGross){
  var g = N(annualGross)*12;
  var brackets = [
    [237101,  0,      0.18],
    [370500,  42678,  0.26],
    [512800,  77362,  0.31],
    [673000,  121475, 0.36],
    [857900,  179147, 0.39],
    [1817000, 251258, 0.41],
    [Infinity,643601, 0.45]
  ];
  var tax = 0;
  for(var i=0;i<brackets.length;i++){
    if(g<=brackets[i][0]){
      var prev = i===0?0:brackets[i-1][0];
      tax = brackets[i][1] + (g-prev)*brackets[i][2];
      break;
    }
  }
  var rebate = 17235; // primary
  tax = Math.max(0, tax-rebate);
  var uif = Math.min(g*0.01, 1776);
  return {
    grossPM: N(annualGross),
    taxPA: Math.round(tax),
    taxPM: Math.round(tax/12),
    uifPM: Math.round(uif/12),
    nettPM: Math.round(N(annualGross) - tax/12 - uif/12)
  };
}

// ─── DATA MODEL ─────────────────────────────────────────────────────────────
var DEFAULTS = {
  cli: { name:'', id:'', dob:'', smoker:'', gender:'', education:'', occ:'', grossPM:'', nettPM:'', retAge:'65' },
  marital: '', domDate: '', kids: [],
  scope: { death:false, disability:false, dread:false, ip:false, retirement:false, investment:false, offshore:false, will:false, estate:false, review:false, other:false },
  scopeNotes: '', whyHere: '',
  assump: { cpi:'5', growth:'9', incEsc:'6', premGrowth:'10' },
  incRows: [
    {src:'Salary / drawings', cli:''},
    {src:'Rental income', cli:''},
    {src:'Investment income', cli:''},
    {src:'Other income', cli:''}
  ],
  expenses: '', incNotes: '',
  props: [],
  vehicles: [],
  otherAssets: [],
  liabilities: [],
  assetNotes: '',
  deathNeeds: { liquidityNeeds:[{desc:'Bond repayment',amt:''},{desc:'Education fund',amt:''},{desc:'Trust / bequest',amt:''},{desc:'Estate duty / costs',amt:''},{desc:'Other capital',amt:''}], incomeNeeds:[{desc:'Family living expenses',amt:'',yrs:'20',esc:'5'}], notes:'' },
  disNeeds: { capitalNeed:'', monthlyNeed:'', waitPeriod:'1 month', benefitPeriod:'To age 65', notes:'' },
  dreadNeeds: { amount:'', notes:'' },
  ipNeeds: { monthlyAmount:'', waitPeriod:'1 month', benefitPeriod:'To age 65', notes:'' },
  retNeeds: { monthlyExpenses:'', medAid:'', lifePrem:'', other:'', lumpsums:[{desc:'Holiday / travel',amt:''},{desc:'Other',amt:''}], notes:'' },
  invNeeds: { amount:'', timeframe:'', notes:'' },
  eduNeeds: [],
  goals: [],
  needsNotes: '',
  pols: [],
  invs: [],
  retCalc: { useCalc:false },
  est: { hasWill:'', exec:'', hasTrust:'', funeral:'15000', notes:'' },
  roaNotes: ''
};

var S = JSON.parse(JSON.stringify(DEFAULTS));

var TABS = ['Client','Scope','Income','Assets','Needs','Retirement','Summary','ROA'];
var activeTab = 0;

// ─── URL PARAM INJECTION ─────────────────────────────────────────────────────
(function(){
  var params = new URLSearchParams(window.location.search);
  if(params.get('name')) S.cli.name = decodeURIComponent(params.get('name'));
  if(params.get('id')) S.cli.id = params.get('id');
  if(params.get('dob')){
    var d = params.get('dob').split('-');
    if(d.length===3) S.cli.dob = d[2]+'/'+d[1]+'/'+d[0];
  }
  if(params.get('income')) S.cli.grossPM = params.get('income');
  // Load saved if exists
  var saved = document.getElementById('saved-data').textContent;
  if(saved && saved!=='null'){ try{ S=JSON.parse(saved); }catch(e){} }
})();

// ─── SAVE / LOAD ─────────────────────────────────────────────────────────────
function saveLocal(){
  document.getElementById('saved-data').textContent = JSON.stringify(S);
  document.getElementById('saveStatus').textContent = '✓ Saved — '+new Date().toLocaleTimeString('en-ZA');
  setTimeout(()=>{ document.getElementById('saveStatus').textContent = 'FSP No: 9978 · Clinton Hayes'; }, 3000);
}

function saveAsClientFile(){
  if(!S.cli.name.trim()){ alert('Enter client name first.'); return; }
  saveLocal();
  var fname = S.cli.name.replace(/[^a-zA-Z0-9\s]/g,'').trim().replace(/\s+/g,'_')+'_FNA.html';
  var blob = new Blob([document.documentElement.outerHTML], {type:'text/html'});
  var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fname; a.click();
}

function newClient(){
  if(!confirm('Open blank form for new client?')) return;
  S = JSON.parse(JSON.stringify(DEFAULTS));
  activeTab = 0;
  render();
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function go(i){ activeTab=i; render(); }
function nextTab(){ if(activeTab<TABS.length-1){ activeTab++; render(); } }
function prevTab(){ if(activeTab>0){ activeTab--; render(); } }

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('hdrClient').textContent = S.cli.name || 'New Client';
  // Tabs
  document.getElementById('tabBar').innerHTML = TABS.map(function(t,i){
    return '<div class="tab'+(i===activeTab?' active':'')+'" onclick="go('+i+')">'+t+'</div>';
  }).join('');
  // Content
  var builders = [buildClient, buildScope, buildIncome, buildAssets, buildNeeds, buildRetirement, buildSummary, buildROATab];
  document.getElementById('content').innerHTML = '';
  document.getElementById('content').appendChild(builders[activeTab]());
}

// ─── FIELD BUILDERS (no render on input - only on blur/change) ───────────────
function fld(label, key, obj, opts){
  opts = opts||{};
  var d = document.createElement('div'); d.className = 'fld';
  if(label){ var lb = document.createElement('label'); lb.textContent = label; d.appendChild(lb); }
  var i = document.createElement('input');
  i.type = opts.type||'text';
  i.value = obj[key]||'';
  if(opts.placeholder) i.placeholder = opts.placeholder;
  if(opts.readonly) i.readOnly = true;
  i.addEventListener('input', function(e){ obj[key]=e.target.value; });
  if(opts.onblur) i.addEventListener('blur', function(e){ obj[key]=e.target.value; opts.onblur(e.target.value); });
  else i.addEventListener('blur', function(){ });
  d.appendChild(i); return d;
}

function rfld(label, key, obj, opts){
  opts = opts||{};
  var d = document.createElement('div'); d.className = 'fld';
  if(label){ var lb = document.createElement('label'); lb.textContent = label; d.appendChild(lb); }
  var w = document.createElement('div'); w.className = 'r-wrap';
  var rp = document.createElement('span'); rp.className = 'rp'; rp.textContent = 'R';
  var i = document.createElement('input'); i.type='text'; i.value=obj[key]||''; i.placeholder='0';
  if(opts.readonly) i.readOnly = true;
  i.addEventListener('input', function(e){ obj[key]=e.target.value; });
  if(opts.onblur) i.addEventListener('blur', function(e){ obj[key]=e.target.value; opts.onblur(e.target.value); });
  w.appendChild(rp); w.appendChild(i); d.appendChild(w); return d;
}

function seld(label, key, obj, options){
  var d = document.createElement('div'); d.className = 'fld';
  if(label){ var lb = document.createElement('label'); lb.textContent = label; d.appendChild(lb); }
  var s = document.createElement('select');
  options.forEach(function(o){
    var opt = document.createElement('option');
    opt.value = typeof o==='object'?o.v:o;
    opt.textContent = typeof o==='object'?o.l:o;
    if(obj[key]===(typeof o==='object'?o.v:o)) opt.selected=true;
    s.appendChild(opt);
  });
  s.addEventListener('change', function(e){ obj[key]=e.target.value; render(); });
  d.appendChild(s); return d;
}

function txa(label, key, obj){
  var d = document.createElement('div'); d.className = 'fld';
  if(label){ var lb = document.createElement('label'); lb.textContent = label; d.appendChild(lb); }
  var t = document.createElement('textarea'); t.value = obj[key]||''; t.placeholder = 'Notes...';
  t.addEventListener('input', function(e){ obj[key]=e.target.value; });
  d.appendChild(t); return d;
}

function radio(label, key, obj, options){
  var d = document.createElement('div'); d.className = 'fld';
  if(label){ var lb = document.createElement('label'); lb.textContent = label; d.appendChild(lb); }
  var g = document.createElement('div'); g.className = 'radio-group';
  options.forEach(function(o){
    var lbl = document.createElement('label');
    var inp = document.createElement('input'); inp.type='radio'; inp.name=key+'_'+Math.random().toString(36).slice(2);
    inp.value = typeof o==='object'?o.v:o;
    if(obj[key]===(typeof o==='object'?o.v:o)) inp.checked=true;
    inp.addEventListener('change', function(e){ obj[key]=e.target.value; if(key==='grossPM'||key==='smoker') render(); });
    var span = document.createElement('span'); span.textContent = typeof o==='object'?o.l:o;
    lbl.appendChild(inp); lbl.appendChild(span); g.appendChild(lbl);
  });
  d.appendChild(g); return d;
}

function g2(){ var d=document.createElement('div'); d.className='g2'; return d; }
function g3(){ var d=document.createElement('div'); d.className='g3'; return d; }
function g4(){ var d=document.createElement('div'); d.className='g4'; return d; }
function sec(t){ var d=document.createElement('div'); d.className='sec-title'; d.textContent=t; return d; }
function div(cls){ var d=document.createElement('div'); if(cls) d.className=cls; return d; }
function el(tag,cls,txt){ var d=document.createElement(tag); if(cls) d.className=cls; if(txt!==undefined) d.textContent=txt; return d; }

function addBtn(label, onClick){
  var b = document.createElement('button'); b.className='btn-add'; b.textContent=label;
  b.addEventListener('click', onClick); return b;
}

function delBtn(onClick){
  var b = document.createElement('button'); b.className='btn-del'; b.textContent='✕';
  b.addEventListener('click', onClick); return b;
}

// ─── TAB 0: CLIENT ──────────────────────────────────────────────────────────
function buildClient(){
  var s = div(); 

  s.appendChild(sec('Personal Details'));
  var r1=g2(); r1.appendChild(fld('Full Name','name',S.cli,{placeholder:'Client full name'}));
  r1.appendChild(fld('ID Number','id',S.cli,{placeholder:'e.g. 8001015009087'})); s.appendChild(r1);

  var r2=g3();
  r2.appendChild(fld('Date of Birth (DD/MM/YYYY)','dob',S.cli,{placeholder:'01/01/1980'}));
  r2.appendChild(seld('Gender','gender',S.cli,['','Male','Female']));
  r2.appendChild(seld('Smoker','smoker',S.cli,['','Non-smoker','Smoker']));
  s.appendChild(r2);

  var r3=g3();
  r3.appendChild(seld('Education','education',S.cli,['','Matric','Diploma','Degree','Post-graduate','Other']));
  r3.appendChild(fld('Occupation','occ',S.cli,{placeholder:'e.g. Engineer'}));
  r3.appendChild(seld('Retirement Age','retAge',S.cli,['55','60','63','65','67','70']));
  s.appendChild(r3);

  // Age display
  var cliAge = age(S.cli.dob);
  var yrs = yrsTo(S.cli.dob, S.cli.retAge);
  if(cliAge){
    var info = div('info');
    info.textContent = 'Age: '+cliAge+' years'+
      (yrs!==null?' · '+yrs+' years to retirement (age '+S.cli.retAge+')':'')+
      (S.cli.smoker?' · '+S.cli.smoker:'');
    s.appendChild(info);
  }

  s.appendChild(sec('Marital Status'));
  var r4=g3();
  r4.appendChild(seld('Marital Status','marital',S.cli,['','Single','Married — COP','Married — ANC no accrual','Married — ANC with accrual','Divorced','Widowed','Life partner']));
  r4.appendChild(fld('Date of Marriage','domDate',S.cli,{type:'date'}));
  r4.appendChild(fld('Spouse / Partner Name','spouseName',S.cli,{placeholder:'Full name'}));
  s.appendChild(r4);

  s.appendChild(sec('Dependants'));
  // Kids table
  var tbl = document.createElement('table');
  var thead = document.createElement('thead');
  thead.innerHTML='<tr><th>Name</th><th>Age</th><th>Dependent?</th><th>Notes</th><th></th></tr>';
  tbl.appendChild(thead);
  var tbody = document.createElement('tbody');
  S.kids.forEach(function(k,i){
    var tr = document.createElement('tr');

    rg.appendChild(rfld('Target Amount','targetAmt',r));

    yi.addEventListener('input',function(e){S.goals[i].targetYear=e.target.value;}); yd.appendChild(yi); rg.appendChild(yd);
    var dd=div(); dd.appendChild(delBtn(function(){S.goals.splice(i,1);render();})); rg.appendChild(dd);
    s.appendChild(rg);

// ─── TAB 5: RETIREMENT ──────────────────────────────────────────────────────
function buildRetirement(){
  var s = div();
  var cliAge = age(S.cli.dob);
  var retAge = N(S.cli.retAge)||65;
  var yrs = cliAge ? Math.max(0, retAge-cliAge) : null;

  var info=div('info');
  info.textContent = cliAge ?
    'Age: '+cliAge+' · Retirement age: '+retAge+' · Years to retirement: '+(yrs||'?')+
    ' · Life expectancy: 85 · Years in retirement: '+(85-retAge) :
    'Enter date of birth on the Client tab to enable retirement calculations.';
  s.appendChild(info);

  s.appendChild(sec('Existing Retirement Assets'));
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>Description</th><th>Institution</th><th>Current Value</th><th>Monthly Contribution</th><th>Growth %</th><th>Projected at Ret.</th><th></th></tr></thead>';
  var tbody=document.createElement('tbody');
  S.invs.forEach(function(r,i){
    var tr=document.createElement('tr');
    function td(content){ var t=document.createElement('td'); t.appendChild(content); tr.appendChild(t); }
    var di=document.createElement('input'); di.type='text'; di.value=r.desc||''; di.placeholder='e.g. Sanlam RA';
    di.addEventListener('input',function(e){S.invs[i].desc=e.target.value;}); td(di);
    var ii=document.createElement('input'); ii.type='text'; ii.value=r.inst||'';
    ii.addEventListener('input',function(e){S.invs[i].inst=e.target.value;}); td(ii);
    var rw1=div('r-cell'); rw1.appendChild(el('span','rp','R')); var vi=document.createElement('input'); vi.type='text'; vi.value=r.val||'';
    vi.addEventListener('input',function(e){S.invs[i].val=e.target.value;}); rw1.appendChild(vi); td(rw1);
    var rw2=div('r-cell'); rw2.appendChild(el('span','rp','R')); var ci=document.createElement('input'); ci.type='text'; ci.value=r.contrib||'';
    ci.addEventListener('input',function(e){S.invs[i].contrib=e.target.value;}); rw2.appendChild(ci); td(rw2);
    var gi=document.createElement('input'); gi.type='text'; gi.value=r.growth||S.assump.growth; gi.style.width='50px';
    gi.addEventListener('input',function(e){S.invs[i].growth=e.target.value;}); td(gi);
    // Projected value
    var proj='—';
    if(yrs&&(N(r.val)>0||N(r.contrib)>0)){
      var g=pct(r.growth||S.assump.growth);
      var fv=N(r.val)*Math.pow(1+g,yrs);
      if(N(r.contrib)>0) fv += N(r.contrib)*12*((Math.pow(1+g,yrs)-1)/g);
      proj=Rfmt(fv);
    }
    var pt=el('td','',proj); pt.style.fontWeight='600'; tr.appendChild(pt);
    var tdDel=document.createElement('td'); tdDel.appendChild(delBtn(function(){S.invs.splice(i,1);render();})); tr.appendChild(tdDel);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); var tw=div('tbl-wrap'); tw.appendChild(tbl); s.appendChild(tw);
  s.appendChild(addBtn('+ Add Retirement Asset', function(){S.invs.push({desc:'',inst:'',val:'',contrib:'',growth:''});render();}));

  // Retirement projection
  if(yrs!==null){
    var totalProj = S.invs.reduce(function(sum,r){
      if(N(r.val)===0&&N(r.contrib)===0) return sum;
      var g=pct(r.growth||S.assump.growth);
      var fv=N(r.val)*Math.pow(1+g,yrs);
      if(N(r.contrib)>0) fv += N(r.contrib)*12*((Math.pow(1+g,yrs)-1)/g);
      return sum+fv;
    },0);

    var monthlyNeed = N(S.retNeeds.monthlyExpenses)+N(S.retNeeds.medAid)+N(S.retNeeds.other);
    var inflAdj = monthlyNeed>0 ? monthlyNeed*Math.pow(1+pct(S.assump.cpi),yrs) : 0;
    var yrsInRet = 85-retAge;
    var capNeeded = inflAdj>0&&yrsInRet>0 ? inflAdj*12*((1-Math.pow(1.04,-yrsInRet))/0.04) : 0;

    s.appendChild(sec('Retirement Projection Summary'));
    var sg=div('sum-grid');
    var c1=div('sum-card'); c1.innerHTML='<div class="lbl">Projected Fund at Ret.</div><div class="val">'+Rfmt(totalProj)+'</div>'; sg.appendChild(c1);
    var c2=div('sum-card'); c2.innerHTML='<div class="lbl">Monthly Need (inflation adj)</div><div class="val">'+Rfmt(inflAdj)+'</div>'; sg.appendChild(c2);
    var c3=div('sum-card'); c3.innerHTML='<div class="lbl">Capital Required</div><div class="val">'+Rfmt(capNeeded)+'</div>'; sg.appendChild(c3);
    var gap=totalProj-capNeeded;
    var c4=div('sum-card'); c4.innerHTML='<div class="lbl">Surplus / Shortfall</div><div class="val '+(gap>=0?'ok':'gap')+'">'+Rfmt(gap)+'</div>'; sg.appendChild(c4);
    s.appendChild(sg);
  }

  var notesWrap=div('notes-wrap');
  var nlb=el('label','','Retirement notes');
  var nta=document.createElement('textarea'); nta.value=(S.retNeeds&&S.retNeeds.notes)||''; nta.placeholder='Notes...';
  nta.addEventListener('input',function(e){if(!S.retNeeds)S.retNeeds={};S.retNeeds.notes=e.target.value;});
  notesWrap.appendChild(nlb); notesWrap.appendChild(nta); s.appendChild(notesWrap);

  return s;
}

// ─── TAB 6: SUMMARY ─────────────────────────────────────────────────────────
function buildSummary(){
  var s = div();
  var info=div('info'); info.textContent='Needs vs existing cover. Add existing policies to see gaps.'; s.appendChild(info);

  s.appendChild(sec('Existing Policies'));
  var tbl=document.createElement('table');
  tbl.innerHTML='<thead><tr><th>Insurer</th><th>Type</th><th>Policy No</th><th>Death Cover</th><th>Disability</th><th>Dread Disease</th><th>IP /pm</th><th>Premium /pm</th><th></th></tr></thead>';
  var tbody=document.createElement('tbody');
  S.pols.forEach(function(p,i){
    var tr=document.createElement('tr');
    function tdi(val,width){ var t=document.createElement('td'); var inp=document.createElement('input'); inp.type='text'; inp.value=val||''; if(width) inp.style.width=width; t.appendChild(inp); tr.appendChild(t); return inp; }
    var ins=tdi(p.insurer,'100px'); ins.placeholder='Insurer'; ins.addEventListener('input',function(e){S.pols[i].insurer=e.target.value;});
    var pt=document.createElement('td'); var ps=document.createElement('select'); ps.style.fontSize='12px';
    ['Life / IP','Business Assurance','RA','Pension/Provident','Endowment','Investment','Medical Aid','Other'].forEach(function(o){ var opt=document.createElement('option'); opt.textContent=o; if(p.polType===o) opt.selected=true; ps.appendChild(opt); });
    ps.addEventListener('change',function(e){S.pols[i].polType=e.target.value;}); pt.appendChild(ps); tr.appendChild(pt);
    var pn=tdi(p.polNo,'80px'); pn.addEventListener('input',function(e){S.pols[i].polNo=e.target.value;});
    function rcel(key){ var t=document.createElement('td'); var rw=div('r-cell'); rw.appendChild(el('span','rp','R')); var inp=document.createElement('input'); inp.type='text'; inp.value=p[key]||''; inp.style.width='80px';
      inp.addEventListener('input',function(e){S.pols[i][key]=e.target.value;}); rw.appendChild(inp); t.appendChild(rw); tr.appendChild(t); }
    rcel('death'); rcel('disability'); rcel('dread'); rcel('ip'); rcel('premium');
    var tdDel=document.createElement('td'); tdDel.appendChild(delBtn(function(){S.pols.splice(i,1);render();})); tr.appendChild(tdDel);
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); var tw=div('tbl-wrap'); tw.appendChild(tbl); s.appendChild(tw);
  s.appendChild(addBtn('+ Add Existing Policy', function(){S.pols.push({insurer:'',polType:'Life / IP',polNo:'',death:'',disability:'',dread:'',ip:'',premium:''});render();}));

  // GAP ANALYSIS
  s.appendChild(sec('Gap Analysis'));

  var totDeath = S.pols.reduce(function(s,p){return s+N(p.death);},0);
  var totDis = S.pols.reduce(function(s,p){return s+N(p.disability);},0);
  var totDread = S.pols.reduce(function(s,p){return s+N(p.dread);},0);
  var totIP = S.pols.reduce(function(s,p){return s+N(p.ip);},0);
  var totPrem = S.pols.reduce(function(s,p){return s+N(p.premium);},0);

  // Death capital need
  var deathCapNeed = S.deathNeeds.liquidityNeeds.reduce(function(s,r){return s+N(r.amt);},0);
  // Death income capitalised
  var deathIncNeed = S.deathNeeds.incomeNeeds.reduce(function(sum,r){
    var yrs=N(r.yrs)||20; var esc=pct(r.esc||5); var r4=0.04;
    if(N(r.amt)===0) return sum;
    return sum + N(r.amt)*12*((1-Math.pow(1+r4,-yrs))/r4);
  },0);
  var totalDeathNeed = deathCapNeed+deathIncNeed;

  function gapRow(label, need, have){
    var gap=have-need;
    var r=div('gap-row '+(need===0?'':'')+(gap>=0&&need>0?'ok':need>0?'gap':''));
    r.innerHTML='<div class="gap-label">'+label+'</div>'+
      '<div class="gap-vals">'+
      '<span><div class="v-label">Need</div><strong>'+(need>0?Rfmt(need):'Not captured')+'</strong></span>'+
      '<span><div class="v-label">Have</div><strong>'+(have>0?Rfmt(have):'-')+'</strong></span>'+
      (need>0?'<span><div class="v-label">Gap</div><strong style="color:'+(gap>=0?'var(--sage)':'var(--rose)')+'">'+Rfmt(Math.abs(gap))+(gap>=0?' surplus':' short')+'</strong></span>':'')+
      '</div>';
    return r;
  }

  if(S.scope.death) s.appendChild(gapRow('Death Cover (lump sum)', totalDeathNeed, totDeath));
  if(S.scope.disability) s.appendChild(gapRow('Capital Disability', N(S.disNeeds.capitalNeed), totDis));
  if(S.scope.dread) s.appendChild(gapRow('Dread Disease', N(S.dreadNeeds.amount), totDread));
  if(S.scope.ip) s.appendChild(gapRow('Income Protection (/pm)', N(S.ipNeeds.monthlyAmount), totIP));

  // Premium summary
  if(totPrem>0){
    var prem=div('info'); prem.style.marginTop='16px';
    prem.textContent='Total existing premiums: '+Rfmt(totPrem)+' /pm';
    s.appendChild(prem);
  }

  return s;
}
