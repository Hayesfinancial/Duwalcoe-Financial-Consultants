<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duwalcoe FNA</title>
<style>
:root {
  --navy:    #0e413a;
  --gold:    #a8b938;
  --gold2:   #ccd660;
  --smoke:   #f4f4f0;
  --mist:    #dde0e8;
  --white:   #ffffff;
  --text:    #1a2a2e;
  --sub:     #6b7280;
  --green:   #16a34a;
  --red:     #dc2626;
  --orange:  #d97706;
  --border:  1.5px solid var(--mist);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--smoke); color: var(--text); font-size: 13px; line-height: 1.4; }

/* ── HEADER ── */
.hdr { background: var(--navy); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; height: 44px; position: sticky; top: 0; z-index: 200; }

.hdr-client { font-size: 12px; color: #ccd6f6; }
.hdr-actions { display: flex; gap: 6px; }

/* ── TABS ── */
.tabbar { background: var(--navy); display: flex; padding: 0 16px; gap: 2px; border-bottom: 2px solid var(--gold); overflow-x: auto; }
.tabbar::-webkit-scrollbar { height: 0; }
.tab { padding: 7px 11px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #8899bb; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color .15s; }
.tab:hover { color: #ccd; }
.tab.on { color: var(--gold); border-bottom-color: var(--gold); }

/* ── CONTENT ── */
.content { max-width: 980px; margin: 0 auto; padding: 14px 16px 80px; }

/* ── SECTION TITLES ── */
.stitle { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); padding-bottom: 5px; border-bottom: 1px solid var(--mist); margin: 16px 0 8px; }
.stitle:first-child { margin-top: 0; }

/* ── GRIDS ── */
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 10px; }

/* ── FIELD ── */
.f { display: flex; flex-direction: column; gap: 3px; }
.f label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); }
.f input, .f select, .f textarea {
  border: var(--border); border-radius: 5px; padding: 6px 8px;
  font-family: inherit; font-size: 12px; color: var(--text);
  background: var(--white); transition: border-color .15s;
}
.f input:focus, .f select:focus, .f textarea:focus { outline: none; border-color: var(--gold); }
.f textarea { resize: vertical; min-height: 60px; }
/* Rand prefix */
.rw { position: relative; }
.rw .rp { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 11px; pointer-events: none; }
.rw input { padding-left: 18px; }
/* Percent suffix */
.pw { position: relative; }
.pw .pp { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: var(--sub); font-size: 11px; pointer-events: none; }
.pw input { padding-right: 20px; }

/* ── RADIO GROUP ── */
.rg { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 2px; }
.rg label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 12px; font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--text); }
.rg input[type=radio] { accent-color: var(--gold); width: 13px; height: 13px; }

/* ── CHECKBOXES ── */
.chkgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 10px; }
.chk { display: flex; align-items: center; gap: 7px; padding: 7px 10px; border: var(--border); border-radius: 6px; background: var(--white); cursor: pointer; transition: all .15s; user-select: none; }
.chk:hover { border-color: var(--gold); }
.chk.on { border-color: var(--gold); background: #fdf8ee; font-weight: 600; color: var(--navy); }
.chk input { accent-color: var(--gold); width: 13px; height: 13px; flex-shrink: 0; }

/* ── TABLES ── */
.twrap { overflow-x: auto; margin-bottom: 8px; }
table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
thead th { background: var(--navy); color: #fff; padding: 5px 7px; text-align: left; font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
tbody tr td { padding: 4px 6px; border-bottom: 1px solid #eef0f4; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafaf8; }
table input, table select {
  border: var(--border); border-radius: 4px; padding: 4px 6px;
  font-family: inherit; font-size: 11px; width: 100%; background: var(--white);
}
table input:focus, table select:focus { outline: none; border-color: var(--gold); }
.td-r { display: flex; align-items: center; }
.td-r .rp { color: var(--sub); font-size: 10px; margin-right: 2px; flex-shrink: 0; }
.td-r input { flex: 1; min-width: 0; }

/* ── BUTTONS ── */
.btn { border: none; border-radius: 5px; padding: 7px 14px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; transition: all .15s; }
.btn-gold  { background: var(--gold); color: #fff; }
.btn-gold:hover  { background: #b8942a; }
.btn-navy  { background: var(--navy); color: #fff; }
.btn-navy:hover  { background: #0f1e38; }
.btn-ghost { background: transparent; border: var(--border); color: var(--sub); }
.btn-ghost:hover { border-color: var(--navy); color: var(--navy); }
.btn-sm { padding: 5px 10px; font-size: 10px; }
.btn-add { width: 100%; background: transparent; border: 1.5px dashed var(--mist); color: var(--sub); border-radius: 5px; padding: 5px; font-family: inherit; font-size: 11px; cursor: pointer; margin-top: 4px; transition: all .15s; }
.btn-add:hover { border-color: var(--gold); color: var(--gold); }
.btn-del { background: none; border: none; color: #bbb; font-size: 14px; cursor: pointer; padding: 1px 5px; border-radius: 3px; line-height: 1; }
.btn-del:hover { color: var(--red); background: #fef2f2; }

/* ── INFO / ALERT ── */
.info  { background: #fdf8ee; border: 1.5px solid var(--gold2); border-radius: 6px; padding: 7px 10px; font-size: 11px; color: #7a5f1a; margin-bottom: 10px; }
.alert { background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 6px; padding: 7px 10px; font-size: 11px; color: var(--red); margin-bottom: 10px; }

/* ── SUMMARY CARDS ── */
.cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 14px; }
.cards.c3 { grid-template-columns: repeat(3,1fr); }
.cards.c2 { grid-template-columns: repeat(2,1fr); }
.card { background: var(--white); border: var(--border); border-radius: 7px; padding: 10px 12px; }
.card .lbl { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--sub); margin-bottom: 2px; }
.card .val { font-size: 17px; font-weight: 700; color: var(--navy); }
.card .val.ok  { color: var(--green); }
.card .val.bad { color: var(--red); }
.card .val.warn { color: var(--orange); }
.card .sub { font-size: 10px; color: var(--sub); margin-top: 1px; }

/* ── GAP ROWS ── */
.gap-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; border-radius: 7px; border: var(--border); background: var(--white); margin-bottom: 6px; }
.gap-row.ok  { border-color: #86efac; background: #f0fdf4; }
.gap-row.bad { border-color: #fca5a5; background: #fef2f2; }
.gap-row .gl { font-size: 12px; font-weight: 700; }
.gap-row .gv { display: flex; gap: 22px; }
.gap-row .gv > div { text-align: right; }
.gap-row .gv .vl { font-size: 9px; text-transform: uppercase; color: var(--sub); }
.gap-row .gv .vn { font-size: 12px; font-weight: 700; }

/* ── TAX BOX ── */
.taxbox { background: var(--white); border: var(--border); border-radius: 6px; padding: 9px 12px; margin-bottom: 10px; }
.taxbox .tr { display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px; }
.taxbox .tr.tot { font-weight: 700; border-top: 1px solid var(--mist); margin-top: 4px; padding-top: 4px; }

/* ── CALC RESULT ── */
.calc-result { background: var(--navy); color: #fff; border-radius: 7px; padding: 10px 14px; margin-top: 6px; }
.calc-result .cr-row { display: flex; justify-content: space-between; padding: 2px 0; font-size: 11px; }
.calc-result .cr-row.big { font-size: 14px; font-weight: 700; padding-top: 5px; border-top: 1px solid #334; margin-top: 3px; }
.calc-result .cr-row .gold { color: var(--gold); }

/* ── FOOTER ── */
.footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--navy); padding: 7px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 200; border-top: 2px solid var(--gold); }
.footer-l { font-size: 10px; color: #8899bb; }
.footer-r { display: flex; gap: 6px; }
</style>
</head>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
'use strict';

// ═══════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════

// ── Policy type arrays (global)
var POL_RA_TYPES  = ['Retirement Annuity','Pension Fund','Provident Fund','Preservation Fund','Living Annuity'];
var POL_INV_TYPES = ['Tax Free Savings','Investment','Endowment','Unit Trust'];
var POL_MED_TYPES = ['Medical Aid','Medical'];
var POL_TYPES     = ['Life / Income Protector','Business Assurance','Life Annuity'].concat(POL_RA_TYPES).concat(POL_INV_TYPES).concat(POL_MED_TYPES);

// ── SA Estate Duty constants (global)
var ABATEMENT  = 3500000;   // Primary abatement R3.5m
var DUTY_THRESH= 30000000;  // 20% up to R30m, 25% above
var DUTY_RATE1 = 0.20;
var DUTY_RATE2 = 0.25;
var EXEC_RATE  = 0.04025;   // Executor fees 3.5% + VAT

function N(v) { return parseFloat(String(v || '').replace(/[^0-9.\-]/g, '')) || 0; }
function pct(v) { return N(v) / 100; }
// Living Annuity sustainable income escalation = growth rate − drawdown rate (floored at 0)
// Falls back to CPI assumption if rates not set
function laEscRate(p) {
  var gr = N(p.GrowthRate) || N(p.PremGrowthRate) || 0;
  var dr = N(p.DrawdownRate) || 0;
  if (gr > 0 && dr > 0) return Math.max(0, gr - dr);
  return 0; // caller should fall back to CPI
}
function Rfmt(v) { return 'R\u202f' + Math.round(N(v)).toLocaleString('en-ZA'); }
function Rval(v) { return N(v) > 0 ? Rfmt(v) : '—'; }

function ageFrom(dob) {
  if (!dob) return null;
  var p = dob.split('/');
  if (p.length !== 3) return null;
  var d = new Date(p[2] + '-' + p[1] + '-' + p[0]);
  if (isNaN(d)) return null;
  return Math.floor((Date.now() - d) / 31557600000);
}
function yrsToRet(dob, retAge) {
  var a = ageFrom(dob);
  if (!a) return null;
  return Math.max(0, N(retAge) - a);
}

// ── TAX TABLES 2025/2026 ──────────────────────────────────
// Returns gross monthly amount needed to yield nettPM nett
// Uses iterative approach: start with gross = nett / (1 - est rate), refine
var TAX_BRACKETS = [
  { limit: 237100,  base: 0,       rate: 0.18 },
  { limit: 370500,  base: 42678,   rate: 0.26 },
  { limit: 512800,  base: 77362,   rate: 0.31 },
  { limit: 673000,  base: 121475,  rate: 0.36 },
  { limit: 857900,  base: 179147,  rate: 0.39 },
  { limit: 1817000, base: 251258,  rate: 0.41 },
  { limit: Infinity,base: 643601,  rate: 0.45 }
];
var PRIMARY_REBATE = 17235;
var SECONDARY_REBATE = 9444; // 65+
var UIF_RATE = 0.01;
var UIF_MAX_ANNUAL = 1776;

function calcTaxPA(grossPA) {
  var g = N(grossPA);
  var prevLimit = 0;
  var tax = 0;
  for (var i = 0; i < TAX_BRACKETS.length; i++) {
    var b = TAX_BRACKETS[i];
    if (g <= b.limit) {
      tax = b.base + (g - prevLimit) * b.rate;
      break;
    }
    prevLimit = b.limit;
  }
  return Math.max(0, tax - PRIMARY_REBATE);
}

function calcMarginalRate(grossPA) {
  var g = N(grossPA);
  for (var i = 0; i < TAX_BRACKETS.length; i++) {
    if (g <= TAX_BRACKETS[i].limit) return TAX_BRACKETS[i].rate;
  }
  return TAX_BRACKETS[TAX_BRACKETS.length - 1].rate;
}

// Full breakdown: salary (subject to UIF) + other taxable income (rental etc — PAYE but no UIF)
function taxBreakdownFull(salaryGrossPM, otherTaxablePM) {
  var sal   = N(salaryGrossPM);
  var other = N(otherTaxablePM);
  var totalGrossPM = sal + other;
  if (totalGrossPM <= 0) return null;
  var totalGrossPA = totalGrossPM * 12;
  var taxPA = calcTaxPA(totalGrossPA);
  var uifPA = Math.min(sal * 12 * UIF_RATE, UIF_MAX_ANNUAL); // UIF on salary portion only
  var taxPM = Math.round(taxPA / 12);
  var uifPM = Math.round(uifPA / 12);
  return {
    salaryGrossPM:  sal,
    otherTaxablePM: other,
    totalGrossPM:   totalGrossPM,
    taxPM:          taxPM,
    uifPM:          uifPM,
    nettPM:         Math.round(totalGrossPM - taxPM - uifPM),
    marginalRate:   calcMarginalRate(totalGrossPA)
  };
}

// Legacy single-arg wrapper for callers that only have salary gross
function taxBreakdown(grossPM) {
  return taxBreakdownFull(N(grossPM), 0);
}

function grossFromNett(nettPM) {
  // Find gross monthly that yields nettPM after PAYE and UIF
  // Iterate: guess gross, compute nett, adjust
  var nett = N(nettPM);
  if (nett <= 0) return 0;
  var gross = nett / 0.72; // initial guess
  for (var i = 0; i < 20; i++) {
    var taxPA = calcTaxPA(gross * 12);
    var uifPA = Math.min(gross * 12 * UIF_RATE, UIF_MAX_ANNUAL);
    var nettCalc = gross - taxPA / 12 - uifPA / 12;
    var diff = nett - nettCalc;
    if (Math.abs(diff) < 1) break;
    gross += diff * 0.7;
  }
  return Math.round(gross);
}

// ── CAPITALISATION ────────────────────────────────────────
// Present value of a growing annuity (annual payments, beginning of year)
// grossMonthly: gross monthly amount (already tax-grossed-up)
// years: term in years
// escalation: annual escalation rate (decimal)
// drawdown: drawdown / return rate (decimal)
// Returns: capital lump sum needed today
function capitalise(grossMonthly, years, escalation, drawdown) {
  var pmt = N(grossMonthly) * 12; // annual
  var n = N(years);
  var g = pct(escalation);
  var r = pct(drawdown);
  if (pmt <= 0 || n <= 0) return 0;
  if (Math.abs(r - g) < 0.0001) {
    // Edge case: r ≈ g
    return pmt * n / (1 + r);
  }
  // PV of growing annuity (beginning of period)
  var pv = pmt * (1 - Math.pow((1 + g) / (1 + r), n)) / (r - g);
  return Math.round(pv);
}

// Confirm: monthly income the capital produces
// cap: capital amount, years: term, escalation, drawdown
function monthlyFromCapital(cap, years, escalation, drawdown) {
  var n = N(years);
  var g = pct(escalation);
  var r = pct(drawdown);
  var C = N(cap);
  if (C <= 0 || n <= 0) return 0;
  if (Math.abs(r - g) < 0.0001) return Math.round(C * (1 + r) / n / 12);
  var annual = C * (r - g) / (1 - Math.pow((1 + g) / (1 + r), n));
  return Math.round(annual / 12);
}

// ── RETIREMENT PROJECTION ─────────────────────────────────
// Grow a fund with contributions from now to retirement
// currentVal, monthlyContrib, annualEscalation, growthRate, years
function projectFund(currentVal, monthlyContrib, escalation, growth, years) {
  var pv = N(currentVal);
  var pmt = N(monthlyContrib);
  var g = pct(escalation);
  var r = pct(growth);
  var n = N(years);
  if (n <= 0) return pv;
  // Grow existing fund
  var fvExisting = pv * Math.pow(1 + r, n);
  if (pmt <= 0) return Math.round(fvExisting);
  // Future value of growing annuity of contributions (annual, beginning of year)
  var annualPmt = pmt * 12;
  var fvContribs;
  if (Math.abs(r - g) < 0.0001) {
    fvContribs = annualPmt * n * Math.pow(1 + r, n / 2);
  } else {
    fvContribs = annualPmt * (Math.pow(1 + r, n) - Math.pow(1 + g, n)) / (r - g);
  }
  return Math.round(fvExisting + fvContribs);
}

// Capital needed to fund income in retirement
// monthlyIncome: income needed in first year of retirement (today's rands, will inflate to retirement)
// yearsToRet: inflation-adjust the income to retirement date
// yearsInRet: how many years capital must last
// cpi: inflation rate
// returnRate: return on capital in retirement
function retirementCapitalNeeded(monthlyIncomeToday, yearsToRet, yearsInRet, cpiToRet, returnRate, escInRet) {
  if (N(monthlyIncomeToday) <= 0 || N(yearsInRet) <= 0) return 0;
  // Inflate to retirement date using escalation-to-retirement rate
  var incomeAtRet = N(monthlyIncomeToday) * Math.pow(1 + pct(cpiToRet), N(yearsToRet));
  // Capitalise in retirement using escInRet (separate from cpiToRet)
  // If escInRet not provided, default to cpiToRet (backward compatible)
  var inRetEsc = (escInRet !== undefined && escInRet !== null && escInRet !== '') ? N(escInRet) : N(cpiToRet);
  return capitalise(incomeAtRet, N(yearsInRet), inRetEsc, N(returnRate));
}

// ── CGT ON DEATH (SA Eighth Schedule) ────────────────────
// SA rules: deemed disposal at market value on death
// Inclusion rate: 40% for individuals
// Year-of-death annual exclusion: R300,000
// Primary residence exclusion: first R2,000,000 of gain
// Spouse beneficiary: rollover — no CGT on death
// Returns { gain, includedGain, cgt } for a single asset
// marginalRate: client's marginal income tax rate (decimal)
// primaryResidence: boolean — apply R2m exclusion
// Applied against shared R300k annual exclusion externally
var CGT_INCLUSION   = 0.40;
var CGT_ANNUAL_EXCL = 300000;  // year of death
var CGT_PRIMARY_RES = 2000000; // primary residence gain exclusion

function calcCGTAsset(marketVal, baseCost, primaryResidence) {
  var mv   = N(marketVal);
  var bc   = N(baseCost);
  if (mv <= 0 || bc <= 0) return { gain: 0, gainAfterExcl: 0 };
  var gain = Math.max(0, mv - bc);
  if (primaryResidence) gain = Math.max(0, gain - CGT_PRIMARY_RES);
  return { gain: Math.max(0, mv - bc), gainAfterExcl: gain };
}

// Total CGT liability across all assets on death
// Returns array of { desc, gain, gainAfterPR, includedGain, cgt }
// and totalCGT after applying shared annual exclusion
function calcTotalCGT(marginalRate) {
  var items = [];
  var totalGainAfterPR = 0;

  // Properties — only if NOT going to spouse (spouse = rollover)
  (S.props||[]).forEach(function(p) {
    if (!N(p.val) || !N(p.baseCost)) return;
    if ((p.deathBenType||'Estate') === 'Spouse') return; // rollover
    var r = calcCGTAsset(p.val, p.baseCost, !!p.primaryResidence);
    if (r.gainAfterExcl > 0) {
      items.push({ desc: p.desc||'Property', gain: r.gain, gainAfterPR: r.gainAfterExcl });
      totalGainAfterPR += r.gainAfterExcl;
    }
  });

  // Vehicles
  (S.vehicles||[]).forEach(function(v) {
    if (!N(v.val) || !N(v.baseCost)) return;
    if ((v.deathBenType||'Estate') === 'Spouse') return;
    var r = calcCGTAsset(v.val, v.baseCost, false);
    if (r.gainAfterExcl > 0) {
      items.push({ desc: v.desc||'Vehicle', gain: r.gain, gainAfterPR: r.gainAfterExcl });
      totalGainAfterPR += r.gainAfterExcl;
    }
  });

  // Other assets — only if cgtApplicable is not explicitly false
  (S.otherAssets||[]).forEach(function(a) {
    if (!N(a.val) || !N(a.baseCost)) return;
    if (a.cgtApplicable === false || a.cgtApplicable === 'false') return; // explicitly exempt
    if ((a.deathBenType||'Estate') === 'Spouse') return;
    var r = calcCGTAsset(a.val, a.baseCost, false);
    if (r.gainAfterExcl > 0) {
      items.push({ desc: a.desc||'Asset', gain: r.gain, gainAfterPR: r.gainAfterExcl });
      totalGainAfterPR += r.gainAfterExcl;
    }
  });

  // Investment / Unit Trust policies — CGT applies, base cost = lump sum premium
  // If Frequency = Once Off, Premium IS the lump sum premium (base cost)
  // Endowments, TFS, RA types, Living Annuity — all exempt
  (S.importedPols||[]).forEach(function(p) {
    if (p.Type !== 'Investment' && p.Type !== 'Unit Trust') return;
    if ((p.BeneficiaryType||'') === 'Spouse') return; // rollover
    // Base cost: Once Off premium = lump sum. Otherwise use manually entered LumpSumPremium.
    var baseCostPol = (p.Frequency === 'Once Off') ? N(p.Premium) : N(p.LumpSumPremium);
    if (!N(p.BenFundValue) || !baseCostPol) return;
    var r = calcCGTAsset(p.BenFundValue, baseCostPol, false);
    if (r.gainAfterExcl > 0) {
      items.push({ desc: (p.Insurer||'Investment')+(p.Product?' — '+p.Product:''), gain: r.gain, gainAfterPR: r.gainAfterExcl });
      totalGainAfterPR += r.gainAfterExcl;
    }
  });

  // Apply shared annual exclusion (R300k in year of death)
  var netGain     = Math.max(0, totalGainAfterPR - CGT_ANNUAL_EXCL);
  var includedGain= Math.round(netGain * CGT_INCLUSION);
  var mr          = N(marginalRate) > 0 ? N(marginalRate) / 100 : 0.45; // default max if unknown
  var totalCGT    = Math.round(includedGain * mr);

  return { items: items, totalGainAfterPR: totalGainAfterPR, netGain: netGain, includedGain: includedGain, totalCGT: totalCGT };
}

function deepMerge(base, over) {
  if (typeof over !== 'object' || over === null) return over !== undefined ? over : base;
  var result = JSON.parse(JSON.stringify(base));
  Object.keys(over).forEach(function (k) {
    if (Array.isArray(over[k])) { result[k] = over[k]; }
    else if (typeof over[k] === 'object' && over[k] !== null && typeof base[k] === 'object') {
      result[k] = deepMerge(base[k], over[k]);
    } else { result[k] = over[k]; }
  });
  return result;
}

  var skip = {importedPols: true};
  Object.keys(S).forEach(function(k){ if(!skip[k]) saveData[k] = S[k]; });

  var payload = JSON.stringify({ action: 'saveFNA', clientId: clientId, jsonData: JSON.stringify(saveData) });
  var indicator = document.getElementById('syncIndicator');
  if(indicator) { indicator.textContent = '↑ Saving...'; indicator.style.color = '#a8b938'; }

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: payload
  })
  .then(function(r){ return r.json(); })
  .then(function(res){
    if(res.ok){
      var t = new Date().toLocaleTimeString('en-ZA',{hour:'2-digit',minute:'2-digit'});
      if(indicator){ indicator.textContent = '✓ Synced ' + t; indicator.style.color = '#86efac'; }
      if(!silent) status('✓ Saved to server at ' + t);
    } else {
      if(indicator){ indicator.textContent = '⚠ Sync failed'; indicator.style.color = '#f87171'; }
      if(!silent) status('⚠ Server save failed: ' + (res.error||'unknown'));
    }
  })
  .catch(function(err){
    if(indicator){ indicator.textContent = '⚠ Offline'; indicator.style.color = '#f87171'; }
    if(!silent) status('⚠ Could not reach server — data saved locally only');
  });
}

// Load FNA state from Google Sheets
function loadFromServer(clientId, onDone) {
  if(!clientId){ if(onDone) onDone(null); return; }
  var url = APPS_SCRIPT_URL + '?action=loadFNA&clientId=' + encodeURIComponent(clientId) + '&callback=_fnaServerCb';
  window._fnaServerCb = function(res){
    delete window._fnaServerCb;
    if(res && res.ok && res.data){
      try {
        var serverState = JSON.parse(res.data);
        if(onDone) onDone(serverState, res.saved||'');
      } catch(e){ if(onDone) onDone(null); }
    } else {
      if(onDone) onDone(null);
    }
  };
  var s = document.createElement('script'); s.src = url;
  s.onerror = function(){ if(onDone) onDone(null); };
  document.head.appendChild(s);
}

// ═══════════════════════════════════════════════════════════
// FIELD BUILDER HELPERS (no re-render on input)
// ═══════════════════════════════════════════════════════════
function el(tag, className, textContent) {
  var e = document.createElement(tag);
  if (className) e.className = className;
  if (textContent !== undefined) e.textContent = textContent;
  return e;
}
function div(className) { return el('div', className); }

// Text field: binds to obj[key], no render on input, optional blur callback
function fld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var inp = document.createElement('input');
  inp.type = opts.type || 'text';
  inp.value = obj[key] || '';
  if (opts.placeholder) inp.placeholder = opts.placeholder;
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  wrap.appendChild(inp);
  return wrap;
}

// Rand field
function rfld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var rw = div('rw');
  var rp = el('span', 'rp', 'R');
  var inp = document.createElement('input');
  inp.type = 'text'; inp.inputMode = 'numeric';
  inp.value = obj[key] || '';
  inp.placeholder = '0';
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  rw.appendChild(rp); rw.appendChild(inp);
  wrap.appendChild(rw);
  return wrap;
}

// Percent field
function pfld(labelTxt, obj, key, opts) {
  opts = opts || {};
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var pw = div('pw');
  var pp = el('span', 'pp', '%');
  var inp = document.createElement('input');
  inp.type = 'text'; inp.inputMode = 'numeric';
  inp.value = obj[key] || '';
  inp.placeholder = '0';
  if (opts.readonly) inp.readOnly = true;
  inp.addEventListener('input', function (e) { obj[key] = e.target.value; });
  if (opts.onblur) inp.addEventListener('blur', function (e) { obj[key] = e.target.value; opts.onblur(e.target.value); });
  pw.appendChild(inp); pw.appendChild(pp);
  wrap.appendChild(pw);
  return wrap;
}

// Select field
function sfld(labelTxt, obj, key, options) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var sel = document.createElement('select');
  options.forEach(function (o) {
    var opt = document.createElement('option');
    var v = typeof o === 'object' ? o.v : o;
    var l = typeof o === 'object' ? o.l : o;
    opt.value = v; opt.textContent = l;
    if (String(obj[key]) === String(v)) opt.selected = true;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', function (e) { obj[key] = e.target.value; render(); });
  wrap.appendChild(sel);
  return wrap;
}

// Textarea
function txfld(labelTxt, obj, key) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var ta = document.createElement('textarea');
  ta.value = obj[key] || ''; ta.placeholder = 'Notes...';
  ta.addEventListener('input', function (e) { obj[key] = e.target.value; });
  wrap.appendChild(ta);
  return wrap;
}

// Radio group
function radioGrp(labelTxt, obj, key, options) {
  var wrap = div('f');
  if (labelTxt) { var lb = el('label'); lb.textContent = labelTxt; wrap.appendChild(lb); }
  var rg = div('rg');
  var gname = key + '_' + Math.random().toString(36).slice(2);
  options.forEach(function (o) {
    var v = typeof o === 'object' ? o.v : o;
    var l = typeof o === 'object' ? o.l : o;
    var lbl = document.createElement('label');
    var inp = document.createElement('input'); inp.type = 'radio'; inp.name = gname; inp.value = v;
    if (String(obj[key]) === String(v)) inp.checked = true;
    inp.addEventListener('change', function (e) { obj[key] = e.target.value; });
    lbl.appendChild(inp); lbl.appendChild(document.createTextNode(l));
    rg.appendChild(lbl);
  });
  wrap.appendChild(rg);
  return wrap;
}

// ═══════════════════════════════════════════════════════════
// TAB 2 — INCOME
// ═══════════════════════════════════════════════════════════
function buildIncome() {
  var s = div();

  // Auto-sync rental income rows from Properties tab
  // Rows with src starting with "Rental:" are managed automatically
  var rentalSrcs = S.props.filter(function(p){ return N(p.rental) > 0; })
                           .map(function(p){ return 'Rental: ' + (p.desc||'Property'); });
  // Remove stale auto rental rows (property deleted or rental cleared)
  S.incRows = S.incRows.filter(function(r){
    if (r._auto) return rentalSrcs.indexOf(r.src) > -1;
    return true;
  });
  // Add missing rental rows
  rentalSrcs.forEach(function(src) {
    var exists = S.incRows.filter(function(r){ return r.src === src; })[0];
    if (!exists) {
      var prop = S.props.filter(function(p){ return 'Rental: '+(p.desc||'Property') === src; })[0];
      S.incRows.push({ src: src, pm: prop ? String(Math.round(N(prop.rental))) : '', _auto: true, _taxable: true });
    } else {
      var prop2 = S.props.filter(function(p){ return 'Rental: '+(p.desc||'Property') === src; })[0];
      if (prop2) exists.pm = String(Math.round(N(prop2.rental)));
      exists._taxable = true; // mark as taxable
    }
  });

  s.appendChild(stitle('Income Sources'));
  var incInf = div('info');
  incInf.innerHTML = 'The <strong>first row (Salary / drawings)</strong> drives the PAYE calculation. ' +
    'Rental income rows (from the Assets tab) are automatically included in taxable income — ' +
    'this affects your marginal rate and RA deduction benefit. ' +
    'Add other income below; tick the <strong>Taxable</strong> box if it\'s subject to income tax.';
  s.appendChild(incInf);

  var itbl = document.createElement('table');
  itbl.innerHTML = '<thead><tr><th>Source</th><th>Gross R/pm</th><th>Taxable</th><th></th></tr></thead>';
  var ib = document.createElement('tbody');
  S.incRows.forEach(function(r, i) {
    var tr = document.createElement('tr');

    // Source description (read-only for auto rental rows)
    var t1 = document.createElement('td');
    if (r._auto) {
      var autoLbl = document.createElement('span');
      autoLbl.textContent = r.src;
      autoLbl.style.cssText = 'font-size:12px;color:var(--sub);font-style:italic';
      t1.appendChild(autoLbl);
    } else {
      var si = document.createElement('input'); si.type = 'text'; si.value = r.src || '';
      si.placeholder = i === 0 ? 'Salary / drawings' : 'e.g. Investment income, spouse salary';
      si.addEventListener('input', function(e) { S.incRows[i].src = e.target.value; });
      t1.appendChild(si);
    }
    tr.appendChild(t1);

    // Amount
    var t2 = document.createElement('td');
    var rw = div('td-r'); rw.appendChild(el('span', 'rp', 'R'));
    var vi = document.createElement('input'); vi.type = 'text'; vi.inputMode = 'numeric';
    vi.value = r.pm || ''; vi.placeholder = '0';
    vi.readOnly = !!r._auto; // auto rows are read-only (driven by Assets tab)
    if (r._auto) vi.style.color = 'var(--sub)';
    vi.addEventListener('input', function(e) { if (!S.incRows[i]._auto) S.incRows[i].pm = e.target.value; });
    vi.addEventListener('blur', function(e) {
      if (!S.incRows[i]._auto) S.incRows[i].pm = e.target.value;
      render();
    });
    rw.appendChild(vi); t2.appendChild(rw); tr.appendChild(t2);

    // Taxable checkbox (row 0 always taxable; auto rental always taxable — both locked)
    var t3 = document.createElement('td'); t3.style.textAlign = 'center';
    var tcb = document.createElement('input'); tcb.type = 'checkbox';
    var isTaxable = (i === 0) || !!r._taxable;
    tcb.checked = isTaxable;
    tcb.disabled = (i === 0 || !!r._auto); // can't untick salary or auto rental
    tcb.addEventListener('change', function(e) { S.incRows[i]._taxable = e.target.checked; render(); });
    t3.appendChild(tcb); tr.appendChild(t3);

    // Delete
    var t4 = document.createElement('td');
    if (i > 0 && !r._auto) t4.appendChild(delBtn(function() { S.incRows.splice(i, 1); render(); }));
    tr.appendChild(t4);

    ib.appendChild(tr);
  });
  itbl.appendChild(ib);
  var itw = div('twrap'); itw.appendChild(itbl); s.appendChild(itw);
  s.appendChild(addBtn('+ Add Income Source', function() {
    S.incRows.push({ src: '', pm: '', _taxable: false }); render();
  }));

  // ── Tax calculation: salary + all taxable other income together
  var salaryGross    = N(S.incRows[0] && S.incRows[0].pm);
  var otherTaxable   = S.incRows.slice(1).reduce(function(sum, r) {
    return sum + (r._taxable ? N(r.pm) : 0);
  }, 0);
  var nonTaxable     = S.incRows.slice(1).reduce(function(sum, r) {
    return sum + (!r._taxable ? N(r.pm) : 0);
  }, 0);

  if (salaryGross > 0 || otherTaxable > 0) {
    var t = taxBreakdownFull(salaryGross, otherTaxable);
    if (t) {
      S.cli.grossPM = String(salaryGross);
      S.cli.nettPM  = String(t.nettPM);
      var tb = div('taxbox');
      tb.style.marginTop = '12px';
      tb.innerHTML =
        '<div class="tr"><span>Gross salary / drawings</span><span>' + Rfmt(t.salaryGrossPM) + '</span></div>' +
        (t.otherTaxablePM > 0 ?
          '<div class="tr"><span>Other taxable income (rental etc)</span><span>+ ' + Rfmt(t.otherTaxablePM) + '</span></div>' +
          '<div class="tr"><span>Total taxable income p/m</span><span>' + Rfmt(t.totalGrossPM) + '</span></div>'
          : '') +
        '<div class="tr"><span>PAYE (income tax)</span><span>− ' + Rfmt(t.taxPM) + '</span></div>' +
        '<div class="tr"><span>UIF (on salary only)</span><span>− ' + Rfmt(t.uifPM) + '</span></div>' +
        '<div class="tr tot"><span>Estimated nett income p/m</span><span>' + Rfmt(t.nettPM) + '</span></div>' +
        (t.otherTaxablePM > 0 ?
          '<div class="tr" style="font-size:11px;color:#aab;margin-top:4px"><span>Marginal rate (combined income)</span><span>' +
          Math.round(t.marginalRate * 100) + '%</span></div>'
          : '');
      s.appendChild(tb);

      if (t.otherTaxablePM > 0) {
        var raNote = div('info');
        raNote.style.cssText = 'font-size:11px;background:#eff6ff;border-color:#bfdbfe;color:#1e40af;margin-top:6px';
        raNote.innerHTML = '💡 <strong>RA tax benefit:</strong> At a marginal rate of ' + Math.round(t.marginalRate * 100) +
          '%, an RA contribution of R10 000/pm saves approximately <strong>' +
          Rfmt(Math.round(10000 * t.marginalRate)) + ' in tax per month</strong>. ' +
          'Rental income pushes the marginal rate up — contributing to an RA is more tax-efficient.';
        s.appendChild(raNote);
      }
    }
  }

  // Retirement age
  var retRow = g2(); retRow.style.marginTop = '14px';
  retRow.appendChild(sfld('Retirement Age', S.cli, 'retAge', ['55','60','63','65','67','70']));
  s.appendChild(retRow);

  // Total income summary
  var nettIncome = N(S.cli.nettPM);
  var totInc     = nettIncome + nonTaxable; // nett already includes rental nett via taxBreakdownFull

  if (totInc > 0) {
    var ti = div('info'); ti.style.marginTop = '4px';
    ti.innerHTML = 'Total nett income: <strong>' + Rfmt(nettIncome) + '</strong>' +
      (nonTaxable > 0 ? ' + Non-taxable: <strong>' + Rfmt(nonTaxable) + '</strong>' : '') +
      ' = <strong>' + Rfmt(totInc) + ' /pm</strong>';
    s.appendChild(ti);
  }

  s.appendChild(stitle('Monthly Expenses'));
  var eg = g2();
  eg.appendChild(rfld('Total monthly expenses', S, 'expenses'));
  var surplus = totInc - N(S.expenses);
  var sf = div('f');
  sf.appendChild(el('label', '', 'Monthly surplus / shortfall'));
  var si2 = document.createElement('input'); si2.type = 'text'; si2.readOnly = true;
  si2.value = totInc > 0 && N(S.expenses) > 0 ? (surplus >= 0 ? '+ ' : '') + Rfmt(surplus) : '';
  si2.style.fontWeight = '700';
  si2.style.color = surplus >= 0 ? 'var(--green)' : 'var(--red)';
  sf.appendChild(si2);
  eg.appendChild(sf);
  s.appendChild(eg);

  s.appendChild(txfld('Income notes', S, 'incNotes'));
  return s;
}

// ── Income Need helpers — global, used by buildNeeds, buildSummary, printFNA
function calcIncomeNeed(r) {
  var gross = N(r.grossPM) || grossFromNett(r.nettPM);
  if (!gross) return 0;
  var escRate = N(r.esc) > 0 ? r.esc : S.assump.cpi;
  var dr = N(r.drawdown) > 0 ? r.drawdown : S.assump.drawdown;
  return capitalise(gross, r.years, escRate, dr);
}

function buildNeeds() {
  var s = div();
  var tabs2 = ['death','disability','dread'];

  // Sub-tab bar
  var subBar = div('tabbar'); subBar.style.cssText='margin-bottom:16px;border-bottom:2px solid var(--mist)';
  tabs2.forEach(function(tk){
    if(!S.scope[tk] && !(tk==='disability'&&S.scope.ip)) return;
    var tb = el('div','tab'+(S._needsTab===tk?' on':''), tabLabels[tk]);
    tb.addEventListener('click',function(){ S._needsTab=tk; render(); });
    subBar.appendChild(tb);
  });
  s.appendChild(subBar);

  var activeNeed = S._needsTab || 'death';

  // ── LIFE COVER TAB
  if (activeNeed === 'death' && S.scope.death) {
    s.appendChild(stitle('Liabilities — payable on death'));
    var inf1=div('info');
    inf1.innerHTML='Bonds and vehicle finance pull automatically from the Assets tab. '+
      'CGT pulls from the Assets tab. Estate costs pull from Estate Planning (if in scope). '+
      'Add personal loans, income tax and funeral costs manually below.';
    s.appendChild(inf1);

    // ── Auto rows — read only, sourced from Assets tab
    var autoLiabs = [];

    // Bonds from properties
    (S.props||[]).forEach(function(p){
      if(N(p.bond)>0) autoLiabs.push({desc:(p.desc||'Property')+' — bond outstanding', amt:N(p.bond), _auto:true});
    });

    // Finance from vehicles
    (S.vehicles||[]).forEach(function(v){
      if(N(v.finance)>0) autoLiabs.push({desc:(v.desc||'Vehicle')+' — finance outstanding', amt:N(v.finance), _auto:true});
    });

    // CGT on death
    var _mr = N(S.cli.grossPM)>0 ? calcMarginalRate(N(S.cli.grossPM)*12) : 0.45;
    var _cgt = calcTotalCGT(_mr*100);
    if(_cgt.totalCGT>0){
      autoLiabs.push({desc:'Capital Gains Tax on death (estimated)', amt:_cgt.totalCGT, _auto:true, _cgt:true});
    }

    // Estate costs — if estate in scope, pull duty (estate share), exec fees, accrual
    if(S.scope.estate){
      // Recalculate using same logic as buildEstate/buildSummary
      var _pv=(S.props||[]).reduce(function(a,p){return a+N(p.val);},0)
        +(S.vehicles||[]).reduce(function(a,v){return a+N(v.val);},0)
        +(S.otherAssets||[]).reduce(function(a,x){return a+N(x.val);},0);
      var _pl=(S.props||[]).reduce(function(a,p){return a+N(p.bond);},0)
        +(S.vehicles||[]).reduce(function(a,v){return a+N(v.finance);},0)
        +(S.liabilities||[]).reduce(function(a,l){return a+N(l.bal);},0);
      var _s4q=0,_ep=0,_tp=0,_bd=0;
      (S.importedPols||[]).forEach(function(p){
        if(p.Type==='Business Assurance'){if(p.EstateDutiable==='Yes')_bd+=N(p.LoanAmount)||N(p.BenDeath);return;}
        var b=N(p.BenDeath);if(!b)return;
        var bt=p.BeneficiaryType||'';
        if(bt==='Spouse')_s4q+=b;else if(bt==='Estate')_ep+=b;else if(bt==='Third Party')_tp+=b;
      });
      var _acc=0;
      if((S.cli.marital||'').indexOf('accrual')>-1){
        var _ra=(S.importedPols||[]).reduce(function(a,p){return POL_RA_TYPES.indexOf(p.Type)>-1?a+(N(p.BenFundValue)||N(p.BenDeath)):a;},0);
        var _ce=_pv+_ra, _se=N(S.accrual&&S.accrual.spouseCurrentAssets);
        var _cs=N(S.accrual&&S.accrual.clientStartVal), _ss=N(S.accrual&&S.accrual.spouseStartVal);
        _acc=Math.max(0,(Math.max(0,_ce-_cs)-Math.max(0,_se-_ss))/2);
      }
      var _cgtNeed=calcTotalCGT((N(S.cli.grossPM)>0?calcMarginalRate(N(S.cli.grossPM)*12):0.45)*100).totalCGT;
      var _gr=_pv+_s4q+_ep+_tp+_bd;
      var _ne=Math.max(0,_gr-_pl-_cgtNeed);
      var _ad=Math.min(_acc,_ne);
      var _aa=Math.max(0,_ne-_ad);
      var _s4d=Math.min(_s4q,_aa);
      var _as4=Math.max(0,_aa-_s4d);
      var _dut=Math.max(0,_as4-ABATEMENT);
      var _duty=_dut<=DUTY_THRESH?_dut*DUTY_RATE1:DUTY_THRESH*DUTY_RATE1+(_dut-DUTY_THRESH)*DUTY_RATE2;
      var _exec=(_pv+_ep)*EXEC_RATE;
      // Apportion duty (s.7) — each category pays duty proportional to its share of estate after s4q
      // Use _aa (after s4q, before abatement) as the denominator — that is the correct base
      function _ap(v){return (_aa>0&&_duty>0)?Math.round(_duty*(v/_aa)):0;}
      var _de=_ap(_pv+_ep); // estate's share: physical assets + estate policies
      if(_de>0) autoLiabs.push({desc:'Estate duty — estate\'s share', amt:_de, _auto:true});
      if(_exec>0) autoLiabs.push({desc:'Executor fees (4.025%)', amt:Math.round(_exec), _auto:true});
      if(_ad>0) autoLiabs.push({desc:'Accrual payable to spouse', amt:Math.round(_ad), _auto:true});
    }

    // Render auto rows (read-only)
    if(autoLiabs.length>0){
      var autoTbl=document.createElement('table'); autoTbl.style.cssText='width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px';
      autoTbl.innerHTML='<thead><tr><th style="text-align:left;padding:5px 8px;background:var(--navy);color:#fff">Item (auto-calculated)</th><th style="text-align:right;padding:5px 8px;background:var(--navy);color:#fff">Amount</th></tr></thead>';
      var atb=document.createElement('tbody');
      var autoTotal=0;
      autoLiabs.forEach(function(r){
        autoTotal+=r.amt;
        var tr=document.createElement('tr');
        tr.innerHTML='<td style="padding:5px 8px;border-bottom:1px solid var(--mist);color:var(--sub);font-style:italic">'+
          (r._cgt?'⚠ ':'')+(r.desc||'')+'</td>'+
          '<td style="text-align:right;padding:5px 8px;border-bottom:1px solid var(--mist);color:var(--sub)">'+Rfmt(r.amt)+'</td>';
        atb.appendChild(tr);
      });
      autoTbl.appendChild(atb);
      var atw=div('twrap'); atw.appendChild(autoTbl); s.appendChild(atw);
    }

    // ── Manual rows — personal loans, tax, funeral
    var manInf=div('info'); manInf.style.cssText='font-size:11px;background:#f0f4ff;border-color:#c7d2fe;color:#3730a3;margin-bottom:6px';
    manInf.textContent='Add personal loans, outstanding income tax and funeral costs below.';
    s.appendChild(manInf);
    S.deathLiabs.forEach(function(r,i){
      var row=g3();
      row.appendChild(fld('Description',r,'desc',{placeholder:'e.g. Personal loan, income tax'}));
      row.appendChild(rfld('Amount',r,'amt',{onblur:function(){render();}}));
      row.appendChild(div());
      var del=delBtn(function(){S.deathLiabs.splice(i,1);render();}); var dw=div('f'); dw.appendChild(del); row.appendChild(dw);
      s.appendChild(row);
    });
    var ab1=addBtn('+ Add liability',function(){S.deathLiabs.push({desc:'',amt:''});render();}); s.appendChild(ab1);

    s.appendChild(stitle('Income replacement needs'));
    var inf2=div('info'); inf2.textContent='Monthly income the family needs. Enter nett — the system grosses up for tax.'; s.appendChild(inf2);
    S.deathIncome.forEach(function(r,i){ buildIncomeNeedRow(s,r,i,'deathIncome'); });
    var ab2=addBtn('+ Add income need',function(){S.deathIncome.push({desc:'',nettPM:'',grossPM:'',years:'',esc:'',drawdown:''});render();}); s.appendChild(ab2);

    s.appendChild(stitle('Capital requirements'));
    var inf3=div('info'); inf3.textContent='Lump sums needed — education, emergency fund, bequests.'; s.appendChild(inf3);
    S.deathCapital.forEach(function(r,i){
      var row=g3();
      row.appendChild(fld('Description',r,'desc',{placeholder:'e.g. Education fund'}));
      row.appendChild(rfld('Amount',r,'amt',{onblur:function(){render();}}));
      row.appendChild(div());
      var del=delBtn(function(){S.deathCapital.splice(i,1);render();}); var dw=div('f'); dw.appendChild(del); row.appendChild(dw);
      s.appendChild(row);
    });
    var ab3=addBtn('+ Add capital need',function(){S.deathCapital.push({desc:'',amt:''});render();}); s.appendChild(ab3);

    // Summary — auto + manual liabilities combined
    var autoTotal2=(autoLiabs||[]).reduce(function(a,r){return a+r.amt;},0);
    var totLiab=autoTotal2+S.deathLiabs.reduce(function(a,r){return a+N(r.amt);},0);
    var totInc=S.deathIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
    var totCap=S.deathCapital.reduce(function(a,r){return a+N(r.amt);},0);
    var totalNeed=totLiab+totInc+totCap;
    var totalHave=N(S.existingCover&&S.existingCover.death);
    if(totalNeed>0){
      var sumBox=div('calc-result'); sumBox.style.marginTop='16px';
      sumBox.innerHTML='<div class="cr-row"><span>Liabilities</span><span class="gold">'+Rfmt(totLiab)+'</span></div>'+
        '<div class="cr-row"><span>Income (capitalised)</span><span class="gold">'+Rfmt(totInc)+'</span></div>'+
        '<div class="cr-row"><span>Capital needs</span><span class="gold">'+Rfmt(totCap)+'</span></div>'+
        '<div class="cr-row big"><span>Total cover needed</span><span class="gold">'+Rfmt(totalNeed)+'</span></div>'+
        '<div class="cr-row"><span>Existing cover</span><span class="gold">'+Rfmt(totalHave)+'</span></div>'+
        '<div class="cr-row big"><span>'+(totalHave>=totalNeed?'Surplus':'Shortfall')+'</span><span style="color:'+(totalHave>=totalNeed?'var(--green)':'var(--red)')+'">'+Rfmt(Math.abs(totalHave-totalNeed))+'</span></div>';
      s.appendChild(sumBox);
    }
  }

  // ── DISABILITY & IP TAB
  if (activeNeed === 'disability' && (S.scope.disability || S.scope.ip)) {
    if(S.scope.ip) {
      s.appendChild(stitle('Income Protection'));
      var ipInf=div('info'); ipInf.textContent='Monthly income protection benefit needed.'; s.appendChild(ipInf);
      var ipg=g3();
      ipg.appendChild(rfld('Nett benefit needed /pm', S, 'ipNettPM', {onblur:function(){S.ipGrossPM=String(Math.round(grossFromNett(S.ipNettPM)));render();}}));
      ipg.appendChild(rfld('Gross benefit /pm (auto)', S, 'ipGrossPM', {readonly:true}));
      ipg.appendChild(div());
      s.appendChild(ipg);
      var ipg2=g3();
      ipg2.appendChild(sfld('Waiting period', S, 'ipWait', ['1 month','3 months','6 months','12 months']));
      ipg2.appendChild(sfld('Benefit period', S, 'ipBenefit', ['2 years','5 years','To age 60','To age 65','To age 70']));
      s.appendChild(ipg2);
    }
    if(S.scope.disability) {
      s.appendChild(stitle('Disability — income needs (capitalised)'));
      S.disIncome.forEach(function(r,i){ buildIncomeNeedRow(s,r,i,'disIncome'); });
      var dab=addBtn('+ Add income need',function(){S.disIncome.push({desc:'',nettPM:'',grossPM:'',years:'',esc:'',drawdown:''});render();}); s.appendChild(dab);
      s.appendChild(stitle('Disability — lump sum capital needs'));
      S.disCapital.forEach(function(r,i){
        var row=g3();
        row.appendChild(fld('Description',r,'desc',{placeholder:'e.g. Adapt home / vehicle'}));
        row.appendChild(rfld('Amount',r,'amt',{onblur:function(){render();}}));
        row.appendChild(div());
        var del=delBtn(function(){S.disCapital.splice(i,1);render();}); var dw=div('f'); dw.appendChild(del); row.appendChild(dw);
        s.appendChild(row);
      });
      var dcab=addBtn('+ Add capital need',function(){S.disCapital.push({desc:'',amt:''});render();}); s.appendChild(dcab);
    }
    var disInc=S.disIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
    var disCap=S.disCapital.reduce(function(a,r){return a+N(r.amt);},0);
    var disHave=N(S.existingCover&&S.existingCover.disability);
    var disTotal=disInc+disCap;
    if(disTotal>0||N(S.ipGrossPM)>0){
      var disBox=div('calc-result'); disBox.style.marginTop='16px';
      disBox.innerHTML=(N(S.ipGrossPM)>0?'<div class="cr-row"><span>IP benefit needed /pm</span><span class="gold">'+Rfmt(S.ipGrossPM)+'</span></div>':'')+
        (disTotal>0?'<div class="cr-row big"><span>Lump sum needed</span><span class="gold">'+Rfmt(disTotal)+'</span></div>':'')+
        '<div class="cr-row"><span>Existing disability cover</span><span class="gold">'+Rfmt(disHave)+'</span></div>'+
        (disTotal>0?'<div class="cr-row big"><span>'+(disHave>=disTotal?'Surplus':'Shortfall')+'</span><span style="color:'+(disHave>=disTotal?'var(--green)':'var(--red)')+'">'+Rfmt(Math.abs(disHave-disTotal))+'</span></div>':'');
      s.appendChild(disBox);
    }
  }

  // ── DREAD DISEASE TAB
  if (activeNeed === 'dread' && S.scope.dread) {
    s.appendChild(stitle('Dread Disease / Trauma'));
    var drInf=div('info'); drInf.textContent='Suggested: 18-24 months gross income, or cost of treatment + income for recovery period.'; s.appendChild(drInf);
    var drg=g3();
    drg.appendChild(rfld('Cover needed', S, 'dreadAmt', {onblur:function(){render();}}));
    var dreadHave=N(S.existingCover&&S.existingCover.dread);
    var drGap=dreadHave-N(S.dreadAmt);

    drg.appendChild(div());
    s.appendChild(drg);
    if(N(S.dreadAmt)>0){
      var drBox=div('calc-result'); drBox.style.marginTop='8px';
      drBox.innerHTML='<div class="cr-row big"><span>Cover needed</span><span class="gold">'+Rfmt(S.dreadAmt)+'</span></div>'+
        '<div class="cr-row"><span>Existing cover</span><span class="gold">'+Rfmt(dreadHave)+'</span></div>'+
        '<div class="cr-row big"><span>'+(drGap>=0?'Surplus':'Shortfall')+'</span><span style="color:'+(drGap>=0?'var(--green)':'var(--red)')+'">'+Rfmt(Math.abs(drGap))+'</span></div>';
      s.appendChild(drBox);
    }
  }

  return s;
}

function buildRetirement() {

  // ── Lump sum needs at retirement

      propsRental.forEach(function(p){
        var escTo=N(p.rentalEsc)>0?N(p.rentalEsc):6;
        var escIn=N(p.rentalRetEsc)>0?N(p.rentalRetEsc):N(S.assump.cpi)||6;
        var renAtRet=yrsToRet?Math.round(N(p.rental)*Math.pow(1+escTo/100,yrsToRet)):N(p.rental);
        var tr=document.createElement('tr');
        tr.innerHTML='<td>'+(p.desc||'Property')+'</td><td>'+Rfmt(p.rental)+'/pm</td><td>'+escTo+'%</td>'+
          '<td><strong>'+Rfmt(renAtRet)+'/pm</strong></td><td>'+escIn+'%</td>';
        prTb.appendChild(tr);
      });
      prTbl.appendChild(prTb);
      var prTw=div('twrap'); prTw.appendChild(prTbl); s.appendChild(prTw);
    }
  }

  // Additional manual proceeds not from properties
  var og=g2();
  og.appendChild(rfld('Additional proceeds (other assets / manual)', S, 'retOtherCapital', {onblur:function(){render();}}));
  og.appendChild(div());
  s.appendChild(og);

  // ── Living Annuity and Life Annuity income drawings — informational
  var laIncPols=(S.importedPols||[]).filter(function(p){ return p.Type==='Living Annuity'&&N(p.BenLAIncome)>0; });
  var lifeAnnPols=(S.importedPols||[]).filter(function(p){ return p.Type==='Life Annuity'&&N(p.BenLifeAnnuityIncome)>0; });
  if(laIncPols.length>0 || lifeAnnPols.length>0){
    s.appendChild(stitle('Annuity Income in Retirement'));
    var laInf=div('info');
    laInf.innerHTML='Living Annuity fund values are included in <strong>Retirement Assets</strong> above — '
      +'income drawings confirm what those funds are currently producing. '
      +'Life Annuity income has no residual capital. '
      +'<strong>Both are shown for information only</strong> — they do not reduce the capital gap (to avoid double-counting).';
    s.appendChild(laInf);

    var laTbl=document.createElement('table');
    laTbl.innerHTML='<thead><tr>'
      +'<th>Policy</th>'
      +'<th>Annuity type</th>'
      +'<th style="text-align:right">Drawing today /pm</th>'
      +'<th style="text-align:right">Growth − Drawdown</th>'
      +(yrsToRet?'<th style="text-align:right">At retirement /pm</th>':'')
      +'<th>Tax treatment</th>'
      +'</tr></thead>';
    var laTb=document.createElement('tbody');

    laIncPols.forEach(function(p){
      var incToday=N(p.BenLAIncome);
      var escRate=(function(r){return r>0?r:N(S.assump.cpi)||6;})(laEscRate(p));
      var incAtRet=yrsToRet?Math.round(incToday*Math.pow(1+escRate/100,yrsToRet)):incToday;
      var isTax=p.LAIncomeTaxable!==false;
      var taxCell=isTax
        ?'<span style="color:var(--orange);font-weight:700">Taxable — marginal rate</span>'
        :'<span style="color:var(--green);font-weight:700">Partially/non-taxable — disallowed contributions</span>';
      var tr=document.createElement('tr');
      tr.innerHTML='<td><strong>'+(p.Insurer||'—')+'</strong>'
        +(p.Product?'<br><span style="font-size:10px;color:var(--sub)">'+p.Product+'</span>':'')+'</td>'
        +'<td style="font-size:11px;color:var(--sub)">Living Annuity</td>'
        +'<td style="text-align:right">'+Rfmt(incToday)+'</td>'
        +'<td style="text-align:right">'+escRate+'%</td>'
        +(yrsToRet?'<td style="text-align:right;font-weight:700">'+Rfmt(incAtRet)+'</td>':'')
        +'<td style="font-size:11px">'+taxCell+'</td>';
      laTb.appendChild(tr);
    });

    lifeAnnPols.forEach(function(p){
      var incToday=N(p.BenLifeAnnuityIncome);
      var escRate=N(p.LifeAnnuityEsc)>0?N(p.LifeAnnuityEsc):N(S.assump.cpi)||6;
      var incAtRet=yrsToRet?Math.round(incToday*Math.pow(1+escRate/100,yrsToRet)):incToday;
      var isTax=p.LifeAnnuityTaxable!==false;
      var taxCell=isTax
        ?'<span style="color:var(--orange);font-weight:700">Taxable — PAYE</span>'
        :'<span style="color:var(--green);font-weight:700">Partially non-taxable — own contributions</span>';
      var jointNote=N(p.LifeAnnuityJointPct)>0?' · Joint life: '+N(p.LifeAnnuityJointPct)+'% to spouse':'';
      var tr=document.createElement('tr');
      tr.innerHTML='<td><strong>'+(p.Insurer||'—')+'</strong>'
        +(p.Product?'<br><span style="font-size:10px;color:var(--sub)">'+p.Product+'</span>':'')+'</td>'
        +'<td style="font-size:11px;color:var(--sub)">Life Annuity'+jointNote+'</td>'
        +'<td style="text-align:right">'+Rfmt(incToday)+'</td>'
        +'<td style="text-align:right">'+escRate+'%</td>'
        +(yrsToRet?'<td style="text-align:right;font-weight:700">'+Rfmt(incAtRet)+'</td>':'')
        +'<td style="font-size:11px">'+taxCell+'</td>';
      laTb.appendChild(tr);
    });

    laTbl.appendChild(laTb);
    var laTw=div('twrap'); laTw.appendChild(laTbl); s.appendChild(laTw);
  }

  // ── Calculator
  if(yrsToRet && yrsToRet > 0){
    var totalMonthlyNeed = (S.retNeeds||[]).reduce(function(a,r){return a+N(r.amtToday);},0);

    // Rental at retirement — auto from properties not sold, per-property escalation
    var rentalAtRet = 0;
    (S.props||[]).forEach(function(p){
      if(p.soldAtRetirement||!N(p.rental)) return;
      var escTo=N(p.rentalEsc)>0?N(p.rentalEsc):6;
      rentalAtRet+=Math.round(N(p.rental)*Math.pow(1+escTo/100,yrsToRet));
    });

    // Other income at retirement from other assets (farm/business)
    var otherIncAtRet=0;
    (S.otherAssets||[]).forEach(function(a){
      if((a.retirementRole||'')!=='Generates income (farm/business)') return;
      if(!N(a.retirementIncomePM)) return;
      var escTo=N(a.retirementIncEsc)>0?N(a.retirementIncEsc):N(S.assump.cpi)||6;
      otherIncAtRet+=Math.round(N(a.retirementIncomePM)*Math.pow(1+escTo/100,yrsToRet));
    });

    // Display: monthly needs at retirement — each at its own escalation rate
    var monthlyAtRet = 0;
    (S.retNeeds||[]).forEach(function(r){
      if(!N(r.amtToday)) return;
      var escTo=N(r.esc)>0?N(r.esc):N(S.assump.cpi)||6;
      monthlyAtRet+=Math.round(N(r.amtToday)*Math.pow(1+escTo/100,yrsToRet));
    });
    var netMonthlyGap = Math.max(0, monthlyAtRet - rentalAtRet - otherIncAtRet);

    // Capital needed — each need capitalised individually at its own escInRet
    var capNeed = 0;
    (S.retNeeds||[]).forEach(function(r){
      if(!N(r.amtToday)) return;
      var escTo=N(r.esc)>0?N(r.esc):N(S.assump.cpi)||6;
      var escIn=(r.escInRet!==''&&r.escInRet!==undefined&&r.escInRet!==null)?N(r.escInRet):escTo;
      capNeed+=retirementCapitalNeeded(N(r.amtToday),yrsToRet,yrsInRet,escTo,S.assump.retReturn,escIn);
    });
    var lumpNeed = (S.retLumps||[]).reduce(function(a,r){return a+N(r.amt);},0);
    var totalCapNeed = capNeed + lumpNeed;

    // Projected capital: RA/investment funds
    var totalProj = S.retAssets.reduce(function(a,r){
      if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
      var gr=N(r.growthRate)>0?N(r.growthRate):N(S.assump.growth)||9;
      var esc3=N(r.contribEsc)>0?N(r.contribEsc):N(S.assump.incEsc)||6;
      return a+projectFund(r.currentVal,r.monthlyContrib,esc3,gr,yrsToRet);
    },0)+N(S.retOtherCapital);

    // Add sold property net proceeds — net equity today projected forward (bond paid off assumed)
    var propSoldTotal=0;
    (S.props||[]).forEach(function(p){
      if(!p.soldAtRetirement||!N(p.val)) return;
      var gr=N(p.propGrowth)>0?N(p.propGrowth):N(S.assump.growth)||9;
      var projV=Math.round(N(p.val)*Math.pow(1+gr/100,yrsToRet));
      // Bond assumed paid off by retirement — use projected value only
      var pct=N(p.retirementPct)>0?N(p.retirementPct):100;
      propSoldTotal+=Math.round(projV*pct/100);
    });
    totalProj+=propSoldTotal;

    // Add sold other asset proceeds
    var soldProceedsAtRet=0;
    (S.otherAssets||[]).forEach(function(a){
      if((a.retirementRole||'')!=='Sold at retirement — proceeds to retirement') return;
      if(!N(a.retirementSaleProceeds)) return;
      var gr=N(a.growthRate)>0?N(a.growthRate):N(S.assump.growth)||9;
      soldProceedsAtRet+=Math.round(N(a.retirementSaleProceeds)*Math.pow(1+gr/100,yrsToRet));
    });
    totalProj+=soldProceedsAtRet;

    var retGap = totalProj - totalCapNeed;

    s.appendChild(stitle('Retirement Capital Summary'));
    var calcBox=div(); calcBox.style.cssText='background:#0e413a;border-radius:8px;padding:14px 16px;margin-bottom:14px';
    function rRow(lbl,val,sub,bold){
      var r2=div(); r2.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
      var l2=el('span','',lbl); l2.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
      var v2=el('span','',val); v2.style.cssText='font-size:'+(sub?'11':'12')+'px;color:'+(bold?'#f0f9d4':'#d4f0a8')+(bold?';font-weight:700':'');
      r2.appendChild(l2); r2.appendChild(v2); calcBox.appendChild(r2);
    }
    rRow('Monthly needs at retirement (age '+retAge+')', Rfmt(monthlyAtRet)+' /pm');
    // Per-need breakdown — show premium at retirement and capital needed as separate values
    (S.retNeeds||[]).forEach(function(r){
      if(!N(r.amtToday)) return;
      var escTo=N(r.esc)>0?N(r.esc):N(S.assump.cpi)||6;
      var escIn=(r.escInRet!==''&&r.escInRet!==undefined&&r.escInRet!==null)?N(r.escInRet):escTo;
      var atRet=Math.round(N(r.amtToday)*Math.pow(1+escTo/100,yrsToRet));
      var capThis=retirementCapitalNeeded(N(r.amtToday),yrsToRet,yrsInRet,escTo,S.assump.retReturn,escIn);
      rRow((r.desc||'Need'), Rfmt(atRet)+' /pm at retirement', true);
      rRow('Capital to fund '+escIn+'% esc, '+yrsInRet+' yrs @ '+(N(S.assump.retReturn)||8)+'% return', Rfmt(capThis), true);
    });
    if(rentalAtRet>0) rRow('Less: rental income at retirement', '('+Rfmt(rentalAtRet)+'/pm)', true);
    if(otherIncAtRet>0) rRow('Less: farm/business income at retirement', '('+Rfmt(otherIncAtRet)+'/pm)', true);
    rRow('Net monthly gap at retirement', Rfmt(netMonthlyGap)+' /pm', false, true);
    rRow('Capital needed to fund income', '('+Rfmt(capNeed)+')', false, true);
    if(lumpNeed>0) rRow('Lump sum needs', '('+Rfmt(lumpNeed)+')', true);
    rRow('Total capital required', '('+Rfmt(totalCapNeed)+')', false, true);
    rRow('Projected capital at retirement', Rfmt(totalProj), false, true);
    if(propSoldTotal>0) rRow('Incl. property proceeds ('+propsSold.length+' propert'+(propsSold.length===1?'y':'ies')+')', Rfmt(propSoldTotal), true);
    if(soldProceedsAtRet>0) rRow('Incl. other asset proceeds', Rfmt(soldProceedsAtRet), true);
    var gapRow=div(); gapRow.style.cssText='display:flex;justify-content:space-between;padding:8px 0;margin-top:8px;border-top:2px solid #445;font-size:14px;font-weight:700';
    var gl2=el('span','',retGap>=0?'Surplus':'Shortfall'); gl2.style.color='#ccd6f6';
    var gv2=el('span','',Rfmt(Math.abs(retGap))); gv2.style.color=retGap>=0?'#86efac':'#f87171';
    gapRow.appendChild(gl2); gapRow.appendChild(gv2); calcBox.appendChild(gapRow);

    // PMT — always show regardless of surplus or shortfall
    // Use shortfall as FV (zero if surplus — shows what's needed to stay on track)
    if(retGap < 0) {
      var shortfall2 = Math.abs(retGap);
      var mr3=N(S.assump.growth)/100/12;
      var nm3=yrsToRet*12;
      var pmtNeeded2=mr3>0?Math.round(shortfall2*mr3/(Math.pow(1+mr3,nm3)-1)):Math.round(shortfall2/nm3);
      var pmtRow2=div();
      pmtRow2.style.cssText='display:flex;justify-content:space-between;padding:6px 0;margin-top:4px;font-size:12px';
      var pmtL2=el('span','','To close this gap, save an additional'); pmtL2.style.color='#8899bb';
      var pmtV2=el('span','',Rfmt(pmtNeeded2)+' /pm'); pmtV2.style.cssText='font-weight:700;color:#fbbf24';
      pmtRow2.appendChild(pmtL2); pmtRow2.appendChild(pmtV2);
      calcBox.appendChild(pmtRow2);
    }

    s.appendChild(calcBox);
  }

  return s;
}

function buildPolicies() {

  var pols = S.importedPols;

  var inf = div('info');

    (pols.length ? '<strong>' + pols.length + ' polic' + (pols.length === 1 ? 'y' : 'ies') + '</strong> loaded from CRM.' :
      'No policies loaded. Add below or open from a CRM client profile.');

  pols.forEach(function(p, i) {
    s.appendChild(buildPolCard(p, i));
  });

    });

  // ── Premium totals + affordability projection
  var _riskTypes = pols.filter(function(p){

           POL_RA_TYPES.indexOf(p.Type||'') < 0 &&
           POL_INV_TYPES.indexOf(p.Type||'') < 0 &&
           p.Type !== 'Medical Aid' &&
           (p.Frequency||'Monthly') === 'Monthly' &&
           N(p.Premium) > 0;
  });

  var totalPrem = _riskTypes.reduce(function(s,p){ return s+N(p.Premium); }, 0);
  var totalAllPrem = pols.reduce(function(s,p){
    return s + ((p.Frequency||'Monthly')==='Monthly' ? N(p.Premium) : 0);
  }, 0);

  if (pols.length > 0) {

    var c2 = div('card'); c2.innerHTML = '<div class="lbl">All Premiums /pm</div><div class="val">' + Rfmt(totalAllPrem) + '</div><div class="sub">Including RA, investments</div>'; totCards.appendChild(c2);
    var c3 = div('card'); c3.innerHTML = '<div class="lbl">Policies on Record</div><div class="val">' + pols.length + '</div>'; totCards.appendChild(c3);
    s.appendChild(totCards);

    // Affordability at retirement

    var retAge2  = N(S.cli.retAge) || 65;
    var yrsToRet2 = cliAge2 ? Math.max(0, retAge2 - cliAge2) : null;
    var yrsInRet  = Math.max(1, 85 - retAge2);
    var grossPM   = N(S.cli.grossPM) || N(S.incRows&&S.incRows[0]&&S.incRows[0].pm);
    var incEscRate = N(S.assump.incEsc) || 6;

    if (yrsToRet2 !== null && yrsToRet2 > 0 && _riskTypes.length > 0) {
      s.appendChild(stitle('Premium Affordability at Retirement'));
      var afford = div('info');
      afford.innerHTML = 'Shows each premium escalated to retirement at its own rate. '
        + 'Income escalation assumption: <strong>' + incEscRate + '% p.a.</strong> '
        + 'Premiums escalating <em>faster</em> than income are shown in <span style="color:var(--red)">red</span> — '
        + 'these policies become increasingly unaffordable. '
        + 'Tick policies to include in retirement budget, then send to the Retirement tab.';
      s.appendChild(afford);

      // Projected gross income at retirement
      var incAtRet = grossPM > 0 ? Math.round(grossPM * Math.pow(1 + incEscRate/100, yrsToRet2)) : 0;

      var affTbl = document.createElement('table');
      affTbl.innerHTML = '<thead><tr>' +
        '<th style="width:28px"></th>' +
        '<th>Policy</th>' +
        '<th style="text-align:right">Premium today</th>' +
        '<th style="text-align:right">% of income</th>' +
        '<th style="text-align:right">Esc %</th>' +
        '<th style="text-align:right">At retirement</th>' +
        '<th style="text-align:right">% of income then</th>' +
        '</tr></thead>';
      var affTb = document.createElement('tbody');
      var totalAtRet2 = 0;
      var totalRetSelected = 0;

      _riskTypes.forEach(function(pol, j) {

        var esc = parseFloat(escRaw) || 0;

        var pctToday  = grossPM > 0 ? (prem / grossPM * 100).toFixed(1) : '—';
        var pctAtRet  = incAtRet > 0 ? (future / incAtRet * 100).toFixed(1) : '—';
        var isHigh    = esc > 0 && esc > incEscRate;

        var tr2 = document.createElement('tr');

        escInp.addEventListener('blur',   function(e){ S.importedPols[idx].premEsc=e.target.value; render(); });
        tdEsc.appendChild(escInp);

        tdEsc.appendChild(escLabel); tr2.appendChild(tdEsc);

          (isHigh ? ' <span style="font-size:9px;color:var(--red)">⚠ faster than income</span>' : '');
        tr2.appendChild(tdPctRet);

        affTb.appendChild(tr2);
      });

      // Totals row
      var trTot = document.createElement('tr');
      trTot.style.cssText = 'border-top:2px solid var(--navy);font-weight:700;background:#f8f9fc';
      var incPctToday  = grossPM > 0 ? (totalPrem / grossPM * 100).toFixed(1) : '—';
      var incPctAtRet  = incAtRet > 0 ? (totalAtRet2 / incAtRet * 100).toFixed(1) : '—';
      trTot.innerHTML = '<td></td><td>Total</td>' +
        '<td style="text-align:right">' + Rfmt(totalPrem) + '</td>' +
        '<td style="text-align:right"><strong>' + incPctToday + '%</strong><br><span style="font-size:9px;color:var(--sub)">of income today</span></td>' +
        '<td></td>' +
        '<td style="text-align:right;color:var(--gold)">' + Rfmt(totalAtRet2) + '</td>' +
        '<td style="text-align:right"><strong>' + incPctAtRet + '%</strong><br><span style="font-size:9px;color:var(--sub)">of income at ret.</span></td>';
      affTb.appendChild(trTot);
      affTbl.appendChild(affTb);
      var affTw = div('twrap'); affTw.appendChild(affTbl); s.appendChild(affTw);

      // Affordability alert
      if (grossPM > 0) {

          (isAfford ? '✓ Premiums appear manageable.' : '⚠ Premium burden is significant — review with client.');

      if(tickedPols.length > 0){

        var polCapInf=div('info');

        s.appendChild(polCapInf);

        var polCapTbl=document.createElement('table');
        polCapTbl.innerHTML='<thead><tr><th>Policy</th><th>Premium today</th><th>Esc %</th><th>Premium at ret.</th><th>Return in ret %</th><th>Capital required</th></tr></thead>';
        var polCapTb=document.createElement('tbody');
        var totalPolCap=0;

        tickedPols.forEach(function(pol){
          var escRaw2=String(pol.PremEscalation!=null&&pol.PremEscalation!==''?pol.PremEscalation:(pol.premEsc!=null&&pol.premEsc!==''?pol.premEsc:'')).replace(/,/g,'.').replace(/[^0-9.]/g,'');
          var esc2=parseFloat(escRaw2)||0;
          var premAtRet=esc2>0?Math.round(N(pol.Premium)*Math.pow(1+esc2/100,yrsToRet2)):N(pol.Premium);
          // Return rate in retirement — use assumption, editable per policy
          var retRet=N(pol._retReturn)>0?N(pol._retReturn):N(S.assump.retReturn)||8;
          // Capital = PV of premium stream in retirement at return rate
          var polCap=capitalise(premAtRet, yrsInRet, esc2||N(S.assump.cpi)||6, retRet);
          totalPolCap+=polCap;
          var idx3=pols.indexOf(pol);
          var tr3=document.createElement('tr');

          // Editable return rate cell
          var retRetInp=document.createElement('input'); retRetInp.type='text'; retRetInp.inputMode='numeric';
          retRetInp.value=pol._retReturn||''; retRetInp.placeholder=String(N(S.assump.retReturn)||8);
          retRetInp.style.cssText='width:46px;padding:3px 5px;border:1.5px solid var(--mist);border-radius:4px;font-size:11px;text-align:right';
          retRetInp.addEventListener('blur',function(e){S.importedPols[idx3]._retReturn=e.target.value;render();});
          retRetInp.addEventListener('input',function(e){S.importedPols[idx3]._retReturn=e.target.value;});

          tr3.innerHTML='<td><strong>'+(pol.Insurer||'—')+'</strong>'+(pol.Product?' — '+pol.Product:'')+'</td>'+
            '<td>'+Rfmt(pol.Premium)+'/pm</td>'+
            '<td>'+(esc2||'—')+'%</td>'+
            '<td>'+Rfmt(premAtRet)+'/pm</td>';
          var tdRet=document.createElement('td');
          tdRet.appendChild(retRetInp);
          var pctSpan=document.createElement('span'); pctSpan.textContent=' %'; pctSpan.style.fontSize='11px';
          tdRet.appendChild(pctSpan);
          tr3.appendChild(tdRet);
          var tdCap=document.createElement('td'); tdCap.innerHTML='<strong>'+Rfmt(polCap)+'</strong>';
          tr3.appendChild(tdCap);
          polCapTb.appendChild(tr3);
        });

        var polCapTot=document.createElement('tr');
        polCapTot.style.cssText='border-top:2px solid var(--navy);font-weight:700';
        polCapTot.innerHTML='<td colspan="5">Total capital to fund selected policies in retirement</td>'+
          '<td><strong>'+Rfmt(totalPolCap)+'</strong></td>';
        polCapTb.appendChild(polCapTot);
        polCapTbl.appendChild(polCapTb);
        var polCapTw=div('twrap'); polCapTw.appendChild(polCapTbl); s.appendChild(polCapTw);

        // Savings needed box
        if(!S._polSav) S._polSav={growth:String(N(S.assump.growth)||9),esc:'0'};
        var savBox=div(); savBox.style.cssText='background:#0e413a;border-radius:8px;padding:14px 16px;margin-top:8px';
        var savHdr=div(); savHdr.style.cssText='font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--gold);margin-bottom:10px';
        savHdr.textContent='Monthly Saving Required to Fund Policy Premiums';
        savBox.appendChild(savHdr);

        // Editable inputs inside the navy box
        var savInputRow=div(); savInputRow.style.cssText='display:flex;gap:14px;margin-bottom:12px;flex-wrap:wrap';
        function savInpFld(lbl,key,dflt){
          var w=div(); w.style.cssText='display:flex;flex-direction:column;gap:3px';
          var lb=el('span','',lbl); lb.style.cssText='font-size:10px;color:#8899bb;text-transform:uppercase;letter-spacing:.5px';
          var inp=document.createElement('input'); inp.type='text'; inp.inputMode='numeric';
          inp.value=S._polSav[key]||dflt||''; inp.placeholder=dflt||'0';
          inp.style.cssText='width:72px;border:1.5px solid #334;border-radius:5px;padding:5px 8px;font-size:13px;font-family:inherit;background:#0f1e38;color:#a8b938;text-align:right';
          inp.addEventListener('blur',function(e){S._polSav[key]=e.target.value;render();});
          inp.addEventListener('input',function(e){S._polSav[key]=e.target.value;});
          w.appendChild(lb); w.appendChild(inp); return w;
        }
        savInputRow.appendChild(savInpFld('Growth rate %','growth',String(N(S.assump.growth)||9)));
        savInputRow.appendChild(savInpFld('Annual increase %','esc','0'));
        savBox.appendChild(savInputRow);

        function savRow(lbl,val,bold,colour){
          var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
          var l=el('span','',lbl); l.style.cssText='color:#ccd6f6;font-size:12px';
          var v=el('span','',val); v.style.cssText='font-size:'+(bold?'14':'12')+'px;font-weight:'+(bold?'700':'400')+';color:'+(colour||'#f0f9d4');
          r.appendChild(l); r.appendChild(v); savBox.appendChild(r);
        }

        savRow('Capital target to fund policy premiums',Rfmt(totalPolCap),true);

        if(yrsToRet2>0){
          var savGrowth=N(S._polSav.growth)>0?N(S._polSav.growth):N(S.assump.growth)||9;
          var savEsc=N(S._polSav.esc)||0;
          var unitFV2=projectFund(0,1,savEsc,savGrowth,yrsToRet2);
          var savPMT=unitFV2>0?Math.round(totalPolCap/unitFV2):0;
          savRow('Capital target',Rfmt(totalPolCap));
          savRow('Monthly saving needed',Rfmt(savPMT)+' /pm',true,'#fbbf24');
          savRow(yrsToRet2+' yrs to retirement · '+savGrowth+'% growth · '+(savEsc>0?savEsc+'% annual increase':'flat'),'',false,'#556');
        }

        s.appendChild(savBox);
      }
    }
  }

  // Send ticked premiums to retirement needs
  if (S.scope.retirement) {
    var brow2 = div(); brow2.style.cssText='display:flex;gap:12px;margin-top:14px;flex-wrap:wrap';
    var bSend = document.createElement('button');
    bSend.className = 'btn btn-navy';
    bSend.textContent = '→ Send ticked premiums to Retirement tab';
    bSend.addEventListener('click', function() {
      var toSend = (S.importedPols||[]).filter(function(p){
        return p._retInclude && (p.Frequency||'Monthly')==='Monthly' && N(p.Premium)>0
          && p.Type !== 'Business Assurance';
      });
      if (!toSend.length) { alert('Tick the checkbox on the policies in the affordability table above.'); return; }
      if (!S.retNeeds) S.retNeeds = [];
      S.retNeeds = S.retNeeds.filter(function(r){ return !r._isPremRow; });
      toSend.forEach(function(p){
        var escRaw3=String(p.PremEscalation!=null&&p.PremEscalation!==''?p.PremEscalation:(p.premEsc!=null&&p.premEsc!==''?p.premEsc:'')).replace(/,/g,'.').replace(/[^0-9.]/g,'');
        S.retNeeds.push({ desc:(p.Insurer||'')+(p.Product?' — '+p.Product:'')+' premium', amtToday:String(Math.round(N(p.Premium))), esc:escRaw3, _isPremRow:true });
      });
      persist(); go(6); // go to Retirement tab (index 6 after tab reorder)
    });
    brow2.appendChild(bSend);
    s.appendChild(brow2);
  }

  return s;
}

function buildPolCard(p, i) {
  var t = p.Type || 'Life / Income Protector';
  var isRA      = POL_RA_TYPES.indexOf(t) > -1;
  var isInv     = POL_INV_TYPES.indexOf(t) > -1;
  var isMed     = (t === 'Medical Aid');
  var isBiz     = (t === 'Business Assurance');
  var isLifeAnn = (t === 'Life Annuity');
  var isRisk    = !isRA && !isInv && !isMed && !isBiz && !isLifeAnn && t !== 'Other';

  var card = div();
  card.style.cssText = 'background:#fff;border:1.5px solid var(--mist);border-radius:9px;padding:16px;margin-bottom:14px';

  // ── Card header: insurer name + type badge + delete
  var ch = div();
  ch.style.cssText = 'display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;gap:12px';

  var chLeft = div();
  chLeft.style.cssText = 'display:flex;flex-direction:column;gap:4px;flex:1';

  // Insurer text input (large, prominent)
  var insurerInp = document.createElement('input');
  insurerInp.type = 'text';
  insurerInp.value = p.Insurer || '';
  insurerInp.placeholder = 'Insurer / Company';
  insurerInp.style.cssText = 'border:none;border-bottom:2px solid var(--mist);border-radius:0;padding:4px 0;font-size:15px;font-weight:700;color:var(--navy);font-family:inherit;width:100%;background:transparent;outline:none';
  insurerInp.addEventListener('input', function(e) { S.importedPols[i].Insurer = e.target.value; });
  insurerInp.addEventListener('focus', function(e) { e.target.style.borderBottomColor = 'var(--gold)'; });
  insurerInp.addEventListener('blur',  function(e) { e.target.style.borderBottomColor = 'var(--mist)'; });
  chLeft.appendChild(insurerInp);

  // Type select (below insurer)
  var typeSel = document.createElement('select');
  typeSel.style.cssText = 'border:var(--border);border-radius:5px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--sub);font-family:inherit;background:var(--smoke);cursor:pointer';
  POL_TYPES.forEach(function(o) {
    var opt = document.createElement('option');
    opt.value = o; opt.textContent = o;
    if (o === t) opt.selected = true;
    typeSel.appendChild(opt);
  });
  typeSel.addEventListener('change', function(e) { S.importedPols[i].Type = e.target.value; render(); });
  chLeft.appendChild(typeSel);
  ch.appendChild(chLeft);

  // Retirement include tick
  var rtickLbl = document.createElement('label');
  rtickLbl.style.cssText='display:flex;align-items:center;gap:4px;font-size:10px;color:var(--sub);cursor:pointer;margin-left:4px;white-space:nowrap';
  var rtickInp = document.createElement('input'); rtickInp.type='checkbox';
  rtickInp.checked = !!p._retInclude;
  rtickInp.addEventListener('change',function(e){ S.importedPols[i]._retInclude=e.target.checked; });
  rtickLbl.appendChild(rtickInp);
  rtickLbl.appendChild(document.createTextNode('Ret'));
  ch.appendChild(rtickLbl);
  // Delete button
  var db = delBtn(function() { S.importedPols.splice(i, 1); render(); });
  ch.appendChild(db);
  card.appendChild(ch);

  // ── Row 1: Policy No, Product, Status
  var r1 = g3();
  r1.appendChild(fld('Policy / Contract No', p, 'PolicyNo'));
  r1.appendChild(fld('Product / Plan Name',  p, 'Product'));
  r1.appendChild(sfld('Status', p, 'Status', ['Active','Lapsed','Paid Up','Cancelled']));
  card.appendChild(r1);

  // ── Row 2: Premium + Frequency + Escalations
  var r2 = g3();
  r2.appendChild(rfld('Premium / Contribution', p, 'Premium'));
  r2.appendChild(sfld('Frequency', p, 'Frequency', ['Monthly','Quarterly','Annually','Once Off']));
  card.appendChild(r2);

  // Premium escalation + benefit escalation — risk policies and business assurance
  if (isRisk || t === 'Life / Income Protector' || isBiz) {
    var escRow = div(); escRow.style.cssText='display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;margin-top:6px;margin-bottom:4px';

    // Premium escalation
    var peWrap=div('f'); peWrap.style.minWidth='160px';
    peWrap.appendChild(el('label','','Premium escalation'));
    var peInp=document.createElement('input'); peInp.type='text';
    peInp.value=String(p.PremEscalation!=null&&p.PremEscalation!==''?p.PremEscalation:(p.premEsc!=null&&p.premEsc!==''?p.premEsc:'')); peInp.placeholder='e.g. 6 or Age rated or CPI';
    peInp.style.cssText='border:1.5px solid var(--mist);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;width:100%';
    peInp.addEventListener('input',function(e){
      S.importedPols[i].PremEscalation=e.target.value;
      S.importedPols[i].premEsc=e.target.value;
    });
    peInp.addEventListener('blur',function(){render();});
    peWrap.appendChild(peInp);
    escRow.appendChild(peWrap);

    // Benefit escalation
    var beWrap=div('f'); beWrap.style.minWidth='160px';
    beWrap.appendChild(el('label','','Benefit escalation'));
    var beInp=document.createElement('input'); beInp.type='text';
    beInp.value=String(p.BenEscalation||''); beInp.placeholder='e.g. 5 or CPI or Age rated';
    beInp.style.cssText='border:1.5px solid var(--mist);border-radius:6px;padding:7px 10px;font-size:13px;font-family:inherit;width:100%';
    beInp.addEventListener('input',function(e){ S.importedPols[i].BenEscalation=e.target.value; });
    beWrap.appendChild(beInp);
    escRow.appendChild(beWrap);

    card.appendChild(escRow);

    // Warning if age rated or above income escalation
    var peRaw=String(p.PremEscalation!=null&&p.PremEscalation!==''?p.PremEscalation:(p.premEsc!=null&&p.premEsc!==''?p.premEsc:'')).toLowerCase();
    var beRaw=String(p.BenEscalation||'').toLowerCase();
    var incEsc=N(S.assump.incEsc)||6;
    var peNum=parseFloat(peRaw)||0;
    var warnings=[];
    if(peRaw==='age rated'||peRaw==='age-rated') warnings.push('⚠ Premium is age rated — increases accelerate as client ages');
    else if(peNum>incEsc) warnings.push('⚠ Premium escalation ('+peNum+'%) exceeds income growth ('+incEsc+'%)');
    if(beRaw==='age rated'||beRaw==='age-rated') warnings.push('⚠ Benefit is age rated');
    else if(beRaw==='cpi') warnings.push('ℹ Benefit escalates with CPI');
    if(warnings.length>0){
      var warnBox=div(); warnBox.style.cssText='font-size:11px;padding:5px 10px;border-radius:5px;background:#fef9ee;border:1px solid var(--gold2);color:#7a5f1a;margin-bottom:4px';
      warnBox.innerHTML=warnings.join(' · ');
      card.appendChild(warnBox);
    }
  }

  // ── Benefits section — varies by type
  if (isRisk || t === 'Life / Income Protector') {
    var bst = el('div','stitle','Benefits');
    bst.style.marginTop = '10px';
    card.appendChild(bst);

    var rb1 = g3();
    rb1.appendChild(rfld('Death / Life Cover',    p, 'BenDeath'));
    rb1.appendChild(rfld('Capital Disability',    p, 'BenDisability'));
    rb1.appendChild(rfld('Dread Disease Cover',   p, 'BenDreadDisease'));
    card.appendChild(rb1);

    // Income benefits (simplified — monthly amount)
    var ipWrap = div();
    ipWrap.style.cssText = 'margin-top:4px';
    var ipLbl = el('label','','Income Protection / Monthly Benefit');
