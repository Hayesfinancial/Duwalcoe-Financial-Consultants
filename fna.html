function buildEstate() {
  var s = div();

  var inf = div('info');
  inf.innerHTML = 'Estate duty is calculated on the <strong>dutiable estate</strong>. ' +
    'Adjust beneficiary routing on the Policies tab to model different outcomes. ' +
    'Asset dutiable amounts can be overridden below.';
  s.appendChild(inf);

  // ── SA Estate Duty constants
  var ABATEMENT   = 3500000;   // Primary abatement R3.5m
  var DUTY_RATE1  = 0.20;      // 20% on first R30m dutiable
  var DUTY_RATE2  = 0.25;      // 25% above R30m
  var DUTY_THRESH = 30000000;
  var EXEC_RATE   = 0.04025;   // 3.5% + VAT (15%) = 4.025%

  // ── SECTION 1: Assets
  s.appendChild(stitle('Dutiable Assets'));

  var assetNote = div('info');
  assetNote.innerHTML = 'Assets are drawn from the Assets tab. Override the dutiable amount if an asset is held in a trust, CC, or is otherwise excluded. ' +
    'Set to <strong>0</strong> to exclude entirely.';
  s.appendChild(assetNote);

  // Build a working list from Assets tab data
  // Each row: { desc, fullVal, dutiableAmt (editable) }
  // We reconcile with S.estateAssets (persisted overrides) by desc key

  function getOverride(desc) {
    if (!S.estateAssets) S.estateAssets = [];
    var found = S.estateAssets.filter(function(a) { return a.desc === desc; })[0];
    return found || null;
  }
  function setOverride(desc, dutiable) {
    if (!S.estateAssets) S.estateAssets = [];
    var idx = -1;
    S.estateAssets.forEach(function(a, i) { if (a.desc === desc) idx = i; });
    if (idx > -1) S.estateAssets[idx].dutiable = dutiable;
    else S.estateAssets.push({ desc: desc, dutiable: dutiable });
  }

  // Collect all assets from tab 3
  var allAssets = [];
  S.props.forEach(function(p) {
    if (!p.desc && !N(p.val)) return;
    var desc = p.desc || 'Property';
    var ov = getOverride(desc);
    allAssets.push({ desc: desc, fullVal: N(p.val), dutiable: ov ? ov.dutiable : String(N(p.val)), bond: N(p.bond) });
  });
  S.vehicles.forEach(function(v) {
    if (!v.desc && !N(v.val)) return;
    var desc = v.desc || 'Vehicle';
    var ov = getOverride(desc);
    allAssets.push({ desc: desc, fullVal: N(v.val), dutiable: ov ? ov.dutiable : String(N(v.val)), bond: N(v.finance) });
  });
  S.otherAssets.forEach(function(a) {
    if (!a.desc && !N(a.val)) return;
    var desc = a.desc || 'Asset';
    var ov = getOverride(desc);
    allAssets.push({ desc: desc, fullVal: N(a.val), dutiable: ov ? ov.dutiable : String(N(a.val)), bond: 0 });
  });

  if (allAssets.length === 0) {
    var noA = div('info');
    noA.textContent = 'No assets captured. Add properties, vehicles, and other assets on the Assets tab.';
    s.appendChild(noA);
  } else {
    var aTbl = document.createElement('table');
    var aThead = document.createElement('thead');
    aThead.innerHTML = '<tr><th>Asset</th><th>Full Value</th><th>Dutiable Amount</th><th>Notes</th></tr>';
    aTbl.appendChild(aThead);
    var aTbody = document.createElement('tbody');

    allAssets.forEach(function(a) {
      var tr = document.createElement('tr');

      var td1 = document.createElement('td'); td1.style.fontWeight = '600'; td1.textContent = a.desc; tr.appendChild(td1);

      var td2 = document.createElement('td'); td2.textContent = Rfmt(a.fullVal); td2.style.color = 'var(--sub)'; tr.appendChild(td2);

      var td3 = document.createElement('td');
      var rw = div('td-r'); rw.appendChild(el('span','rp','R'));
      var inp = document.createElement('input'); inp.type = 'text'; inp.inputMode = 'numeric';
      inp.value = a.dutiable; inp.placeholder = '0';
      inp.addEventListener('input', function(e) { setOverride(a.desc, e.target.value); });
      inp.addEventListener('blur', function(e) { setOverride(a.desc, e.target.value); render(); });
      rw.appendChild(inp); td3.appendChild(rw); tr.appendChild(td3);

      var td4 = document.createElement('td');
      td4.style.fontSize = '11px'; td4.style.color = 'var(--sub)';
      if (N(a.dutiable) < a.fullVal && N(a.dutiable) >= 0) {
        td4.textContent = a.bond > 0 ? 'Bond: ' + Rfmt(a.bond) : 'Partially excluded';
        if (N(a.dutiable) === 0) td4.textContent = 'Excluded (trust/CC?)';
      } else if (a.bond > 0) {
        td4.textContent = 'Bond outstanding: ' + Rfmt(a.bond) + ' (reduce dutiable if applicable)';
      }
      tr.appendChild(td4);

      aTbody.appendChild(tr);
    });
    aTbl.appendChild(aTbody);
    var aTw = div('twrap'); aTw.appendChild(aTbl); s.appendChild(aTw);
  }

  // ── SECTION 2: Retirement assets (outside estate — display only)
  var retTotal = S.retAssets.reduce(function(sum, r) { return sum + N(r.currentVal); }, 0);
  if (retTotal > 0) {
    s.appendChild(stitle('Retirement Assets (Outside Estate)'));
    var retNote = div('info');
    retNote.innerHTML = 'RA / pension fund values are <strong>excluded from estate duty</strong> (Pension Funds Act s.37C — paid at trustee discretion). ' +
      'Shown for liquidity context only.';
    s.appendChild(retNote);
    var retCards = div('cards c3');
    S.retAssets.forEach(function(r) {
      if (!N(r.currentVal)) return;
      var c = div('card');
      c.innerHTML = '<div class="lbl">' + (r.desc || 'Retirement fund') + '</div><div class="val">' + Rfmt(r.currentVal) + '</div>' +
        '<div class="sub">Outside estate</div>';
      retCards.appendChild(c);
    });
    s.appendChild(retCards);
  }

  // ── SECTION 3: Policy death benefits — routing summary
  s.appendChild(stitle('Policy Death Benefits — Routing'));

  var pols = S.importedPols || [];
  var section4q  = 0;  // To spouse — s.4(q) deduction
  var toEstate   = 0;  // Into estate (dutiable)
  var toThird    = 0;  // Direct to 3rd party
  var toBiz      = 0;  // Business assurance

  pols.forEach(function(p) {
    var ben = N(p.BenDeath);
    if (!ben && (POL_RA_TYPES.indexOf(p.Type) > -1 || POL_INV_TYPES.indexOf(p.Type) > -1)) {
      ben = N(p.BenFundValue);  // Use fund value for RA/investments
    }
    if (p.Type === 'Business Assurance') {
      // Business assurance goes to toBiz regardless of beneficiary — outside personal estate
      toBiz += N(p.LoanAmount) || N(p.BenDeath);
      return; // skip personal routing
    }
    if (!ben) return;
    var bt = p.BeneficiaryType || '';
    if (bt === 'Spouse')       section4q += ben;
    else if (bt === 'Estate')  toEstate  += ben;
    else if (bt === 'Third Party') toThird += ben;
    else                       toBiz     += ben;
  });

  if (pols.length === 0) {
    var noPol = div('info'); noPol.textContent = 'No policies captured. Add policies on the Policies tab.';
    s.appendChild(noPol);
  } else {
    var polRouteCards = div('cards');
    polRouteCards.style.gridTemplateColumns = 'repeat(4,1fr)';
    [
      { l: 'Section 4(q) — Spouse', v: section4q, c: 'ok',  sub: 'Not dutiable' },
      { l: 'To Estate',              v: toEstate,  c: 'warn', sub: 'Dutiable' },
      { l: 'Third Party Direct',     v: toThird,   c: '',     sub: 'Not dutiable' },
      { l: 'Business Assurance',     v: toBiz,     c: '',     sub: 'Outside estate' }
    ].forEach(function(x) {
      var c = div('card');
      c.innerHTML = '<div class="lbl">' + x.l + '</div>' +
        '<div class="val ' + x.c + '">' + (x.v > 0 ? Rfmt(x.v) : '—') + '</div>' +
        '<div class="sub">' + x.sub + '</div>';
      polRouteCards.appendChild(c);
    });
    s.appendChild(polRouteCards);
  }

  // ── SECTION 4: Accrual Claim (OCP with Accrual marriages)
  var isOCP = (S.cli.marital || '').toLowerCase().indexOf('accrual') > -1 ||
              (S.cli.marital || '').toLowerCase().indexOf('community') > -1;
  var accrualClaim = 0;

  if (isOCP || N(S.accrual.spouseCurrentAssets) > 0) {
    s.appendChild(stitle('Accrual Claim (OCP with Accrual)'));
    var accrNote = div('info');
    accrNote.innerHTML = 'For OCP with accrual marriages: if the client\'s estate accrual exceeds the spouse\'s accrual, ' +
      'half the difference is payable to the surviving spouse from the estate before estate duty. ' +
      '<strong>Accrual claim reduces the dutiable estate.</strong>';
    s.appendChild(accrNote);

    var accrGrid = g3();
    accrGrid.appendChild(rfld('Client estate at marriage (R)', S.accrual, 'clientStartVal'));
    accrGrid.appendChild(rfld('Spouse estate at marriage (R)', S.accrual, 'spouseStartVal'));
    accrGrid.appendChild(rfld('Spouse\'s current gross assets (R)', S.accrual, 'spouseCurrentAssets'));
    s.appendChild(accrGrid);

    // Accrual = current estate - estate at start of marriage
    var clientGross = totalDutiableAssets + toEstate; // same as grossEstate below
    var clientAccrual = Math.max(0, clientGross - N(S.accrual.clientStartVal));
    var spouseAccrual = Math.max(0, N(S.accrual.spouseCurrentAssets) - N(S.accrual.spouseStartVal));

    if (clientAccrual > spouseAccrual) {
      accrualClaim = (clientAccrual - spouseAccrual) / 2;
    }

    var accrCards = div('cards c3'); accrCards.style.marginTop = '10px';
    var ac1 = div('card');
    ac1.innerHTML = '<div class="lbl">Client Accrual</div><div class="val">' + Rfmt(clientAccrual) + '</div>' +
      '<div class="sub">Current estate − start value</div>';
    accrCards.appendChild(ac1);
    var ac2 = div('card');
    ac2.innerHTML = '<div class="lbl">Spouse Accrual</div><div class="val">' + Rfmt(spouseAccrual) + '</div>' +
      '<div class="sub">Current assets − start value</div>';
    accrCards.appendChild(ac2);
    var ac3 = div('card');
    ac3.innerHTML = '<div class="lbl">Accrual Claim Payable</div><div class="val ' + (accrualClaim > 0 ? 'warn' : '') + '">' +
      (accrualClaim > 0 ? Rfmt(accrualClaim) : '—') + '</div>' +
      '<div class="sub">½ × (Client − Spouse) accrual</div>';
    accrCards.appendChild(ac3);
    s.appendChild(accrCards);
  }

  // ── SECTION 5: Estate duty calculation
  s.appendChild(stitle('Estate Duty Calculation'));

  // Gross dutiable estate = dutiable assets + estate-routed policy benefits - liabilities
  var totalDutiableAssets = allAssets.reduce(function(sum, a) { return sum + N(a.dutiable); }, 0);
  var totalLiabs = S.props.reduce(function(sum, p) { return sum + N(p.bond); }, 0) +
                   S.vehicles.reduce(function(sum, v) { return sum + N(v.finance); }, 0) +
                   S.liabilities.reduce(function(sum, l) { return sum + N(l.bal); }, 0);

  var grossEstate    = totalDutiableAssets + toEstate;
  var netEstate      = Math.max(0, grossEstate - totalLiabs);
  var sec4qDed       = Math.min(section4q, netEstate);  // can't exceed net estate
  var afterSpouse    = Math.max(0, netEstate - sec4qDed);
  // Accrual deduction (payable before estate duty is calculated)
  var accrualDed     = Math.min(accrualClaim, afterSpouse);
  var afterAccrual   = Math.max(0, afterSpouse - accrualDed);
  var afterAbatement = Math.max(0, afterAccrual - ABATEMENT);

  // Estate duty
  var estateDuty = 0;
  if (afterAbatement > 0) {
    if (afterAbatement <= DUTY_THRESH) {
      estateDuty = afterAbatement * DUTY_RATE1;
    } else {
      estateDuty = DUTY_THRESH * DUTY_RATE1 + (afterAbatement - DUTY_THRESH) * DUTY_RATE2;
    }
  }

  // Executor fees on gross estate (gross assets, not net)
  var execFees = grossEstate * EXEC_RATE;

  // Total estate costs
  var totalEstateCosts = estateDuty + execFees;

  // Liquidity: cash-type assets + estate-routed policies vs costs
  // Cash/liquid = investments and other assets not properties/vehicles (rough proxy)
  var liquidAssets = S.otherAssets.reduce(function(sum, a) { return sum + N(a.val); }, 0) + toEstate;
  var liquidityGap = liquidAssets - totalEstateCosts;

  // ── Calculation breakdown display
  var calcBox = div();
  calcBox.style.cssText = 'background:var(--navy);color:#fff;border-radius:9px;padding:18px 20px;margin-bottom:16px';

  function calcRow(label, val, indent, highlight, borderTop) {
    var row = div();
    row.style.cssText = 'display:flex;justify-content:space-between;padding:4px 0;font-size:13px' +
      (indent ? ';padding-left:20px' : '') +
      (borderTop ? ';border-top:1px solid #334;margin-top:8px;padding-top:10px' : '') +
      (highlight ? ';font-size:15px;font-weight:700' : '');
    var lSpan = el('span','',label);
    var vSpan = el('span','', val);
    vSpan.style.color = highlight ? 'var(--gold)' : '#ccd6f6';
    row.appendChild(lSpan); row.appendChild(vSpan);
    calcBox.appendChild(row);
  }

  function calcRowSub(label, val) {
    var row = div();
    row.style.cssText = 'display:flex;justify-content:space-between;padding:3px 0 3px 16px;font-size:11px;color:#8899bb';
    row.innerHTML = '<span>' + label + '</span><span>' + val + '</span>';
    calcBox.appendChild(row);
  }

  calcRow('Gross Estate', Rfmt(grossEstate));
  calcRowSub('Dutiable assets', Rfmt(totalDutiableAssets));
  calcRowSub('+ Estate-routed policy benefits', Rfmt(toEstate));

  calcRow('Less: Liabilities', '− ' + Rfmt(totalLiabs), true);
  calcRow('Net Estate', Rfmt(netEstate), false, false, true);

  if (section4q > 0) {
    calcRow('Less: Section 4(q) — spouse bequest', '− ' + Rfmt(sec4qDed), true);
  }
  if (afterSpouse !== netEstate) {
    calcRow('After 4(q) deduction', Rfmt(afterSpouse), false, false, true);
  }
  if (accrualClaim > 0) {
    calcRow('Less: Accrual claim (OCP)', '− ' + Rfmt(accrualDed), true);
    calcRow('After accrual deduction', Rfmt(afterAccrual), false, false, true);
  }
  calcRow('Less: Primary abatement', '− ' + Rfmt(Math.min(afterAccrual, ABATEMENT)), true);
  calcRow('Dutiable amount', Rfmt(afterAbatement), false, false, true);

  if (afterAbatement > 0) {
    if (afterAbatement <= DUTY_THRESH) {
      calcRowSub('Rate: 20% on R' + (DUTY_THRESH/1000000) + 'm', '');
    } else {
      calcRowSub('20% on first R30m + 25% on balance', '');
    }
  }

  calcRow('Estate Duty', Rfmt(estateDuty), false, false, true);
  calcRow('Executor fees (~4.025% of gross estate)', Rfmt(execFees), true);
  calcRow('Total Estate Costs', Rfmt(totalEstateCosts), false, true, true);
  s.appendChild(calcBox);

  // ── Liquidity analysis
  s.appendChild(stitle('Liquidity Analysis'));
  var liqNote = div('info');
  liqNote.innerHTML = 'The estate needs <strong>liquid funds</strong> to pay duty and executor fees without forcing asset sales. ' +
    'Estate-routed policy benefits contribute to estate liquidity.';
  s.appendChild(liqNote);

  var liqCards = div('cards c3');
  var lc1 = div('card');
  lc1.innerHTML = '<div class="lbl">Estate Costs (Duty + Fees)</div><div class="val bad">' + Rfmt(totalEstateCosts) + '</div>';
  liqCards.appendChild(lc1);
  var lc2 = div('card');
  lc2.innerHTML = '<div class="lbl">Liquid / Policy Assets in Estate</div><div class="val">' + Rfmt(Math.max(0, liquidAssets)) + '</div>';
  liqCards.appendChild(lc2);
  var lc3 = div('card');
  lc3.innerHTML = '<div class="lbl">Liquidity ' + (liquidityGap >= 0 ? 'Surplus' : 'Shortfall') + '</div>' +
    '<div class="val ' + (liquidityGap >= 0 ? 'ok' : 'bad') + '">' + Rfmt(Math.abs(liquidityGap)) + '</div>';
  liqCards.appendChild(lc3);
  s.appendChild(liqCards);

  if (liquidityGap < 0) {
    var liqAlert = div('alert');
    liqAlert.innerHTML = '⚠ <strong>Liquidity shortfall of ' + Rfmt(Math.abs(liquidityGap)) + '.</strong> ' +
      'The estate may need to sell assets to fund duty and executor fees. ' +
      'Consider routing additional life cover to the estate, or an estate liquidity policy.';
    s.appendChild(liqAlert);
  } else {
    var liqOk = div('info');
    liqOk.style.cssText = 'background:#f0fdf4;border-color:#86efac;color:#166534';
    liqOk.innerHTML = '✓ <strong>Estate is liquid.</strong> Sufficient funds available to cover duty and executor fees without forced asset sales.';
    s.appendChild(liqOk);
  }

  // ── What each beneficiary receives
  s.appendChild(stitle('Beneficiary Outcome Summary'));

  var outCards = div('cards c2');
  outCards.style.marginTop = '0';

  // Spouse receives: 4(q) policies + residual estate after all costs and bequests
  var estateResidual = Math.max(0, netEstate - sec4qDed - totalEstateCosts);
  var c_spouse = div('card');
  c_spouse.innerHTML = '<div class="lbl">Spouse receives</div>' +
    '<div class="val ok">' + Rfmt(section4q + estateResidual) + '</div>' +
    '<div class="sub">Section 4(q) policies: ' + Rfmt(section4q) + '<br>Estate residual: ' + Rfmt(estateResidual) + '</div>';
  outCards.appendChild(c_spouse);

  var c_third = div('card');
  c_third.innerHTML = '<div class="lbl">Third party beneficiaries</div>' +
    '<div class="val">' + Rfmt(toThird) + '</div>' +
    '<div class="sub">Paid direct — no estate duty</div>';
  outCards.appendChild(c_third);

  s.appendChild(outCards);

  // ── Estate planning notes
  s.appendChild(stitle('Estate Planning Notes'));
  s.appendChild(txfld('Notes / recommendations', S, 'estateNotes'));

  return s;
}

// ═══════════════════════════════════════════════════════════
// TAB 8 — SUMMARY & GAPS
// ═══════════════════════════════════════════════════════════
function buildSummary() {
  var s = div();
  var inf=div('info'); inf.textContent='This tab summarises all needs versus existing cover. Complete the other tabs first.'; s.appendChild(inf);

  var pols = S.importedPols || [];

  function pct(v){ return N(v)/100; }
  function sTitle(t){ var d=el('div','stitle',t); d.style.margin='20px 0 10px'; s.appendChild(d); }
  function sBox(){ var b=div(); b.style.cssText='background:#1a2a4a;color:#fff;border-radius:8px;padding:14px 16px;margin-bottom:14px'; s.appendChild(b); return b; }
  function sRow(b,label,val,sub,total){
    var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(total?'8':'4')+'px 0'+(total?';border-top:1px solid #334;margin-top:6px':'');
    var l=el('span','',label); l.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
    var v=el('span','',val); v.style.cssText='font-weight:'+(total?'700':'400')+';color:#c8a84b;font-size:'+(sub?'11':'12')+'px';
    r.appendChild(l); r.appendChild(v); b.appendChild(r);
  }
  function gapBox(label,need,have){
    var gap=have-need;
    var b=div(); b.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-radius:6px;margin-bottom:8px;background:'+(need>0?(gap>=0?'#f0fdf4':'#fef2f2'):'#f9f9f6')+';border:1px solid '+(need>0?(gap>=0?'#bbf7d0':'#fecaca'):'#e5e5e5');
    var left=el('span','',label); left.style.cssText='font-weight:600;font-size:12px';
    var right=div(); right.style.cssText='text-align:right';
    var needSpan=el('div','','Need: '+(need>0?Rfmt(need):'—')); needSpan.style.cssText='font-size:11px;color:#555';
    var haveSpan=el('div','','Have: '+(have>0?Rfmt(have):'—')); haveSpan.style.cssText='font-size:11px;color:#555';
    var gapSpan=el('div','',need>0?(gap>=0?'\u25b2 '+Rfmt(gap)+' surplus':'\u25bc '+Rfmt(Math.abs(gap))+' shortfall'):'—');
    gapSpan.style.cssText='font-weight:700;font-size:13px;color:'+(need>0?(gap>=0?'#16a34a':'#dc2626'):'#999');
    right.appendChild(needSpan); right.appendChild(haveSpan); right.appendChild(gapSpan);
    b.appendChild(left); b.appendChild(right); s.appendChild(b);
  }

  // ── RISK NEEDS
  if(S.scope.death||S.scope.disability||S.scope.dread||S.scope.ip){
    sTitle('Risk Needs Summary');
    if(S.scope.death){
      var totLiab=S.deathLiabs.reduce(function(a,r){return a+N(r.amt);},0);
      var totInc=S.deathIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
      var totCap=S.deathCapital.reduce(function(a,r){return a+N(r.amt);},0);
      var totalDeathNeed=totLiab+totInc+totCap;
      var totalDeathHave=pols.reduce(function(a,p){return p.Type!=='Business Assurance'?a+N(p.BenDeath):a;},0);
      gapBox('Life Cover',totalDeathNeed,totalDeathHave);
    }
    if(S.scope.disability){
      var disInc=S.disIncome.reduce(function(a,r){return a+calcIncomeNeed(r);},0);
      var disCap=S.disCapital.reduce(function(a,r){return a+N(r.amt);},0);
      var disHave=pols.reduce(function(a,p){return a+N(p.BenDisability);},0);
      gapBox('Disability',disInc+disCap,disHave);
    }
    if(S.scope.dread){
      var dreadHave=pols.reduce(function(a,p){return a+N(p.BenDreadDisease);},0);
      gapBox('Dread Disease',N(S.dreadAmt),dreadHave);
    }
    if(S.scope.ip){
      var ipHave=pols.reduce(function(a,p){
        var ib=[]; try{ib=JSON.parse(p.IncomeBenefits||'[]');}catch(e){}
        return a+ib.reduce(function(s,b){return s+N(b.amount);},0);
      },0);
      gapBox('Income Protection /pm',N(S.ipGrossPM||S.ipNettPM),ipHave);
    }
  }

  // ── RETIREMENT SUMMARY
  if(S.scope.retirement){
    var cliAge=ageFrom(S.cli.dob), retAge=N(S.cli.retAge)||65;
    var yrsToR2=cliAge?Math.max(0,retAge-cliAge):null;
    var yrsInRet3=85-retAge;
    if(yrsToR2&&yrsInRet3>0){
      sTitle('Retirement Summary');
      var mNeed3=0;
      if(S.retNeeds&&S.retNeeds.length>0){
        mNeed3=S.retNeeds.reduce(function(a,r){return a+N(r.amtToday);},0);
      } else {
        mNeed3=N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
      }
      // Capitalise other income sources at retirement
      var rentalAtRet3=0;
      if(S.retRentalPM) rentalAtRet3=Math.round(N(S.retRentalPM)*Math.pow(1+pct(S.assump.cpi),yrsToR2));
      var otherIncAtRet3=0;
      (S.otherAssets||[]).forEach(function(a){
        if((a.retirementRole||'')!=='Generates income (farm/business)') return;
        if(N(a.retirementIncomePM)>0) otherIncAtRet3+=Math.round(N(a.retirementIncomePM)*Math.pow(1+pct(S.assump.cpi),yrsToR2));
      });
      var totalOtherInc3=rentalAtRet3+otherIncAtRet3;
      var monthlyAtRet3=mNeed3>0?Math.round(mNeed3*Math.pow(1+pct(S.assump.cpi),yrsToR2)):0;
      var monthlyGapAtRet3=Math.max(0,monthlyAtRet3-totalOtherInc3);
      var monthlyGapToday3=monthlyGapAtRet3>0?monthlyGapAtRet3/Math.pow(1+pct(S.assump.cpi),yrsToR2):0;
      var retTarget3=monthlyGapToday3>0?retirementCapitalNeeded(monthlyGapToday3,yrsToR2,yrsInRet3,S.assump.cpi,S.assump.retReturn):0;
      var lumpAtRet3=(S.retLumps||[]).reduce(function(a,r){return a+N(r.amt);},0);
      var totalCapNeeded3=retTarget3+lumpAtRet3;

      // Project retirement assets
      var totalCapAvail3=S.retAssets.reduce(function(a,r){
        if(!N(r.currentVal)&&!N(r.monthlyContrib)) return a;
        var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
        var esc2=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
        return a+projectFund(r.currentVal,r.monthlyContrib,esc2,gr,yrsToR2);
      },0);
      var otherCapAtRet3=N(S.retOtherCapital);
      totalCapAvail3+=otherCapAtRet3;
      var retGap3=totalCapAvail3-totalCapNeeded3;

      // Other income capitalised
      var _rentalCap3=rentalAtRet3>0?retirementCapitalNeeded(rentalAtRet3/Math.pow(1+pct(S.assump.cpi),yrsToR2),yrsToR2,yrsInRet3,S.assump.cpi,S.assump.retReturn):0;
      var _farmCap3=otherIncAtRet3>0?retirementCapitalNeeded(otherIncAtRet3/Math.pow(1+pct(S.assump.cpi),yrsToR2),yrsToR2,yrsInRet3,S.assump.cpi,S.assump.retReturn):0;
      var _totalOtherCap3=Math.round(_rentalCap3+_farmCap3);
      var grossCapNeed3=Math.round(totalCapNeeded3+_totalOtherCap3);

      var retBox3=div(); retBox3.style.cssText='background:#1a2a4a;border-radius:8px;padding:14px 16px;margin-bottom:14px';
      function r3Row(lbl,val,sub,bold){
        var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
        var l=el('span','',lbl); l.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
        var v=el('span','',val); v.style.cssText='font-size:'+(sub?'11':'12')+'px;color:#c8a84b'+(bold?';font-weight:700':'');
        r.appendChild(l); r.appendChild(v); retBox3.appendChild(r);
      }
      function r3Sub(l,v){ r3Row(l,v,true,false); }
      r3Row('Monthly income needed today', Rfmt(mNeed3)+' /pm');
      r3Row('At retirement (age '+retAge+')', Rfmt(monthlyAtRet3)+' /pm');
      if(totalOtherInc3>0){
        r3Row('Less: ongoing income at retirement','',false,false);
        if(rentalAtRet3>0) r3Sub('Rental — at retirement: '+Rfmt(rentalAtRet3)+'/pm','');
        if(otherIncAtRet3>0) r3Sub('Farm/business — at retirement: '+Rfmt(otherIncAtRet3)+'/pm','');
        r3Row('Net monthly gap', Rfmt(monthlyGapAtRet3)+' /pm');
      }
      r3Row('Gross capital needed','('+Rfmt(grossCapNeed3)+')',false,true);
      r3Sub('Full capital to fund all income for '+yrsInRet3+' years','');
      if(_totalOtherCap3>0){
        r3Row('Less: ongoing income (capitalised)','',false,false);
        if(_rentalCap3>0) r3Sub('Rental capitalised: '+Rfmt(Math.round(_rentalCap3)),'');
        if(_farmCap3>0) r3Sub('Farm/business capitalised: '+Rfmt(Math.round(_farmCap3)),'');
      }
      r3Row('Net capital needed from funds','('+Rfmt(retTarget3)+')',false,true);
      r3Sub('After deducting ongoing income sources','');
      r3Row('Projected capital at retirement',Rfmt(totalCapAvail3),false,true);
      S.retAssets.forEach(function(r){
        if(N(r.currentVal)||N(r.monthlyContrib)){
          var gr=N(r.growthRate)>0?r.growthRate:S.assump.growth;
          var esc2=N(r.contribEsc)>0?r.contribEsc:S.assump.incEsc;
          r3Sub((r.desc||'Fund')+(N(r.monthlyContrib)?' ('+Rfmt(r.monthlyContrib)+'/pm)':''),Rfmt(projectFund(r.currentVal,r.monthlyContrib,esc2,gr,yrsToR2)));
        }
      });
      if(otherCapAtRet3>0) r3Sub('Other assets / property proceeds',Rfmt(otherCapAtRet3));
      var rg3=div(); rg3.style.cssText='display:flex;justify-content:space-between;padding:8px 0;margin-top:8px;border-top:2px solid #445;font-size:14px;font-weight:700';
      var rgl3=el('span','',retGap3>=0?'Overall position \u2014 Surplus':'Overall position \u2014 Shortfall');
      var rgv3=el('span','',Rfmt(Math.abs(retGap3)));
      rgl3.style.color='#ccd6f6'; rgv3.style.color=retGap3>=0?'#86efac':'#f87171';
      rg3.appendChild(rgl3); rg3.appendChild(rgv3); retBox3.appendChild(rg3);
      s.appendChild(retBox3);
    }
  }

  // ── ESTATE SUMMARY
  if(S.scope.estate){
    sTitle('Estate Planning Summary');
    var physAssets=(S.props||[]).reduce(function(a,p){return a+N(p.val);},0)
      +(S.vehicles||[]).reduce(function(a,v){return a+N(v.val);},0)
      +(S.otherAssets||[]).reduce(function(a,x){return a+N(x.val);},0);
    var liabs=(S.props||[]).reduce(function(a,p){return a+N(p.bond);},0)
      +(S.vehicles||[]).reduce(function(a,v){return a+N(v.finance);},0)
      +(S.liabilities||[]).reduce(function(a,l){return a+N(l.bal);},0);
    var s4q=0,estPols=0;
    pols.forEach(function(p){
      if(p.Type==='Business Assurance') return;
      var b=N(p.BenDeath); if(!b) return;
      if((p.BeneficiaryType||'')==='Spouse') s4q+=b;
      else if((p.BeneficiaryType||'')==='Estate') estPols+=b;
    });
    var gross=physAssets+s4q+estPols;
    var net=Math.max(0,gross-liabs);
    var s4qDed=Math.min(s4q,net);
    var afterS4q=Math.max(0,net-s4qDed);
    var dutiable=Math.max(0,afterS4q-ABATEMENT);
    var duty=dutiable<=DUTY_THRESH?dutiable*DUTY_RATE1:DUTY_THRESH*DUTY_RATE1+(dutiable-DUTY_THRESH)*DUTY_RATE2;
    var execFees=(physAssets+estPols)*EXEC_RATE;

    var estBox=div(); estBox.style.cssText='background:#1a2a4a;border-radius:8px;padding:14px 16px;margin-bottom:14px';
    function e3Row(lbl,val,sub,bold){
      var r=div(); r.style.cssText='display:flex;justify-content:space-between;padding:'+(bold?'7':'4')+'px 0'+(bold?';border-top:1px solid #334;margin-top:4px':'');
      var l=el('span','',lbl); l.style.cssText='color:#ccd6f6;font-size:'+(sub?'11':'12')+'px'+(sub?';padding-left:14px':'');
      var v=el('span','',val); v.style.cssText='font-size:'+(sub?'11':'12')+'px;color:#c8a84b'+(bold?';font-weight:700':'');
      r.appendChild(l); r.appendChild(v); estBox.appendChild(r);
    }
    e3Row('Gross estate',Rfmt(gross));
    if(liabs>0) e3Row('Less: liabilities','('+Rfmt(liabs)+')',false,false);
    e3Row('Net estate',Rfmt(net),false,true);
    if(s4qDed>0) e3Row('Less: s.4(q) spouse deduction','('+Rfmt(s4qDed)+')',false,false);
    e3Row('Less: abatement','('+Rfmt(Math.min(afterS4q,ABATEMENT))+')',false,false);
    e3Row('Dutiable amount',Rfmt(dutiable),false,true);
    e3Row('Estate duty',Rfmt(Math.round(duty)),false,true);
    e3Row('Executor fees (est.)',Rfmt(Math.round(execFees)),false,false);
    e3Row('Total estate costs',Rfmt(Math.round(duty+execFees)),false,true);
    // Spouse residue — informational only
    var totalEstateCosts = Math.round(duty+execFees);
    var spouseResidue = Math.max(0, net - s4qDed - totalEstateCosts);
    if(spouseResidue>0){
      e3Row('Estimated residue to spouse/estate',Rfmt(spouseResidue),false,false);
    }
    s.appendChild(estBox);
  }

  return s;
}

function buildROATab() {
  var s = div();
  if (!S.roa) S.roa = {};
  var r = S.roa;
  if (!r.needsRows) r.needsRows = [
    { area:'Life Cover',              quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Disability',              quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Dread Disease / Trauma',  quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Income Protection',       quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Pre-Retirement',          quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Post-Retirement',         quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Savings / Investment',    quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Will / Estate',           quantified:'', priority:'', addressed:'', shortfall:'', review:'' },
    { area:'Other',                   quantified:'', priority:'', addressed:'', shortfall:'', review:'' }
  ];

  var inf = div('info');
  inf.innerHTML = 'Complete the advisory narrative. <strong>All fields are editable</strong> — the FNA provides the analysis but the ROA records what was actually agreed with the client. '
    + 'Section B and the products table are pre-populated as a starting point — override anything.';
  s.appendChild(inf);

  function roaSec(title, key, ph, ht) {
    s.appendChild(stitle(title));
    var ta = document.createElement('textarea');
    ta.style.cssText = 'width:100%;box-sizing:border-box;border:var(--border);border-radius:7px;padding:10px 12px;font-family:inherit;font-size:13px;min-height:'+(ht||90)+'px;resize:vertical';
    ta.placeholder = ph; ta.value = r[key] || '';
    ta.addEventListener('input', function(e){ r[key] = e.target.value; S.roa = r; });
    s.appendChild(ta);
  }

  // Section A
  roaSec('A. Client Objectives', 'objectives', 'e.g. Ensure family is financially secure. Plan for retirement at 65. Review estate structures.', 70);
  roaSec('A. Financial Situation', 'situation', 'e.g. Farmer, income from CC. Assets held in family trust. Married ANC with accrual.', 70);
  roaSec('A. Current Product Experience', 'experience', 'e.g. Existing life and disability cover with Liberty and Sanlam. Sygnia RA and TFS.', 70);

  // Section B — fully editable needs table
  s.appendChild(stitle('B. Needs & Goals Identified'));
  var bInf = div('info');
  bInf.innerHTML = 'Record what was <strong>discussed and agreed</strong> with the client. Fill in the cover amounts taken up, not just what was needed. '
    + 'Leave rows blank if not discussed. Addressed: Yes / Partially / Later / No.';
  s.appendChild(bInf);

  var tbl = document.createElement('table');
  tbl.innerHTML = '<thead><tr>'
    + '<th style="width:18%">Planning Area</th>'
    + '<th style="width:22%">Cover / Amount</th>'
    + '<th style="width:8%">Priority</th>'
    + '<th style="width:18%">Addressed</th>'
    + '<th style="width:18%">Shortfall / Notes</th>'
    + '<th style="width:12%">Review Date</th>'
    + '</tr></thead>';
  var tb = document.createElement('tbody');

  // Pre-populate from FNA where possible
  function fnaHint(rowIdx) {
    var pols = S.importedPols || [];
    switch(rowIdx) {
      case 0: // Life cover
        var need = S.deathLiabs.reduce(function(a,x){return a+N(x.amt);},0)
                 + S.deathIncome.reduce(function(a,x){return a+calcIncomeNeed(x);},0)
                 + S.deathCapital.reduce(function(a,x){return a+N(x.amt);},0);
        var have = pols.reduce(function(a,p){return p.Type!=='Business Assurance'?a+N(p.BenDeath):a;},0);
        return need > 0 ? 'FNA need: '+Rfmt(need)+' / Have: '+Rfmt(have) : '';
      case 1: // Disability
        var dn = S.disIncome.reduce(function(a,x){return a+calcIncomeNeed(x);},0)+S.disCapital.reduce(function(a,x){return a+N(x.amt);},0);
        var dh = pols.reduce(function(a,p){return a+N(p.BenDisability);},0);
        return dn > 0 ? 'FNA need: '+Rfmt(dn)+' / Have: '+Rfmt(dh) : '';
      case 2: // Dread
        var drh = pols.reduce(function(a,p){return a+N(p.BenDreadDisease);},0);
        return N(S.dreadAmt) > 0 ? 'FNA need: '+Rfmt(S.dreadAmt)+' / Have: '+Rfmt(drh) : '';
      case 3: // IP
        return N(S.ipGrossPM) > 0 ? 'FNA need: '+Rfmt(S.ipGrossPM)+'/pm gross' : '';
      case 4: // Pre-retirement
        var cliAge=ageFrom(S.cli.dob), retAge=N(S.cli.retAge)||65, yrsToR=cliAge?Math.max(0,retAge-cliAge):null;
        if(!yrsToR) return '';
        var totalProj=S.retAssets.reduce(function(a,r2){if(!N(r2.currentVal)&&!N(r2.monthlyContrib))return a;var g=N(r2.growthRate)>0?r2.growthRate:S.assump.growth;var e=N(r2.contribEsc)>0?r2.contribEsc:S.assump.incEsc;return a+projectFund(r2.currentVal,r2.monthlyContrib,e,g,yrsToR);},0);
        var mNeed=(S.retNeeds&&S.retNeeds.length>0)?S.retNeeds.reduce(function(a,r2){return a+N(r2.amtToday);},0):N(S.retIncomeToday)+N(S.retMedAidToday)+N(S.retOtherMonthly);
        var capNeed=retirementCapitalNeeded(mNeed,yrsToR,85-retAge,S.assump.cpi,S.assump.retReturn);
        var gap=totalProj-capNeed;
        return capNeed>0?'FNA: need '+Rfmt(capNeed)+' / have '+Rfmt(totalProj)+(gap<0?' \u25bc '+Rfmt(Math.abs(gap))+' shortfall':' \u25b2 surplus'):'';
      default: return '';
    }
  }

  r.needsRows.forEach(function(row, ni) {
    var tr = document.createElement('tr');
    var hint = fnaHint(ni);

    // Area (fixed label)
    var td0 = document.createElement('td');
    td0.style.cssText = 'font-weight:700;font-size:11px';
    td0.textContent = row.area;
    if (hint) {
      var hd = document.createElement('div');
      hd.style.cssText = 'font-size:9px;color:#888;font-weight:400;margin-top:2px';
      hd.textContent = hint;
      td0.appendChild(hd);
    }
    tr.appendChild(td0);

    // Editable cells
    ['quantified','priority','addressed','shortfall','review'].forEach(function(key) {
      var td = document.createElement('td');
      var inp = document.createElement('input');
      inp.type = 'text';
      inp.value = row[key] || '';
      inp.style.cssText = 'width:100%;border:none;border-bottom:1px solid var(--mist);padding:4px 2px;font-size:11px;font-family:inherit;background:transparent';
      if (key === 'addressed') {
        inp.placeholder = 'Yes / Partially / Later / No';
      }
      inp.addEventListener('input', function(e){ r.needsRows[ni][key] = e.target.value; S.roa = r; });
      td.appendChild(inp);
      tr.appendChild(td);
    });

    tb.appendChild(tr);
  });
  tbl.appendChild(tb);
  var tw = div('twrap'); tw.appendChild(tbl); s.appendChild(tw);

  // Section C — products (free text + context from FNA)
  s.appendChild(stitle('C. Products Considered'));
  var cInf = div('info');
  cInf.innerHTML = 'Record companies and quotes considered. The existing policy schedule is shown in the generated document as context.';
  s.appendChild(cInf);
  roaSec('', 'products', 'e.g. Sanlam quoted R1 800/pm for R5m life cover. Liberty quoted R2 100/pm. Client selected Sanlam.', 80);

  // Section D
  roaSec('D. Recommendation & Motivation', 'recommendation',
    'e.g. Recommended increasing life cover by R5m to address shortfall. Retained existing Sanlam policies. '
    + 'Increased RA contribution to R3 000/pm. Client acknowledged age-rated premium risk on trust policy.', 120);

  // Section E
  roaSec('E. Important Information Highlighted to Client', 'important',
    'e.g. Advised on age-rated premium escalation and long-term affordability. Explained estate duty implications of policy beneficiary routing. '
    + 'Discussed s.4(q) deduction and accrual claim.', 90);

  // Section F
  roaSec('F. Products / Advice Client Elected Not to Take', 'declined',
    'e.g. Client declined offshore investment at this stage — to be reviewed at next annual review. '
    + 'Client declined additional dread disease cover citing affordability.', 70);

  roaSec('Additional Comments', 'comments', 'Any additional notes...', 60);

  var brow = div(); brow.style.cssText = 'display:flex;gap:12px;margin-top:20px;flex-wrap:wrap';
  var b1 = document.createElement('button'); b1.className = 'btn btn-gold'; b1.textContent = 'Generate ROA Document';
  b1.addEventListener('click', generateROA); brow.appendChild(b1);
  var b2 = document.createElement('button'); b2.className = 'btn btn-navy'; b2.textContent = 'Save Client File';
  b2.addEventListener('click', saveFile); brow.appendChild(b2);
  s.appendChild(brow);
  return s;
}

    var net=Math.max(0,gross-liabs);
    var s4qDed=Math.min(s4q,net);
    var afterS4q=Math.max(0,net-s4qDed);
    var dutiable=Math.max(0,afterS4q-ABATEMENT);
    var duty=dutiable<=DUTY_THRESH?dutiable*DUTY_RATE1:DUTY_THRESH*DUTY_RATE1+(dutiable-DUTY_THRESH)*DUTY_RATE2;
    var execFees=(physAssets+estPols)*EXEC_RATE;

    h += '<h2>Estate Duty Calculation</h2>';
    h += '<table><thead><tr><th>Item</th><th>Amount</th></tr></thead><tbody>';
    h += '<tr><td>Gross estate (physical assets + deemed policy proceeds)</td><td>'+rfmt(gross)+'</td></tr>';
    if(liabs>0) h += '<tr><td>Less: Liabilities</td><td>('+rfmt(liabs)+')</td></tr>';
    h += '<tr><td>Net estate</td><td><strong>'+rfmt(net)+'</strong></td></tr>';
    if(s4qDed>0) h += '<tr><td>Less: Section 4(q) \u2014 spouse policies</td><td>('+rfmt(s4qDed)+')</td></tr>';
    h += '<tr><td>Less: Primary abatement</td><td>('+rfmt(Math.min(afterS4q,ABATEMENT))+')</td></tr>';
    h += '<tr><td>Dutiable amount</td><td><strong>'+rfmt(dutiable)+'</strong></td></tr>';
    h += '<tr><td>Estate duty (20%)</td><td><strong>'+rfmt(duty)+'</strong></td></tr>';
    h += '<tr><td>Executor fees (4.025%)</td><td>'+rfmt(execFees)+'</td></tr>';
    h += '</tbody></table>';

    h += '<h2>Policy Routing</h2>';
    h += '<table><thead><tr><th>Policy</th><th>Sum Assured</th><th>Beneficiary Type</th><th>Estate Dutiable</th></tr></thead><tbody>';
    pols.forEach(function(p){
      var amt = p.Type==='Business Assurance'?(N(p.LoanAmount)||N(p.BenDeath)):N(p.BenDeath);
      if(!amt&&!N(p.BenFundValue)) return;
      h += '<tr><td>'+esc(p.Insurer||'')+(p.Product?' \u2014 '+esc(p.Product):'')+'</td>';
      h += '<td>'+rfmt(amt||p.BenFundValue)+'</td>';
      h += '<td>'+esc(p.BeneficiaryType||p.BizType||'—')+'</td>';
      h += '<td>'+esc(p.EstateDutiable||'—')+'</td></tr>';
    });
    h += '</tbody></table>';
  }

  // ══ PRINT BUTTON ════════════════════════════════════════════
  h += '<div class="noprint" style="position:fixed;bottom:16px;right:16px;display:flex;gap:8px">';
  h += '<button onclick="window.print()" style="background:#1a2a4a;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700">Print / Save PDF</button>';
  h += '<button onclick="window.close()" style="background:#888;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-size:13px">Close</button></div>';

  h += '</body></html>';

  var win = window.open('','_blank');
  if (win) {
    win.document.write(h); win.document.close();
  } else {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:9999;background:#fff;overflow:auto';
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '\u2715 Close';
    closeBtn.style.cssText = 'position:fixed;top:12px;right:12px;z-index:10000;background:#1a2a4a;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700';
    closeBtn.addEventListener('click', function(){ document.body.removeChild(overlay); });
    var iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:100%;height:100%;border:none';
    overlay.appendChild(closeBtn);
    overlay.appendChild(iframe);
    document.body.appendChild(overlay);
    iframe.contentDocument.write(h);
    iframe.contentDocument.close();
  }
}

// INIT
render();
setInterval(autoSave, 60000);
document.addEventListener('visibilitychange', function(){ if(document.hidden) autoSave(); });
</script>
</body>
</html>
